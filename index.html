ανάγκες των δημόσιων υπηρεσιών. Εξάλλου, το\nαποκαρδιωτικό αυτό φαινόμενο ανιχνεύεται παντού από έρευνες και στατιστικές, που\nδείχνουν ότι έχουμε πολύ δρόμο ακόμα, για να συμπέσει η εντιμότητα των υποσχέσεων με\nτην αποφασιστικότητα των πράξεών μας. Γιατί στις περισσότερες περιπτώσεις, όπου\nυπάρχουν ράμπες, ή δεν έχουν το απαιτούμενο πλάτος, πάνω από 80 εκατοστά, ή υπάρχουν\nεμπόδια στην κίνηση των αναπήρων.\nΠάντως, όλα τα πράγματα μπορούν να τακτοποιηθούν, αν οι προθέσεις είναι καλές,\nαν υπάρχει αλληλεγγύη όχι στα λόγια αλλά στην πράξη. Κάτι τέτοιο θα το επιτύχουμε με\nδιάλογο και συνεργασία του πολίτη με τις κρατικές υπηρεσίες.\nΞανθοπούλου Α.- Δημάκη Π., Τετράδιο Εργασιών Νεοελληνικής Γλώσσας, Α’Β’Γ’ Γυμνασίου, εκδ. Έννοια, Αθήνα 2006\nΔιασκευασμένο για τις ανάγκες των εξετάσεων", "sub": [{"type": "tf", "t": "Οι μεγάλες υποσχέσεις για τη μέριμνα ατόμων με κινητικά προβλήματα δεν γίνονται πράξη", "a": true}, {"type": "tf", "t": "Ο διάλογος του πολίτη με τις κρατικές υπηρεσίες και η συνεργασία τους δίνουν λύσεις", "a": true}, {"type": "tf", "t": "Η αδιαφορία για τους πάσχοντες δεν έχει θέση σε ένα κράτος κοινωνικής πρόνοιας", "a": true}, {"type": "tf", "t": "Η αλληλεγγύη στα λόγια ανακουφίζει τους ανθρώπους που υποφέρουν από αναπηρία", "a": false}, {"type": "tf", "t": "Η εκσυγχρονισμένη κοινωνία μας δεν παρουσιάζει αντιφάσεις", "a": false}, {"type": "mcq", "q": "Στο κείμενο θεωρείται αποκαρδιωτικό το :", "options": ["να λείπουν οι υποσχέσεις", "να ικανοποιούνται οι δευτερεύουσες ανάγκες και όχι οι βασικές", "να αδιαφορούν για τους κήπους"], "answer": 1}, {"type": "mcq", "q": "Όλα τα προβλήματα μπορούν να τακτοποιηθούν:", "options": ["αν διαμαρτυρηθούμε στον Δήμαρχο", "αν προσφέρουμε οικονομική βοήθεια", "αν οι κρατικές υπηρεσίες συνεργάζονται με τους πολίτες"], "answer": 2}, {"type": "mcq", "q": "Το απαιτούμενο πλάτος μιας ράμπας, σύμφωνα με το κείμενο, είναι:", "options": ["90 εκατοστά", "πάνω από 80 εκατοστά", "κάτω από 60 εκατοστά"], "answer": 1}, {"type": "mcq", "q": "Σύμφωνα με το κείμενο, η κίνηση των αναπήρων:", "options": ["διευκολύνεται", "εμποδίζεται", "απαγορεύεται"], "answer": 1}, {"type": "mcq", "q": "μέριμνα", "options": ["αδιαφορία", "φροντίδα", "απορία"], "answer": 1}, {"type": "mcq", "q": "δυστυχώς", "options": ["πρωτίστως", "αμέσως", "ατυχώς"], "answer": 2}, {"type": "mcq", "q": "νιώθει", "options": ["είναι", "αισθάνεται", "νομίζει"], "answer": 1}, {"type": "mcq", "q": "ανιχνεύεται", "options": ["διδάσκεται", "βρίσκεται", "χάνεται"], "answer": 1}, {"type": "mcq", "q": "πτυχές", "options": ["μέτρα", "πλευρές", "γωνιές Ξαναγράψτε τις παρακάτω προτάσεις του κειμένου με βάση τη φράση που δίνεται στην αρχή:"], "answer": 1}, {"type": "typed", "q": "Χθες η μέριμνα για την καλαίσθητη εμφάνιση του εσωτερικού χώρου μεγάλωσε> Από αύριο και κάθε μέρα η μέριμνα για την καλαίσθητη εμφάνιση του εσωτερικού χώρου_____________________________________", "a": "θα μεγαλώνει"}, {"type": "typed", "q": "Αν οι προθέσεις είναι καλές, όλα τα πράγματα μπορούν να τακτοποιηθούν-> Αν οι προθέσεις ήταν καλές, _______________________________________", "a": "όλα τα πράγματα θα μπορούσαν να τακτοποιηθούν"}, {"type": "typed", "q": "Οι μεγάλες εξαγγελίες διαψεύδονται από την καθημερινή πραγματικότητα-> Η καθημερινή πραγματικότητα ____________________________________", "a": "{…} διαψεύδει τις μεγάλες εξαγγελίες"}, {"type": "typed", "q": "Δευτερεύουσες ανάγκες: γράψτε τη φράση που έχει αντίθετη σημασία _____________ ανάγκες", "a": "κύριες/ βασικές/ πρωτεύουσες"}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Σε μια εκδήλωση του Δήμου σας με θέμα «Φροντίστε τους ανάπηρους» μίλησαν άνθρωποι από διάφορες χώρες. Γράψτε μια σύντομη ομιλία για την κατάσταση που επικρατεί στη χώρα σας σχετικά με το θέμα των αναπήρων."}, {"type": "reading", "cat": "reading", "id": "read_097", "title": "!", "passage": "«Τα παιδιά του πολέμου»\nΜεγάλη σημασία για μια πολιτισμένη κοινωνία έχει η ομαλή ανάπτυξη της παιδικής\nηλικίας, η οποία προϋποθέτει ένα κλίμα ειρήνης και ασφάλειας, μακριά από τη βία και τον\nφόβο του πολέμου. Η πραγματική, όμως, εικόνα της καθημερινής ζωής δείχνει ότι δεν\nέχουν όλα τα παιδιά του πλανήτη την ίδια δυνατότητα να μεγαλώσουν σε υγιεινές\nσυνθήκες, να γευθούν τα αγαθά της μόρφωσης, να παίξουν ξένοιαστα και να νιώσουν την\nαγάπη και τη στοργή ενός φιλόξενου κόσμου.\nΚάθε φορά που οι δυνάμεις του πολέμου ή της φύσης διαταράσσουν την αρμονία της\nζωής, οι λέξεις αξιοπρέπεια, ασφάλεια και μέλλον γίνονται άψυχα σχήματα σε άχρηστα\nχαρτιά, γιατί τα όνειρα των παιδιών σωριάζονται στη μανία της βίας και του τρόμου.\nΣήμερα, η σκληρή πραγματικότητα των αριθμών αποκαλύπτει τις απάνθρωπες συνθήκες\nζωής και τον χαμό εκατομμυρίων παιδιών, που θυσιάζονται στους τόπους των πολεμικών\nσυγκρούσεων, σαν να είναι πλάσματα ενός κατώτερου θεού. Ο σύγχρονος πολιτισμός\nδιαιρεί τα παιδιά σε ευνοημένα και μη, γιατί 25 εκατομμύρια σε όλο τον κόσμο έχουν\nεγκαταλείψει τα σπίτια τους, 12 εκατομμύρια είναι άστεγα, 2 εκατομμύρια έχασαν τη ζωή\nτους, 1 εκατομμύριο είναι ορφανά, ενώ 60 εκατομμύρια νάρκες σε 87 χώρες σκορπίζουν\nτον θάνατο σε 10.000 τρυφερές ζωές κάθε χρόνο.\nΑυτός είναι ο τραγικός απολογισμός ενός πολιτισμού που καυχιέται για τις θαυμαστές\nτεχνολογικές επιδόσεις του. Κάτι, επομένως, πρέπει να κατανοήσει, επιτέλους, ο σύγχρονος\nκόσμος. Να ληφθούν μέτρα, για να αποφεύγονται οι αιματηρές συγκρούσεις. Είναι\nυποκριτικό να προκαλούμε τους πολέμους και έπειτα να κλαίμε για τα παιδιά που\nσκοτώνονται, μένουν χωρίς πόδια ή ταξιδεύουν ασυνόδευτα χωρίς προορισμό.\nΞανθοπούλου Α.- Δημάκη Π., Τετράδιο Εργασιών Νεοελληνικής Γλώσσας, Α’Β’Γ’ Γυμνασίου, εκδ. Έννοια, Αθήνα 2006,\nσ.141, Διασκευάστηκε για τις ανάγκες των εξετάσεων", "sub": [{"type": "tf", "t": "Όλα τα παιδιά σήμερα έχουν τη δυνατότητα να παίξουν ξένοιαστα.", "a": false}, {"type": "tf", "t": "Ο σύγχρονος πολιτισμός διχάζει τα παιδιά σε ευνοημένα και μη.", "a": true}, {"type": "tf", "t": "Ο απολογισμός του πολιτισμού είναι τραγικός.", "a": true}, {"type": "tf", "t": "Δύο εκατομμύρια παιδιά είναι άστεγα.", "a": false}, {"type": "tf", "t": "Τα κλάματα αυτών που προκαλούν τους πολέμους είναι υποκριτικά.", "a": true}, {"type": "mcq", "q": "Ένα παιδί, για να αναπτυχθεί ομαλά, σύμφωνα με το κείμενο, χρειάζεται:", "options": ["σιγουριά και ειρήνη", "πόλεμο και ανασφάλεια", "χρήματα και ταξίδια"], "answer": 0}, {"type": "mcq", "q": "Έχουν εγκαταλείψει το σπίτι τους σύμφωνα με το κείμενο:", "options": ["300.000 παιδιά", "25 εκατομμύρια παιδιά", "700 χιλιάδες παιδιά"], "answer": 1}, {"type": "mcq", "q": "Σύμφωνα με το κείμενο πρέπει να ληφθούν μέτρα", "options": ["για να έχουν φαγητό τα παιδιά", "για να πηγαίνουν στο σχολείο τα παιδιά", "για να αποφεύγονται οι πολεμικές συγκρούσεις"], "answer": 2}, {"type": "mcq", "q": "Τα όνειρα των παιδιών γκρεμίζονται από:", "options": ["την έλλειψη νερού", "την έλλειψη τεχνολογικών μέσων", "τη μανία της βίας"], "answer": 2}, {"type": "mcq", "q": "σκληρή", "options": ["ελπιδοφόρα", "μαύρη", "οδυνηρή"], "answer": 2}, {"type": "mcq", "q": "αρμονία", "options": ["ταχύτητα", "ισορροπία", "ελπίδα"], "answer": 1}, {"type": "mcq", "q": "αιματηρές", "options": ["βίαιες", "άσκοπες", "ψυχοφθόρες"], "answer": 0}, {"type": "mcq", "q": "φόβος", "options": ["ελπίδα", "τρόμος", "προσοχή"], "answer": 1}, {"type": "mcq", "q": "ασφάλεια", "options": ["σιγουριά", "εμπιστοσύνη", "αβεβαιότητα Να συμπληρώσετε το κενό/ά με τις κατάλληλες λέξεις:"], "answer": 0}, {"type": "typed", "q": "Σήμερα, η σκληρή πραγματικότητα των αριθμών αποκαλύπτει τις συνθήκες ζωής -> Αύριο, σε μια στιγμή, η σκληρή πραγματικότητα των αριθμών ____________________ τις συνθήκες ζωής .", "a": "θα αποκαλύψει τις συνθήκες ζωής"}, {"type": "typed", "q": "Ο σύγχρονος πολιτισμός διαιρεί τα παιδιά σε ευνοημένα και μη -> Τα παιδιά __________ από _____ __________ __________ σε ευνοημένα και μη.", "a": "διαιρούνται από τον σύγχρονο πολιτισμό"}, {"type": "typed", "q": "Οι δυνάμεις του πολέμου διαταράσσουν function record(id, correct){
  const s = P.stats[id] || {seen:0,correct:0,wrong:0};
  s.seen++; correct? s.correct++ : s.wrong++; s.last = correct?"ok":"no";
  P.stats[id]=s;
  const t=today();
  if(P.lastDay!==t){
    const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
    P.streak = (P.lastDay===y)? P.streak+1 : 1;
    P.lastDay=t;
  }
  save();
}

/* ---- Greek-aware answer matching (accents, final sigma, sound-alikes, typos) ---- */
function grNorm(s){
  s=(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  s=s.replace(/ς/g,"σ").replace(/[^α-ωa-z0-9 ]/g," ");
  return s.replace(/\s+/g," ").trim();
}
function grPhon(s){
  s=grNorm(s);
  s=s.replace(/αυ/g,"αφ").replace(/ευ/g,"εφ");
  s=s.replace(/μπ/g,"β").replace(/ντ/g,"δ").replace(/γκ|γγ/g,"γ");
  s=s.replace(/ει|οι|υι/g,"ι").replace(/[ηυ]/g,"ι");
  s=s.replace(/αι/g,"ε").replace(/ω/g,"ο");
  return s.replace(/(.)\1+/g,"$1");
}
function lev(a,b){
  const m=a.length,n=b.length,d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=0;j<=n;j++)d[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return d[m][n];
}
/* returns 2 = exact, 1 = correct but mis-spelled, 0 = wrong */
function matchScore(user,target){
  const u=grNorm(user), t=grNorm(target);
  if(!u) return 0;
  if(u===t) return 2;
  if(grPhon(user)===grPhon(target)) return 1;
  if(t.split(" ").includes(u) || u.split(" ").includes(t)) return 1;
  const d=lev(grPhon(user),grPhon(target));
  if(d<=1 || (d<=2 && t.length>=8)) return 1;
  return 0;
}

/* ---- picture-answer MCQ: 4 option images, single- or multi-select ---- */
function imgmcqCard(q,next){
  const box=$(`<div></div>`);
  box.appendChild(qhead(q));
  const labels=q.labels||["Α","Β","Γ","Δ"];
  const answer=q.answer.slice().sort((a,b)=>a-b);
  const multi=answer.length>1;
  let answered=false;
  const sel=new Set();
  const els=[];
  if(multi) box.appendChild($(`<p class="multihint">Μπορεί να είναι σωστές παραπάνω από μία. Διάλεξε όλες τις σωστές (${answer.length}), μετά πάτησε «Έλεγχος».</p>`));
  const grid=$(`<div class="imgrid"></div>`);
  q.imgs.forEach((fn,i)=>{
    const el=$(`<button class="imgopt"><span class="mark"></span><img src="img/${fn}" alt="Εικ. ${labels[i]}" loading="lazy"><span class="lab">Εικ. ${labels[i]}</span></button>`);
    el.onclick=()=>{
      if(answered) return;
      if(multi){
        if(sel.has(i)){ sel.delete(i); el.classList.remove("sel"); }
        else { sel.add(i); el.classList.add("sel"); }
        check.disabled = sel.size===0;
      } else {
        answered=true;
        grade(new Set([i]));
      }
    };
    els.push(el); grid.appendChild(el);
  });
  box.appendChild(grid);
  const correctSet=new Set(answer);
  function grade(picked){
    answered=true;
    const ok = picked.size===correctSet.size && [...picked].every(i=>correctSet.has(i));
    record(q.id, ok);
    els.forEach((e,i)=>{
      const isAns=correctSet.has(i), isPick=picked.has(i);
      if(isAns && isPick){ e.className="imgopt ok"; e.querySelector(".mark").textContent="✓"; e.querySelector(".mark").style.color="#059669"; }
      else if(isPick && !isAns){ e.className="imgopt no"; e.querySelector(".mark").textContent="✗"; e.querySelector(".mark").style.color="#e11d48"; }
      else if(isAns && !isPick){ e.className="imgopt miss"; e.querySelector(".mark").textContent="✓"; e.querySelector(".mark").style.color="#059669"; }
      else { e.className="imgopt dim"; }
    });
    if(check) check.remove();
    box.appendChild(nextBtn(next));
  }
  let check=null;
  if(multi){
    check=$(`<button class="btn btn-primary" style="margin-top:6px" disabled>Έλεγχος</button>`);
    check.onclick=()=>{ if(!answered && sel.size) grade(new Set(sel)); };
    box.appendChild(check);
  }
  return box;
}

/* ---- reading comprehension: passage on top + sub-questions inline + writing reveal ---- */
function readingCard(q,next){
  const box=$(`<div></div>`);
  const head=$(`<div class="row" style="align-items:flex-start; margin-bottom:8px"><div class="qtext" style="font-size:19px">${esc(q.title||'Κείμενο')}</div></div>`);
  const lb=$(`<button class="listen">🔊</button>`); lb.onclick=()=>speak((q.title?q.title+'. ':'')+q.passage); head.appendChild(lb);
  box.appendChild(head);
  const pass=$(`<div class="passage"></div>`); pass.textContent=q.passage; box.appendChild(pass);

  const subs=q.sub||[]; const total=subs.length; let answered=0, correct=0;
  const status=$(`<div class="map-status" style="margin:14px 0 4px"></div>`);
  status.textContent = total ? `Απάντησε στις ${total} ερωτήσεις` : '';
  box.appendChild(status);
  function done1(ok){ answered++; if(ok) correct++; status.textContent=`Απαντημένες ${answered}/${total}`; if(answered===total) finish(); }
  function finish(){
    record(q.id, total ? correct/total>=0.6 : true);
    status.textContent=`Ολοκληρώθηκε — ${correct}/${total} σωστά`;
    if(q.writing) box.appendChild(writingBlock(q.writing));
    box.appendChild(nextBtn(next));
  }
  subs.forEach((s,i)=> box.appendChild(readingSub(s,i+1,done1)));
  if(total===0) finish();
  return box;
}
function readingSub(s,num,done){
  const wrap=$(`<div class="rsub"></div>`); let ans=false;
  if(s.type==='mcq'){
    wrap.appendChild($(`<div style="font-weight:600; margin-bottom:9px">${num}. ${esc(s.q)}</div>`));
    const els=[];
    s.options.forEach((o,j)=>{
      const el=$(`<button class="opt"><span>${esc(o)}</span><span></span></button>`);
      el.onclick=()=>{ if(ans)return; ans=true;
        els.forEach((e,k)=>{ if(k===s.answer){e.className="opt ok"; e.lastChild.textContent="✓";}
          else if(k===j){e.className="opt no"; e.lastChild.textContent="✗";} else e.className="opt dim"; });
        done(j===s.answer); };
      els.push(el); wrap.appendChild(el);
    });
  } else if(s.type==='tf'){
    const top=$(`<div class="row" style="align-items:flex-start; gap:8px"></div>`);
    top.appendChild($(`<div style="flex:1; font-weight:600">${num}. ${esc(s.t)}</div>`));
    const sb=$(`<button class="slbtn" title="Σωστό">Σ</button>`), lbn=$(`<button class="slbtn" title="Λάθος">Λ</button>`);
    const pick=(btn,val)=>{ if(ans)return; ans=true; const ok=val===s.a;
      btn.classList.add(ok?'ok':'no'); if(!ok)(s.a?sb:lbn).classList.add('ok');
      [sb,lbn].forEach(b=>{ if(b!==btn && !(b===(s.a?sb:lbn)&&!ok)) b.classList.add('dimd'); });
      done(ok); };
    sb.onclick=()=>pick(sb,true); lbn.onclick=()=>pick(lbn,false);
    top.appendChild(sb); top.appendChild(lbn); wrap.appendChild(top);
  } else {
    wrap.appendChild($(`<div style="font-weight:600; margin-bottom:9px">${num}. ${esc(s.q)}</div>`));
    const inp=$(`<input class="blank-in" style="width:100%; max-width:340px" placeholder="Η απάντησή σου">`);
    const chk=$(`<button class="btn btn-primary" style="margin-top:10px">Έλεγχος</button>`);
    chk.onclick=()=>{ if(ans)return; if(!inp.value.trim()){ flash(chk,'Γράψε απάντηση'); return; } ans=true;
      const ok=matchScore(inp.value, s.a)>0; inp.classList.add(ok?'ok':'no'); chk.remove();
      wrap.appendChild($(`<div class="cloud ${ok?'ok':'no'}" style="margin-top:9px; display:inline-block">${ok?'✓ Σωστό':'✗ Σωστή απάντηση: '+esc(s.a)}</div>`));
      done(ok); };
    wrap.appendChild(inp); wrap.appendChild(chk);
  }
  return wrap;
}
function writingBlock(t){

/* Builds a fill sentence; if it has ≥2 lettered clauses (Α. … Β. …),
   each clause goes on its own line so filling a blank can't reflow the others. */
function buildFillSentence(sentence, makeNode){
  const wrap=$(`<div class="fill-sentence"></div>`);
  const labels=sentence.match(/(?:^|\s)[ΑΒΓΔΕΖ]\.\s/g)||[];
  const enumerated=labels.length>=2;
  const lines = enumerated
    ? sentence.split(/(?=(?:^|\s)[ΑΒΓΔΕΖ]\.\s)/).map(s=>s.trim()).filter(Boolean)
    : [sentence];
  lines.forEach(line=>{
    const ld=$(`<div class="${enumerated?'fill-line':'fill-oneline'}"></div>`);
    line.split(/(⟦\d+⟧)/).forEach(part=>{
      const m=part.match(/⟦(\d+)⟧/);
      if(m) ld.appendChild(makeNode(+m[1]));
      else if(part) ld.appendChild(document.createTextNode(part));
    });
    wrap.appendChild(ld);
  });
  return wrap;
}

/* ---- Fill in the blanks: drag a word into a slot (tap also works) ---- */
function fillCard(q,next){
  const box=$(`<div class="card"></div>`);
  box.appendChild(qhead(q,true));
  const solByNum={}; q.blanks.forEach(([n,t])=>solByNum[n]=t);
  let checked=false, selected=null, selChip=null;
  const isChecked=()=>checked;

  const slots={};
  const sent=buildFillSentence(q.sentence,(n)=>{
    const slot=$(`<span class="slot" data-n="${n}">___</span>`);
    slot.onclick=()=>{
      if(checked) return;
      if(slot.dataset.word){ clearSlot(slot); return; }
      if(selected){ fillSlot(slot,selected); deselect(); }
    };
    slots[n]=slot; return slot;
  });
  box.appendChild(sent);

  function fillSlot(slot,w){ slot.dataset.word=w; slot.textContent=w; slot.classList.add("filled"); }
  function clearSlot(slot){ slot.dataset.word=""; slot.textContent="___"; slot.classList.remove("filled"); }
  function deselect(){ if(selChip) selChip.classList.remove("sel"); selected=null; selChip=null; }

  const bankWrap=$(`<div class="chips"></div>`);
  q.bank.forEach(w=>{
    const chip=$(`<button class="chip">${esc(w)}</button>`);
    makeDraggable(chip,w,slots,fillSlot,isChecked);
    chip.onclick=()=>{
      if(checked||chip._dragged) return;
      if(selChip===chip){ deselect(); return; }
      deselect(); selected=w; selChip=chip; chip.classList.add("sel");
    };
    bankWrap.appendChild(chip);
  });
  box.appendChild(bankWrap);

  const check=$(`<button class="btn btn-primary" style="margin-top:16px">Έλεγχος</button>`);
  check.onclick=()=>{
    if(checked) return;
    const nums=Object.keys(slots);
    if(nums.some(n=>!slots[n].dataset.word)){ flash(check,"Συμπλήρωσε όλα τα κενά"); return; }
    checked=true; let allOk=true;
    nums.forEach(n=>{
      const ok=matchScore(slots[n].dataset.word, solByNum[n])>0;
      slots[n].classList.add(ok?"ok":"no");
      if(!ok){ allOk=false; slots[n].textContent=solByNum[n]; }
    });
    record(q.id, allOk); check.remove(); box.appendChild(nextBtn(next));
  };
  box.appendChild(check);
  return box;
}

/* pointer-based drag that works on touch; a small move = drag, no move = tap */
function makeDraggable(chip,word,slots,fillSlot,isChecked){
  chip.addEventListener("pointerdown",e=>{
    if(isChecked()) return;
    const sx=e.clientX, sy=e.clientY; let moving=false, ghost=null; chip._dragged=false;
    const move=ev=>{
      if(!moving && Math.hypot(ev.clientX-sx,ev.clientY-sy)>6){
        moving=true; chip._dragged=true; chip.classList.add("dragging");
        ghost=chip.cloneNode(true); ghost.classList.add("ghost"); document.body.appendChild(ghost);
      }
      if(moving){
        ghost.style.left=ev.clientX+"px"; ghost.style.top=ev.clientY+"px";
        const el=document.elementFromPoint(ev.clientX,ev.clientY);
        Object.values(slots).forEach(s=>s.classList.remove("hover"));
        const slot=el&&el.closest&&el.closest(".slot"); if(slot) slot.classList.add("hover");
      }
    };
    const up=ev=>{
      document.removeEventListener("pointermove",move); document.removeEventListener("pointerup",up);
      chip.classList.remove("dragging"); Object.values(slots).forEach(s=>s.classList.remove("hover"));
      if(moving){
        if(ghost) ghost.remove();
        const el=document.elementFromPoint(ev.clientX,ev.clientY);
        const slot=el&&el.closest&&el.closest(".slot");
        if(slot && !isChecked()) fillSlot(slot,word);
        setTimeout(()=>{ chip._dragged=false; },60);
      }
    };
    document.addEventListener("pointermove",move); document.addEventListener("pointerup",up);
  });
}

/* ---- Matching: tap a left item, then tap its match on the right ---- */
function matchCard(q,next){
  const box=$(`<div class="card"></div>`);
  box.appendChild(qhead(q,true));
  let checked=false, selLeft=null;
  const assign={}, correct={}, rTxt={};
  q.pairs.forEach(([n,l])=>correct[n]=l);
  q.right.forEach(([l,t])=>rTxt[l]=t);

  const grid=$(`<div class="match-grid"></div>`);
  const leftCol=$(`<div class="match-col"></div>`), rightCol=$(`<div class="match-col"></div>`);
  const leftEls={}, rightEls={};
  q.left.forEach(([n,t])=>{
    const el=$(`<button class="mitem"><span class="mtxt">${esc(t)}</span><span class="mtag"></span></button>`);
    el.onclick=()=>{ if(checked) return; selLeft=n;
      Object.values(leftEls).forEach(e=>e.classList.remove("sel")); el.classList.add("sel"); };
    leftEls[n]=el; leftCol.appendChild(el);
  });
  shuffle(q.right.slice()).forEach(([l,t])=>{
    const el=$(`<button class="mitem"><span class="mtxt">${esc(t)}</span></button>`);
    el.onclick=()=>{ if(checked) return;
      if(selLeft==null){ flash(el,"Διάλεξε πρώτα αριστερά"); return; }
      Object.keys(assign).forEach(k=>{ if(assign[k]===l) delete assign[k]; });
      assign[selLeft]=l; selLeft=null; refresh(); };
    rightEls[l]=el; rightCol.appendChild(el);
  });
  grid.appendChild(leftCol); grid.appendChild(rightCol); box.appendChild(grid);

  function refresh(){
    for(const n in leftEls){ const l=assign[n];
      leftEls[n].querySelector(".mtag").textContent = l?("→ "+rTxt[l]):"";
      leftEls[n].classList.toggle("paired",!!l); leftEls[n].classList.remove("sel"); }
    for(const l in rightEls){ rightEls[l].classList.toggle("used", Object.values(assign).includes(l)); }
  }

  const check=$(`<button class="btn btn-primary" style="margin-top:16px">Έλεγχος</button>`);
  check.onclick=()=>{
    if(checked) return;
    if(Object.keys(assign).length<q.left.length){ flash(check,"Αντιστοίχισε όλα"); return; }
    checked=true; let allOk=true;
    q.left.forEach(([n])=>{ const ok=assign[n]===correct[n];
      leftEls[n].classList.add(ok?"ok":"no");
      if(!ok){ allOk=false; leftEls[n].querySelector(".mtag").textContent="→ "+rTxt[correct[n]]; } });
    record(q.id, allOk); check.remove(); box.appendChild(nextBtn(next));
  };
  box.appendChild(check);
  return box;
}

function listCard(q,next){
  const box=$(`<div class="card"></div>`);
  box.appendChild(qhead(q,true));
  box.appendChild($(`<p class="sub" style="margin:2px 0 12px">Γράψε <b>${q.n}</b> ${q.n===1?"απάντηση":"απαντήσεις"} (μία κάθε φορά):</p>`));
  const cloudWrap=$(`<div class="clouds"></div>`); box.appendChild(cloudWrap);
  const used=[]; let got=0, tries=0;

  const row=$(`<div class="row" style="gap:8px"></div>`);
  const inp=$(`<input class="text-in" type="text" autocomplete="off" placeholder="Η απάντησή σου…">`);
  const sub=$(`<button class="btn btn-primary" style="margin:0">Υποβολή</button>`);
  row.appendChild(inp); row.appendChild(sub); box.appendChild(row);

  function finish(){
    inp.disabled=true; sub.disabled=true;
    const miss=q.pool.filter(p=>!used.includes(p));
    const res=$(`<div class="reveal"><div class="lbl">ΑΠΟΤΕΛΕΣΜΑ</div><div class="ans">Βρήκες ${got}/${q.n} σωστές.</div>
      <div style="margin-top:8px;font-size:14px;color:var(--mut)">Όλες οι αποδεκτές απαντήσεις:</div>
      <div style="margin-top:4px">${q.pool.map(p=>esc(p)).join(" · ")}</div></div>`);
    box.appendChild(res);
    record(q.id, got>=q.n);
    box.appendChild(nextBtn(next));
  }
  function submit(){
    if(tries>=q.n) return;
    const val=inp.value.trim(); if(!val){ return; }
    tries++;
    let best={s:0,p:null};
    q.pool.forEach(p=>{ if(used.includes(p)) return; const s=matchScore(val,p); if(s>best.s) best={s,p}; });
    const cloud=$(`<span class="cloud"></span>`);
    if(best.s>0){
      used.push(best.p); got++;
      cloud.classList.add("ok");
      cloud.innerHTML = best.s===2 ? esc(val) : esc(val)+` <small>→ ${esc(best.p)}</small>`;
    } else {
      cloud.classList.add("no"); cloud.textContent=val;
    }
    cloudWrap.appendChild(cloud);
    inp.value=""; inp.focus();
    if(tries>=q.n) finish();
  }
  sub.onclick=submit;
  inp.addEventListener("keydown",e=>{ if(e.key==="Enter") submit(); });
  return box;
}

function flash(btn,msg){ const o=btn.textContent; btn.textContent=msg; setTimeout(()=>btn.textContent=o,1200); }

/* ---- Recall fill: type each answer; fuzzy-graded (accepts minor typos) ---- */
function typefillCard(q,next){
  const box=$(`<div></div>`);
  box.appendChild(qhead(q,true));
  const sol={}; q.blanks.forEach(([n,t])=>sol[n]=t);
  const inputs={};
  const sent=buildFillSentence(q.sentence,(n)=>{
    const inp=$(`<input class="blank-in" data-n="${n}" autocomplete="off" autocapitalize="off">`);
    inputs[n]=inp; return inp;
  });
  box.appendChild(sent);
  let checked=false;
  const check=$(`<button class="btn btn-primary" style="margin-top:14px">Έλεγχος</button>`);
  check.onclick=()=>{
    if(checked) return;
    if(Object.values(inputs).some(i=>!i.value.trim())){ flash(check,"Συμπλήρωσε όλα τα κενά"); return; }
    checked=true; let allOk=true;
    Object.entries(inputs).forEach(([n,inp])=>{
      const sc=matchScore(inp.value.trim(), sol[n]);
      inp.disabled=true; inp.classList.add(sc>0?"ok":"no");
      if(sc===0){ allOk=false; inp.after($(`<span class="corr">→ ${esc(sol[n])}</span>`)); }
      else if(sc===1){ inp.after($(`<span class="corr ok-note">✓ ${esc(sol[n])}</span>`)); }
    });
    record(q.id, allOk); check.remove(); box.appendChild(nextBtn(next));
  };
  box.appendChild(check);
  return box;
}

/* ---- Interactive segmented map of Greece (74 regional units) ---- */
function attribLine(){
  return $(`<div class="map-attrib">Δεδομένα ορίων: peterdsp/greece-prefectures-and-units (GitHub)</div>`);
}
/* Overlay transparent, click-forwarding circles on tiny island units so they're
   easy to tap (the halo is in SVG units, so it grows with zoom). Visual map unchanged. */
function addHaloHits(svg, onHalo){
  if(!svg || svg._haloed) return; svg._haloed=true;
  const NS="http://www.w3.org/2000/svg";
  const SMALL=22;   // units: treat a unit as "small" if its larger side < this
  const MINR=11;    // minimum halo radius in viewBox units (~22u tap diameter)
  svg.querySelectorAll('path').forEach(p=>{
    let bb; try{ bb=p.getBBox(); }catch(e){ return; }
    const maxd=Math.max(bb.width,bb.height);
    if(maxd<=0 || maxd>=SMALL) return;
    const r=Math.max(MINR, maxd*0.6);
    const h=document.createElementNS(NS,"circle");
    h.setAttribute("cx", bb.x+bb.width/2);
    h.setAttribute("cy", bb.y+bb.height/2);
    h.setAttribute("r", r);
    h.setAttribute("fill","transparent");
    h.setAttribute("class","hit-halo");
    h.style.cursor="pointer";
    h._unit=p;   // the map interaction engine resolves a tapped halo to this unit path
    if(onHalo) h.addEventListener('click', e=>{ e.stopPropagation(); onHalo(p); });
    svg.appendChild(h);
  });
}

/* Pan/zoom/tap engine for the map. Two-finger pinch zoom, one-finger drag to pan,
   wheel zoom on desktop, and tap detection that routes the tapped unit to onTap(pathEl).
   Keeps the map's instant green/red feedback: a tap just colours the unit under the finger. */
/* Pan/zoom engine. Transforms the PAN DIV (not the <svg> root — Safari/iOS renders CSS
   transforms on the svg element unreliably, which broke both pinch and the live re-colouring
   of regions). Selection itself stays on the units' own click handlers, so a tapped region
   colours instantly; this engine only moves the map and tells the click handler to ignore the
   click that follows a drag/pinch (via suppressed()). */
function attachMapInteraction(wrap, pan, btns){
  const view={scale:1, tx:0, ty:0};
  let suppressUntil=0;
  pan.style.transformOrigin="0 0";
  const apply=()=>{ pan.style.transform=`translate(${view.tx}px,${view.ty}px) scale(${view.scale})`; };
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const clampApply=()=>{
    const W=wrap.clientWidth, H=wrap.clientHeight;
    view.tx=Math.min(0, Math.max(W*(1-view.scale), view.tx));
    view.ty=Math.min(0, Math.max(H*(1-view.scale), view.ty));
    apply();
  };
  function zoomAt(fx,fy,ns){
    ns=clamp(ns,1,8);
    const cx=(fx-view.tx)/view.scale, cy=(fy-view.ty)/view.scale;
    view.tx=fx-cx*ns; view.ty=fy-cy*ns; view.scale=ns; clampApply();
  }
  const rect=()=>wrap.getBoundingClientRect();
  const markMoved=()=>{ suppressUntil=Date.now()+450; };

  // ---- touch: two-finger pinch + one-finger pan ----
  let tDist=0, tScale=1, tFocus=null, tPan=null, tTx=0, tTy=0, tMoved=false, tMode=null;
  wrap.addEventListener('touchstart',e=>{
    if(e.touches.length>=2){
      tMode='pinch'; tMoved=true;
      const a=e.touches[0], b=e.touches[1], r=rect();
      tDist=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY)||1; tScale=view.scale;
      tFocus={x:(a.clientX+b.clientX)/2-r.left, y:(a.clientY+b.clientY)/2-r.top};
      markMoved(); e.preventDefault();
    } else if(e.touches.length===1){
      tMode='tap'; tMoved=false;
      const t=e.touches[0]; tPan={x:t.clientX,y:t.clientY}; tTx=view.tx; tTy=view.ty;
    }
  },{passive:false});
  wrap.addEventListener('touchmove',e=>{
    if(tMode==='pinch' && e.touches.length>=2){
      const a=e.touches[0], b=e.touches[1];
      const d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY)||1;
      zoomAt(tFocus.x, tFocus.y, tScale*(d/tDist)); markMoved(); e.preventDefault();
    } else if(tPan && e.touches.length===1){
      const t=e.touches[0], dx=t.clientX-tPan.x, dy=t.clientY-tPan.y;
      if(Math.abs(dx)+Math.abs(dy)>8){ tMoved=true; tMode='pan'; markMoved(); wrap.classList.add('grabbing'); }
      if(view.scale>1 && tMoved){ view.tx=tTx+dx; view.ty=tTy+dy; clampApply(); e.preventDefault(); }
    }
  },{passive:false});
  const tEnd=e=>{ if(tMoved) markMoved(); if(!e.touches||e.touches.length===0){ tMode=null; tPan=null; tMoved=false; wrap.classList.remove('grabbing'); } };
  wrap.addEventListener('touchend',tEnd);
  wrap.addEventListener('touchcancel',tEnd);

  // ---- mouse (desktop): drag pan + wheel zoom ----
  let mDown=false, mStart=null, mTx=0, mTy=0, mMoved=false;
  wrap.addEventListener('mousedown',e=>{ mDown=true; mMoved=false; mStart={x:e.clientX,y:e.clientY}; mTx=view.tx; mTy=view.ty; });
  wrap.addEventListener('mousemove',e=>{
    if(!mDown) return;
    const dx=e.clientX-mStart.x, dy=e.clientY-mStart.y;
    if(Math.abs(dx)+Math.abs(dy)>6){ mMoved=true; markMoved(); wrap.classList.add('grabbing'); }
    if(view.scale>1 && mMoved){ view.tx=mTx+dx; view.ty=mTy+dy; clampApply(); }
  });
  const mUp=()=>{ if(mMoved) markMoved(); mDown=false; wrap.classList.remove('grabbing'); };
  wrap.addEventListener('mouseup',mUp);
  wrap.addEventListener('mouseleave',mUp);
  wrap.addEventListener('wheel',e=>{ e.preventDefault(); const r=rect(); zoomAt(e.clientX-r.left,e.clientY-r.top, view.scale*Math.exp(-e.deltaY*0.0015)); },{passive:false});

  if(btns){
    const ctr=()=>{ const r=rect(); return [r.width/2,r.height/2]; };
    btns.plus  && (btns.plus.onclick =()=>{ const c=ctr(); zoomAt(c[0],c[1],view.scale+0.6); });
    btns.minus && (btns.minus.onclick=()=>{ const c=ctr(); zoomAt(c[0],c[1],view.scale-0.6); });
    btns.reset && (btns.reset.onclick=()=>{ view.scale=1; view.tx=0; view.ty=0; apply(); });
  }
  return { view, suppressed:()=>Date.now()<suppressUntil };
}

function mapCard(q,next){
  const box=$(`<div></div>`);
  box.appendChild(qhead(q,true));

  // zoom toolbar
  const tools=$(`<div class="map-tools"></div>`);
  const bMinus=$(`<button aria-label="zoom out">−</button>`);
  const bReset=$(`<button aria-label="reset" style="font-size:16px">⟲</button>`);
  const bPlus=$(`<button aria-label="zoom in">+</button>`);
  const hint=$(`<span class="map-hint">Τσίμπησε για ζουμ · σύρε για μετακίνηση</span>`);
  tools.appendChild(bMinus); tools.appendChild(bReset); tools.appendChild(bPlus); tools.appendChild(hint);

  const wrap=$(`<div class="map-wrap"></div>`);
  const pan=$(`<div class="map-pan"></div>`);
  pan.innerHTML=window.GREECE_SVG||"";
  wrap.appendChild(pan);
  const svg=pan.querySelector('svg');

  const status=$(`<div class="map-status"></div>`);
  const legend=$(`<div class="map-legend"></div>`);
  box.appendChild(tools); box.appendChild(wrap); box.appendChild(status); box.appendChild(legend);
  const sget=id=>svg.querySelector('#'+id);
  const U=window.GREECE_UNITS||{};
  const eng=attachMapInteraction(wrap, pan, {plus:bPlus,minus:bMinus,reset:bReset});

  // Wire up selection: a tap on a unit (or its halo) runs onTap, unless it was the
  // tail of a drag/pinch gesture. Native clicks keep the instant green/red colouring rock-solid.
  function wireTaps(onTap){
    const tap=p=>{ if(eng.suppressed()) return; onTap(p); };
    svg.querySelectorAll('path').forEach(p=>p.addEventListener('click',()=>tap(p)));
    requestAnimationFrame(()=>addHaloHits(svg, tap));
    box.appendChild(attribLine());
    return box;
  }

  if(q.mode==="pickN"){
    const acc=new Set(q.accept); let found=0, errors=0, fin=false;
    status.textContent=`Βρες ${q.n} — πάτησέ τες στον χάρτη.`;
    return wireTaps(p=>{
      if(fin||p.classList.contains('ok')||p.classList.contains('no')) return;
      if(acc.has(p.id)){ p.classList.add('ok'); found++; status.textContent=`Βρέθηκαν ${found}/${q.n}`; }
      else { p.classList.add('no'); errors++; status.textContent=`Λάθος: ${U[p.id.slice(1)]||''}`; }
      if(found>=q.n){ fin=true; record(q.id, errors===0);
        legend.appendChild($(`<div class="corr ${errors===0?'ok-note':''}">Αποδεκτές: ${esc(q.answerText)}</div>`));
        box.appendChild(nextBtn(next)); }
    });
  }

  // locate mode — every tap immediately green (a target) or red (not)
  const targets=q.targets.map((t,i)=>({label:t.label,codes:t.codes,hit:false,i}));
  let errors=0, done=0;
  const chips={};
  if(q.showList){
    targets.forEach(t=>{ const c=$(`<span class="mchip">${esc(t.label)}</span>`); chips[t.i]=c; legend.appendChild(c); });
  } else {
    status.textContent=`Βρες και πάτησε τις ${targets.length} περιοχές στον χάρτη.`;
  }
  const c2t={};
  targets.forEach(t=>t.codes.forEach(c=>{(c2t[c]=c2t[c]||[]).push(t);}));
  return wireTaps(p=>{
    if(done===targets.length) return;
    if(p.classList.contains('no')) return;            // already-wrong stays wrong
    const ts=(c2t[p.id]||[]).filter(t=>!t.hit);
    if(!c2t[p.id]){                                    // not part of any answer → red, persists
      if(!p.classList.contains('ok')){ p.classList.add('no'); errors++; status.textContent=`Λάθος: ${U[p.id.slice(1)]||''}`; }
      return;
    }
    ts.forEach(t=>{ t.hit=true; done++;
      t.codes.forEach(c=>{const pp=sget(c); if(pp){pp.classList.remove('no'); pp.classList.add('ok');}});
      if(chips[t.i]){ chips[t.i].classList.add('done'); chips[t.i].textContent='✓ '+t.label; }
      else legend.appendChild($(`<span class="mchip done">✓ ${esc(t.label)}</span>`));
      status.textContent=`Σωστά: ${t.label}`;
    });
    if(done===targets.length){
      record(q.id, errors===0);
      status.textContent = errors===0 ? 'Τέλεια — όλα σωστά!' : `Ολοκληρώθηκε (${errors} λάθος).`;
      box.appendChild(nextBtn(next));
    }
  });
}

function nextBtn(next){
  const b=$(`<button class="btn btn-primary" style="margin-top:18px">Επόμενη</button>`);
  b.onclick=next; return b;
}

/* ---- Mock exam (multiple-choice, 4 options, 4/4/6/6) ---- */
function buildMock(){
  const pick=(c,n)=> shuffle(QS.filter(q=>q.cat===c && q.type==="mcq" && q.options && q.options.length===4)).slice(0,n);
  const qs=shuffle([...pick("geography",4),...pick("culture",4),...pick("history",6),...pick("institutions",6)]);
  return {qs, i:0, ans:{}, done:false};
}
function mockView(){
  if(!mock){ mock=buildMock(); }
  app.innerHTML="";
  const w=$(`<div class="pad"></div>`);
  if(!mock.started){
    w.appendChild($(`<h1 style="margin:28px 0 8px">Δοκιμαστική Εξέταση</h1>`));
    w.appendChild($(`<p class="sub" style="margin-bottom:20px">20 ερωτήσεις πολλαπλής επιλογής όπως στην πραγματική εξέταση: 4 Γεωγραφία, 4 Πολιτισμός, 6 Ιστορία, 6 Θεσμοί. Χρειάζεσαι 50% για να περάσεις αυτό το μέρος.</p>`));
    const b=$(`<button class="btn btn-primary">Ξεκίνα</button>`); b.onclick=()=>{mock.started=true; mockView();}; w.appendChild(b);
    if(P.mocks.length){
      w.appendChild($(`<h2 class="sec">Προηγούμενες προσπάθειες</h2>`));
      P.mocks.slice(-5).reverse().forEach(m=>{
        const ok=m.score/m.total>=.5;
        w.appendChild($(`<div class="card row" style="margin-bottom:8px"><span class="sub">${m.date}</span><span style="margin-left:auto; font-weight:700; color:${ok?'var(--ok)':'var(--no)'}">${m.score}/${m.total} ${ok?'✓':''}</span></div>`));
      });
    }
    app.appendChild(w); renderNav(); return;
  }
  if(mock.done){
    const sc=Object.entries(mock.ans).filter(([id,a])=>{const q=mock.qs.find(x=>x.id===id); return q&&a===q.answer;}).length;
    const pass=sc/mock.qs.length>=.5;
    w.appendChild($(`<div class="center" style="margin-top:40px">
      <div style="width:96px;height:96px;border-radius:50%;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;font-size:46px;background:${pass?'#d1fae5':'#ffe4e6'}">${pass?'✓':'↻'}</div>
      <h1 style="margin:0">${sc}/${mock.qs.length}</h1>
      <p style="font-weight:700;color:${pass?'var(--ok)':'var(--no)'}">${pass?'Πέρασες αυτό το μέρος! 🎉':'Λίγο ακόμα — συνέχισε τη μελέτη.'}</p>
      <p class="small" style="margin-bottom:30px">Όριο επιτυχίας στις θεματικές ενότητες: 50%</p></div>`));
    const b1=$(`<button class="btn btn-primary" style="margin-bottom:10px">Νέα δοκιμή</button>`); b1.onclick=()=>{mock=buildMock(); mock.started=true; mockView();};
    const b2=$(`<button class="btn btn-soft">Τέλος</button>`); b2.onclick=()=>{mock=null; view="home"; render();};
    w.appendChild(b1); w.appendChild(b2); app.appendChild(w); renderNav(); return;
  }
  const q=mock.qs[mock.i]; const chosen=mock.ans[q.id]; const answered=chosen!==undefined;
  w.appendChild($(`<div class="row" style="margin-top:28px"><span class="small">Ερώτηση ${mock.i+1} από ${mock.qs.length}</span>
    <span class="badge" style="margin-left:auto; background:${CATS[q.cat].color}1a; color:${CATS[q.cat].color}">${CATS[q.cat].short}</span></div>`));
  w.appendChild($(`<div class="bar" style="margin:10px 0 20px"><i style="width:${(mock.i+1)/mock.qs.length*100}%;background:var(--sky)"></i></div>`));
  w.appendChild(qhead(q));
  q.options.forEach((o,i)=>{
    let cls="opt";
    if(answered){ if(i===q.answer)cls="opt ok"; else if(i===chosen)cls="opt no"; else cls="opt dim"; }
    const el=$(`<button class="${cls}"><span>${esc(o)}</span><span>${answered&&i===q.answer?'✓':(answered&&i===chosen?'✗':'')}</span></button>`);
    if(!answered) el.onclick=()=>{ record(q.id,i===q.answer); mock.ans[q.id]=i; mockView(); };
    w.appendChild(el);
  });
  if(answered){
    const last=mock.i+1>=mock.qs.length;
    const b=$(`<button class="btn btn-primary" style="margin-top:8px">${last?'Δες το αποτέλεσμα':'Επόμενη'}</button>`);
    b.onclick=()=>{ if(last){ const sc=Object.entries(mock.ans).filter(([id,a])=>{const qq=mock.qs.find(x=>x.id===id);return qq&&a===qq.answer;}).length; P.mocks.push({date:today(),score:sc,total:mock.qs.length}); save(); mock.done=true;} else mock.i++; mockView(); };
    w.appendChild(b);
  }
  app.appendChild(w); renderNav();
}

function progressView(){
  const w=$(`<div class="pad"></div>`);
  w.appendChild($(`<h1 style="margin:28px 0 18px">Η Πρόοδός σου</h1>`));
  const seen=Object.values(P.stats).reduce((a,s)=>a+s.seen,0);
  w.appendChild($(`<div class="card row" style="gap:18px"><div>${ring(readiness(),"#0d5eaf","#e2e8f0")}</div>
    <div><div class="title">Συνολική ετοιμότητα</div><div class="sub" style="margin-top:3px">${seen} απαντήσεις συνολικά</div>
    <div style="color:#d97706; font-weight:700; font-size:14px; margin-top:6px">🔥 ${P.streak} μέρες σερί</div></div></div>`));
  w.appendChild($(`<h2 class="sec">Ανά ενότητα</h2>`));
  Object.entries(CATS).forEach(([k,c])=>{
    const p=catProg(k), pct=p.total?Math.round(p.known/p.total*100):0;
    w.appendChild($(`<div class="card" style="margin-bottom:11px"><div class="row" style="margin-bottom:6px; gap:9px"><span class="ico" style="width:30px; height:30px; border-radius:8px; background:${c.color}1a">${icon(k,18)}</span><b>${c.label}</b><span class="count">${p.known}/${p.total}</span></div>
      <div class="bar"><i style="width:${pct}%;background:${c.color}"></i></div></div>`));
  });
  const m=mistakes().length;
  w.appendChild($(`<div class="card row" style="margin-top:6px"><b>Ερωτήσεις για επανάληψη</b><span style="margin-left:auto; font-weight:700; color:${m?'var(--no)':'var(--ok)'}">${m}</span></div>`));
  w.appendChild($(`<p class="small center" style="margin-top:24px">Συνολικά ${QS.length} ερωτήσεις από την επίσημη Τράπεζα Θεμάτων (Απρίλιος 2026)</p>`));
  app.appendChild(w);
}

function renderNav(){
  const nav=document.getElementById("nav");
  const items=[["home","Αρχική","home"],["study","Μελέτη","study"],["mock","Εξέταση","mock"],["progress","Πρόοδος","progress"]];
  nav.innerHTML="";
  items.forEach(([k,l,e])=>{
    const b=$(`<button class="${view===k?'on':''}"><span class="ni">${icon(e,24)}</span><span>${l}</span></button>`);
    b.onclick=()=>{ view=k; if(k==="study")cat=null; if(k==="mock")mock=null; render(); };
    nav.appendChild(b);
  });
}
