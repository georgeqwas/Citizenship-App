<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0369a1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Ελληνική Ιθαγένεια — Προετοιμασία</title>
<style>
  :root{
    --sky:#0369a1; --sky2:#0284c7; --ink:#1e293b; --mut:#64748b;
    --line:#e2e8f0; --bg:#f1f5f9; --ok:#059669; --okbg:#ecfdf5; --no:#e11d48; --nobg:#fff1f2;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{margin:0; background:var(--bg); font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; color:var(--ink)}
  #app{max-width:480px; margin:0 auto; min-height:100vh; background:var(--bg); padding-bottom:84px}
  .pad{padding:0 18px}
  .hidden{display:none!important}
  /* header */
  .hdr{position:relative; z-index:0; background:linear-gradient(180deg,var(--sky),var(--sky2)); color:#fff; padding:34px 18px 46px; border-radius:0 0 26px 26px}
  .hdr .brand{display:flex; align-items:center; gap:8px; opacity:.92; font-size:14px; font-weight:600}
  .hdr h1{margin:6px 0 18px; font-size:25px}
  .ringrow{display:flex; align-items:center; gap:20px}
  .pill{display:inline-flex; align-items:center; gap:7px; background:rgba(255,255,255,.16); padding:7px 13px; border-radius:999px; font-weight:600; font-size:15px; margin-top:8px}
  /* cards */
  .card{background:#fff; border-radius:18px; box-shadow:0 1px 3px rgba(0,0,0,.06); padding:16px}
  .card:active{transform:scale(.99)}
  .row{display:flex; align-items:center; gap:13px}
  .ico{width:48px; height:48px; border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:24px; flex:0 0 auto; color:#334155}
  .ico .ic{display:block}
  [data-theme="dark"] .ico{color:#e2e8f0}
  .grid .card.wide{grid-column:span 2}
  .passage{white-space:pre-wrap; font-size:15.5px; line-height:1.6; background:#f8fafc; border:1px solid var(--line); border-radius:12px; padding:14px; max-height:300px; overflow:auto; margin-bottom:6px}
  [data-theme="dark"] .passage{background:#0f172a; border-color:#334155}
  .rsub{margin-bottom:16px; padding-bottom:14px; border-bottom:1px solid var(--line)}
  .title{font-weight:700; font-size:18px}
  .sub{color:var(--mut); font-size:14px}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .bar{height:7px; background:var(--line); border-radius:99px; overflow:hidden; margin-top:9px}
  .bar > i{display:block; height:100%; border-radius:99px}
  h2.sec{font-size:18px; margin:22px 0 12px}
  .chev{margin-left:auto; color:#cbd5e1; font-size:22px}
  /* buttons */
  button{font-family:inherit}
  .btn{display:block; width:100%; border:none; border-radius:16px; padding:16px; font-size:18px; font-weight:700; cursor:pointer}
  .btn-primary{background:var(--sky); color:#fff}
  .btn-warn{background:#f59e0b; color:#fff}
  .btn-dark{background:#1e293b; color:#fff}
  .btn-soft{background:#e2e8f0; color:#475569}
  .opt{display:flex; justify-content:space-between; align-items:center; gap:10px; width:100%; text-align:left; border:2px solid var(--line); background:#fff; border-radius:16px; padding:15px; font-size:17px; font-weight:600; color:#334155; cursor:pointer; margin-bottom:11px}
  .opt.ok{background:var(--okbg); border-color:#34d399; color:#065f46}
  .opt.no{background:var(--nobg); border-color:#fda4af; color:#9f1239}
  .opt.dim{color:#94a3b8; border-color:#eef2f7}
  .listen{flex:0 0 auto; width:44px; height:44px; border-radius:999px; border:none; background:#e0f2fe; color:var(--sky); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center}
  .qtext{font-size:21px; font-weight:700; line-height:1.32; flex:1; white-space:pre-line}
  .badge{font-size:12px; font-weight:700; padding:4px 10px; border-radius:999px}
  .tfrow{background:#fff; border:2px solid #eef2f7; border-radius:16px; padding:14px; margin-bottom:11px}
  .tfbtns{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:11px}
  .tfbtn{border:none; border-radius:12px; padding:13px; font-size:17px; font-weight:700; background:#eef2f7; color:#475569; cursor:pointer}
  .tfbtn.sel{background:var(--sky); color:#fff}
  .tfbtn.ok{background:#d1fae5; color:#065f46; box-shadow:inset 0 0 0 2px #34d399}
  .tfbtn.no{background:#ffe4e6; color:#9f1239; box-shadow:inset 0 0 0 2px #fb7185}
  .slbtn{flex:0 0 auto; width:42px; height:42px; border-radius:11px; border:1.5px solid var(--line); background:#fff; color:var(--ink); font-size:18px; font-weight:800; cursor:pointer}
  .slbtn.ok{background:#d1fae5; color:#065f46; border-color:#34d399}
  .slbtn.no{background:#ffe4e6; color:#9f1239; border-color:#fb7185}
  .slbtn.dimd{opacity:.4}
  .catbtns{display:flex; flex-wrap:wrap; gap:8px}
  .catbtn{flex:1; min-width:120px; border:1.5px solid var(--line); background:#fff; color:var(--ink); border-radius:12px; padding:11px 12px; font-size:15px; font-weight:600; cursor:pointer; text-align:left}
  .catbtn b{color:var(--sky); margin-right:4px}
  .catbtn.ok{background:#d1fae5; color:#065f46; border-color:#34d399}
  .catbtn.no{background:#ffe4e6; color:#9f1239; border-color:#fb7185}
  .catbtn.dimd{opacity:.4}
  .note{background:#f1f5f9; border-radius:12px; padding:12px; color:#475569; font-size:15px; line-height:1.5; margin:14px 0}
  .reveal{background:var(--okbg); border:1px solid #a7f3d0; border-radius:16px; padding:16px; margin:6px 0 14px}
  .reveal .lbl{font-size:12px; font-weight:700; color:var(--ok); margin-bottom:4px}
  .reveal .ans{font-size:18px; font-weight:700; color:#065f46; line-height:1.4; white-space:pre-line}
  .back{background:none; border:none; color:var(--sky); font-weight:600; font-size:16px; cursor:pointer; padding:0; display:inline-flex; align-items:center; gap:4px; margin:26px 0 6px}
  .center{text-align:center}
  /* nav */
  .nav{position:fixed; left:50%; transform:translateX(-50%); bottom:0; width:100%; max-width:480px; z-index:20; background:#fff; border-top:1px solid var(--line); display:flex; padding:8px 4px; padding-bottom:max(8px,env(safe-area-inset-bottom))}
  .nav button{flex:1; background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:2px; padding:6px 0; color:#94a3b8; font-size:12px; font-weight:600; cursor:pointer}
  .nav button.on{color:var(--sky)}
  .nav .ni{font-size:22px}
  .small{font-size:13px; color:var(--mut)}
  .count{margin-left:auto; font-size:14px; color:var(--mut)}
  /* interactive fill + list + match */
  .qimg{display:block; max-width:100%; max-height:340px; margin:4px auto 16px; border-radius:12px; border:1px solid var(--line); background:#fff}
  /* multi-image MCQ (picture-answer) */
  .imgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:6px 0 8px}
  .imgopt{position:relative; border:2.5px solid var(--line); background:#fff; border-radius:14px; padding:8px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:6px}
  .imgopt img{width:100%; height:150px; object-fit:contain; border-radius:8px; pointer-events:none}
  .imgopt .lab{font-size:15px; font-weight:800; color:var(--mut)}
  .imgopt .mark{position:absolute; top:6px; right:9px; font-size:22px; font-weight:900; line-height:1}
  .imgopt.sel{border-color:var(--sky); background:#f0f9ff}
  .imgopt.ok{border-color:#34d399; background:var(--okbg)}
  .imgopt.ok .lab{color:#065f46}
  .imgopt.no{border-color:#fb7185; background:var(--nobg)}
  .imgopt.no .lab{color:#9f1239}
  .imgopt.dim{opacity:.45}
  .imgopt.miss{border-color:#34d399; border-style:dashed}
  .multihint{font-size:14px; color:var(--mut); margin:2px 0 12px}
  .fill-sentence{font-size:18px; line-height:2.2; margin:6px 0 18px}
  .fill-line{display:block; margin-bottom:10px; line-height:2}
  .slot{display:inline-block; min-width:62px; text-align:center; border-bottom:2px dashed var(--sky); background:#f0f9ff; color:var(--ink); font-size:16px; font-weight:600; padding:2px 8px; margin:0 2px; border-radius:6px 6px 0 0; cursor:pointer}
  .slot.filled{border-bottom-style:solid; background:#e0f2fe}
  .slot.hover{background:#bae6fd; outline:2px solid var(--sky)}
  .slot.ok{background:var(--okbg); color:var(--ok); border-bottom-color:var(--ok)}
  .slot.no{background:var(--nobg); color:var(--no); border-bottom-color:var(--no)}
  .chips{display:flex; flex-wrap:wrap; gap:8px}
  .chip{background:#fff; border:1.5px solid var(--line); border-radius:20px; padding:8px 14px; font-size:15px; font-weight:600; color:var(--ink); cursor:grab; touch-action:none; user-select:none}
  .chip.sel{border-color:var(--sky); background:#e0f2fe; color:var(--sky)}
  .chip.dragging{opacity:.35}
  .chip.ghost{position:fixed; transform:translate(-50%,-50%); pointer-events:none; z-index:9999; box-shadow:0 8px 24px rgba(2,132,199,.35); border-color:var(--sky); color:var(--sky); background:#e0f2fe}
  .map-tools{display:flex; gap:8px; align-items:center; margin:6px 0}
  .map-tools button{width:42px; height:42px; border-radius:10px; border:1.5px solid var(--line); background:var(--card); color:var(--ink); font-size:22px; font-weight:700; cursor:pointer; line-height:1}
  .map-tools button:active{background:var(--okbg)}
  .map-hint{font-size:12px; opacity:.6}
  .map-wrap{position:relative; width:100%; overflow:hidden; margin:6px 0; border-radius:14px; background:#cfe8ff; touch-action:none; user-select:none; -webkit-user-select:none; cursor:grab}
  .map-wrap.grabbing{cursor:grabbing}
  .map-pan{width:100%; transform-origin:0 0; will-change:transform}
  .map-wrap svg{display:block; width:100%; height:auto}
  .gr-map path{fill:#e9e2cf; stroke:#b0a48c; stroke-width:0.6; cursor:pointer; transition:fill .1s}
  .gr-map path.ok{fill:#34c759}
  .gr-map path.no{fill:#ff5a4d}
  .map-status{font-weight:700; margin:6px 0; min-height:22px}
  .map-legend{display:flex; flex-wrap:wrap; gap:8px; margin:8px 0}
  .mchip{border:1.5px solid var(--line); border-radius:999px; padding:5px 12px; font-size:14px; font-weight:600}
  .mchip.done{background:var(--okbg); color:var(--ok); border-color:var(--ok)}
  .map-attrib{font-size:11px; opacity:.55; margin-top:10px}
  [data-theme="dark"] .map-wrap{background:#0c344e}
  [data-theme="dark"] .gr-map path{fill:#36425e; stroke:#55617e}
  /* dark base fill above has equal specificity to .gr-map path.ok/.no and comes later,
     so it would override the green/red. These dark-mode rules restore the feedback colours. */
  [data-theme="dark"] .gr-map path.ok{fill:#34c759}
  [data-theme="dark"] .gr-map path.no{fill:#ff5a4d}
  .blank-in{display:inline-block; min-width:90px; width:120px; border:none; border-bottom:2px solid var(--sky); background:#f0f9ff; color:var(--ink); font-size:16px; font-weight:600; padding:2px 6px; margin:0 2px; border-radius:6px 6px 0 0; outline:none}
  .blank-in:focus{background:#e0f2fe}
  .blank-in.ok{background:var(--okbg); color:var(--ok); border-bottom-color:var(--ok)}
  .blank-in.no{background:var(--nobg); color:var(--no); border-bottom-color:var(--no)}
  .corr{font-size:14px; font-weight:700; color:var(--no); margin:0 4px}
  .corr.ok-note{color:var(--ok)}
  [data-theme="dark"] .blank-in{background:#0c344e}
  [data-theme="dark"] .blank-in.ok{background:#0c2e25; color:#6ee7b7}
  [data-theme="dark"] .blank-in.no{background:#3a1620; color:#fda4af}
  .clouds{display:flex; flex-wrap:wrap; gap:8px; min-height:8px; margin-bottom:12px}
  .cloud{padding:6px 12px; border-radius:14px; font-size:15px; font-weight:600; border:1.5px solid var(--line)}
  .cloud.ok{background:var(--okbg); color:var(--ok); border-color:#a7f3d0}
  .cloud.no{background:var(--nobg); color:var(--no); border-color:#fecdd3}
  .cloud small{font-weight:600; opacity:.8}
  .match-grid{display:flex; gap:10px}
  .match-col{flex:1; display:flex; flex-direction:column; gap:8px}
  .mitem{text-align:left; background:#fff; border:1.5px solid var(--line); border-radius:12px; padding:10px 12px; font-size:14px; font-weight:600; color:var(--ink); cursor:pointer; display:flex; flex-direction:column; gap:2px}
  .mitem.sel{border-color:var(--sky); background:#e0f2fe}
  .mitem.paired{border-color:var(--sky)}
  .mitem.used{opacity:.4}
  .mitem.ok{border-color:var(--ok); background:var(--okbg)}
  .mitem.no{border-color:var(--no); background:var(--nobg)}
  .mtag{font-size:12px; font-weight:700; color:var(--sky)}
  .text-in{flex:1; border:1.5px solid var(--line); border-radius:12px; padding:12px 14px; font-size:16px; outline:none}
  .text-in:focus{border-color:var(--sky)}
  .ver{text-align:center; font-size:11px; color:#cbd5e1; padding:10px 0 84px}
  /* ---- dark theme (opt-in via data-theme="dark" on <html>) ---- */
  html{transition:background .2s}
  .theme-toggle{position:absolute; top:18px; right:16px; width:40px; height:40px; border-radius:999px; border:none; background:rgba(255,255,255,.18); color:#fff; font-size:19px; cursor:pointer; display:flex; align-items:center; justify-content:center}
  [data-theme="dark"]{
    --ink:#e5edf5; --mut:#94a3b8; --line:#334155; --bg:#0f172a;
    --ok:#34d399; --okbg:#0c2e25; --no:#fb7185; --nobg:#3a1620; --sky:#0ea5e9; --sky2:#0284c7;
  }
  [data-theme="dark"] body, [data-theme="dark"] #app{ background:var(--bg); }
  [data-theme="dark"] .card,
  [data-theme="dark"] .opt,
  [data-theme="dark"] .tfrow,
  [data-theme="dark"] .chip,
  [data-theme="dark"] .mitem,
  [data-theme="dark"] .nav{ background:#1e293b; }
  [data-theme="dark"] .card{ box-shadow:0 1px 3px rgba(0,0,0,.4); }
  [data-theme="dark"] .opt{ color:#cbd5e1; border-color:#334155; }
  [data-theme="dark"] .opt.dim{ color:#64748b; border-color:#293548; }
  [data-theme="dark"] .tfrow{ border-color:#334155; }
  [data-theme="dark"] .tfbtn, [data-theme="dark"] .btn-soft{ background:#334155; color:#cbd5e1; }
  [data-theme="dark"] .btn-dark{ background:#475569; }
  [data-theme="dark"] .note{ background:#1e293b; color:#cbd5e1; }
  [data-theme="dark"] .listen,
  [data-theme="dark"] .chip.sel,
  [data-theme="dark"] .slot,
  [data-theme="dark"] .chip.ghost,
  [data-theme="dark"] .mitem.sel{ background:#0c344e; }
  [data-theme="dark"] .slot.filled{ background:#0e4a6e; }
  [data-theme="dark"] .slot.hover{ background:#075985; }
  [data-theme="dark"] .reveal{ border-color:#155e44; }
  [data-theme="dark"] .reveal .ans{ color:#6ee7b7; }
  [data-theme="dark"] .opt.ok, [data-theme="dark"] .tfbtn.ok,
  [data-theme="dark"] .mitem.ok, [data-theme="dark"] .slot.ok{ color:#6ee7b7; }
  [data-theme="dark"] .tfbtn.ok{ background:#0c2e25; }
  [data-theme="dark"] .opt.no, [data-theme="dark"] .tfbtn.no,
  [data-theme="dark"] .mitem.no, [data-theme="dark"] .slot.no{ color:#fda4af; }
  [data-theme="dark"] .tfbtn.no{ background:#3a1620; }
  [data-theme="dark"] .slbtn, [data-theme="dark"] .catbtn{ background:#1e293b; }
  [data-theme="dark"] .slbtn.ok, [data-theme="dark"] .catbtn.ok{ background:#0c2e25; color:#6ee7b7; border-color:#34d399; }
  [data-theme="dark"] .slbtn.no, [data-theme="dark"] .catbtn.no{ background:#3a1620; color:#fda4af; border-color:#fb7185; }
  [data-theme="dark"] .imgopt{ background:#1e293b; border-color:#334155; }
  [data-theme="dark"] .imgopt img{ background:#0f172a; }
  [data-theme="dark"] .imgopt.sel{ background:#0c2733; border-color:#38bdf8; }
  [data-theme="dark"] .imgopt.ok{ background:#0c2e25; border-color:#34d399; }
  [data-theme="dark"] .imgopt.ok .lab{ color:#6ee7b7; }
  [data-theme="dark"] .imgopt.no{ background:#3a1620; border-color:#fb7185; }
  [data-theme="dark"] .imgopt.no .lab{ color:#fda4af; }
  [data-theme="dark"] .chev{ color:#475569; }
  [data-theme="dark"] .theme-toggle{ background:rgba(255,255,255,.16); }
</style>
</head>
<body>
<div id="app"></div>
<div class="nav" id="nav"></div>

window.READING = [{"type": "reading", "cat": "reading", "id": "read_001", "title": "Πώς να κάνετε ασφαλείς αγορές μέσω διαδικτύου", "passage": "Η δυνατότητα για αγορές μέσω διαδικτύου παρέχει άνεση στις αγορές, διευρύνει τη\nδυνατότητα επιλογής και δίνει αξία στα χρήματα των καταναλωτών. Διαβάστε παρακάτω\nεπτά συμβουλές που, αν τις ακολουθείτε, μπορείτε να είστε σίγουροι για την ασφάλεια των\nαγορών που πραγματοποιείτε μέσα από το διαδίκτυο, προκειμένου να μην πέσετε θύμα\nηλεκτρονικής απάτης.\n•\nΕλέγξτε τον ιστότοπο (website) της επιχείρησης: Οποιοσδήποτε μπορεί να ανοίξει\nένα διαδικτυακό κατάστημα. Γι’ αυτό είναι σημαντικό να έχετε κάποια γνώση για τη φήμη\nτης επιχείρησης που έχετε επιλέξει, για να πραγματοποιήσετε τις αγορές σας.\n•\nΠροστατεύετε τα προσωπικά σας στοιχεία: Μην αποκαλύπτετε προσωπικά στοιχεία,\nπαρά μόνο εάν είστε βέβαιοι για το ποιος τα συγκεντρώνει, τον σκοπό για τον οποίο τα\nζητάει και τον τρόπο με τον οποίο θα τα χρησιμοποιήσει.\n•\nΠροσέχετε τις λεπτομέρειες: Ελέγχετε την αναμενόμενη ημερομηνία παραλαβής, τα\nέξοδα αποστολής, την εγγύηση, την πολιτική επιστροφών και άλλες σημαντικές\nλεπτομέρειες. Βεβαιωθείτε ότι υπάρχει διεύθυνση ηλεκτρονικού ταχυδρομείου στην οποία\nμπορείτε να απευθυνθείτε γραπτώς, ή τηλεφωνικός αριθμός επικοινωνίας σε περίπτωση\nπου χρειάζεστε βοήθεια με την παραγγελία ή το προϊόν που αγοράσατε.\n•\nΧρησιμοποιείτε ένα ασφαλές πρόγραμμα περιήγησης: Το πρόγραμμα που\nχρησιμοποιείτε για το διαδίκτυο θα πρέπει να εγγυάται την ασφάλεια των συναλλαγών σας.\n•\nΚρατάτε μυστικούς τους κωδικούς εισόδου και φροντίστε να παραμένουν ασφαλείς.\nΜη χρησιμοποιείτε απλές λέξεις ή την ημερομηνία της γέννησής σας.\n• Κρατήστε τις αποδείξεις και τους λογαριασμούς πληρωμής της κάρτας σας.\nτων εξετάσεων.", "sub": [{"type": "mcq", "q": "Οι αγορές μέσω διαδικτύου", "options": ["κοστίζουν περισσότερο", "είναι πάντα επικίνδυνες", "χρειάζονται μεγάλη προσοχή"], "answer": 2}, {"type": "mcq", "q": "Η ίδρυση μιας διαδικτυακής επιχείρησης", "options": ["είναι εξαιρετικά ακριβή", "είναι απαγορευμένη στην Ελλάδα", "επιτρέπεται στον καθένα"], "answer": 2}, {"type": "mcq", "q": "Πρέπει να μην φανερώνετε τα προσωπικά σας στοιχεία σε κάποιον όταν", "options": ["γνωρίζετε ότι αυτός τα συγκεντρώνει", "αγνοείτε τον σκοπό που τα ζητάει", "είστε βέβαιοι για το πώς θα τα χρησιμοποιήσει"], "answer": 1}, {"type": "mcq", "q": "Οι κωδικοί ασφαλείας πρέπει", "options": ["να περιλαμβάνουν την ημερομηνία γέννησής σας", "να αποθηκεύονται σε σημείο που μόνο εσείς γνωρίζετε", "να μην περιέχουν δύσκολα γράμματα"], "answer": 1}, {"type": "mcq", "q": "Κατά τις ηλεκτρονικές συναλλαγές σας είναι απαράδεκτο", "options": ["να γνωρίζετε αν μπορείτε και με ποιο τρόπο να επιστρέψετε αυτό που αγοράσατε.", "να ξέρετε πόσα χρήματα χρειάζεται να πληρώσετε, για να σας στείλουν αυτό που αγοράσατε.", "να αγνοείτε πώς να επικοινωνήσετε με την εταιρεία με την οποία κάνατε συναλλαγή."], "answer": 2}, {"type": "tf", "t": "Οι ηλεκτρονικές συναλλαγές περιορίζουν τις επιλογές μας", "a": false}, {"type": "tf", "t": "Πρέπει να αποφεύγουμε τις συχνές αγορές μέσω Διαδικτύου", "a": false}, {"type": "tf", "t": "Στο κείμενο δίνονται οδηγίες για ακίνδυνες αγορές στο διαδίκτυο", "a": true}, {"type": "tf", "t": "Είναι άχρηστες οι αποδείξεις των πληρωμών κατά τις ηλεκτρονικές αγορές", "a": false}, {"type": "typed", "q": "Κρατήστε τις αποδείξεις και τους λογαριασμούς πληρωμής. Πάντα _____ τις αποδείξεις και τους λογαριασμούς πληρωμής.", "a": "να κρατάτε"}, {"type": "typed", "q": "Αν ακολουθείτε τις συμβουλές αυτές, θα είστε σίγουροι για την ασφάλεια των αγορών. Αν είχατε ακολουθήσει τις συμβουλές αυτές, _____ σίγουροι για την ασφάλεια των αγορών.", "a": "θα ήσασταν"}, {"type": "typed", "q": "Η δυνατότητα για αγορές μέσω διαδικτύου διευρύνει τη δυνατότητα επιλογής Η δυνατότητα επιλογής _____ από τη δυνατότητα για αγορές μέσω διαδικτύου.", "a": "Διευρύνεται"}, {"type": "typed", "q": "Να έχετε κάποια γνώση για τη φήμη της επιχείρησης που έχετε επιλέξει, για να πραγματοποιήσετε τις αγορές σας. Να έχετε κάποια γνώση για τη φήμη της επιχείρησης που έχετε επιλέξει για την _____ των αγορών σας.", "a": "Πραγματοποίηση"}, {"type": "typed", "q": "Κρατάτε μυστικούς τους κωδικούς εισόδου. Οι κωδικοί εισόδου πρέπει _____ μυστικοί.", "a": "να κρατούνται"}, {"type": "typed", "q": "Διαβάστε παρακάτω επτά συμβουλές που, αν τις ακολουθείτε, μπορείτε να είστε σίγουροι για την ασφάλεια των αγορών σας. Διάβασε παρακάτω επτά συμβουλές που, αν τις ακολουθήσεις, _____ να είσαι σίγουρος για την ασφάλεια των αγορών σου.", "a": "Μπορείς"}, {"type": "mcq", "q": "Γι’ αυτό είναι σημαντικό να έχετε κάποια γνώση για τη φήμη της επιχείρησης.", "options": ["Ωστόσο", "Επειδή", "Συνεπώς"], "answer": 2}, {"type": "mcq", "q": "Βεβαιωθείτε ότι υπάρχει διεύθυνση ηλεκτρονικού ταχυδρομείου (…) σε περίπτωση που χρειάζεστε βοήθει", "options": ["αν", "επιπλέον", "αλλά"], "answer": 0}, {"type": "mcq", "q": "Το πρόγραμμα που χρησιμοποιείτε για το διαδίκτυο θα πρέπει να εγγυάται την ασφάλεια των συναλλαγών σας.", "options": ["διαχωρίζει", "διασφαλίζει", "διακινδυνεύει"], "answer": 1}], "writing": "Διαβάστε το παρακάτω θέμα και γράψτε το δικό σας κείμενο με βάση τις οδηγίες (80100 λέξεις). Επισημαίνουμε ότι δεν πρέπει να υπογράψετε με το ονοματεπώνυμό σας στο τέλος του κειμένου. Ο καλύτερος φίλος σας ή η καλύτερη φίλη σας θα κάνει για πρώτη φορά αγορά μέσω διαδικτύου. Του/Της στέλνετε ένα σύντομο ηλεκτρονικό μήνυμα (e-mail) και του/της διηγείστε πώς πέσατε θύμα ηλεκτρονικής απάτης."}, {"type": "reading", "cat": "reading", "id": "read_002", "title": "Ιδιοκτήτης ταβέρνας στην Αθήνα μαγειρεύει δωρεάν 630 μερίδες φαγητού κάθε", "passage": "μέρα για όσους έχουν ανάγκη\nΚρητικός μάγειρας: Πρόκειται για τον Δημήτρη, ο οποίος έχει χρησιμοποιήσει το μαγαζί\nτου για ιερό σκοπό και στο πρώτο lockdown.\nΟ ίδιος αναφέρει:\n«Ήμουν 20 ετών όταν ανέλαβα το μαγαζί από τον θείο μου. Για λόγους υγείας, το είχε\nκλειστό για τρία χρόνια και ήταν ώρα η οικογενειακή μας επιχείρηση να ανοίξει και πάλι.\nΑπό 16 χρονών, μαγείρευα σε καράβια και όχι μόνο…Όμως, και 20 χρόνια μετά, μάγειρας\nνιώθω, όχι τόσο επιχειρηματίας.»\nΤο μαγαζί πήγαινε πολύ καλά και, ειδικά, τα τελευταία χρόνια, δεν άδειαζε σχεδόν ποτέ.\nΟ Δημήτρης, ανέκαθεν, μοίραζε το φαγητό που περίσσευε σε συμπολίτες του που το είχαν\nανάγκη. Κατέβαινε στο κέντρο της πόλης, αλλά έδινε και σε κατοίκους της περιοχής οι\nοποίοι χρειάζονταν μια μερίδα φαγητού.\nΌταν άρχισε να μοιράζει δωρεάν φαγητό, μαγειρεμένο από τα χέρια του, δεν μπορούσε να\nπιστέψει στα μάτια του πόσος κόσμος το είχε ανάγκη. «Ο λόγος που το πρωτοξεκίνησα,\nήταν τα κλειστά συσσίτια της εκκλησίας, λόγω της κατάστασης. Κι αφού είχα τόσα κιλά\nφαγητό, τι να το έκανα; Ένα πράγμα ξέρω: να μαγειρεύω. Οπότε, έβαλα μπρος. Είχα τη\nστήριξη λίγων και καλών, βλέπαμε ότι όλο αυτό ήταν απαραίτητο για αρκετούς ανθρώπους.\nΈρχονταν και από άλλες γειτονιές… έπαιρναν το λεωφορείο για ένα πιάτο φαγητό.»\nΟ Δημήτρης αγοράζει με δικά του έξοδα την πρώτη ύλη για να φτιάξει μαγειρευτό φαγητό\nγια όσους το έχουν ανάγκη: μακαρόνια με κιμά, φακές, κοτόπουλο με πατάτες, λαδερά…\nΣταδιακά, και ειδικά τώρα, στη δεύτερη και «σκληρή» καραντίνα του χειμώνα, άρχισε ο\nκόσμος να βοηθάει με σακούλες γεμάτες με προμήθειες όπως λάδι, αλεύρι και ζυμαρικά.\nhttps://www.newsitamea.gr/2020/12/17/36chronos-idioktitis-tavernas-stin-athinamageireyei-dorean-630-merides-fagitoy-mera-osoys-echoyn-anagki-foto/", "sub": [{"type": "mcq", "q": "Ο κ. Δημήτρης μαγειρεύει στο κατάστημά του,", "options": ["για να βοηθήσει τους συνομηλίκους του", "για να δώσει δουλειά στους άνεργους συμπολίτες του", "για να δωρίσει φαγητό σε φτωχούς συνανθρώπους του"], "answer": 2}, {"type": "mcq", "q": "Ο κ. Δημήτρης", "options": ["σε ηλικία 36 ετών εξακολουθεί να αισθάνεται μάγειρας", "σε ηλικία 20 ετών άνοιξε δικό του κατάστημα", "σε ηλικία 16 ετών εργάστηκε στο κατάστημα του θείου του"], "answer": 0}, {"type": "mcq", "q": "Τα τελευταία χρόνια το μαγαζί του κ. Δημήτρη", "options": ["είχε πολλά οικονομικά προβλήματα", "είχε εξαιρετική επιτυχία", "είχε πολλούς δυσαρεστημένους πελάτες"], "answer": 1}, {"type": "mcq", "q": "Τον κ. Δημήτρη στο ξεκίνημά του", "options": ["βοήθησαν ορισμένοι αληθινοί φίλοι", "βοήθησε με συσσίτια η εκκλησία", "βοήθησε με χρήματα ο θείος του"], "answer": 0}, {"type": "mcq", "q": "Ο κόσμος", "options": ["στάθηκε από την πρώτη στιγμή στο πλευρό του κ. Δημήτρη", "αγόραζε στην αρχή την πρώτη ύλη και την προσέφερε στον κ. Δημήτρη", "σιγά σιγά του συμπαραστέκεται όλο και περισσότερο."], "answer": 2}, {"type": "tf", "t": "Ο κ. Δημήτρης δούλευε πάντα ως μάγειρας", "a": true}, {"type": "tf", "t": "Ο κ. Δημήτρης έχει χρησιμοποιήσει το μαγαζί του για φιλανθρωπικούς σκοπούς της εκκλησίας", "a": false}, {"type": "tf", "t": "Ο κ. Δημήτρης προσέφερε μερίδες φαγητό σε όλους τους δήμους της Αθήνας", "a": false}, {"type": "tf", "t": "Ο κ. Δημήτρης ήταν πάντα βέβαιος ότι πολύς κόσμος είχε ανάγκη για φαγητό", "a": false}, {"type": "typed", "q": "Ο θείος μου, για λόγους υγείας, είχε κλειστό το μαγαζί του. Ο θείος μου, επειδή _____ ,είχε κλειστό το μαγαζί του.", "a": "είχε προβλήματα υγείας/ήταν άρρωστος"}, {"type": "typed", "q": "Ο Δημήτρης, ανέκαθεν, μοίραζε το φαγητό που περίσσευε σε συμπολίτες του. Ο Δημήτρης, την προηγούμενη Κυριακή, _____ το φαγητό που _____ σε συμπολίτες του.", "a": "μοίρασε…περίσσεψε"}, {"type": "typed", "q": "Όμως, και 20 χρόνια μετά, μάγειρας νιώθω, όχι τόσο επιχειρηματίας. Όμως, και 20 χρόνια μετά νιώθω περισσότερο μάγειρας _____ επιχειρηματίας.", "a": "παρά"}, {"type": "typed", "q": "Ήμουν 20 ετών, όταν ανέλαβα το μαγαζί από τον θείο μου. Σε ηλικία 20 ετών _____ το μαγαζί από τον θείο του.", "a": "ανέλαβε"}, {"type": "typed", "q": "Όταν άρχισε να μοιράζει δωρεάν φαγητό, δεν μπορούσε να το πιστέψει Αν δεν είχα αρχίσει να μοιράζω δωρεάν φαγητό, δεν _____ να το πιστέψω", "a": "θα μπορούσα"}, {"type": "mcq", "q": "Στην πρόταση «άρχισε ο κόσμος να βοηθάει με σακούλες γεμάτες με προμήθειες» η φράση «να βοηθάει» σημαίνει", "options": ["να συντροφεύει", "να συντρέχει", "να συμβάλλει"], "answer": 2}, {"type": "mcq", "q": "Στη φράση «Ο Δημήτρης αγοράζει με δικά του έξοδα την πρώτη ύλη, για να φτιάξει μαγειρευτό φαγητό» το «για να» δηλώνει", "options": ["σκοπό", "αντίθεση", "τρόπο"], "answer": 0}, {"type": "mcq", "q": "Στη φράση «σταδιακά άρχισε ο κόσμος να βοηθάει» η λέξη «σταδιακά» σημαίνει", "options": ["βαθμιαία", "αργότερα", "αντίθετα"], "answer": 0}, {"type": "mcq", "q": "Στην πρόταση «Ο Δημήτρης ανέκαθεν, μοίραζε το φαγητό που περίσσευε σε συμπολίτες του» η λέξη «περίσσευε» σημαίνει", "options": ["χρειαζόταν", "έμενε", "έλειπε"], "answer": 1}], "writing": "Διαβάστε το παρακάτω θέμα και γράψτε το δικό σας κείμενο με βάση τις οδηγίες (80100 λέξεις). Επισημαίνουμε ότι δεν πρέπει να υπογράψετε με το ονοματεπώνυμό σας στο τέλος του κειμένου. Στέλνετε ένα ηλεκτρονικό μήνυμα (e-mail) σε έναν φίλο σας ή σε μια φίλη σας που έχει εστιατόριο στην πόλη σας, και του/της μιλάτε με θαυμασμό για την ιστορία που μόλις διαβάσατε."}, {"type": "reading", "cat": "reading", "id": "read_003", "title": "Το μετρό της Αθήνας", "passage": "Το μετρό της Αθήνας είναι ένα δίκτυο μητροπολιτικού σιδηρόδρομου στην Περιφέρεια\nΑττικής. Εξυπηρετεί την περιοχή της Αθήνας και ένα μέρος της Ανατολικής Αττικής.\nΠαράλληλα συνδέεται με τον Προαστιακό Σιδηρόδρομο, καθώς και το δίκτυο του Τραμ,\nσχηματίζοντας έτσι ένα δίκτυο μέσων μεταφοράς που εξυπηρετεί το μεγαλύτερο μέρος της\nΑττικής. Με το μετρό της Αθήνας μπορεί κανείς να φτάσει στο αεροδρόμιο της Αθήνας,\nστον Κεντρικό Σιδηροδρομικό Σταθμό Αθηνών, καθώς και στο λιμάνι του Πειραιά.\nΤο δίκτυο μετρό της Αθήνας αποτελείται από 3 γραμμές, με 66 συνολικά σταθμούς. Από\nαυτούς οι 5 («Σύνταγμα», «Ομόνοια», «Αττική», «Μοναστηράκι», «Πειραιάς») είναι σταθμοί\nπου συνδέονται με άλλη γραμμή του μετρό. Το συνολικό μήκος που καλύπτει το μετρό της\nΑθήνας είναι 90,1 χιλιόμετρα. Η μοναδική άλλη γραμμή μετρό στα Βαλκάνια που καλύπτει\nμεγαλύτερο συνολικό μήκος είναι της Κωνσταντινούπολης.\nΤο μετρό της Αθήνας αποτελείται από 3 γραμμές: Η Γραμμή 1 (γνωστή και ως\nΗΣΑΠ/Ηλεκτρικός) ξεκίνησε τη λειτουργία της το 1869. Έχει μήκος 25,7 χιλιόμετρα, ξεκινάει\nαπό την Κηφισιά και φτάνει στον Πειραιά. Εξυπηρετεί 24 σταθμούς. Συνδέεται με τη Γραμμή\n2 στους σταθμούς Αττική και Ομόνοια, με τη Γραμμή 3 στους σταθμούς Μοναστηράκι και\nΠειραιάς και με τον Προαστιακό Σιδηρόδρομο στους σταθμούς Νερατζιώτισσα και\nΠειραιάς.\nΗ Γραμμή 2 λειτουργεί από το 2000, ξεκινάει από την Ανθούπολη και φτάνει ως το Ελληνικό.\nΕξυπηρετεί 20 σταθμούς. Συνδέεται με τη Γραμμή 1 στους σταθμούς Αττική και Ομόνοια,\nμε τη Γραμμή 3 στο σταθμό Σύνταγμα, και με τον Προαστιακό σιδηρόδρομο στον σταθμό\nΛαρίσης.\nΗ Γραμμή 3 άρχισε να λειτουργεί επίσης από το 2000. Εξυπηρετεί 20 σταθμούς και επιπλέον\n4, τους οποίους μοιράζεται με τον Προαστιακό. Συνδέεται με τη Γραμμή 1 στο σταθμό\nΜοναστηράκι και με τη Γραμμή 2 στο σταθμό Σύνταγμα. Όλοι της οι σταθμοί είναι υπόγειοι\nεκτός από το κομμάτι που βρίσκεται ανάμεσα στον σταθμό Δουκίσσης Πλακεντίας και το\nΑεροδρόμιο.\nΟι ώρες λειτουργίας της Γραμμής 1 είναι 5:00 π.μ. – 00:30 π.μ. Οι Γραμμές 2 και 3\nλειτουργούν 5:30 π.μ. – 00:20 π.μ., αλλά την Παρασκευή και το Σάββατο μένουν ανοιχτές\nως 1.30 π.μ., δηλαδή μια ώρα παραπάνω .", "sub": [{"type": "mcq", "q": "Με το μετρό της Αθήνας κάποιος μπορεί να φτάσει", "options": ["στο λιμάνι του Πειραιά", "στο αεροδρόμιο", "σε όλα τα παραπάνω"], "answer": 2}, {"type": "mcq", "q": "Το μετρό της Αθήνας", "options": ["εξυπηρετεί μόνο την περιοχή της Αθήνας", "εξυπηρετεί ένα κομμάτι και της υπόλοιπης Αττικής", "δεν εξυπηρετεί την Ανατολική Αττική"], "answer": 1}, {"type": "mcq", "q": "Το μετρό της Αθήνας", "options": ["είναι το δεύτερο μεγαλύτερο στα Βαλκάνια", "είναι το μικρότερο στα Βαλκάνια", "είναι μεγαλύτερο από το μετρό της Κωνσταντινούπολης"], "answer": 0}, {"type": "mcq", "q": "Η Γραμμή 2 συνδέει", "options": ["την Κηφισιά με τον Πειραιά", "το Σύνταγμα με τον Προαστιακό Σιδηρόδρομο", "την Ανθούπολη με το Ελληνικό"], "answer": 2}, {"type": "tf", "t": "Το μετρό συνδέεται με το Τραμ", "a": true}, {"type": "tf", "t": "Η Γραμμή 1 λέγεται και «Ηλεκτρικός»", "a": true}, {"type": "tf", "t": "Η Γραμμή 3 άρχισε να λειτουργεί αργότερα από τη Γραμμή 2", "a": false}, {"type": "tf", "t": "Όλοι οι σταθμοί της Γραμμής 3 είναι υπόγειοι", "a": false}, {"type": "tf", "t": "Τα Σαββατοκύριακα το μετρό λειτουργεί λιγότερες ώρες", "a": false}, {"type": "typed", "q": "Το συνολικό μήκος που καλύπτει το μετρό της Αθήνας είναι 90,1 χιλιόμετρα. 90, 1 χιλιόμετρα _____ από το μετρό της Αθήνας.", "a": "καλύπτονται"}, {"type": "typed", "q": "Με το μετρό της Αθήνας μπορεί κανείς να φτάσει στο Αεροδρόμιο της Αθήνας. Με το μετρό της Αθήνας μπορούμε _____ στο αεροδρόμιο της Αθήνας.", "a": "να φτάσουμε"}, {"type": "typed", "q": "Η Γραμμή 1 ξεκίνησε τη λειτουργία της το 1869. Η Γραμμή 1 _____ από το 1869.", "a": "λειτουργεί"}, {"type": "typed", "q": "Η Γραμμή 1 εξυπηρετεί 24 σταθμούς. 24 σταθμοί _____ από τη Γραμμή 1.", "a": "εξυπηρετούνται"}, {"type": "typed", "q": "Η Γραμμή 1 συνδέεται με τη Γραμμή 2 στους σταθμούς Αττική και Ομόνοια. Στους σταθμούς Αττική και Ομόνοια υπάρχει _____ ανάμεσα στη Γραμμή 1 και τη γραμμή 2. Επιλέξτε τη λέξη που έχει ίδια σημασία από την υπογραμμισμένη στο κείμενο και γράψτε στο τετράδιό σας τον αριθμό της άσκησης και δίπλα τη σωστή απάντηση:", "a": "σύνδεση"}, {"type": "mcq", "q": "Εξυπηρετεί την περιοχή της Αθήνας και ένα μέρος της Ανατολικής Αττικής.", "options": ["κομμάτι", "πλευρό", "βουνό"], "answer": 0}, {"type": "mcq", "q": "Η Γραμμή 2 λειτουργεί από το 2000, ξεκινάει από την Ανθούπολη και φτάνει ως το Ελληνικό.", "options": ["σταματάει", "αρχίζει", "περνάει"], "answer": 1}, {"type": "mcq", "q": "Εξυπηρετεί 20 σταθμούς και επιπλέον 4, τους οποίους μοιράζεται με τον Προαστιακό.", "options": ["ίσως", "σχεδόν", "ακόμα"], "answer": 2}, {"type": "mcq", "q": "Οι Γραμμές 2 και 3 λειτουργούν 5:30 π.μ. – 00:20 π.μ., αλλά την Παρασκευή και το Σάββατο μένουν ανοιχτές ως 1.30 π.μ., δηλαδή μια ώρα παραπάνω .", "options": ["περισσότερο", "λιγότερο", "νωρίτερα"], "answer": 0}], "writing": "Διαβάστε το παρακάτω θέμα και γράψτε το δικό σας κείμενο με βάση τις οδηγίες (80100 λέξεις). Επισημαίνουμε ότι δεν πρέπει να υπογράψετε με το ονοματεπώνυμό σας στο τέλος του κειμένου. Ένας φίλος σας, σας έγραψε ότι θα έρθει σύντομα για λίγες μέρες στην πόλη που ζείτε. Απαντήστε του με email, εξηγώντας του τι είναι όμορφο στην πόλη σας και γιατί πρέπει να το δει."}, {"type": "reading", "cat": "reading", "id": "read_004", "title": "Ο Παγκόσμιος Οργανισμός Υγείας τοποθετείται για την Οδική Ασφάλεια", "passage": "Με αφορμή την 4η Παγκόσμια Εβδομάδα Ασφάλειας για οδηγούς και πεζούς, ο Παγκόσμιος\nΟργανισμός Υγείας (Π.Ο.Υ.)ανακοίνωσε σε ειδικές εκδηλώσεις, μια εκ των οποίων έγινε και\nστη χώρας μας, τη θέση του αναφορικά με αυτό το ανησυχητικό, σε όλον τον κόσμο, ζήτημα.\nΘέμα της εβδομάδας ήταν η ταχύτητα και οι ενέργειες που πρέπει να γίνουν, ώστε να\nμειωθούν οι θάνατοι και οι τραυματισμοί. Σύμφωνα με τον Π.Ο.Υ., οι χώρες που έχουν\nπετύχει μείωση των θανάτων έχουν κάνει μια σειρά από συγκεκριμένες ενέργειες.\nΑυτές οι ενέργειες είναι κατασκευή ή βελτίωση δρόμων που μειώνουν την κίνηση, κυρίως\nαποφεύγοντας στενούς δρόμους και επικίνδυνες στροφές. Επίσης, η επιβολή ορίων\nταχύτητας ανάλογα με τον κάθε δρόμο, η ύπαρξη στην αγορά αυτοκινήτων με ηλεκτρονικά\nσυστήματα ασφαλείας, καθώς και η ενημέρωση και ευαισθητοποίηση του κοινού για τους\nκινδύνους που προκύπτουν από την επικίνδυνη οδήγηση εξαιτίας της κατανάλωσης\nαλκοόλ και της υπερβολικής ταχύτητας στους δρόμους.\nΙδιαίτερο ενδιαφέρον παρουσιάζουν και τα στοιχεία που παρουσίασε ο Π.Ο.Υ. σχετικά με\nτο θέμα. Όπως αναφέρεται:\n•\n40-50% των οδηγών ξεπερνούν το όριο ταχύτητας\n•\nΣύμφωνα με τις έρευνες, στην υπερβολική ταχύτητα οφείλονται το 1/3 των θανάτων\nσε πλούσιες χώρες και σχεδόν οι μισοί θάνατοι στις χώρες με μεσαία ή χαμηλά εισοδήματα.\n•\nΑκόμη, όσο μεγαλύτερη είναι η ταχύτητα του αυτοκινήτου, τόσο αυξάνονται  του", "την άποψή του", "την καρέκλα του"], "answer": 1}, {"type": "mcq", "q": "Αντίθετο της λέξης «πετύχει» στη φράση «οι χώρες που έχουν πετύχει» είναι", "options": ["επιτύχει", "κατορθώσει", "αποτύχει"], "answer": 2}], "writing": "Διαβάστε το παρακάτω θέμα και γράψτε το δικό σας κείμενο με βάση τις οδηγίες (80100 λέξεις). Επισημαίνουμε ότι δεν πρέπει να υπογράψετε με το ονοματεπώνυμό σας στο τέλος του κειμένου. Ο γιος σας ή η κόρη σας, που μένει σε άλλη πόλη, μόλις έχει πάρει δίπλωμα οδήγησης. Του/της στέλνετε ένα ηλεκτρονικό μήνυμα (e-mail) στο οποίο τον/την συγχαίρετε και του/της δίνετε συμβουλές για ασφαλή οδήγηση."}, {"type": "reading", "cat": "reading", "id": "read_005", "title": "Οι Σκύλοι οδηγοί τυφλών στην Ελλάδα", "passage": "Ο σκύλος-οδηγός μπορεί να βοηθήσει στους τυφλούς ή τους ανθρώπους με χαμηλή όραση\nνα κινούνται χωρίς κίνδυνο. Οι σκύλοι οδηγοί μπορούν να τους οδηγούν γύρω από\nεμπόδια, να σταματήσουν σε πεζοδρόμια και σκάλες και να βρουν κάποια αντικείμενα που\nμπορούν να δουν, όταν τους δίνουν εντολές, όπως \"Βρες την πόρτα\" ή \"Βρες το ασανσέρ\".\nΟι συνθήκες στην Ελλάδα δεν είναι εύκολες, για να\nβρεθεί ένας σκύλος οδηγός, αφού είναι ακριβή η\nεκπαίδευσή του. Θα μπορούσε κανείς να ψάξει έναν\nσκύλο οδηγό από κάποια χώρα του εξωτερικού, όμως\nσε αυτή την περίπτωση, ο σκύλος δεν θα μπορούσε\nνα\nδουλέψει\nστην\nΕλλάδα,\nεπειδή\nθα\nήταν\nεκπαιδευμένος για άλλη χώρα. Γι’ αυτό και έρχονται\nσκύλοι από την Ολλανδία και εκπαιδεύονται στην\nΕλλάδα.\nΈνας σκύλος οδηγός, τις ώρες που δεν εργάζεται,\nείναι ένα σκυλί σαν όλα τα άλλα, όμως, όταν φοράει\nτο γιλέκο με τη λαβή που χρησιμοποιεί ο χειριστής\nτου, είναι ένας εργαζόμενος σκύλος-οδηγός. Όταν\nοδηγεί, δεν πρέπει να τον φωνάξουμε με το όνομά του, να του μιλήσουμε ή να τον\nχαϊδέψουμε, γιατί, έτσι, θα του αποσπάσουμε την προσοχή. Επίσης, είναι σημαντικό να\nγνωρίζουν οι φιλόζωοι ότι, εάν δουν έναν σκύλο-οδηγό την ώρα που οδηγεί, θα πρέπει να\nκρατήσουν τα σκυλιά τους μακριά. Ένας σκύλος που πάει να να αδέσποτο ζωάκι που βρήκαν και εκείνοι που προτίμησαν να αγοράσουν ένα\nκαθαρόαιμο.\nΜε αφορμή τη σημερινή Παγκόσμια Ημέρα Αδέσποτων Ζώων, συγκεντρώσαμε 5 λόγους που\nη υιοθεσία ενός αδέσποτου ζώου θα κάνει τη ζωή σου λίγο καλύτερη.\n1. Σώζεις μια ζωή\nΤο ωραιότερο συναίσθημα όταν υιοθετείς ένα ζώο είναι η γνώση ότι σώζεις ένα πλάσμα, το\nοποίο περιπλανιόταν στους δρόμους, χωρίς φαγητό, νερό και κυρίως χωρίς αγάπη, ενώ\nμπορεί να είχε κακοποιηθεί. Έτσι, με το να το υιοθετήσεις, το απομακρύνεις από την\nταλαιπωρία και τον φόβο και του χαρίζεις φαγητό, σπίτι, ασφάλεια και, φυσικά, πολλή\nαγάπη.\n2. Συμβάλλεις στη μείωση του αριθμού των αδέσποτων ζώων\nΗ υιοθεσία ενός αδέσποτου βοηθά στη μείωση του αριθμού των ζώων που ζουν στους\nδρόμους και αντιμετωπίζουν δυσκολίες και κινδύνους. Όσο περισσότερα αδέσποτα ζώα\nυιοθετούνται, τόσο λιγότερα ζώα θα υπάρχουν στους δρόμους και τόσο λιγότερα ζώα θα\nυποφέρουν από την έλλειψη φροντίδας και αγάπης.\n3. Γεμίζεις αγάπη\nΗ αγάπη δεν αγοράζεται, αλλά μόνο προσφέρεται απλόχερα. Η υιοθεσία είναι μια πράξη\nαγάπης, φροντίδας και στοργής προς ένα πλάσμα που μπορεί να είναι εγκαταλελειμμένο,\nταλαιπωρημένο και κακοποιημένο. Το ζωάκι που θα υιοθετήσεις θα σου το ανταποδώσει.\nΜπορεί να μη στο πει με λέξεις, αλλά θα εκφράσει με διαφορετικό τρόπο την ευγνωμοσύνη\nκαι την αγάπη του. Θα ξαπλώσει δίπλα σου, θα αγγίξει το χέρι σου αποζητώντας ένα χάδι.\nΚαι κυρίως, θα σε κοιτάει στα μάτια βαθιά, με έναν τρόπο που κανένας άνθρωπος δεν θα σε\nκοιτάξει ποτέ.\n4. Αλλάζει η καθημερινότητά σου (προς το καλύτερο)\nΕκτός από την συντροφιά που θα σου κάνει, ένα κατοικίδιο θα αλλάξει την καθημερινότητά\nσου. Η υιοθεσία ενός κατοικιδίου μας κάνει αυτόματα υπεύθυνους για αυτό. Όχι μόνο για\nτην καλοπέρασή του αλλά κυρίως για την ίδια του την επιβίωση. Αν δεν χαρακτηρίζεσαι\nαπό την μεγάλη οργανωτικότητά σου, η συγκατοίκησή σου με ένα ζώο που εξαρτάται από\nσένα, θα σε βοηθήσει να βάλεις σε τάξη πολλά πράγματα μέσα στην καθημερινότητά σου\nκαι να οργανωθείς, ώστε να μπορείς να του παρέχεις τα βασικά για τις ανάγκες του, όπως\nτη βόλτα του (αν είναι σκυλάκι) και την τροφή και το φρέσκο νερό του που πάντα πρέπει\nνα έχει.\n5. Ξεπερνάς (κοινωνικά) στερεότυπα\nΤο να δώσεις στοργή σε ένα πλάσμα που μπορεί να είναι ταλαιπωρημένο και κακοποιημένο,\nχωρίς να σε νοιάζει εάν το ζώο αυτό είναι «ράτσας», θα σε κάνει να συνειδητοποιήσεις ότι\nσημασία έχει ο χαρακτήρας του ζώου που θα σε συντροφεύει και όχι η ομορφιά του και\nέτσι μπορείς να επηρεάσεις προς την σωστή κατεύθυνση και τους άλλους γύρω σου.\nΤι χρειάζεται να θυμάσαι\nΈνα αδέσποτο μπορεί να χρειαστεί να το φροντίσεις λίγο παραπάνω από ό,τι ένα κατοικίδιο\nπου γεννήθηκε και μεγάλωσε σε ένα προστατευμένο περιβάλλον. Μπορεί να το βρεις\nνεογέννητο, άρρωστο, χτυπημένο. Σε αυτή την περίπτωση, θα πρέπει να δείξεις μεγάλη\nυπομονή αλλά και επιμονή με την ανατροφή του, καθώς μπορεί να χρειαστεί περισσότερο\nκαιρό να προσαρμοστεί στη νέα του πραγματικότητα και να εμπιστευτεί τους ανθρώπους,\nειδικά εάν έχει κακοποιηθεί. Να θυμάσαι όμως ότι με τη φροντίδα σου θα του έχεις σώσει\nκυριολεκτικά τη ζωή!", "sub": [{"type": "mcq", "q": "Σύμφωνα με το κείμενο, η ζωοφιλία είναι κυρίως", "options": ["μόδα", "έκφραση ευαισθησίας", "θέμα οικονομικής άνεσης"], "answer": 1}, {"type": "mcq", "q": "Τα κατοικίδια ζώα, σύμφωνα με τις έρευνες,", "options": ["αυξάνουν το άγχος των ανθρώπων", "δεν επηρεάζουν ιδιαίτερα την ψυχική υγεία", "μας βοηθούν να μη νιώθουμε μόνοι"], "answer": 2}, {"type": "mcq", "q": "Όταν υιοθετείς ένα αδέσποτο ζώο του προσφέρεις κυρίως", "options": ["παιχνίδια", "ασφάλεια", "φαγητό"], "answer": 1}, {"type": "mcq", "q": "Ένα αδέσποτο ζώο μπορεί να χρειαστεί", "options": ["λιγότερη φροντίδα από ένα ζώο που μεγάλωσε σε σπίτι", "την ίδια ακριβώς φροντίδα με ένα καθαρόαιμο που αγοράστηκε", "περισσότερη υπομονή μέχρι να προσαρμοστεί"], "answer": 2}, {"type": "tf", "t": "Τα κατοικίδια ζώα μπορούν να βοηθήσουν τόσο στη σωματική όσο και στην ψυχική μας υγεία.", "a": true}, {"typ ες κοινωνικές επαφές.»", "sub": [{"type": "mcq", "q": "Η γυναίκα περιγράφει:", "options": ["όταν ξεκίνησε η πανδημία, συγκεντρωνόταν κάθε βράδυ στο zoom, για να παίξει με τους φίλους της", "από τη μέρα που ξεκίνησε η πανδημία, συνεργαζόταν μια φορά την εβδομάδα με τους φίλους της για θέματα της δουλειάς τους", "από την έναρξη της πανδημίας, συναντούσε τους φίλους της διαδικτυακά, όπως, άλλωστε, και πολλοί άλλοι την ίδια περίοδο"], "answer": 2}, {"type": "mcq", "q": "8 εβδομάδες μετά το δεύτερο lockdown η αφηγήτρια στο κείμενο", "options": ["έχει διατηρήσει όλους τους φίλους της στο διαδίκτυο", "έχει κρατήσει τους γνήσιους φίλους της", "έχει κάνει καινούργιες φιλίες στο διαδίκτυο"], "answer": 1}, {"type": "mcq", "q": "Σύμφωνα με το κείμενο,", "options": ["η κούραση της αφηγήτριας μειώθηκε πάρα πολύ το 2020", "η αφηγήτρια δεν είναι η μόνη που νιώθει κούραση κατά το δεύτερο lockdown", "η εξάντληση που νιώθει η αφηγήτρια είναι ανησυχητική, σύμφωνα με μια ψυχολόγο"], "answer": 1}, {"type": "mcq", "q": "Δεν αποτελεί, σύμφωνα με την ψυχολόγο, αιτία εξάντλησης κατά την περίοδο της πανδημίας", "options": ["η διαρκής χρήση μάσκας", "η εργασία από το σπίτι", "η χρήση του διαδικτύου"], "answer": 2}, {"type": "mcq", "q": "Ο κατάλληλος τρόπος, για να αντιμετωπίσουμε την κυρίαρχη στην εποχή της πανδημίας εξάντληση, είναι", "options": ["να καλύψουμε πρώτα τις ανάγκες μας και μετά των φίλων μας", "να καλύψουμε τις ανάγκες μας μαζί με τους φίλους μας", "να βοηθήσουμε τους φίλους μας να καλύψουν τις ανάγκες τους"], "answer": 0}, {"type": "mcq", "q": "Ένας από τους λόγους που η αφηγήτρια είχε διαδικτυακές συναντήσεις με τους φίλους της ήταν για να παίζει.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Η αφηγήτρια υπήρξε ανέκαθεν αγχώδης.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Η αφηγήτρια νιώθει τύψεις που πλέον δεν βλέπει πολλούς φίλους της.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer ing", "id": "read_009", "title": "Διαβάσετε με προσοχή το παρακάτω κείμενο και στη συνέχεια απαντήστε", "passage": "στις ερωτήσεις που ακολουθούν.\n5 Συμβουλές για ένα Υπέροχο Πάρτι Γενεθλίων\nΤα γενέθλια είναι μια πολύ ξεχωριστή μέρα για όλους μας. Είναι η μέρα που γιορτάζουμε\nτη ζωή μας με τους φίλους και την οικογένειά μας. Αν ετοιμάζεις ένα πάρτι γενεθλίων,\nυπάρχουν μερικά πράγματα που πρέπει να προσέξεις για να περάσουν όλοι υπέροχα.\nΔιάβασε παρακάτω 5 απλές συμβουλές για ένα τέλειο πάρτι!\n1. Οργάνωσε από νωρίς\nΗ καλή οργάνωση είναι το κλειδί για να πετύχει το πάρτι σου. Ξεκίνα να σκέφτεσαι τι\nχρειάζεσαι τουλάχιστον δύο εβδομάδες πριν. Γράψε μια λίστα με όλα όσα πρέπει να κάνεις:\nποιοι θα έρθουν, πού θα γίνει το πάρτι, τι φαγητό και ποτά θα έχεις, και ποια μουσική θα\nπαίξεις. Έτσι δεν θα αγχωθείς την τελευταία στιγμή.\n2. Φτιάξε μια ωραία πρόσκληση\nΗ πρόσκληση είναι η πρώτη εντύπωση που θα έχουν οι φίλοι σου για το πάρτι. Μπορείς να\nφτιάξεις μια απλή κάρτα ή να στείλεις ένα όμορφο μήνυμα στο κινητό ή στο email. Μην\nξεχάσεις να γράψεις την ημέρα, την ώρα και το μέρος του πάρτι. Αν θες, μπορείς να\nπροσθέσεις και κάποιο θέμα, όπως \"πάρτι με στολές\" ή \"πάρτι στην παραλία\".\n3. Ετοίμασε νόστιμα φαγητά και γλυκά\nΤο φαγητό είναι πάντα πολύ σημαντικό σε κάθε γιορτή. Μπορείς να φτιάξεις εύκολα σνακ,\nόπως τοστάκια, πίτσες, πατατάκια και μικρές σαλάτες. Μην ξεχάσεις να έχεις και μερικά\nγλυκά, όπως κεκάκια ή μπισκότα. Και φυσικά, το πιο σημαντικό είναι η τούρτα γενεθλίων!\nΜπορείς να αγοράσεις μια έτοιμη ή να τη φτιάξεις μόνος σου.\n4. Διάλεξε τη σωστή μουσική\nΗ μουσική κάνει το πάρτι πιο ζωντανό και χαρούμενο. Φτιάξε μια λίστα με τραγούδια που\nαγαπάς εσύ και οι φίλοι σου. Μπορείς να βάλεις χαρούμενη ποπ μουσική, κλασικά ελληνικά\nτραγούδια ή ακόμα και να οργανώσεις καραόκε! Η σωστή μουσική θα κάνει όλους να\nχορέψουν και να διασκεδάσουν.\n5. Μην ξεχνάς το κέφι!\nΤο πιο σημαντικό σε ένα πάρτι είναι να περάσεις καλά και να γελάσεις πολύ! Δεν χρειάζεται\  στο εξωτερικό, λέγοντας στους γονείς του πως το ιδανικό\nτου δεν ήταν να πλουτίσει, αλλά να εργαστεί και να βοηθήσει τον άνθρωπο.\nΠρώτα πήγε στο Ωκεανογραφικό Ινστιτούτο του Μονακό. Όμως επέστρεψε στην Ελλάδα,\nπροκειμένου να συμμετάσχει στον Βαλκανικό Πόλεμο του 1912 και, όταν τελείωσε,\nμετανάστευσε μαζί με τη γυναίκα του στην Αμερική. Εκεί είχαν οικονομικά προβλήματα κι,\nέτσι, εργάστηκαν και οι δυο: ο ένας πουλώντας χαλιά και η άλλη ράβοντας κουμπιά. Τα\nπροβλήματα τελείωσαν, όταν ο Παπανικολάου διορίστηκε στο Νοσοκομείου της Νέας\nΥόρκης. Γρήγορα διακρίθηκε και βρήκε δουλειά στο Πανεπιστημίου Κορνέλλ, όπου\nεργάστηκε το διάστημα 1914-61.\nΣτα 78 του εγκαταστάθηκε στο Μαϊάμι μέχρι τον θάνατό του (1962). Εκεί έγινε διευθυντής\nστο Ινστιτούτο για τον καρκίνο. Η επαναστατική μέθοδός του έγινε παγκοσμίως γνωστή ως\n«Pap test» και o ίδιος χαρακτηρίστηκε ως ο «άνθρωπος που χάρισε ζωή στις γυναίκες\nολόκληρου του κόσμου». Προς τιμή του δόθηκε το όνομά του σε ένα νοσοκομείο της\nΘεσσαλονίκης και σε ένα της Εύβοιας.\nανάγκες των εξετάσεων", "sub": [{"type": "mcq", "q": "Ο Γ. Παπανικολάου", "options": ["πήγε Δημοτικό στην Αθήνα", "μετακόμισε με τους γονείς του στην Αθήνα", "πέρασε τα παιδικά του χρόνια στην Εύβοια"], "answer": 2}, {"type": "mcq", "q": "Σύμφωνα με το κείμενο, ο Γ. Παπανικολάου", "options": ["λάτρευε να μαθαίνει καινούργια πράγματα", "όταν τελείωσε τις σπουδές του, σπούδασε φιλοσοφία", "πήρε πτυχίο από την Ιατρική το 1906"], "answer": 0}, {"type": "mcq", "q": "Όταν επέτρεψε από τη Γερμανία ο Γ. Παπανικολάου", "options": ["κατάλαβε ότι ήταν η καλύτερη ευκαιρία για να ξεχωρίσει ως γιατρός", "παντρεύτηκε και επέστρεψε στη Γερμανία", "αποφάσισε να φύγει πάλι στο εξωτερικό"], "answer": 2}, {"type": "mcq", "q": "Όταν πήγε στην Αμερική ο Γ. Παπανικολάου,", "options": ["είχε από την πρώτη στιγμή δουλειά στο Νοσοκομείο της Νέας Υόρκης", "πέρασε στην αρχή δύσκολες στιγμές, αλλά μετά γνώρισε την επιτυχία", "αναγκάστηκε αρχικά να βρει άλλη δουλειά γιατί η γυναίκα του ι πλαστικές σακούλες και τα μπουκάλια. Χιλιάδες από αυτά\nεγκαταλείπονται στις ακτές, «μνημεία» της παραμονής των λουομένων μετατρέποντας σε\nσκουπιδότοπους τις πανέμορφες ελληνικές παραλίες. Έπειτα ταξιδεύουν για χρόνια στις\nθάλασσες κάνοντας «παρέα» στα ψάρια ή μολύνοντας τον βυθό. Άραγε είναι τόσο δύσκολο\nνα μαζέψουμε,\nφεύγοντας από την παραλία, το μπουκάλι που ήπιαμε νερό;\nΦυσικά δεν το σκεφτόμαστε επειδή, σε μας τουλάχιστον, δεν κοστίζει τίποτα. Ωστόσο, η\nκατασκευή μιας πλαστικής σακούλας κοστίζει μισό ευρώ. Στη Φύση μάλιστα κοστίζει πολύ\nπερισσότερο, εφόσον οι πλαστικές σακούλες και τα μπουκάλια χρειάζονται πάνω από τρία\nχρόνια για να διαλυθούν μέσα στη θάλασσα. Σε περίπτωση που το πλαστικό μείνει θαμμένο\nσε στεγνό έδαφος «ζει» έως και διακόσια χρόνια.\nΑν, λοιπόν, χρειαζόταν να πληρώνουμε τις πλαστικές σακούλες όσο πραγματικά κοστίζουν\nκαι χρησιμοποιούσαμε τα πλαστικά μπουκάλια είκοσι φορές, δεν θα είχαμε μόνο λιγότερα\nπλαστικά σκουπίδια σε θάλασσες και ακτές αλλά και γενικότερα λιγότερα σκουπίδια. Έχει\nυπολογιστεί ότι ο συνολικός όγκος των σκουπιδιών με αυτό τον τρόπο θα μειωνόταν κατά\n3%.\nΠεριοδικό «ΟΙΚΟ», εφημερίδα Η ΚΑΘΗΜΕΡΙΝΗ, 15/9/2002", "sub": [{"type": "tf", "t": "Το καλοκαίρι αφήνει πίσω του όμορφες αναμνήσεις.", "a": true}, {"type": "tf", "t": "Οι πλαστικές σακούλες είναι από τα χειρότερα σκουπίδια.", "a": true}, {"type": "tf", "t": "Οι πλαστικές σακούλες χρειάζονται δύο χρόνια για να διαλυθούν.", "a": false}, {"type": "tf", "t": "Η κατασκευή μιας πλαστικής σακούλας κοστίζει μισό ευρώ.", "a": true}, {"type": "tf", "t": "Θα είχαμε λιγότερα σκουπίδια, αν πληρώναμε τις πλαστικές σακούλες όσο πραγματικά κοστίζουν.", "a": true}, {"type": "mcq", "q": "Τα σκουπίδια που συναντάμε συχνότερα στις παραλίες είναι:", "options": ["πλαστικά μπουκάλια", "πλαστικές σακούλες", "και τα δύο προηγούμενα"], "answer": 2}, {"type": "mcq", "q": "Οι πανέμορφες ελληνικές παραλίες μετατρέπονται από τους λουόμενους σε:", "options": ["λίμνες", "βάλτους", "σκουπιδότοπους"], "answer": 2}, {"type": "mcq", "q": "Δεν σκεπτόμαστε να πάρουμε το πλαστικό μπουκάλι μαζί μας φεύγοντας από την παραλία, διότι:", "options": ["δεν κοστίζει τίποτα", "αγνοούμε το κακό που κάνει", "μας ενδιαφέρει μόνο να φύγουμε"], "answer": 0}, {"type": "mcq", "q": "Αν το πλαστικό μπουκάλι μείνει θαμμένο σε στεγνό έδαφος, ζει ως:", "options": ["10 χρόνια", "20 χρόνια", "200 χρόνια"], "answer": 2}, {"type": "mcq", "q": "κοστίζει:", "options": ["χρωστάει", "πληρώνει", "στοιχίζει"], "answer": 2}, {"type": "mcq", "q": "μολύνοντας τον βυθό:", "options": ["πετώντας στον πάτο", "καθαρίζοντας τη μόλυνση", "δηλητηριάζοντας τον βυθό"], "answer": 2}, {"type": "mcq", "q": "συχνότερα:", "options": ["πολλές φορές", "περισσότερες φορές", "πάρα πολλές φορές"], "answer": 1}, {"type": "typed", "q": "πανέμορφες ελληνικές παραλίες: Η _____ _____ . _____ ..", "a": "πανέμορφη ελληνική παραλία"}, {"type": "typed", "q": "στεγνό έδαφος: _____ _____ Το μπουκάλι που ήπιαμε νερό: Το μπουκάλι που συνέχεια _____ . _____ ..", "a": "πίναμε νερό"}, {"type": "typed", "q": "Χιλιάδες από αυτά εγκαταλείπονται στις ακτές: Δύο μήνες πριν, χιλιάδες από αυτά _____ . στις ακτές", "a": "εγκαταλείφθηκαν"}, {"type": "typed", "q": "Έπειτα ταξιδεύουν για χρόνια στις θάλασσες: Έπειτα, όλο το 2020, _____ .. στις θάλασσες τη σωστή", "a": "ταξίδευαν"}, {"type": "typed", "q": "Το καλοκαίρι αφήνει πίσω του σκουπίδια. Σε έναν μήνα το καλοκαίρι _____ ..", "a": "θα (έχει) αφήσει πίσω του σκουπίδια"}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80- 100 λέξεις). Επισημαίνουμε ότι δεν πρέπει να υπογράψετε με το ονοματεπώνυμό σας στο τέλος του κειμένου. Πήγατε να κολυμπήσετε σε μια παραλία της Αττικής και τη βρήκατε γεμάτη σκουπίδια, κυρίως πλαστικές σακούλες και πλαστικά μπουκάλια. Στέλνετε ένα ηλεκτρονικό μήνυμα στον Δήμαρχο της περιοχής για να διαμαρτυρηθείτε και να του προτείνετε κάποια μέτρα που θα μπορούσαν να λύσουν το πρόβλημα."}, {"type": "reading", "cat": "reading", "id": "read_017", "title": "Διαβάστε με προσοχή το παρακάτω κείμενο και στη συνέχεια απαντήστε", "passage": "στις ερωτήσεις που ακολουθούν\nΤα έθιμα της Αποκριάς: οι φανοί στην Κοζάνη\nΣτις αποκριές υπάρχουν πολλά έθιμα στην Ελλάδα. Ένα από τα πιο φημισμένα είναι οι\nΦανοί της Κοζάνης. Είναι φωτιές που ανάβουν στις γειτονιές της πόλης και γύρω τους\nστήνεται γλέντι με χορό και τραγούδι. Το έθιμο στηρίζεται στη συμμετοχή των κατοίκων,\nκαθώς αυτοί τους ετοιμάζουν και πρωταγωνιστούν στο γλέντι με τα παραδοσιακά\nτραγούδια και τη συνοδεία μουσικών οργάνων.\nΗ καταγωγή του εθίμου βρίσκεται σε αρχαίες ελληνικές και ρωμαϊκές γιορτές. Οι φανοί\nσυμβολίζουν τη λατρεία της φύσης και την αρχή της άνοιξης και της καρποφορίας της γης.\nΟ Φανός ανάβει κατά τις 8 το βράδυ της Μεγάλης Αποκριάς. Κυρίαρχος είναι ο κορυφαίος\nτραγουδιστής. Οι κόσμος σχηματίζει έναν κύκλο γύρω από τη φωτιά και τον ίδιο και με\nρυθμό επαναλαμβάνουν τα λόγια του χτυπώντας τα χέρια τους και χορεύοντας. Το κέφι\nαρχίζει να ανεβαίνει σιγά-σιγά, ενώ το κρασί και οι παραδοσιακές πίτες -τα γνωστά «κιχί»κυκλοφορούν από χέρι σε χέρι. Τα τραγούδια διαδέχονται το ένα το άλλο, άλλοτε γρήγορα\nκαι δυναμικά και άλλοτε μονότονα και αργά. Άλλα είναι τραγούδια αγάπης κα έρωτα, άλλα\nεμπνευσμένα από τα κατορθώματα των κλεφτών της Επανάστασης(1821) και άλλα\nκοροϊδευτικά για άνδρες και γυναίκες.\nΤην Κυριακή της Αποκριάς ανάβουν ταυτόχρονα και οι δεκαπέντε φανοί της πόλης με τον\nδήμαρχο να δίνει το σήμα στην κεντρική πλατεία. Οι φανοί σβήνουν την επόμενη μέρα,\nδηλαδή την Καθαρή Δευτέρα, και το γλέντι τελειώνει.\nΣτις αποκριές χιλιάδες επισκέπτες φθάνουν στην Κοζάνη για να τραγουδήσουν τα\nτραγούδια των φανών και να χορέψουν μαζί με τους κατοίκους γύρω από τη φωτιά.", "sub": [{"type": "mcq", "q": "Σύμφωνα με το κείμενο", "options": ["Οι Φανοί είναι χριστουγεννιάτικο έθιμο", "Ανάβουν συνολικά 15 Φανοί σε όλη την πόλη της Κοζάνης", "Οι φανοί είναι το πιο γνωστό αποκριάτικο έθιμο στην Ελλάδα"], "answer": 1}, {"type": "mcq", "q" ονότονη.", "a": "Η διαδοχή"}, {"type": "typed", "q": "Την Κυριακή της Αποκριάς ανάβουν ταυτόχρονα και οι δεκαπέντε φανοί της πόλης με τον δήμαρχο να δίνει το σήμα στην κεντρική πλατεία. Αν την Κυριακή της Αποκριάς ο δήμαρχος της πόλης δεν είχε δώσει το σήμα στην κεντρική πλατεία, _____ ταυτόχρονα και οι δεκαπέντε φανοί της πόλης.", "a": "δεν θα άναβαν"}, {"type": "mcq", "q": "Στη φράση «Το έθιμο στηρίζεται στη συμμετοχή των κατοίκων» η λέξη «στηρίζεται» σημαίνει", "options": ["κατάγεται", "συμβολίζεται", "βασίζεται"], "answer": 2}, {"type": "mcq", "q": "Στη φράση «το γλέντι τελειώνει» η λέξη «γλέντι» σημαίνει", "options": ["το πανέρι", "το πανηγύρι", "το παντζάρι"], "answer": 1}, {"type": "mcq", "q": "Η φράση «σιγά σιγά» σημαίνει", "options": ["απότομα", "ύπουλα", "σταδιακά"], "answer": 2}, {"type": "mcq", "q": "Στη φράση «Τα τραγούδια διαδέχονται το ένα το άλλο» η λέξη «διαδέχονται» σημαίνει", "options": ["ακολουθούν", "διαφεύγουν", "κανένα από τα παραπάνω"], "answer": 0}], "writing": "Διαβάστε το παρακάτω θέμα και γράψτε το δικό σας κείμενο με βάση τις οδηγίες (80100 λέξεις). Επισημαίνουμε ότι δεν πρέπει να υπογράψετε με το ονοματεπώνυμό σας στο τέλος του κειμένου. Ο φίλος/Η φίλη σας θα πάει για τις αποκριές στην Κοζάνη, αλλά δεν γνωρίζει για τους φανούς. Έτσι, του/της στέλνετε ένα ηλεκτρονικό μήνυμα, για να του ευχηθείτε να περάσει καλά και να του/της δώσετε ορισμένες πληροφορίες για τους φανούς."}, {"type": "reading", "cat": "reading", "id": "read_018", "title": "Διαβάστε με προσοχή το παρακάτω κείμενο και στη συνέχεια απαντήστε", "passage": "στις ερωτήσεις που ακολουθούν\nΑρχαίοι Ολυμπιακοί Αγώνες\nΟι Ολυμπιακοί ήταν οι αρχαιότεροι και σημαντικότεροι από όλους τους ελληνικούς αγώνες\nκαι η σπουδαιότερη θρησκευτική γιορτή προς τιμή του Δία, του πατέρα των θεών. Η φήμη\nτου ιερού της Ολυμπίας διαδόθηκε σε ολόκληρο τον ελληνικό κόσμο, ενώ σύντομα οι\nΟλυμπιακοί Αγώνες έγιναν το σύμβολο της πανελλήνιας ενότητας.\nΜε το πέρασμα του χρόνου η θέση και η σημασία της Ολυμπίας μεγάλωσαν. Από απλός\nχώρος λατρείας εξελίχθηκε σε ένα ιερό γεμάτο περίτεχνους ναούς και αγάλματα. Νέα\nαγωνίσματα προστέθηκαν στους Αγώνες και καινούργιες εγκαταστάσεις χτίστηκαν για να\nεξυπηρετήσουν τους αθλητές.\nΤα Ολύμπια τελούνταν κάθε τέσσερα χρόνια κατά τη διάρκεια των πιο ζεστών ημερών του\nκαλοκαιριού. Περισσότερα από 40.000 άτομα, αθλητές, φιλόσοφοι, πολιτικοί, καλλιτέχνες,\nποιητές και διάφοροι προσκυνητές, ταξίδευαν ως την Oλυμπία από όλον τον ελληνικό\nκόσμο, προκειμένου να παρακολουθήσουν όλους τους αγώνες. Κατά την πενθήμερη\nδιάρκειά τους αφιερώνονταν στους βωμούς των θεών θυσίες, με πιο μεγαλειώδη εκείνη\nτων εκατό βοδιών στον βωμό του Δία. Αθλητικοί αγώνες διεξάγονταν στο Στάδιο και τον\nΙππόδρομο. Οι νικητές βραβεύονταν με ένα στεφάνι ελιάς και απολάμβαναν ιδιαίτερες\nτιμές από την πατρίδα τους. Oι πόλεις τους έριχναν τα τείχη τους κατά την είσοδό τους ως\nένδειξη της ασφάλειας που αισθάνονταν.\nΚατά τη διάρκεια των Αγώνων διεξάγονταν διάφορα αγωνίσματα, όπως το στάδιο, η πάλη,\nη πυγμαχία, τα ιππικά αγωνίσματα και το πένταθλο. Όσοι συμμετείχαν ακολουθούσαν\nκοινούς κανόνες, που είχαν καθιερωθεί για την καλύτερη οργάνωση των αγώνων.\nΤέλος, όλες οι πόλεις ήταν υποχρεωμένες να σταματήσουν τις εχθροπραξίες κατά τη\nδιάρκειά τους, ενώ επιτρεπόταν η συμμετοχή μόνο στους άνδρες Έλληνες πολίτες.\nεξετάσεων", "sub": [{"type": "mcq", "q": "Οι Ολυμπιακοί αγώνες", "options": ["ήταν από τους πιο παλιούς ελληνικούς αγώνες", "αποτέλεσαν την έκφραση της ενότητας των Ελλήνων", "γίνονταν προς τιμή του θεού Ολύμπου"], "answer": 1}, {"type": "mcq", "q": "Το ιερό της Ολυμπίας", "options": ["έχανε σταδιακά τη φήμη του στον τότε ελληνικό κόσμο", "ξεκίνησε ως πλούσιος χώρος συγκέντρωσης πλήθους πιστών", "μεταμορφώθηκε με την πάροδο του χρόνου σε ένα πλούσιο ιερό"], "answer": 2}, {"type": "mcq", "q": "Τα Ολύμπια γίνονταν", "options": ["σε ειδικά διαμορφωμένες εγκαταστάσεις", "κάθε τέσσερα χρόνια", "όλα τα παραπάνω"], "answer": 2}, {"type": "mcq", "q": "Κατά τη ing", "id": "read_023", "title": "Αρκτούρος", "passage": "Ο Αρκτούρος ιδρύθηκε το 1992\nστην\nΕλλάδα\nμε\nσκοπό\nνα\nπροσφέρει καταφύγιο στην άγρια\nζωή που βρισκόταν υπό απειλή, να\nεκπαιδεύσει και να ενημερώσει\nτον\nκόσμο\nσε\nσχέση\nμε\nαπειλούμενα είδη πανίδας που\nζουν στη χώρα καθώς και να\nαναβαθμίσει αποψιλωμένες δασικές περιοχές με δενδροφυτεύσεις. Ο πρώτος στόχος που\nεκπληρώθηκε ήταν το τέλος της αρκούδας χορεύτριας. Το όνομα Αρκτούρος προέρχεται\nαπό τον αρχαίο ελληνικό μύθο του Δία και της Καλλιστούς και σημαίνει ο φύλακας της\nάρκτου.\nΩς μια Μη Κερδοσκοπική Οργάνωση, ο Αρκτούρος λειτουργεί με τη βοήθεια ιδιωτικής\nπρωτοβουλίας σε οικονομικό και πρακτικό επίπεδο, ώστε να προφέρει το έργο του με\nαπόλυτη διαφάνεια και ανεξαρτησία. Ο εθελοντισμός, οι χορηγίες και η υιοθεσία άγριων\nζώων βοηθούν την οργάνωση Αρκτούρος να συντηρεί το Περιβαλλοντικό Κέντρο\nΑρκτούρου στο Νυμφαίο και στην Αγραπιδιά Φλώρινας, το Κτηνιατρικό κέντρο και μια\nμόνιμη Ομάδα Άμεσης Επέμβασης. Παράλληλα, τα έσοδα επιτρέπουν στον Αρκτούρο να\nδημιουργεί δράσεις και προγράμματα στη φύση για παιδιά και ενήλικες.\nΟ βασικός άξονας λειτουργίας του Αρκτούρου είναι η προστασία άγριων και\nπροστατευόμενων ζώων που ζουν στην Ελλάδα όπως: η αρκούδα, η καφέ αρκούδα, ο λύκος,\nτο τσακάλι, το ζαρκάδι, το ελάφι, το αγριόγιδο, η βίδρα και ο ελληνικός ποιμενικός. Αυτά\nτα θηλαστικά χάρη στον Αρκτούρο ζουν στην Ελλάδα ελεύθερα στα δάση ή στα δύο\nκαταφύγια της οργάνωσης. Επιπλέον, ο Αρκτούρος, γνωρίζοντας ότι τα ζώα που\nπροστατεύει μπορεί να αποτελέσουν απειλή το ένα για το άλλο ή η έλλειψή τους να έχει\nκαταστροφικό αντίκτυπο στη διατροφική αλυσίδα της φύσης, εκτρέφει και παρέχει δωρεάν\nελληνικούς ποιμενικούς σε κτηνοτρόφους ορεινών περιοχών.\nhttps://www.youbehero.com/gr/cause/arcturos Διασκευάστηκε για τις ανάγκες της εξέτασης.", "sub": [{"type": "mcq", "q": "Η οργάνωση Αρκτούρος δεν υπήρχε", "options": ["πριν από τη δεκαετία 1990.", "πριν από το 1993.", "πριν ιδρυθεί μία Μη Κερδοσκοπική Οργάν  το δικό σας κείμενο (80-100 λέξεις). Επισημαίνουμε ότι δεν πρέπει να υπογράψετε με το ονοματεπώνυμό σας στο τέλος του κειμένου. Επισκεφτήκατε το καταφύγιο του Αρκτούρου στο Νυμφαίο. Γράψτε τι σας έκανε εντύπωση σε ένα ηλεκτρονικό μήνυμα στον φίλο σας/τη φίλη σας."}, {"type": "reading", "cat": "reading", "id": "read_024", "title": "Το φοινικόδασος στο Βάι", "passage": "Μια εξωτική αμμουδερή παραλία με\nφόντο\nχιλιάδες\nθυμίζει\nαφρικανικά\nΚαραϊβική\nφοινικόδεντρα\nτοπία\nδεσπόζει στην\nκαι\nπου\nτην\nανατολική\nπλευρά της Κρήτης, στον νομό\nΛασιθίου. Το Βάι είναι ένα από τα πιο\nδημοφιλή αξιοθέατα στην Κρήτη και μια\nαπό τις πιο όμορφες και ιδιαίτερες τοποθεσίες σε ολόκληρη τη Μεσόγειο.\nΗ αποικία των φοινικόδεντρων καταλαμβάνει μια έκταση περίπου 250 στρεμμάτων και\nαποτελεί τη μεγαλύτερη στην Ευρώπη. Το όνομα του φοινικοδάσους ετυμολογείται από την\nελληνική λέξη «βάγια», που στην τοπική διάλεκτο σημαίνει «φοινικόδεντρα».\nΣύμφωνα με τον θρύλο της περιοχής, το φοινικόδασος του Βάι δημιουργήθηκε, όταν\nΆραβες πειρατές που έφτασαν στην περιοχή με τα καράβια τους, έφαγαν τους χουρμάδες\nπου είχαν φέρει μαζί τους και πέταξαν τα κουκούτσια στο χώμα. Ωστόσο, το φοινικόδασος\nέχει ηλικία 2.000 χρόνων, άρα η εκδοχή των Αράβων, αν και ωραία, είναι μάλλον μύθος.\nΒέβαια, η ιστορία έχει και μια δεύτερη εκδοχή κατά την οποία το δάσος δημιουργήθηκε με\nπαρόμοιο τρόπο, όχι από Άραβες πειρατές, αλλά από Φοίνικες ναυτικούς που αποίκισαν\nτην περιοχή. Η επιστημονική κοινότητα, όμως, έχει αποδείξει ότι το φοινικόδασος στο Βάι\nείναι το μεγαλύτερο αυτοφυές φοινικόδασος της Ευρώπης με τους ενδημικούς κρητικούς\nφοίνικες που ανήκουν στο είδος του «Θεόφραστου». Το συγκεκριμένο είδος φοίνικα είναι\nγνωστό από τη Μινωική εποχή, κάτι που φανερώνουν οι ιστορικές πηγές, όπως τα κείμενα\nτου Πλίνιου.\nΤο Βάι θεωρείται μια από τις ομορφότερες περιοχές στην Κρήτη και το φοινικόδασος είναι\nπεριφραγμένο, προστατεύεται και απαγορεύεται αυστηρά η διαμονή στην παραλία.\nhttps://www.mixanitouxrono λοκληρώθηκε το 1887.\nΕίναι ένα οικοδόμημα στολίδι που κτίστηκε με τις δωρεές του ομογενούς επιχειρηματία της\nΒιέννης βαρώνου Σίνα και της γυναίκας του, η οποία συνέχισε να χρηματοδοτεί το έργο\nμετά τον θάνατό του. Φημισμένη για τα αγάλματα της Αθηνάς του Σωκράτη και του\nΠλάτωνα, στον περίβολό της, έργα του γλύπτη Δρόση, στεγάζει το ανώτατο πνευματικό\nίδρυμα της χώρας. Έχει ως στόχο την καλλιέργεια των γραμμάτων και την πρόοδο του\nπολιτισμού.\nΤο τελευταίο κομμάτι της τριλογίας αποτελεί το Εθνικό και Καποδιστριακό Πανεπιστήμιο\nΑθηνών. Ιδρύθηκε το 1837 και ήταν το πρώτο πανεπιστήμιο της Ελλάδας αλλά και των\nΒαλκανίων. Πρόκειται για ομάδα κτιρίων που σχηματίζουν διπλό «Τ» με δύο ιστορικές\nεσωτερικές αυλές με εξωτερικά αγάλματα τα οποία χαρακτηρίζονται από αυστηρές\nγραμμές. Σχεδιάστηκε και αυτό από τον Χάνσεν και διακοσμήθηκε από τον ζωγράφο Καρλ\nΡαλ. Σήμερα, λειτουργεί ως έδρα του Πανεπιστημίου, στεγάζοντας την Πρυτανεία, τη\nΣύγκλητο και την Μεγάλη Αίθουσα Τελετών.\nΔιασκευασμένο κείμενο για τις ανάγκες της εξέτασης από το Δώδεκα κτίρια με ξεχωριστή ιστορία στην Πανεπιστημίου\n- Newsbeast", "sub": [{"type": "mcq", "q": "Τα κτήρια της Ακαδημίας και του Πανεπιστημίου ήταν δωρεά του ομογενούς βαρώνου Σίνα.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Ο αρχιτέκτονας Θεόφιλος Χάνσεν μελέτησε και τα τρία κτίρια της «αθηναϊκής τριλογίας».", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Τα αγάλματα στον κήπο του κτηρίου της Ακαδημίας είναι έργα του γλύπτη Δρόση.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Ακόμα και σήμερα στα κτίρια του Πανεπιστημίου Αθηνών γίνονται μαθήματα της Φιλοσοφικής Σχολής.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Σκοπός του κειμένου είναι να προβάλει", "options": ["την μεγάλη κίνηση που έχει η οδός Πανεπιστημίου", "τα σημαντικά αρχιτεκτονικά κτήρια – μνημεία της οδού Πανεπ  ως\n«συλλογική\n(επίσης\nανοσία»\nγνωστή\nως\n«ανοσία της αγέλης»).\nΚατ’ αυτόν τον τρόπο, τα\nεμβόλια\nπροστατεύουν\nέμμεσα τα υπόλοιπα άτομα του πληθυσμού που είναι ευάλωτα στη νόσο, μεταξύ άλλων\nβρέφη, παιδιά, ηλικιωμένους, άτομα με εξασθενημένο ανοσοποιητικό σύστημα,\nκαρκινοπαθείς και άτομα που δεν μπορούν να εμβολιαστούν για ιατρικούς λόγους.\nΑυτό σημαίνει ότι τα άτομα που δεν μπορούν να εμβολιαστούν, π.χ. λόγω πολύ μικρής\nηλικίας ή αλλεργίας στα συστατικά του εμβολίου, επωφελούνται από όσους έχουν\nεμβολιαστεί διότι η νόσος δεν μπορεί να εξαπλωθεί εύκολα στην κοινότητα.\nΓια παράδειγμα, για να διασφαλιστεί η συλλογική ανοσία κατά της ιλαράς, οι αρχές\nδημόσιας υγείας συνιστούν τον εμβολιασμό του 95% του πληθυσμού με δύο δόσεις του\nεμβολίου κατά της ιλαράς (πρόκειται για το εμβόλιο MMR, το οποίο προστατεύει από την\nιλαρά, την παρωτίτιδα και την ερυθρά).\nΩστόσο, ο πληθυσμός δεν μπορεί να βασίζεται στη συλλογική ανοσία για ορισμένες\nλοιμώδεις νόσους. Για παράδειγμα, ο τέτανος προκαλείται από κοινά τραύματα, μεταξύ\nάλλων από δάγκωμα σκύλου ή γάτας. Ο εμβολιασμός είναι ο μόνος τρόπος για να\nδιασφαλιστεί η άμεση προστασία από τον τέτανο.\nhttps://vaccination-info.eu/el/emboliasmos/ta-ofeli-toy-emboliasmoy-gia-tin-koinotita. Διασκευάστηκε για τις ανάγκες\nτης εξέτασης.", "sub": [{"type": "mcq", "q": "Ο εμβολιασμός προστατεύει", "options": ["μόνο αυτούς που εμβολιάζονται.", "αυτούς που εμβολιάζονται και το περιβάλλον τους.", "μόνο τα μωρά."], "answer": 1}, {"type": "mcq", "q": "Συλλογική ανοσία και ανοσία της αγέλης", "options": ["είναι το ίδιο πράγμ", "δεν είναι το ίδιο πράγμ", "είναι ένα δύσκολο δίλημμ"], "answer": 0}, {"type": "mcq", "q": "Συλλογική ανοσία σημαίνει ότι", "options": ["είναι τόσο πολλοί οι άνθρωποι που δεν μπορούν να κολλήσουν μία αρρώστια, που τελικά αυτή η αρρώστια σταματά να εξαπλώνεται.", "έχουν εμβολιαστεί όλοι.", "όσοι αρρώστησαν δεν μπορούν να ξανα-αρρωστήσουν από την ίδια αρρώστι"], "answer": 0}, {"type": "mcq", "q": "Κάποιοι άνθρωποι δεν μπορούν να εμβολιάζονται", "options": ["για να μην πάθουν αυτισμό.", "γιατί με τα εμβόλια τους ελέγχουν οι φαρμακευτικές εταιρείες.", "γιατί δεν το επιτρέπει η υγεία τους."], "answer": 2}, {"type": "mcq", "q": "Το εμβόλιο MMR", "options": ["προστατεύει από τρεις αρρώστιες.", "το έχει κάνει το 95% του πληθυσμού.", "γίνεται σε μία δόση."], "answer": 0}, {"type": "mcq", "q": "Τα εμβόλια έχουν παρενέργειες στο 95% των ανθρώπων.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Η ιλαρά μεταδίδεται και από δάγκωμα σκύλου ή γάτας.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Η λύσσα μεταδίδεται και από δάγκωμα σκύλου ή γάτας.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Η συλλογική ανοσία μάς προστατεύει από τον τέτανο.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Η λέξη «μεταδοτική» έχει όλες τις παρακάτω σημασίες εκτός από το", "options": ["λοιμώδης.", "κολλητική.", "σοβαρή."], "answer": 2}, {"type": "mcq", "q": "Η λέξη «προστατεύουν» εδώ σημαίνει ότι", "options": ["προφυλάσσουν.", "περιορίζουν.", "ωφελούν."], "answer": 0}, {"type": "mcq", "q": "Η λέξη «εξασθενημένο» σημαίνει", "options": ["άρρωστο.", "φιλάσθενο.", "αποδυναμωμένο."], "answer": 2}, {"type": "mcq", "q": "Η λέξη «συνιστούν» σημαίνει", "options": ["επιβάλλουν.", "προτείνουν.", "αναλαμβάνουν."], "answer": 1}, {"type": "mcq", "q": "Η παρωτίτιδα λέγεται και με όλα τα άλλα ονόματα εκτός από το", "options": ["ωτίτιδ", "παραμαγούλ", "μαγουλάδες."], "answer": 0}, {"type": "typed", "q": "Χρειάζεται να εμβολιαζόμαστε. → Χρειάζεται _____ .", "a": "ο εμβολιασμός"}, {"type": "typed", "q": "Μπορεί να μεταδίδουμε μια νόσο. → Είναι πιθανή _____ ..της νόσου.", "a": "η μετάδοση"}, {"type": "typed", "q": "Πρέπει να προστατεύουμε τους ευάλωτους. →Επιβάλλεται _____ .των ευάλωτων.", "a": "η προστασία"}, {"type": "typed", "q": "Πρέπει να διασφαλίσουμε τη συλλογι τους αυριανούς\nπολίτες.\nΗ ενδοοικογενειακή βία, λοιπόν, δεν είναι σε καμία περίπτωση μια ιδιωτική υπόθεση στην\nοποία δεν πρέπει να εμπλέκεται ο γείτονας ή ο φίλος, αλλά ένα σημαντικό κοινωνικό\nπρόβλημα με μεγάλες διαστάσεις και ένα σοβαρό ποινικό αδίκημα σύμφωνα με τον νόμο.\nhttps://www.hopespot.gr/index.php/2015-01-21-05-38-17/endooikogeneiaki-bia\nΔιασκευάστηκε για τις ανάγκες της εξέτασης", "sub": [{"type": "mcq", "q": "Η ενδοοικογενειακή βία", "options": ["είναι αόρατη.", "λέγεται αόρατη.", "μοιάζει αόρατη."], "answer": 1}, {"type": "mcq", "q": "Η ενδοοικογενειακή βία", "options": ["γεννιέται ως αντίδραση σε άλλα προβλήματ", "είναι παράδοση.", "δεν ξέρουμε από πού προέρχεται."], "answer": 0}, {"type": "mcq", "q": "Αν κάποια τη δέρνει η οικογένειά της,", "options": ["είναι καταπάτηση των ανθρωπίνων δικαιωμάτων.", "κάτι θα έκανε και το προκάλεσε.", "πρέπει να το κρύβει, για να μην εκθέσει την οικογένειά της."], "answer": 0}, {"type": "mcq", "q": "Αν κάποιον τον βρίζει η οικογένειά του,", "options": ["είναι ενδοοικογενειακή βί", "δεν είναι άξιος να λέγεται άνδρας.", "πρέπει να κάνει υπομονή γιατί η οικογένεια είναι ιερή."], "answer": 0}, {"type": "mcq", "q": "Αν κάποια δεν την αφήνει η οικογένειά της να κάνει φίλους και φίλες,", "options": ["είναι ενδοοικογενειακή βί", "είναι για να την προστατέψει.", "πρέπει να συμμορφωθεί γιατί έχουν δίκιο."], "answer": 0}, {"type": "tf", "t": "Οι γυναίκες που υφίστανται ενδοοικογενειακή βία συχνά το κρύβουν γιατί ντρέπονται.", "a": true}, {"type": "tf", "t": "Σε μία οικογένεια που υπάρχει βία μαθαίνουν και τα παιδιά να είναι βίαια.", "a": true}, {"type": "tf", "t": "Στις περιπτώσεις ενδοοικογενειακής βίας δεν πρέπει να ανακατεύονται οι γείτονες.", "a": false}, {"type": "tf", "t": "Η ενδοοικογενειακή βία δεν είναι θέμα της κοινωνίας.", "a": false}, {"type": "mcq", "q": "Η λέξη «αόρατη» σημαίνει", "options": ["άγνωστη.", "αθέατη.", "ατιμώρητη."], "answer": 1}, {"type": "mcq", "q": "Η λέξη «εμφανείς» σημαίνει", "options": ["φα -4 μελιτζάνες\n•\n3-4 πατάτες\n•\nλάδι για τηγάνισμα\nΓια τον κιμά\n•\n750γρ. κιμά\n•\n2 κρεμμύδια, ψιλοκομμένα\n•\n2 σκελίδες σκόρδο, ψιλοκομμένες\n•\n1 κονσέρβα ντοματάκια\n•\n2 κ.σ. ντοματοπελτέ\n•\n1 κ.γλ. ζάχαρη\n•\n1 ποτήρι κόκκινο κρασί\n•\nαλάτι και φρεσκοτριμμένο πιπέρι\n•\n1 φύλλο δάφνης\n•\n1 πρέζα κανέλα\n•\n¼ της κούπας ελαιόλαδο\nΓια τη μπεσαμέλ\n•\n900ml γάλα (3 και ¾ της κούπας)\n•\n120γρ. βούτυρο\n•\n120γρ. αλεύρι\n•\nμια πρέζα μοσχοκαρύδο\n•\n2 κρόκους αυγών\n•\n100γρ. παρμεζάνα ή κεφαλοτύρι ή γραβιέρα, τριμμένη\nΜπορείτε να χρησιμοποιήσετε κιμά αρνίσιο και μοσχαρίσιο. Για να προετοιμάσετε τη\nσάλτσα του κιμά για τον μουσακά, σοτάρετε τον κιμά σε ελαιόλαδο, αρωματισμένο με\nκρεμμύδια και σκόρδο, και στη συνέχεια σιγοβράστε στο κόκκινο κρασί και στη σάλτσα\nντομάτας. Αφήστε τη σάλτσα να σιγοβράσει, για να ανακατευτούν όμορφα οι γεύσεις.\nΓια να πετύχετε τη τέλεια υφή για τη μπεσαμέλ σας, προσθέστε το γάλα (κατά προτίμηση\nχλιαρό) λίγο λίγο. Το μυστικό είναι να ανακατεύετε τη μπεσαμέλ συνεχώς και να αφήνετε\nκάθε φορά το αλεύρι να απορροφήσει το γάλα, έτσι ώστε να μη σβολιάσει. Μαγειρέψτε την\nμπεσαμέλ σε μέτρια φωτιά, για να μην καεί και να μην κολλήσει στον πάτο της κατσαρόλας,\nαλλά να είστε προσεκτικοί να τη μαγειρέψετε αρκετά, ώστε να μην μπορείτε να γευτείτε το\nαλεύρι.\nΟι\nπατάτες\nκαι\nοι\nμελιτζάνες\nτηγανίζονται\nσε\nμπόλικο\nελαιόλαδο,\nμέχρι\nνα\nροδοκοκκινίσουν. Μερικές μελιτζάνες μπορεί να είναι πικρές, οπότε είναι σημαντικό να τις\nξεπικρίσετε πριν τις μαγειρέψετε. Αλατίστε τες και αφήστε τες για μισή ώρα σε ένα\nσουρωτήρι.\nhttps://www.tastycooking.gr/recipe/syntagi-paradosiakos-mousakas-me-patates- kai-melitzanes/\nΔιασκευάστηκε για τις ανάγκες των εξετάσεων.", "sub": [{"type": "mcq", "q": "Ο μουσακάς είναι ένα φαγητό που μπορούν να φάνε", "options": ["οι χορτοφάγοι.", "όσοι δεν είναι χορτοφάγοι.", "όλοι."], "answer": 1}, {"type": "mcq", "q": "Ο μουσακάς είναι ένα", "options": ["παραδοσιακό ελληνικό φαγητό.", "παραδοσιακό φαγητό.", άσημη για το\nκρύο της. Έτσι έχει καταγραφεί στη συνείδηση\nτων\nΕλλήνων\nπολιτών\nτο\nάγνωστο\nγια\nπολλούς σημείο αυτό στον χάρτη, εκεί που καταγράφονται οι χαμηλότερες θερμοκρασίες\nκατά τους χειμερινούς μήνες.\nΟι επιστήμονες αποδίδουν το φαινόμενο των πολικών θερμοκρασιών στο γεγονός ότι τα\nγύρω βουνά εμποδίζουν την είσοδο θερμών αέριων μαζών στο λεκανοπέδιο. Αποτέλεσμα\nείναι να δημιουργούνται καιρικές συνθήκες όμοιες με της σιβηριανής στέπας. Σύμφωνα με\nτα δεδομένα, ο χειμώνας διαρκεί 6-7 μήνες, με τον υδράργυρο να ανεβοκατεβαίνει μεταξύ\n-15 και -30 βαθμών. Δεν είναι σπάνιες οι χιονοπτώσεις τον Μάιο, ακόμα και στα τέλη\nΙουνίου, όπως συνέβη το 1996.\nΓια τους 8026 κατοίκους ο σκληρός χειμώνας είναι μέρος της καθημερινότητάς τους. Η\nκάθετη πτώση του υδράργυρου αρχίζει από τα μέσα του Οκτωβρίου οπότε και ξεκινούν τα\nπρώτα κρύα. Ο κάμπος του Νευροκοπίου ζει σε ρυθμούς σκληρού χειμώνα έως και τον\nΑπρίλιο με το χιόνι να αγγίζει μέχρι και τα δυο μέτρα. Φυσικά, τους κατοίκους του\nΝευροκοπίου τους «πονάει» ιδιαίτερα η κατανάλωση πετρελαίου. Σύμφωνα με τον μέσο\nόρο, ένα νοικοκυριό χρειάζεται τουλάχιστον 5.000 ευρώ για θέρμανση.\nΗ περιοχή, που είναι επιπλέον γνωστή για τα περίφημα γεωργικά προϊόντα, όπως πατάτες\nκαι φασόλια, έχει πολλές δυνατότητες προσέλκυσης τουριστών: Το χιονοδρομικό κέντρο\nΦαλακρού, τον παραδοσιακό οικισμό στο χωριό «Γρανίτης», τεχνητές λίμνες και ποτάμια,\nτις θεαματικές διαδρομές στα δάση, τις παλιές εκκλησίες. Οι κάτοικοι της περιοχής\nδημιούργησαν μια σελίδα στο Facebook αφιερωμένη στις ομορφιές του τόπου τους.\nhttps://www.enimerotiko.gr/plus/toyrismos/i-pio-krya-poli-tis-elladas-ekei-poy-o- cheimonas-echei-diarkeia-7-mineskai-i-thermokrasia-peftei-stoys-30/ Διασκευάστηκε για τις ανάγκες των εξετάσεων.", "sub": [{"type": "mcq", "q": "Το Νευροκόπι είναι", "options": ["στη Σιβηρία των Νοτίων Βαλκανίων.", "στον νομό Δράμας.", "στη σιβηριανή στέπ"], "answer": 1}, {"type": "mcq", "q": "Ξέρουν πού βρίσκεται το Νευροκόπι", "options": ["όλοι οι Έλληνες.", "όχι πολλοί Έλληνες.", "ελάχιστοι Έλληνες."], "answer": 1}, {"type": "mcq", "q": "Στο Νευροκόπι κάνει πολύ κρύο ίσως γιατί", "options": ["είναι ανάμεσα σε βουνά και δεν φτάνει εκεί ζεστός αέρας.", "είναι ανάμεσα σε βουνά και δεν το χτυπάει ποτέ ο ήλιος.", "ανάμεσα στα βουνά υπάρχει ένας παγετώνας."], "answer": 0}, {"type": "mcq", "q": "Το καλοκαίρι διαρκεί στο Νευροκόπι", "options": ["6-7 μήνες", "3 μήνες ή και λιγότερο", "5-6 μήνες"], "answer": 1}, {"type": "mcq", "q": "Στο Νευροκόπι δεν έχει χιονίσει ποτέ", "options": ["τον Ιούνιο.", "τον Ιούλιο.", "τον Οκτώβριο."], "answer": 1}, {"type": "mcq", "q": "Το Νευροκόπι έχει περίπου πέντε χιλιάδες κατοίκους.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Στο Νευροκόπι δεν κλείνουν τα σχολεία, όταν χιονίζει.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Οι κάτοικοι του Νευροκοπίου πονούν ιδιαίτερα στα κόκκαλα λόγω κρύου.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Το Νευροκόπι έχει και αγροτική και τουριστική δραστηριότητα.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Η φράση «έχει καταγραφεί στη συνείδηση» σημαίνει ότι", "options": ["το ξέρουν.", "δεν το ξέρουν.", "έχουν τύψεις που δεν το ξέρουν."], "answer": 0}, {"type": "mcq", "q": "Η λέξη «ανεβοκατεβαίνει» μέσα στο κείμενο σημαίνει", "options": ["κατεβοανεβαίνει.", "πηγαινοέρχεται.", "κυμαίνεται."], "answer": 2}, {"type": "mcq", "q": "Το αντίθετο του «σκληρός χειμώνας» είναι όλες οι παρακάτω εκφράσεις εκτός από", "options": ["μαλακός χειμώνας.", "καλός χειμώνας.", "ήπιος χειμώνας."], "answer": 1}, {"type": "mcq", "q": "Η λέξη «περίφημα» εδώ σημαίνει", "options": ["φημισμέν", "περήφαν", "περιφρονημέν"], "answer": 0}, {"type": "mcq", "q": "Τα «γεωργικά προϊόντα» μπορούμε αλλιώς να τα πούμε", "options": ["δημητριακά προϊόντ", "αγροτικά προϊόντ", "γήινα προϊόντ"], "answer": 1}, {"type": "typed", "q": "Αυτοί αποκαλούν → Εμείς _____", "a": "αποκαλούμε"}, {"type": "typed", "q": "Αυτοί καταγράφονται → Εμείς _____", "a": "καταγραφόμαστε"}, {"type": "typed", "q": "Αυτό συνέβη → Αυτά _____", "a": "συνέβησαν"}, {"type": "typed", "q": "Αυτά ξεκινούν → Εσύ _____", "a": "ξεκινάς"}], "writing": "Διαβάστε το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Επισημαίνουμε ότι δεν πρέπει να υπογράψετε με το ονοματεπώνυμό σας στο τέλος του κειμένου. Γράψτε ένα ηλεκτρονικό μήνυμα στον φίλο σας /τη φίλη σας περιγράφοντας τι ιδιαίτερο έχει ένα μέρος της Ελλάδας το οποίο έχετε επισκεφτεί και σας έκανε εντύπωση."}, {"type": "reading", "cat": "reading", "id": "read_033", "title": "Οδική Ασφάλεια", "passage": "Η\nΔιεθνής\nΟμοσπονδία\nΑυτοκινήτου\nξεκίνησε την εκστρατεία \"3500 Lives\" με\nσκοπό την ενημέρωση και ευαισθητοποίηση\nσχετικά με τα τροχαία ατυχήματα, που\nαποτελούν την αιτία για τον θάνατο 3500\nσυνανθρώπων μας κάθε ημέρα.\nΣτατιστικές που όλοι καλό θα ήταν να γνωρίζουμε:\n•\nΜείωση 5% της μέσης ταχύτητας κατά την κίνηση μπορεί να οδηγήσει σε μείωση των\nθανάτων από τροχαία κατά 30%.\n•\nΤα παιδικά καθίσματα μειώνουν την πιθανότητα θανάτου για τα παιδιά έως και κατά\n70%.\n•\nΟι οδηγοί ηλικίας 15-29 ετών, πιθανώς λόγω μειωμένης εμπειρίας και αυξημένης\nτάσης προς το ρίσκο, αποτελούν την πιο ευάλωτη ηλικιακή ομάδα στους δρόμους\nκαι αυτό αποδεικνύεται από το γεγονός ότι τα τροχαία αποτελούν την κυριότερη\nαιτία θανάτου για τους νέους.\n•\nΗ χρήση ζώνης μειώνει την πιθανότητα θανάτου για οδηγούς και μπροστινούς\nεπιβάτες κατά 45-50%.\n•\nΗ χρήση τηλεφώνου κατά την οδήγηση τετραπλασιάζει τις πιθανότητες ατυχήματος.\n•\nΤο αλκοόλ έχει παίξει ρόλο σε 1 στα 3 θανατηφόρα ατυχήματα.\n•\nΗ αυστηρή επιβολή του νόμου ενάντια στην οδήγηση υπό την επήρεια αλκοόλ\nμπορεί να μειώσει τον αριθμό των θανάτων από τροχαία κατά 20%.\n•\nΤο 49% των θανάτων από τροχαία αφορά πεζούς, ποδηλάτες και μοτοσικλετιστές.\n•\nΟι πεζοί αποτελούν το 22% των θυμάτων από τροχαία ατυχήματα είται η πιο ηλιόλουστη περιοχή σ’ ολόκληρη την Ευρώπη.\nΔιαθέτει πλούσια ιστορία, όμορφη φύση και ζεστή θάλασσα. Από την Ιεράπετρα γίνονται\nεκδρομές σε παραδοσιακά ορεινά χωριά και παραθαλάσσιους οικισμούς. Η ίδια η πόλη\nδιαθέτει πολλά ξενοδοχεία και ενοικιαζόμενα δωμάτια και κάθε καλοκαίρι περιμένει να σας\nφιλοξενήσει στη ζεστή αγκαλιά της.\nΠερίπατος στην πόλη.\nΞεκινήστε για μια βόλτα στο ζωηρό κέντρο της πόλης κατά μήκος της προκυμαίας ή\nχαθείτε στα γραφικά δρομάκια της παλιάς πόλης στην Κάτω Μερά. Το πιο γνωστό\nαξιοθέατο της πόλης είναι το φρούριο Καλές (13ος αι.), που ακόμη προστατεύει το λιμάνι\nτης Ιεράπετρας. Το φρούριο αποτελεί το καλύτερο σημείο για μια ρομαντική βόλτα το\nηλιοβασίλεμα.\nΟι Παραλίες.\nΌλες σχεδόν οι παραλίες της Ιεράπετρας κερδίζουν κάθε χρόνο βραβείο για τα\nκαθαρά νερά τους. Η καλύτερα οργανωμένη παραλία, με ψιλό βοτσαλάκι και ρηχά νερά,\nείναι τα Λιβαδάκια. Στην περιοχή του Αγίου Ανδρέα εκτείνεται η μεγαλύτερη σε μήκος (φτάνει\nτα 4 χλμ.) παραλία της πόλης αλλά αξίζει σίγουρα τον κόπο και μια βουτιά στις φημισμένες\nπαραλίες της Αγίας Φωτιάς και του Μύρτου που βρίσκονται σε κοντινή απόσταση.\nΑναμφισβήτητα, όμως, το δυνατό χαρτί της Ιεράπετρας για κολύμπι είναι το μικρό\nνησάκι Χρυσή. Στο νησί φτάνετε με μικρά σκάφη που κάνουν μονοήμερες εκδρομές. Τα\nσπάνια δάση από κέδρο, οι παραλίες του με τη λευκή άμμο και η θάλασσα με τα διάφανα\nγαλάζια νερά θα σας μαγέψουν!\n(Άρθρο στον ιστότοπο: http://www.visitgreece.gr/el/destinations/ierapetra - διασκευή για τις ανάγκες των\nεξετάσεων)", "sub": [{"type": "mcq", "q": "σπουδαιότερες", "options": ["ιστορικότερες", "μεγαλύτερες", "σημαντικότερες"], "answer": 2}, {"type": "mcq", "q": "θεωρείται", "options": ["είναι", "φαίνεται", "αποδεικνύεται"], "answer": 0}, {"type": "mcq", "q": "φημισμένες", "options": ["αναγνωρισμένες", "διάσημες", "φανταστικές"], "answer": 1}, {"type": "mcq", "q": "διάφανα", "options": ["κρύα", "βαθιά", "καθαρά"], "answer": 2}, {"type": "mcq", "q": "σπάνια", "options": ετε το γεύμα σας σε μικρότερες μερίδες και να τρώτε πιο συχνά κατά τη διάρκεια της\nημέρας.\nΚανόνας 3: Αλάτι με το μέτρο.\nΠεριορίστε το αλάτι που παίρνετε από τα τρόφιμα! Να προσέχετε διότι, ακόμη κι αν δεν\nπροσθέτετε αλάτι στο φαγητό σας, μπορεί να καταναλώνετε μεγάλη ποσότητα, εφόσον\nαλάτι υπάρχει στα έτοιμα τρόφιμα που αγοράζουμε (π.χ. στις σάλτσες και στο ψωμί). Η\nκαλύτερη λύση είναι να χρησιμοποιήσετε τις ετικέτες των τροφίμων, για να σας βοηθήσουν\nνα το περιορίσετε.\nΚανόνας 4: Πολλά φρούτα και λαχανικά.\nΝα καταναλώνετε τουλάχιστον πέντε μερίδες από διάφορα είδη\nφρούτων και λαχανικών κάθε ημέρα. Ένα ποτήρι με 100% χυμό\nφρούτων χωρίς ζάχαρη, για παράδειγμα, μπορεί να μετρήσει ως\nμια μερίδα, όπως επίσης και τα λαχανικά μαγειρεμένα σε\nπιάτα.\nΚανόνας 5: Λίγο κόκκινο κρέας. Καταναλώνετε κόκκινο\nκρέας μια φορά την εβδομάδα, προκειμένου να μειώσετε το\nλίπος που παίρνει ο οργανισμός σας. Μπορείτε να αντικαταστήσετε το κρέας με όσπρια ή\nψάρι, καθώς και με πουλερικά.\n[Απόσπασμα από το άρθρο του Ν. Γεωργιακώδη στον ιστότοπο https://www.in2life.gr/wellbeing/nutrition/article/248547/17-hrysoikanones-gia-sosth-diatrofh.html. 16-10-2012– διασκευή για τις ανάγκες των εξετάσεων]", "sub": [{"type": "mcq", "q": "Ο κάθε άνθρωπος πρέπει να τρώει διαφορετικά, ανάλογα με τον τρόπο ζωής του.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Το τι πρέπει να τρώει ο καθένας εξαρτάται και από την υγεία του.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Ο κάθε άνθρωπος καλό είναι να αλλάζει το τι τρώει ανάλογα με την ηλικία του.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Δεν υπάρχουν απαγορευμένες τροφές, μόνο τροφές που πρέπει να τρώγονται λιγότερο.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Αν θέλει κάποιος να παραμείνει υγιής πρέπει να τρώει κόκκινο κρέας μία φορά το μήνα.", "options": ["Σωστό", "Λάθος", "
