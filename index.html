η αποτυχία του αιώνα’.\nΣυγκεκριμένα, ο συνωστισμός των ανθρώπων, οι υποβαθμισμένες συνθήκες\nδιαβίωσης, η έλλειψη δημοσίων αγαθών, όπως ο καθαρός αέρας και ο ελεύθερος χώρος,\nαποτελούν ορισμένες μόνο από τις αρνητικές συνέπειες της ζωής\nστην πόλη που επιβαρύνουν την υγεία των κατοίκων. Εξίσου μεγάλα\nπροβλήματα είναι ο θόρυβος, η έλλειψη χώρων πρασίνου και η\nκοινωνική απομόνωση.\nΟ πολύ έντονος και μόνιμος θόρυβος, που παράγουν τα αυτοκίνητα, η βιομηχανία και οι\nψυχαγωγικές δραστηριότητες στην πόλη, έχει δυσάρεστες συνέπειες για τον άνθρωπο,\nεφόσον ενοχλεί τον ύπνο,\nδιασπά την προσοχή, επηρεάζει την ακοή και προκαλεί\nψυχολογικά προβλήματα.\nΕπίσης, η έλλειψη χώρου για ψυχαγωγία και για βόλτα στο πράσινο αποτελεί\nσημαντικό πρόβλημα σε πολλές πόλεις. Το γεγονός ότι δεν υπάρχουν κήποι, μεγάλες\nπλατείες και λεωφόροι με δέντρα επιβαρύνει την ατμοσφαιρική ρύπανση και την ψυχική\nυγεία των κατοίκων.\nΠρόβλημα στις σύγχρονες πόλεις αποτελεί και το άγχος και το αίσθημα\nαπομόνωσης από την έλλειψη χρόνου και την έλλειψη φυσικής άσκησης, που\nχαρακτηρίζουν την καθημερινή ζωή. Οι παράγοντες αυτοί επηρεάζουν περισσότερο τις πιο\nευαίσθητες ομάδες του πληθυσμού των πόλεων που είναι τα παιδιά, οι ηλικιωμένοι και τα\nάτομα με ειδικές ανάγκες.\nΕιδικά το ιδιωτικό αυτοκίνητο έχει γίνει ο χειρότερος εχθρός των πόλεων διότι,\nεκτός από τα πολλά τροχαία ατυχήματα, ρυπαίνει την ατμόσφαιρα και προκαλεί θόρυβο.\nΕπιπλέον, ο εκνευρισμός και το άγχος από την κίνηση στους δρόμους, καθώς και τα\nπαρκαρισμένα ακόμη και στα πεζοδρόμια αυτοκίνητα αποτελούν κίνδυνο για τη σωματική\nκαι ψυχική υγεία των κατοίκων των πόλεων.\n[ Γ. Τούντας, Α. Καθηγητής Κοινωνικής Ιατρικής του Ε.Κ.Π.Α.. 13-11-2007: https://www.iatronet.gr/ygeia/perivallonygeia/article/3255/oi-synepeies-tis-zwis-stin-poli.htm -διασκευή για τις ανάγκες των εξετάσεων]", "sub": [{"type": "mcq", "q": "Η σύγχρονη πόλη έχει πολλούς ανθρώπους, πολλά κτίρια και πολύ εξοπλισμό.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answ υν", "φέρνουν", "αφήνουν"], "answer": 0}, {"type": "mcq", "q": "σημαντικό", "options": ["άχρηστο", "ασήμαντο", "απρόβλεπτο"], "answer": 1}, {"type": "mcq", "q": "ευαίσθητες", "options": ["χαρούμενες", "ανθεκτικές", "δυναμικές"], "answer": 1}, {"type": "mcq", "q": "ιδιωτικό", "options": ["δημόσιο", "λαϊκό", "δημοτικό Ξαναγράψτε τις παρακάτω φράσεις ή προτάσεις του κειμένου με βάση τη φράση που δίνεται στην αρχή:"], "answer": 0}, {"type": "typed", "q": "υποβαθμισμένες συνθήκες διαβίωσης συνθήκες διαβίωσης που _____ .", "a": "που έχουν υποβαθμιστεί / που είναι υποβαθμισμένες"}, {"type": "typed", "q": "η έλλειψη δημοσίων αγαθών όπως ο καθαρός αέρας και ο ελεύθερος χώρος η έλλειψη δημοσίων αγαθών σαν _____ και _____ ..", "a": "σαν τον καθαρό αέρα και τον ελεύθερο χώρο"}, {"type": "typed", "q": "Το γεγονός ότι δεν υπάρχουν κήποι, μεγάλες πλατείες και λεωφόροι με δέντρα επιβαρύνει την ατμοσφαιρική ρύπανση. Η ατμοσφαιρική ρύπανση _____ από το γεγονός ότι δεν υπάρχουν κήποι, μεγάλες πλατείες και λεωφόροι με δέντρα.", "a": "επιβαρύνεται"}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Επισημαίνουμε ότι δεν πρέπει να υπογράψετε με το ονοματεπώνυμό σας στο τέλος του κειμένου. Κάτω από την πολυκατοικία ή το σπίτι που μένετε παρκάρουν κάθε μέρα δύο αυτοκίνητα και κλείνουν την είσοδο. Γράψτε μία επιστολή προς τον Δήμο, για να τους εξηγήσετε το πρόβλημα που προκαλούν τα αυτοκίνητα και να τους ζητήσετε να κάνουν κάτι."}, {"type": "reading", "cat": "reading", "id": "read_043", "title": "Γιατί χρειάζεται να μάθω ξένες γλώσσες;", "passage": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRNJ2zgQAeUkf7gaEprrl9huUpxOMzj1gYyQ&usqp=CAU\nΣτην εποχή που ζούμε υπάρχουν πολλές και διαφορετικές γλώσσες που\nχρησιμοποιούνται σε διαφορετικές χώρες. Κάποιες απ' αυτές έχουν αρκετά κοινά, οι\nπερισσότερες, ωστόσο, είναι τόσο διαφορετικές, ώστε δεν επιτρέπουν την επικοινωνία\nμεταξύ δύο ανθρώπων που γνωρίζουν ο ένας την μια κι ο άλλος την άλλη.\nΕπομένως, αν θέλουμε να επικοινωνήσουμε με κάποιο άτομο που δεν γνωρίζει την\nγλώσσα μας, τότε θα πρέπει είτε να μάθουμε εμείς τη δική του, είτε και οι δύο να\nγνωρίζουμε μια άλλη, κοινή γλώσσα, η οποία θα χρησιμεύσει ως μέσο επικοινωνίας.\nΠαράλληλα, η γνώση ξένων γλωσσών είναι από τα προσόντα, τα οποία σε παγκόσμιο\nεπίπεδο κρίνονται σήμερα ως ιδιαίτερα αξιόλογα, χρήσιμα και σημαντικά. Οι\nπερισσότερες πολυεθνικές εταιρείες, που δραστηριοποιούνται σε ολόκληρο τον\nκόσμο, χρυσοπληρώνουν για θέσεις, στις οποίες απαραίτητη είναι η γνώση των γλωσσών\nπου απαιτούν οι εργασίες της εταιρείας.\nΑπό την άλλη μεριά οι ξένες γλώσσες δίνουν στο άτομο και τη δυνατότητα να\nεργαστούν σε άλλες χώρες, όπου οι συνθήκες ζωής και το βιοτικό επίπεδο είναι καλύτερα.\nΕπομένως, μπορούμε με σιγουριά να πούμε πως η κάθε νέα γλώσσα που μαθαίνουμε\nδιευρύνει τους ορίζοντές μας και ανοίγει νέες πόρτες που αλλιώς θα έμεναν κλειστές.\nΕπιπλέον, μαθαίνοντας μια νέα γλώσσα, το άτομο αυξάνει τις ικανότητές του στον\nδιάλογο και στην επικοινωνία και εξασκεί τις κοινωνικές του δεξιότητες. Ακόμη μαθαίνει\nτον πολιτισμό και τις συνήθειες του λαού που βρίσκεται πίσω απ' αυτή την ξένη γλώσσα\nκαι έτσι εμπλουτίζει τον εσωτερικό του κόσμο. Όταν, για παράδειγμα, κάποιος ξένος\nμαθαίνει την ελληνική γλώσσα μελετώντας ελληνικά κείμενα, τότε μαθαίνει και πράγματα\nπου αφορούν τον ελληνικό πολιτισμό και ιστορία.\nΩς συμπέρασμα, μπορούμε να πούμε πως η γνώση ξένων γλωσσών είναι ένα προσόν\nπου μόνο θετικά αποτελέσματα μπορεί να φέρει στη ζωή του ανθρώπου.\n[Ανώνυμο άρθρο από τον ιστότοπο: https://www.glwsses.gr/foreign-language-advices/the-need-of-a-\nforeign-language.html Ανάκτηση στις 27-12-2020, διασκευή για τις ανάγκες των εξετάσεων]", "sub": [{"type": "mcq", "q": "Δεν θα κουραζόμασταν να μαθαίνουμε ξένες γλώσσες, αν όλοι οι άνθρωποι μιλούσαν την ίδια γλώσσα.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Δεν υπάρχουν στον κόσμο γλώσσες με αρκετά κοινά στοιχεία, θε νέα γλώσσα δείχνει καινούγρια μυστικά", "Κάθε νέα γλώσσα δίνει καινούργιες ευκαιρίες."], "answer": 2}, {"type": "mcq", "q": "απαιτούν", "options": ["ζητούν", "προϋποθέτουν", "υποδεικνύουν"], "answer": 0}, {"type": "mcq", "q": "αυξάνει", "options": ["διογκώνει", "πολλαπλασιάζει", "διαμοιράζει"], "answer": 1}, {"type": "mcq", "q": "εμπλουτίζει", "options": ["κάνει πιο πλούσιο", "κάνει πιο όμορφο", "κάνει πιο μεγάλο"], "answer": 0}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Στο μάθημα των Ελληνικών ο δάσκαλος / η δασκάλα σας ζήτησε να εξηγήσετε στους συμμαθητές σας γιατί εσείς αποφασίσατε να μάθετε Ελληνικά. Γράψτε την απάντησή σας σε ένα σύντομο κείμενο, στο οποίο να αναφέρετε δύο τουλάχιστον λόγους."}, {"type": "reading", "cat": "reading", "id": "read_044", "title": "Εργαζόμενη μητέρα και παιδί.", "passage": "https://www.google.com/imgres?imgurl=https%3A%2F%2Fwww.ipaidia.gr\nΠολύ συχνά οι εργαζόμενες μητέρες ανησυχούν για το πόσο ποιοτικό χρόνο\nπερνούν με τα παιδιά τους ή νιώθουν ενοχές για την απουσία τους από το σπίτι. Πρέπει,\nωστόσο, κάθε γυναίκα να καταλάβει ότι το να εργάζεται δεν σημαίνει πως είναι “κακή\nμητέρα”. Ούτε είναι κακό να αρέσει στη γυναίκα η δουλειά της. Άλλωστε, δεν εργαζόμαστε\nμόνο για βιοποριστικούς λόγους. Η εργασία προσφέρει χαρά και δημιουργικότητα. Είναι\nωφέλιμο και για το παιδί να βλέπει πως η μητέρα του εργάζεται.\nΌταν η μητέρα εργάζεται, δίνει πολύτιμα μαθήματα στα παιδιά της, εφόσον\nμεταφέρει την πείρα της από το γραφείο, για να τα διδάξει πώς να διαχειρίζονται\nκαλύτερα τα προβλήματα και πώς να διαπραγματεύονται. Φυσικά, έτσι τα παιδιά\nμαθαίνουν πολύ καλά και την ισότητα των δύο φύλων. Ένα μικρό κορίτσι μαθαίνει από την\nεργαζόμενη μητέρα του να διεκδικεί ίσες ευκαιρίες.\nΕπίσης, η εργαζόμενη μητέρα διδάσκει στα παιδιά πώς να κατακτούν τους στόχους\nτους. Καθώς μεγαλώνουν, τη βλέπουν να διεκδικεί καλύτερες συνθήκες στην\nεργασία. Έτσι, ξέρουν πόσο σημαντική είναι η προσπάθεια. Βάζουν στόχους για το μέλλον.\nΆρα η μητέρα γίνεται ένα θετικό πρότυπο.\nΕπιπλέον, τα παιδιά που μεγαλώνουν με εργαζόμενες μητέρες γίνονται περισσότερο\nανεξάρτητα. Μπορεί να υπάρχουν περιπτώσεις, όπου η μητέρα δεν πηγαίνει το παιδί στη\nγιορτή ενός φίλου, γιατί καθυστέρησε στη δουλειά. Απογοητεύονται λίγο τα παιδιά, αλλά\nμαθαίνουν να αντιμετωπίζουν πιο υπεύθυνα τις δυσκολίες. Επίσης, αναλαμβάνουν\nκάποιες δουλειές του σπιτιού, όταν η μητέρα λείπει από το σπίτι για δουλειά.\nΚάθε μητέρα θέλει να δώσει στο παιδί της μια ευτυχισμένη παιδική ηλικία. Και θα\nτο καταφέρει είτε εργάζεται είτε όχι, αρκεί να νιώθει πρώτα η ίδια καλά. Τα παιδιά θέλουν\nνα έχουν ευτυχισμένους γονείς.\n[Άρθρο της Μαίρη Κάντα στον ιστότοπο: http://www.marvelousmoms.gr/ergazomeni-mitera-xronos-me-to-paidi/#.Xoq19Izbow – διασκευασμένο για τις ανάγκες της εξέτασης]", "sub": [{"type": "mcq", "q": "Η εργαζόμενη μητέρα νιώθει ενοχές, επειδή δεν περνάει πολύ χρόνο με τα παιδιά της.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Η εργαζόμενη μητέρα νιώθει ενοχές, επειδή λείπει από το σπίτι.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Η εργαζόμενη μητέρα προσπαθεί να περνάει όσο το δυνατό λιγότερο χρόνο έξω από το σπίτι, για να μη νιώθει ενοχές.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Το παιδί ωφελείται, όταν η μητέρα του είναι εργαζόμενη", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Για το παιδί σημασία έχει να είναι το ίδιο ευτυχισμένο, όχι η μητέρα του.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Το κείμενο εκφράζει την άποψη ότι η μητέρα που εργάζεται", "options": ["δεν είναι τόσο καλή όσο αυτή που δεν εργάζεται", "είναι περισσότερο καλή από αυτή που δεν εργάζεται", "μπορεί να είναι καλή μητέρ"], "answer": 2}, {"type": "mcq", "q": "Η εργασία προσφέρει στη μητέρα", "options": ["κυρίως χρήματα για να αναθρέψει τα παιδιά της", "κυρίως χαρά και δημιουργικότητα για την ίδια", "τόσο χρήματα όσο και χαρά και δημιουργικότητ"], "answer": 2}, {"type": "mcq", "q": "Όταν η μητέρα εργάζεται, διδάσκει στα παιδιά της", "options": ["να τα βγάζουν πέρα μόνα τους", "να διεκδικούν ίσες ευκαιρίες, ανεξάρτητα από το φύλο τους", "να μην παραπονιούνται για τις καθημερινές δυσκολίες και τα προβλήματ"], "answer": 1}, {"type": "mcq", "q": "Τα παιδιά μαθαίνουν από την εργαζόμενη μητέρα", "options": ["να βάζουν στόχους και να προσπαθούν να τους πετύχουν", "να διεκδικούν καλύτερες συνθήκες στη δική τους δουλειά", "να βελτιώνουν την καθημερινή ζωή στο σπίτι."], "answer": 0}, {"type": "mcq", "q": "ωφέλιμο", "options": ["ωραίο", "χρήσιμο", "ευχάριστο"], "answer": 1}, {"type": "mcq", "q": "μεταφέρει", "options": ["προσφέρει", "παίρνει", "μεταβιβάζει"], "answer": 2}, {"type": "mcq", "q": "να κατακτούν", "options": ["να πετυχαίνουν", "να αρπάζουν", "να πολλαπλασιάζουν"], "answer": 0}, {"type": "mcq", "q": "ανεξάρτητα", "options": ["προσηλωμένα", "αγχωμένα", "εξαρτημένα"], "answer": 2}, {"type": "mcq", "q": "αναλαμβάνουν", "options": ["παρακάμπτουν", "παραμερίζουν", "αποφεύγουν Ξαναγράψτε το υπογραμμισμένο τμήμα από τις προτάσεις του κειμένου, με βάση τη λέξη που δίνεται:"], "answer": 2}, {"type": "typed", "q": "Οι εργαζόμενες μητέρες νιώθουν ενοχές για την απουσία τους από το σπίτι. Οι εργαζόμενες μητέρες νιώθουν ενοχές, επειδή _____ . από το σπίτι.", "a": "απουσιάζουν"}, {"type": "typed", "q": "Είναι ωφέλιμο και για το παιδί να βλέπει πως η μητέρα του εργάζεται. Είναι ωφέλιμο για το παιδί να βλέπει τη μητέρα του _____ .", "a": "να εργάζεται"}, {"type": "typed", "q": "Τα παιδιά μαθαίνουν πολύ καλά και την ισότητα των δύο φύλων. Τα παιδιά μαθαίνουν πολύ καλά και ότι τα δύο φύλα _____ ..", "a": "τα δύο φύλα είναι ίσα"}, {"type": "typed", "q": "Η εργαζόμενη μητέρα διδάσκει στα παιδιά πώς να κατακτούν τους στόχους τους. Η εργαζόμενη μητέρα διδάσκει στα παιδιά τον _____ . να κατακτού ες. Επιπλέον, συμβάλλουν στο να\nπαραμένει το δέρμα μας νεανικό, χωρίς ρυτίδες και χαλάρωση. Γενικά, βοηθούν τον\nανθρώπινο οργανισμό να αναπτυχθεί σωστά, αλλά και να κλείσει τις ανοιχτές πληγές,\nαν έχει τραυματιστεί σε κάποιο σημείο.\nΑν σε όλα αυτά προσθέσετε και μια τεράστια ποικιλία γεύσεων και αρωμάτων,\nείμαστε βέβαιοι ότι τα μανιτάρια θα αποτελέσουν αναντικατάστατο μέρος των\nδιατροφικών σας επιλογών.\n[Ανυπόγραφο κείμενο από τον Κατάλογο Προϊόντων του Μουσείου Φυσικής Ιστορίας και του Μουσείου Μανιταριών\nΜετεώρων, σελ. 5 – διασκευή για τις ανάγκες των εξετάσεων]", "sub": [{"type": "mcq", "q": "Οι άνθρωποι γνωρίζουν τα μανιτάρια εδώ και χιλιάδες χρόνια, αλλά μόνο τώρα τελευταία έχουν αρχίσει να τα τρώνε.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Οι επιστήμονες έχουν ασχοληθεί σήμερα με τα μανιτάρια και τα θρεπτικά τους συστατικά.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Χρειάζεται να προσέχουμε όταν τρώμε συχνά μανιτάρια, διότι έχουν πολλές θερμίδες.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Μερικά μανιτάρια περιέχουν δηλητήριο και γι’ αυτό δεν πρέπει να τα τρώμε.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Οι Ρωμαίοι έλεγαν ότι τα μανιτάρια είναι «δώρο θεού» για να τονίσουν:", "options": ["ότι τα τρώνε μόνο οι θεοί", "ότι τρώγονται ως προσφορά προς τους θεούς", "ότι είναι πολύτιμα"], "answer": 2}, {"type": "mcq", "q": "Η επιστήμη σήμερα έχει δείξει", "options": ["από ποια στοιχεία έχουν δημιουργηθεί τα μανιτάρια", "ποια αξία έχουν τα μανιτάρια ως είδος διατροφής", "ότι τα μανιτάρια δεν είναι απαραίτητα στη διατροφή μας"], "answer": 1}, {"type": "mcq", "q": "Τα μανιτάρια θεωρούνται πολύ θρεπτικά για τον ανθρώπινο οργανισμό, επειδή περιέχουν", "options": ["πολλές και διαφορετικές βιταμίνες", "ζάχαρα και λιπαρές ουσίες", "κάθε είδους πρωτεΐνες και σίδηρο"], "answer": 0}, {"type": "mc τίδες και _____ . .", "a": "να χαλαρώνει"}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Γράψτε ένα μικρό κείμενο με συμβουλές για σωστή διατροφή, που θα το αναρτήσετε στον χώρο δουλειάς, για να το βλέπουν όλοι."}, {"type": "reading", "cat": "reading", "id": "read_046", "title": "Κατοικίδια: τα οφέλη τους στα άτομα της τρίτης ηλικίας.", "passage": "Πολλά άτομα της τρίτης ηλικίας υποφέρουν από μοναξιά και κατάθλιψη, νιώθοντας ότι δεν\nβρίσκουν κάποιο νόημα στη ζωή τους. Ένας τρόπος να περιοριστούν αυτά τα αρνητικά\nσυναισθήματα είναι η απόκτηση ενός κατοικίδιου ζώου, που είναι πάντα πρόθυμο να μας\nπροσφέρει την αφοσίωση και την αγάπη του.\nΠοια είναι, λοιπόν, τα κυριότερα οφέλη που έχει ένα ηλικιωμένο άτομο από τη\nσυμβίωση με ζώα συντροφιάς;\nΌπως μαρτυρεί και η έννοια “ζώα συντροφιάς”, τα κατοικίδια προσφέρουν πρώτα\nαπ’ όλα την παρέα τους, που είναι ιδιαίτερα σημαντική για τους ηλικιωμένους, οι οποίοι\nσυχνά τα αντιμετωπίζουν σαν ανθρώπους και έτσι το αίσθημα της μοναξιάς τους\nμειώνεται.\nΕπιπλέον, τα κατοικίδια χρειάζονται καθημερινή φροντίδα: Έχουν ανάγκη από\nτροφή, νερό, βούρτσισμα, την καθημερινή τους βόλτα και, φυσικά, παιχνίδια και χάδια.\nΌλες αυτές οι δραστηριότητες ωθούν έναν ηλικιωμένο άνθρωπο να κινείται περισσότερο,\nκάτι που έχει θετική επίδραση στην υγεία του. Εκτός αυτού, νιώθει πως προσφέρει, πως\nείναι χρήσιμος και μέσα στη ζωή– συναισθήματα σπουδαία για ανθρώπους αυτής της\nηλικίας.\nΑκόμη, τα ζωάκια είναι μία καλή αφορμή για καινούργιες συναναστροφές. Η\nπαρουσία κατοικιδίων στη ζωή των ανθρώπων βοηθά στην αλληλεπίδραση με άλλους\nανθρώπους και στην ανάπτυξη κοινωνικών σχέσεων. Ειδικά για όσους ηλικιωμένους ζουν\nμόνοι, μία επίσκεψη στον κτηνίατρο ή στο πάρκο για τη βόλτα του ζώου γίνεται αφορμή\nπολύτιμης επαφής με άλλους ανθρώπους.\nΤέλος, τα κατοικίδια αναπτύσσουν συναισθήματα προς τους ανθρώπους που τα\nφροντίζουν. Είναι ικανά να αντιληφθούν τη σωματική και τη συναισθηματική κατάσταση\n  ηλεκτρονική επιστολή, στην οποία να του / της εξηγείτε πόσο πολύ θα ωφεληθούν τα παιδιά από την παρέα με το σκυλάκι."}, {"type": "reading", "cat": "reading", "id": "read_047", "title": "Πώς να περιορίσουμε τον κίνδυνο των δασικών πυρκαγιών", "passage": "https://i.ytimg.com/vi/tFpSuptEYh4/maxresdefault.jpg\nΗ χώρα μας στο σύνολό της καλύπτεται από δασικές εκτάσεις. Αυτό, σε συνδυασμό\nμε τις κλιματολογικές συνθήκες (υψηλές θερμοκρασίες, ισχυροί άνεμοι) που επικρατούν\nτους μήνες του καλοκαιριού, έχει ως αποτέλεσμα να δημιουργούνται συνθήκες επικίνδυνες\nγια φωτιά. Οι δασικές πυρκαγιές ,που εκδηλώνονται κάθε χρόνο στην Ελλάδα, οφείλονται\nκατά μεγάλο μέρος στην ανθρώπινη συμπεριφορά. Βέβαια, οι πυρκαγιές είναι φυσικό\nφαινόμενο και θα εξακολουθήσουν να υπάρχουν και στο μέλλον, ωστόσο, μπορούμε να τις\nπεριορίσουμε, λαμβάνοντας τα κατάλληλα μέτρα. Διαβάστε παρακάτω ποια είναι αυτά:\nΌταν βρισκόμαστε στο δάσος ή στην ύπαιθρο, δεν πετάμε ποτέ αναμμένα τσιγάρα ούτε\nκαίμε σκουπίδια ή ξερά χόρτα και κλαδιά, διότι ενδέχεται η μικρή φωτιά να ξεφύγει και να\nπροκαλέσει μεγάλη καταστροφή. Για τον ίδιο λόγο δεν ανάβουμε υπαίθριες ψησταριές κατά\nτους θερινούς μήνες μέσα στα δάση ή σε χώρους όπου υπάρχουν ξερά φύλλα.\nΌταν οδηγούμε μέσα στο δάσος και υπάρχει αυξημένος κίνδυνος πυρκαγιάς, λόγω\nτου καιρού, δεν πετάμε ποτέ το αναμμένο τσιγάρο μας από το παράθυρο του αυτοκινήτου\nούτε σταματάμε το αυτοκίνητό μας σε σημεία όπου υπάρχουν ξερά χόρτα. Αυτό πρέπει να\nτο προσέξουμε πολύ, διότι ο καταλύτης του αυτοκινήτου παραμένει θερμός για πολλή ώρα\nκαι υπάρχει κίνδυνος να βάλει φωτιά στα χόρτα ή σε άλλη βλάστηση.\nΤέλος, όταν αντιληφθούμε ότι κάπου έχει πιάσει φωτιά, πρέπει να τηλεφωνήσουμε\nΑΜΕΣΩΣ στον αριθμό 199της Πυροσβεστικής Υπηρεσίας και να δώσουμε σαφείς\nπληροφορίες για το ακριβές σημείο που βρισκόμαστε, καθώς και πληροφορίες για τη\nσυγκεκριμένη θέση που βλέπουμε την πυρκαγιά. Η κλήση στον αριθμό 199 είναι χωρίς\nχρέωση τόσο από σταθερό όσο και από κινητό τηλέφωνο. Επίσης, στα καρτοτηλέφωνα δεν\nχρειάζεται να βάλουμε τηλεκάρτα. Σε περίπτωση που το κινητό τηλέφωνο μας δείχνει την\nένδειξη «κλήσεις έκτακτης ανάγκης» ή «εκτός δικτύου», τηλεφωνούμε στο 112.\n[Φυλλάδιο οδηγιών από τον ιστοχώρο της Ελληνικής Πυροσβεστικής Υπηρεσίας\nhttps://www.ﬁreservice.gr/el/-/h-prostasia-ton-dason-einai-ypothese-olon-mas , διασκευή για τις ανάγκες\nτων εξετάσεων]", "sub": [{"type": "mcq", "q": "Τα δάση βρίσκονται σε λίγα και εντοπισμένα σημεία του ελληνικού χώρου.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Οι πυρκαγιές στα δάση είναι συχνότερες το καλοκαίρι λόγω των καιρικών συνθηκών.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Η αιτία για τις περισσότερες πυρκαγιές στα δάση είναι ότι δεν προσέχουν οι άνθρωποι.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Η πυροσβεστική υπηρεσία κάνει μεγάλες εκστρατείες κάθε χρόνο για την προστασία των δασών.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Με τα κατάλληλα μέτρα μπορούμε να σώσουμε τα δάση από τις πυρκαγιές μια για πάντα.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Στο κείμενο αναφέρεται ότι, για να αποφύγουμε τις καταστροφικές πυρκαγιές", "options": ["πρέπει να προσέχουμε πολύ τις μικρές φωτιές που βάζουμε σε ανοιχτό χώρο", "πρέπει να ελέγχουμε το κάψιμο των σκουπιδιώνσε ανοιχτό χώρο", "δεν πρέπει ποτέ να βάζουμε μικρές φωτιές σε ανοιχτό χώρο"], "answer": 2}, {"type": "mcq", "q": "Όταν πηγαίνουμε εκδρομή το καλοκαίρι στο δάσος", "options": ["πρέπει να ψήνουμε φαγητό μόνο στα σημεία που επιτρέπεται", "πρέπει να μη ψήνουμε φαγητό σε οποιοδήποτε σημείο", "πρέπει να προσέχουμε πολύ το σημείο που διαλέγουμε για να ψήσουμε"], "answer": 1}, {"type": "mcq", "q": "Υπάρχει κίνδυνος το καλοκαίρι να καεί το δάσος από τα σταματημένα αυτοκίνητα, διότι", "options": ["η βενζίνη που έχουν στο ντεπόζιτό τους μπορεί να πάρει φωτιά", "οι λαμαρίνες τους ζεσταίνονται από τον ήλιο και παίρνουν φωτιά", "το κάτω μέρος τους είναι ζεστό και βάζει φωτιά στα ξερά φυτά."], "answer": 2}, {"type": "mcq", "q": "Όταν είμαστε στο δάσος και δούμε φωτιά", "options": ["πρέπει να τηλεφωνήσουμε αμέσως στην Πυροσβεστική Υπηρεσία", "πρέπει να φύγουμε από εκεί αμέσως, γιατί κινδυνεύουμε", "πρέπει να πάμε αντίθετα προς την κατεύθυνση του ανέμου, για να γλιτώσουμε."], "answer": 0}, {"type": "mcq", "q": "σε συνδυασμό", "options": ["μαζί", "παράλληλα", "διαδοχικά"], "answer": 0}, {"type": "mcq", "q": "ενδέχεται", "options": ["είναι σίγουρο", "είναι θετικό", "είναι πιθανό"], "answer": 2}, {"type": "mcq", "q": "αυξημένος", "options": ["υπερβολικός", "μεγαλύτερος", "τρομακτικός"], "answer": 1}, {"type": "mcq", "q": "αντιληφθούμε", "options": ["καταλάβουμε", "μάθουμε", "ακούσουμε"], "answer": 0}, {"type": "typed", "q": "_____ σκουπίδια ή ξερά χόρτα και κλαδιά. Ξαναγράψτε τις παρακάτω προτάσεις του κειμένου, με βάση τη φράση που δίνεται στην αρχή:", "a": "θα κάψουμε"}, {"type": "typed", "q": "Η χώρα μας στο σύνολό της καλύπτεται από δασικές εκτάσεις. Δασικές εκτάσεις _____ .. στο σύνολό της.", "a": "καλύπτουν τη χώρα μας"}, {"type": "typed", "q": "Η κλήση στον αριθμό 199 είναι χωρίς χρέωση. Τόσο το σταθερό όσο και το κινητό τηλέφωνο δεν _____ . για την κλήση στον αριθμό 199.", "a": "δεν χρεώνονται"}, {"type": "typed", "q": "Μπορούμε να περιορίσουμε τις πυρκαγιές, λαμβάνοντας τα κατάλληλα μέτρα. Μπορούμε να περιορίσουμε τις πυρκαγιές, αν _____ .. τα κατάλληλα μέτρα.", "a": "αν λάβουμε"}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Είστε αυτός / ή που ειδοποίησε την Πυροσβεστική Υπηρεσία για μία μεγάλη πυρκαγιά στο δάσος και σας έχουν καλέσει στο ραδιόφωνο, για να μιλήσετε για το τι είδατε και τι κάνατε. Γράψτε ένα μικρό κείμενο με τις σημειώσεις σας γι’ αυτά που σκοπεύετε να πείτε στο ραδιόφωνο."}, {"type": "reading", "cat": "reading", "id": "read_048", "title": "Ο παραδοσιακός γάμος", "passage": "[Γάμος στην Όλυμπο της Καρπάθου.\nhttps://cdn.pculiar.com/assets/photos/2128/10005ee0812619ab4651a9878cb13eacc1e8c902.jpg?158362633]\n[Αθηναία νύφη στα χρόνια της Τουρκοκρατίας (από το βιβλίο του Γάλλου ζωγράφου L.Dupré, ‘’Voyage a Athenes et a\nConstantinople” Ανάκτηση από τον ιστότοπο https://ellas2.wordpress.com/ ]\nΟ γάμος την παλιά εποχή ήταν μια σημαντική στιγμή στη ζωή δύο ανθρώπων. Το\nξεχωριστό αυτό γεγονός το ζούσαν έντονα όχι μονάχα οι μελλόνυμφοι και το συγγενικό\nτους περιβάλλον αλλά και η τοπική κοινωνία.\nΤο ξεκίνημά του ήταν οι συζητήσεις για την προίκα. Οι πατεράδες έπαιρναν τις\nαποφάσεις. Κάποιες φορές υποχρέωναν το κορίτσι τους να αποδεχτεί για σύζυγο κάποιο\nπρόσωπο που δεν ήθελε.\nΔεύτερο βήμα ήταν ο αρραβώνας των παιδιών για τη γνωριμία τους και ο\nκαθορισμός της ημερομηνίας του γάμου. Ο γάμος γινόταν Κυριακή και συνήθως Άνοιξη και\nΦθινόπωρο, ανάλογα με τις υποχρεώσεις των δύο οικογενειών, που τότε συνδέονταν με\nτην καλλιέργεια της γης.\nΜια εβδομάδα πριν την τέλεση του γάμου άρχιζε το στόλισμα του σπιτιού της\nνύφης. Επίσης, η οικογένεια της κοπέλας ετοίμαζε τα δώρα και τα γλυκά για την οικογένεια\nτου γαμπρού και για τον κουμπάρο.\nΤην Παρασκευή το απόγευμα άρχιζε το στρώσιμο του νυφικού κρεβατιού, πάνω στο\nοποίο τοποθετούσαν δώρα. Στο στρώσιμο παρευρίσκονταν ανύπαντρες κοπέλες και στενοί\nσυγγενείς. Στο τέλος ήταν συνήθεια να ρίχνουν ένα αγοράκι πάνω στο κρεβάτι, για να είναι\nαγόρι το πρώτο παιδί.\nΤο Σάββατο το απόγευμα τελείωναν οι προετοιμασίες και ήδη το σπίτι των\nμελλονύμφων ήταν έτοιμο και άρχιζε το φτιάξιμο των πατροπαράδοτων μεζέδων.\nΤην Κυριακή το μεσημέρι με τη συνοδεία μουσικής πήγαιναν τα γλυκά και τα δώρα\nστο σπίτι του γαμπρού. Το απόγευμα μαζεύονταν στο σπίτι του γαμπρού όλοι οι\nανύπαντροι νέοι του χωριού, για να τον ξυρίσουν και να τον στολίσουν.\nΤο στόλισμα της νύφης γινόταν την ίδια ώρα στο σπίτι της και ήταν ξεχωριστή\nτελετή. Όλες οι φιλενάδες της ήταν δίπλα της και φρόντιζαν για τα πάντα. Εκείνη την ώρα\nτραγουδούσαν τραγούδια συχνά μελαγχολικά, επειδή η νύφη σε λίγη ώρα θα\nαποχωριζόταν οριστικά την πατρική της οικογένεια.\nΤελευταίο στάδιο ήταν η τελετή του γάμου που γινόταν στην εκκλησία. Μετά το\nτέλος της άρχιζε μεγάλο γλέντι που κρατούσε μέχρι το πρωί.\n[Ανυπόγραφο κείμενο από τον ιστοχώρο https://www.biomatiko.gr/wp-content/uploads/2015/07/paradosi.pdf - διασκευή για τις\nανάγκες των εξετάσεων]", "sub": [{"type": "mcq", "q": "Ο γάμος την παλιά εποχή ήταν πολύ σημαντικό γεγονός στη ζωή των ανθρώπων.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Με τον γάμο ασχολούνταν όχι μόνο αυτοί που παντρεύονταν, αλλά και ολόκληρο το χωριό.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Για να παντρευτεί ένα κορίτσι, έπρεπε οι γονείς της να καθορίσουν την προίκα της.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Η προίκα του κοριτσιού αποτελούνταν τόσο από ακίνητα (π.χ. χωράφια) όσο και από κινητά πράγματα (π.χ. έπιπλα).", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Συνήθως το κορίτσι παντρευόταν όποιον ήθελε, αλλά έπρεπε να συμφωνήσει και ο πατέρας.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Κατάλληλη εποχή για τους γάμους ήταν η Άνοιξη και το Φθινόπωρο, επειδή", "options": ["είναι καλός ο καιρός, δεν έχει ούτε ζέστη ούτε κρύο", "οι γεωργικές εργασίες αφήνουν περιθώριο για τις ετοιμασίες του γάμου", "υπάρχουν λίγες γιορτές, γι ΄ αυτό δίνει περισσότερη χαρά ο γάμος."], "answer": 1}, {"type": "mcq", "q": "Η οικογένεια της νύφης πρόσφερε δώρα και γλυκά", "options": ["στον γαμπρό και στον κουμπάρο", "στην οικογένεια του γαμπρού και του κουμπάρου", "στην οικογένεια του γαμπρού και στον κουμπάρο."], "answer": 2}, {"type": "mcq", "q": "Πάνω στο νυφικό κρεβάτι έριχναν ένα μικρό αγόρι,", "options": ["για να είναι αγόρι το πρώτο παιδί του ζ  από τους πολυάριθμους\nφροντισμένους χώρους.\nΤρέξιμο.\nhttp://www.trip2athens.com/userﬁles/articlephotos/running/treximo_02.jpg?w=619&h=348&mode=crop&\nscale=both&quality=80\nΤο τρέξιμο κερδίζει όλο και περισσότερους Αθηναίους που εκμεταλλεύονται τον καλό καιρό\nγια να επιδοθούν στο αγαπημένο τους άθλημα. Στους δρόμους της πόλης, στο κέντρο και\nστις γειτονιές, σε ανοιχτά δημόσια πάρκα ή στους λόφους της Αθήνας και τα γειτονικά\nβουνά η εικόνα ανθρώπων που αθλούνται είναι πια γνώριμη. Το σκηνικό αλλάζει τον\nΣεπτέμβριο, όταν αθλητές κάθε ηλικίας προετοιμάζονται εντατικά για τον Μαραθώνιο,\nπου πραγματοποιείται κάθε Νοέμβριο και συγκεντρώνει χιλιάδες συμμετοχές από όλο τον\nκόσμο.\nΔημόσια γήπεδα\nΤα περισσότερα γήπεδα στην Αθήνα είναι δημόσια, δηλαδή, ανοιχτά για όλους και\nμε δωρεάν χρήση. Όλες οι γειτονιές διαθέτουν γήπεδα ποδοσφαίρου και μπάσκετ. Κάποιοι\nδήμοι έχουν οργανωμένες αθλητικές εγκαταστάσεις, στις οποίες περιλαμβάνονται γήπεδα\nτένις και βόλεϊ, ανοιχτά και στεγασμένα. Σε ορισμένες περιπτώσεις πριν τη χρήση των\nεγκαταστάσεων απαιτείται τηλεφωνική κράτηση ή επίσκεψη σε γιατρό που να πιστοποιεί\nτην καλή φυσική κατάσταση.\nΠοδήλατο\nΣτην Αθήνα όλες οι εποχές είναι κατάλληλες για ποδήλατο. Χρησιμοποιώντας το\nδικό σας ποδήλατο ή νοικιάζοντας, ανακαλύψτε την Αθήνα μέσα από δικές σας διαδρομές\nή ακολουθήστε τον νέο ποδηλατόδρομο που οδηγεί από το Γκάζι στο Φάληρο. Ποδηλατικές\nομάδες πραγματοποιούν βραδινές ομαδικές βόλτες με διαδρομές λίγων ή περισσότερων\nχιλιομέτρων μέσα στην πόλη. Συνδυάζοντας φύση και άθληση, μπορείτε να δοκιμάσετε να\nκατευθυνθείτε στην Πάρνηθα, στο κτήμα Συγγρού, στη λίμνη Μαραθώνα, στο Πάρκο\nΤρίτση, στο Τατόι και στον Υμηττό. Για ρομαντική βόλτα προσφέρεται η Διονυσίου\nΑρεοπαγίτου με πετάλι στη σκιά της Ακρόπολης.\n[Διαφημιστικό κείμενο από τον ιστότοπο http://www.trip2athens.com/el/see-n-do/activities/ﬁtness/running/activity-57/ - με\nπερικοπές για τις ανάγκες των εξετάσεων]", "sub": [{"type": "mcq", "q": "Οι Αθηναίοι έχουν όλο και περισσότερο την τάση να φροντίζουν το σώμα και την υγεία τους.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Οι κάτοικοι της Αθήνας ασχολούνται με ατομικά αλλά περισσότερο με ομαδικά αθλήματα.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Οι Αθηναίοι αρχίζουν το τρέξιμο τον Σεπτέμβριο, όταν προετοιμάζονται για τον Μαραθώνιο του Νοεμβρίου.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Υπάρχουν γήπεδα στις γειτονιές της Αθήνας, αλλά δυστυχώς είναι μόνο ανοιχτά.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Είναι ωραίο να κάνεις ποδήλατο στην Αθήνα αλλά όχι το καλοκαίρι, γιατί έχει πολλή ζέστη.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Όλο και περισσότεροι κάτοικοι της Αθήνας ασχολούνται με το τρέξιμο", "options": ["σε ειδικά διαμορφωμένους χώρους", "όπου βρουν ανοιχτό χώρο", "στην κλασσική διαδρομή του Μαραθωνίου."], "answer": 1}, {"type": "mcq", "q": "Στην Αθήνα τα περισσότερα γήπεδα", "options": ["ανήκουν σε ιδιώτες και χρειάζεται να δώσεις μία μικρή συνδρομή", "ανήκουν στους δήμους και χρειάζεται να κάνεις εγγραφή", "ανήκουν στους δήμους και δέχονται όλο τον κόσμο χωρίς προϋποθέσεις."], "answer": 2}, {"type": "mcq", "q": "Μερικές φορές πριν χρησιμοποιήσουμε τα γήπεδα χρειάζεται", "options": ["να έχουμε δηλώσει την επίσκεψή μας τηλεφωνικώς", "να έχουμε δηλώσει την επίσκεψή μας με ειδικό έγγραφο", "να έχουμε καλέσει γιατρό να μας επισκεφτεί."], "answer": 0}, {"type": "mcq", "q": "Οι διαδρομές με ποδήλατο στην Αθήνα", "options": ["μπορούν να καθοριστούν από τον ίδιο τον ποδηλάτη", "είναι υποχρεωτικό να ακολουθούν τον νέο ποδηλατόδρομο", "είναι από πριν καθορισμένες από τις ποδηλατικές ομάδες."], "answer": 0}, {"type": "mcq", "q": "να επιδοθούν", "options": ["να ασχοληθούν", "να ευκολυνθούν", "να καταφύγουν"], "answer": 0}, {"type": "mcq", "q": "εντατικά", "options": ["πολύ γρήγορα", "πολύ δυναμικά", "πολύ έντονα"], "answer": 2}, {"type": "mcq", "q": "να πιστοποιεί", "options": ["να δείχνει", "να παρουσιάζει", "να βεβαιώνει Ξαναγράψτε το παρακάτω απόσπασμα του κειμένου, ώστε να δείχνει ότι απευθύνεται σε ένα και μόνο πρόσωπο: Εκμεταλλευτείτε την τάση για να κρατηθείτε σε φόρμα όσο είσαστε στην πόλη και απολαύστε τις προσφερόμενες υπηρεσίες σε κάποιον από τους πολυάριθμους φροντισμένους χώρους. Εσύ ……………………….4) την τάση για ……………………..5) σε φόρμα όσο είσαι στην πόλη και …………………… 6) τις προσφερόμενες υπηρεσίες σε κάποιον από τους πολυάριθμους φροντισμένους χώρους. Ξαναγράψτε τις παρακάτω προτάσεις του κειμένου με βάση τη φράση που δίνεται στην αρχή:"], "answer": 2}, {"type": "typed", "q": "Η κουλτούρα του αθλητισμού και της ευεξίας ενισχύεται από τους κατοίκους της Αθήνας. Οι κάτοικοι της Αθήνας _____ του αθλητισμού και της ευεξίας.", "a": "ενισχύουν την κουλτούρα του αθλητισμού και της ευεξίας"}, {"type": "typed", "q": "Σε ορισμένες περιπτώσεις πριν τη χρήση των εγκαταστάσεων απαιτείται τηλεφωνική κράτηση. Σε ορισμένες περιπτώσεις πριν τη χρήση των εγκαταστάσεων κάποιος πρέπει _____ τηλεφωνική κράτηση .", "a": "να κάνει"}, {"type": "typed", "q": "Χρησιμοποιώντας το δικό σας ποδήλατο ή νοικιάζοντας, Αν _____ το δικό σας ποδήλατο ή _____ _____ ,", "a": "αν χρησιμοποιήσετε ή νοικιάσετε"}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Επισημαίνουμε ότι δεν πρέπει να υπογράψετε με το ονοματεπώνυμό σας στο τέλος του κειμένου. Θέλετε να γράψετε τον γιο / την κόρη σας στον αθλητικό σύλλογο του Δήμου σας, για να παίζει μπάσκετ. Να στείλετε ένα μικρό ηλεκτρονικό μήνυμα προς τους υπευθύνους αθλητισμού του Δήμου, στο οποίο θα ρωτάτε χρήσιμες πληροφορίες (π.χ. κάθε πότε γίνονται τα μαθήματα, αν υπάρχει χρέωση κ.λπ.)."}, {"type": "reading", "cat": "reading", "id": "read_050", "title": "Η χαρά της ανάγνωσης", "passage": "(“Κοπέλα που διαβάζει” - πίνακας της Θάλειας Φλωρά – Καραβία (1871-1960)\nhttps://www.nationalgallery.gr/el/sulloges/collection/sulloges/html)\nΜε αφορμή την Παγκόσμια Ημέρα Βιβλίου η συγγραφέας Σώτη Τριανταφύλλου απευθύνει\nτο παρακάτω κείμενο στα παιδιά που είναι και οι μελλοντικοί αναγνώστες:\nΑγαπητά παιδιά,\nΣας γράφω αυτό το γράμμα για να σας πω δυο-τρία πραγματάκια που έμαθα και που με έκαναν\nαπίστευτα ευτυχισμένη. Λοιπόν ακούστε:\nΜερικοί άνθρωποι γίνονται ευτυχισμένοι κάνοντας εκδρομές και παίζοντας παιχνίδια, ενώ\nάλλοι με χορούς και με τραγούδια. Υπάρχουν αρκετοί που τους αρέσουν τα ωραία αντικείμενα.\nΌλα αυτά είναι φανταστικά. Ωστόσο, αν πάρω παράδειγμα τον εαυτό μου, τίποτα δεν μου αρέσει\nπερισσότερο από το να διαβάζω βιβλία.\nΤα βιβλία είναι σαν ταξίδια και σαν παιχνίδια: διαβάζοντας πετάμε με μεγάλα φτερά σε\nτόπους μακρινούς, μαθαίνουμε για τις ζωές άλλων ανθρώπων, νιώθουμε συγκινήσεις. Μέσα στις\nσελίδες βρίσκουμε εμπειρίες που μοιάζουν με τις δικές μας, ή, ακόμα καλύτερα, δεν μοιάζουν με\nτις δικές μας - είναι πιο καταπληκτικές! Θυμάμαι πως, όταν διάβασα την ιστορία του Ροβινσώνα\nΚρούσου, ένιωσα ανακούφιση: αν ναυαγούσα σε έρημο νησί, όχι μόνο θα επιζούσα αλλά και θα\nπερνούσα τέλεια!\nΤα βιβλία ηρέμησαν τους φόβους μου: κατάλαβα ότι η ζωή είναι μια περιπέτεια κι ότι ποτέ\nδεν θα βαδίσω μόνη – τα βιβλία θα με συνοδεύουν σαν ζωντανά πλάσματα, θα με παρηγορούν\nκαι θα χαϊδεύουν την ψυχή μου. Τώρα που σας γράφω, θυμάμαι ότι συχνά είχα ένα σωρό\nπροβλήματα στο σχολείο και στο σπίτι και ένιωθα αγωνία - σε όλα αυτά με παρηγορούσαν τα\nβιβλία.\nΩστόσο, η χαρά της ανάγνωσης ήταν, κάπου- κάπου, και στενοχώρια. Τι παράξενο ε;\nΜερικές φορές, οι ιστορίες ήταν λυπητερές, στα παραμύθια οι ήρωες περνούσαν φοβερά\nπράγματα. Ωστόσο, παρόλο που έκλαιγα πολύ, ήμουν ευχαριστημένη: ένιωθα 'κάτι'. Θέλω να πω,\nδεν μπορούμε να χαμογελάμε διαρκώς: οι άνθρωποι γίνονται σοφότεροι νιώθοντας, κάπου κάπου, λύπη, οίκτο, αγανάκτηση. Κυρίως, όμως, γίνονται απίστευτα ευτυχισμένοι: δοκιμάστε να\nζήσετε τη ζωή του αναγνώστη και θα με θυμηθείτε.»\nΚείμενο της Σ. Τριανταφύλλου στο πλαίσιο της δράσης του Εθνικού Κέντρου Βιβλίου για τη χαρά της ανάγνωσης:\nhttps://tvxs.gr/news/biblio/pagkosmia-imera-biblioy-ena-gramma-gia-ti-xara-tis-anagnosis -- διασκευή για τις ανάγκες\nτων εξετάσεων].", "sub": [{"type": "mcq", "q": "Η συγγραφέας Σώτη Τριανταφύλλου γράφει αυτό το γράμμα στα παιδιά, διότι η Παγκόσμια Ημέρα Βιβλίου σχετίζεται με αυτά.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Στη συγγραφέα αρέσουν και τα ωραία αντικείμενα και να διαβάζει βιβλία.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Η συγγραφέας έχει διαβάσει πολλά ωραία βιβλία για παιδιά στη ζωή της.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Η συγγραφέας αναφέρει τη δική της παιδική ηλικία, απευθυνόμενη στα παιδιά.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Η συγγραφέας γράφει στα παιδιά πως μπορούμε να είμαστε ευτυχισμένοι, ακόμη και όταν κλαίμε.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Η συγγραφέας θέλει", "options": ["να δείξει στα παιδιά τους ευτυχισμένους ανθρώπους", "να μιλήσει στα παιδιά για τους ευτυχισμένους ανθρώπους", "να μιλήσει στα παιδιά για το τι κάνει την ίδια ευτυχισμένη ."], "answer": 2}, {"type": "mcq", "q": "Η συγγραφέας ισχυρίζεται ότι τα βιβλία", "options": ["μας ταξιδεύουν και μας διασκεδάζουν", "μας κάνουν να ξεφεύγουμε από την πραγματικότητα", "μας βοηθούν να ζήσουμε."], "answer": 0}, {"type": "mcq", "q": "Τα βιβλία, σύμφωνα με τη συγγραφέα, περιλαμβάνουν", "options": ["πράγματα που γνωρίζουμε και γι’ αυτό τα θεωρουμέ οικεία", "πράγματα που δεν γνωρίζουμε και γι’ αυτό τα νομίζουμε καταπληκτικά", "πράγματα που μας προκαλουν να τα γνωρίσουμε και γι’ αυτό τα θεωρούμε αξιόλογ"], "answer": 1}, {"type": "mcq", "q": "Η συγγραφέας κατάλαβε, από το προσωπικό της παράδειγμα, ότι τα βιβλία μπορούν", "options": ["να  τους σας φέρνει στο νου\nόμορφες αναμνήσεις. Άρα ο τρόπος διακόσμησης του εσωτερικού χώρου, στον οποίο\nβρίσκεστε, μπορεί να επιδράσει στη διάθεσή σας.\nΗ\nπρώτη σας σκέψη μπορεί να είναι ότι δεν έχετε την οικονομική δυνατότητα να\nδιακοσμήσετε ξανά το σπίτι σας. Όμως, ακόμα και μικρές, εύκολες αλλαγές μπορούν να\nεπηρεάσουν θετικά τον τρόπο που νιώθετε σε ένα δωμάτιο. Πώς μπορείτε να κάνετε\nτέτοιες αλλαγές;\nΦέρτε τη φύση στο σπίτι σας\nΤα φυτά βελτιώνουν τη διάθεση, τη συγκέντρωση, ακόμα και τη μνήμη, αφού, ακόμη και\nόταν τα βλέπουμε απλώς, μειώνεται το άγχος. Γνωρίζουμε, επίσης, ότι, όταν περνάμε χρόνο\nστη φύση, θεραπεύουμε την ψυχή μας και το σώμα μας. Έτσι, είναι\nφυσιολογικό να\nχρειαζόμαστε φυτά στον εσωτερικό μας χώρο, για να βελτιώσουμε τη συνολική μας υγεία.\nΑν μένετε σε αστικό περιβάλλον, μπορείτε να γεμίσετε το μπαλκόνι σας φυτά και να\nανοίγετε τις πόρτες. Αν δεν έχετε μπαλκόνι, επιλέξτε φυτά εσωτερικού χώρου και γίνετε\nδημιουργικοί ως προς τις ποικιλίες.\nΒάψτε το σπίτι σας\nΟ ευκολότερος τρόπος να αλλάξετε το σπίτι σας είναι να αλλάξετε το χρώμα των τοίχων. Το\nχρώμα ενός δωματίου έχει πραγματικά μεγάλη επίδραση στη διάθεση, αφού ορισμένα\nχρώματα ή συνδυασμοί τους τείνουν να προκαλούν παρόμοιες αντιδράσεις στους\nπερισσότερους ανθρώπους.\nΠροσθέστε προσωπικά στοιχεία\nΟι προσωπικές πινελιές είναι σημαντικές για την επίδραση που θα έχει το δωμάτιο στη\nδιάθεσή σας. Συμπεριλάβετε αντικείμενα που σας δημιουργούν θετικές εμπειρίες και\nαναμνήσεις, όπως μία φωτογραφία, μια απαλή κουβέρτα ή κάτι που ταξιδεύει τον νου σας\nσε ευχάριστα πράγματα. Επίσης, τα χαλιά λέγεται ότι ενισχύουν την αίσθηση της χαράς και\nάνεσης, ενώ τα ξύλινα στοιχεία έχουν συνδεθεί με την προσωπική ανάπτυξη και υγεία.\n[Κείμενο στον ιστότοπο: https://enallaktikidrasi.com/2018/05/eukoloi-tropoi-veltiwsete-stigmi-tmosfaira-spitiou/διασκευή για τις ανάγκες των εξετάσεων].", "sub": [{"type": "mcq", "q": "Η διακόσμηση του χώρου κατοικίας επηρεάζει την ψυχική διάθεση των ανθρώπων.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Οι άνθρωποι δεν διαθέτουν πάντα τα χρήματα για τις απαραίτητες διακοσμητικές αλλαγές.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Τα φυτά στο σπίτι κάνουν καλό, αλλά προορίζονται μόνο για όσους διαθέτουν μπαλκόνι.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Οι τοίχοι του σπιτιού πρέπει να είναι καθαροί, ανεξάρτητα από το χρώμα τους.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Καλό είναι να προτιμάτε ζεστά και ξεκούραστα χρώματα (π.χ. πορτοκαλί, γαλάζιο) παρά έντονα και επιθετικά (π.χ. κόκκινο, κίτρινο).", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Το κείμενο προτείνει ότι, για να αλλάξει θετικά η διάθεσή σας μέσα στο σπίτι,", "options": ["καλό είναι να κάνετε ριζική ανακαίνιση", "αρκούν ορισμένες βασικές αλλαγές στη διακόσμηση", "αρκούν ακόμη και οι μικρές αλλαγές."], "answer": 2}, {"type": "mcq", "q": "Τα φυτά στο σπίτι είναι απαραίτητα,επειδή", "options": ["μειώνουν το άγχος που αισθανόμαστε", "βελτιώνουν τη σωματική και ψυχική μας υγεία", "μας κάνουν να αισθανόμαστε ότι βρισκόμαστε στη φύση."], "answer": 1}, {"type": "mcq", "q": "Στο κείμενο προτείνεται το βάψιμο του σπιτιού ως", "options": ["ο πιο βασικός τρόπος να αλλάξει η διακόσμηση", "ο πιο οικονομικός τρόπος να αλλάξει η διακόσμηση", "ο πιο εύκολος τρόπος να αλλάξει η διακόσμηση."], "answer": 2}, {"type": "mcq", "q": "Το κάθε χρώμα στους τοίχους ενός δωματίου επιδρά", "options": ["με διαφορετικό τρόπο στον κάθε άνθρωπο", "με παρόμοιο τρόπο στους περισσότερους ανθρώπους", "με ειδικό τρόπο στους ανθρώπους που ζουν μέσα στο δωμάτιο."], "answer": 1}, {"type": "mcq", "q": "επιλέξτε", "options": ["φέρτε", "προτείνετε", "διαλέξτε"], "answer": 2}, {"type": "mcq", "q": "να προκαλούν", "options": ["να δημιουργούν", "να αναφέρουν", "να μεταδίδουν"], "answer": 0}, {"t τάθλιψης. Η γυμναστική μπορεί να βοηθήσει να _____ _____ η κατάθλιψη.", "a": "μειωθεί"}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Επισημαίνουμε ότι δεν πρέπει να υπογράψετε με το ονοματεπώνυμό σας στο τέλος του κειμένου. Ένας φίλος/μία φίλη σας υποφέρει από άγχος. Γράψτε του ένα μήνυμα ηλεκτρονικού ταχυδρομείου (email) με συμβουλές, για να το μειώσει. Μπορείτε να χρησιμοποιήσετε τις ιδέες του κειμένου και δικές σας."}, {"type": "reading", "cat": "reading", "id": "read_055", "title": "Δόθηκαν τα βραβεία του 9ου Διεθνούς Λογοτεχνικού Διαγωνισμού 2020 της UNESCO", "passage": "O Όμιλος για την UNESCO Τεχνών, Λόγου και Επιστημών Ελλάδος ανακοινώνει τα\nαποτελέσματα του 9ου Διεθνούς Λογοτεχνικού Διαγωνισμού 2020, ο οποίος οργανώνεται\nσε ετήσια βάση από τον Όμιλο και έχει στόχο να αποτελέσει αφετηρία για την ανάδειξη\nνέων ταλέντων στη Νέα Ελληνική Λογοτεχνία. Αφορά τα είδη του λόγου: Ποίηση,\nΔιήγημα, Νουβέλα, Παιδικό\nΠαραμύθι, Παιδικό\n–\nΝεανικό\nΔιήγημα.\nΤην επιτροπή\nαξιολόγησης αποτέλεσαν γνωστοί λογοτέχνες , τους οποίους ευχαριστούμε θερμά για τον\nπροσωπικό τους χρόνο, καθώς και για την αντικειμενικότητα και αγάπη με την οποία\nπεριέβαλαν τους συμμετέχοντες.\nΕιδικά το τρέχον έτος, που σημαδεύεται από ιδιαίτερα δύσκολες και πρωτόγνωρες\nσυνθήκες λόγω της πανδημίας του κορονοϊού, οι συμμετοχές ξεπέρασαν κάθε\nπροηγούμενο τόσο σε πλήθος, όσο και εξαιρετικό επίπεδο σε όλες τις κατηγορίες\nαποδεικνύοντας πως η Τέχνη, ο Λόγος και ο Πολιτισμός αποτελούν πνευματική τροφή και\nόχι απλά ψυχαγωγία. Διαγωνιζόμενοι από κάθε σημείο της Ελλάδας, την Κύπρο, το\nΗνωμένο Βασίλειο, το Βέλγιο, την Αυστρία, τον Καναδά και αλλού μας τίμησαν με την\nεμπιστοσύνη τους. Ο Όμιλος συγχαίρει όλους τους συμμετέχοντες για την προσπάθειά\nτους! Ευχή μας: ο διαγωνισμός αυτός να αποτελέσει την αφετηρία για μια λαμπρή πορεία\nστη συγγραφή και τη λογοτεχνία!\nΑργότερα, μόλις το επιτρέψουν οι συνθήκες διασφάλισης της δημόσιας υγείας από\nτην ού ταχυδρομείου (e-mail), για να τον/την ενημερώσετε για τον διαγωνισμό και να του προτείνετε να συμμετάσχει την επόμενη χρονιά."}, {"type": "reading", "cat": "reading", "id": "read_056", "title": "Ελληνική κουζίνα", "passage": "Η ελληνική κουζίνα βασίζεται στα προϊόντα εποχής, στην απλότητα, τη διάρκεια,\nτην εντοπιότητα και τον υγιεινό της χαρακτήρα. Η υπεροχή των ξεχωριστών ελληνικών\nπροϊόντων, τα οποία καλλιεργούνται στο μεσογειακό κλίμα της χώρας μας, έχει ενισχύσει\nτον σεβασμό για τις γεύσεις της παραδοσιακής ελληνικής κουζίνας και μαγειρικής, οι\nοποίες παραμένουν σε μεγάλο βαθμό εποχικές.\nΟι ρίζες της ελληνικής κουζίνας φθάνουν ως την αρχαιότητα. Το ελαιόλαδο, το μέλι,\nτα βότανα, τα αγριόχορτα, τα όσπρια, τα ψάρια και θαλασσινά, οι ξηροί καρποί, οι σπόροι\nσουσαμιού, τα δημητριακά ολικής άλεσης και λίγα τυριά, απλώς από κατσικίσιο και\nπρόβειο γάλα, είναι τα διαχρονικά προϊόντα του ελληνικού τραπεζιού.\nΣτην παραδοσιακή ελληνική διατροφή, που είναι ουσιαστικά μεσογειακή, τα\nλαχανικά και τα όσπρια εμφανίζονται σε αναρίθμητα πιάτα και παρέχουν την κατάλληλη\nημερήσια ποσότητα κατανάλωσης. Συνοδευμένα με ψωμί ολικής άλεσης και λίγο τυρί\n(πρωτεΐνη), αυτά τα γεύματα είναι πλήρη από θρεπτική άποψη. Ο πλούτος των πιάτων με\nλαχανικά προέκυψε από τις παραδόσεις της νηστείας, που απαιτούσαν αποχή από όλα τα\nζωικά προϊόντα περίπου για το μισό έτος.\nΣήμερα, οι Έλληνες είναι θερμοί κρεατοφάγοι, αλλά παραδοσιακά, το κρέας ήταν\nπεριορισμένο και καταναλωνόταν ως εορταστικό φαγητό ή συνδυαζόταν με τρόφιμα\nβασισμένα στα χορταρικά, μαγειρεμένα στην κατσαρόλα ή στον φούρνο. Το εξαιρετικά\nπαρθένο ελληνικό ελαιόλαδο είναι το βασικό μαγειρικό λίπος που χρησιμοποιείται στην\nΕλλάδα και το οποίο περιχύνεται σε κάθε είδος σαλάτας και σε πολλά μαγειρευτά πιάτα,\nαφού αυτά ολοκληρωθούν.\nΔιασκευή για τις ανάγκες των εξετάσεων https://winesofgreece.org/el/, 5/12/2020", "sub": [{"type": "mcq", "q": "Η παραδοσιακή ελληνική διατροφή ακολουθεί τη μεσογειακή διατροφή.", "options" ας κείμενο (80-100 λέξεις). Επισημαίνουμε ότι δεν πρέπει να υπογράψετε με το ονοματεπώνυμό σας στο τέλος του κειμένου. Αφού διαβάσατε το παραπάνω κείμενο, γράψτε ένα μήνυμα ηλεκτρονικού ταχυδρομείου (email) σε ένα φίλο/μία φίλη σας για το πώς θα νιώθατε, αν ξαφνικά δεν υπήρχε το διαδίκτυο."}, {"type": "reading", "cat": "reading", "id": "read_058", "title": "!", "passage": "Νάξος: Το αρχαίο ελληνικό άγαλμα που βρίσκεται ξαπλωμένο εδώ και αιώνες\nΗ αρχαία ελληνική ιστορία έχει αφήσει τα σημάδια της σε ολόκληρη τη χώρα.\nΣημαντικά αξιοθέατα και μνημεία υπάρχουν τόσο στην ηπειρωτική όσο και στη νησιωτική\nΕλλάδα. Κάθε φορά που κάποιος κάνει ταξίδι αναψυχής σε ένα μέρος της Ελλάδας, μπορεί\nνα κάνει και ένα νοητό ταξίδι στην ιστορία της. Κάποιες τοποθεσίες της χώρας μας\nφημίζονται ακόμη περισσότερο για τα υπολείμματα που έχει αφήσει πίσω της η αρχαία\nελληνική τέχνη και ιστορία, όπως η Νάξος. Εκεί θα συναντήσετε ένα ξεχωριστό αξιοθέατο:\nτον Κούρο του Απόλλωνα!\nΟ Κούρος του Απόλλωνα είναι ένα εντυπωσιακό, γιγάντιο και μισοτελειωμένο\nανδρικό άγαλμα. Βρίσκεται ξαπλωμένο στη γη, στο παραθαλάσσιο χωριό του Απόλλωνα.\nΣτη θέση αυτή βρίσκεται εδώ και αιώνες. Το άγαλμα του Κούρου, που είναι μοναδικό στο\nείδος του στην Ελλάδα, έχει ύψος 10,45 μέτρα και οι επιστήμονες πιστεύουν ότι έχει\nκατασκευαστεί στις αρχές του 6ου αιώνα π.Χ. . Επίσης, θεωρείται ότι παριστάνει τον θεό\nΔιόνυσο ή τον θεό Απόλλωνα. Και οι δύο αυτοί θεοί λατρεύτηκαν στη Νάξο και οι ειδικοί\nδιαφωνούν για το ποιον παριστάνει. Αποτελεί ένα από τα πιο εντυπωσιακά αρχαία\nευρήματα της χώρας μας και εξαιτίας του μεγέθους του, αλλά και εξαιτίας του τρόπου με\nτον οποίο το βλέπει κανείς: ξαπλωμένο στο έδαφος. Φαίνεται πως ο τεχνίτης που το σκάλιζε\nάφησε στη μέση τη δουλειά του, πριν προλάβει να τελειώσει…\nΗ Νάξος είναι ένας προορισμός για όλες τις εποχές με αξιοθέατα που σε\nσυναρπάζουν!\nΔιασκευή από διαδικτυακό άρθρο για τις ανάγκες των εξετάσεων: https://www.newsbeast.gr/travel/arthro/6956564/naxos-toarchaio- ιά του στη μέση. Τώρα, ο τεχνίτης _____ ..τη δουλειά του στη μέση.", "a": "αφήνει"}, {"type": "typed", "q": "Να μεταφέρετε το ρήμα στον κατάλληλο τύπο, για να δηλώνει το μέλλον. Ο Κούρος του Απόλλωνα αποτελεί ένα από τα πιο σημαντικά μνημεία της Ελλάδας. Ο Κούρος του Απόλλωνα και στο μέλλον για πάντα _____ ένα από τα πιο σημαντικά μνημεία της Ελλάδας.", "a": "θα αποτελεί"}, {"type": "typed", "q": "Να μεταφέρετε το ρήμα στον κατάλληλο τύπο, για να δηλώνει το παρελθόν. Στη Νάξο θα συναντήσετε ένα ξεχωριστό μνημείο. Χθες το πρωί στη Νάξο _____ .. ένα ξεχωριστό μνημείο.", "a": "συναντήσατε"}, {"type": "mcq", "q": "«γιγάντιο, ανδρικό άγαλμα»: φράση με αντίθετη σημασία είναι", "options": ["μικρό, κοριτσίστικο άγαλμα", "μικροσκοπικό, παιδικό άγαλμα", "μικροσκοπικό, γυναικείο άγαλμα"], "answer": 2}, {"type": "mcq", "q": "«αναψυχή»: λέξη με παρόμοια σημασία είναι", "options": ["ευχαρίστηση", "ανάμνηση", "υποχρέωση"], "answer": 0}, {"type": "mcq", "q": "«αξιοθέατο»: έκφραση με παρόμοια σημασία είναι", "options": ["αυτό το οποίο αξίζει κανείς να φάει", "εκεί που μπορεί κανείς να θαυμάσει τη θέα", "αυτό το οποίο αξίζει κανείς να δει"], "answer": 2}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Επισημαίνουμε ότι δεν πρέπει να υπογράψετε με το ονοματεπώνυμό σας στο τέλος του κειμένου. Επισκεφθήκατε τη Νάξο και είδατε τον Κούρο του Απόλλωνα. Γράψτε ένα μήνυμα ηλεκτρονικού ταχυδρομείου (email) σε έναν φίλο/μία φίλη σας με τις εντυπώσεις σας."}, {"type": "reading", "cat": "reading", "id": "read_059", "title": "!", "passage": "Ομήρου ΟΔΥΣΣΕΙΑ από το ΚΘΒΕ\nΤριάντα οκτώ ηθοποιοί του Κρατικού Θεάτρου Βορείου Ελλάδος (ΚΘΒΕ), εν μέσω\nκαραντίνας, ένωσαν τις δυνάμεις τους και με σκηνοθέτιδα την Έφη Δρόσου ηχογράφησαν\nτην Οδύσσεια, όπως την απέδωσε αξεπέραστα με την αριστουργηματική του μετάφραση ο\nΔημήτρης Μαρωνίτης. Και οι 24 ραψωδίες της Οδύσσειας αποτυπώθηκαν σε ένα έργο 23\nωρών (η κάθε Ραψωδία έχει διάρκεια περίπου 45΄\n). Η παραγωγή του έργου, μια πολύμηνη\nδιαδικασία, θα είναι διαθέσιμη στην ιστοσελίδα του Οργανισμού (ιστοσελίδα: www.ntng.gr)\nαπό την Παραμονή της Πρωτοχρονιάς.\nΟ Καλλιτεχνικός Διευθυντής του ΚΘΒΕ, Νίκος Κολοβός, σημειώνει: «Στην Οδύσσεια,\nο ηρωισμός δεν αποτυπώνεται με ηρωικές μάχες, αλλά με το ταξίδι και τον αγώνα επιβίωσης του\nΟδυσσέα μέχρι να επιστρέψει στην πατρίδα του, την Ιθάκη. Σήμερα, λόγω των συνθηκών, πιο\nεπίκαιρος από ποτέ ο Όμηρος, μέσα από τα βάσανα και τις περιπέτειες του Οδυσσέα μιλά και για\nτον σύγχρονο αγώνα επιβίωσης του ανθρώπου ενάντια στο τέρας της πανδημίας.»\nΗ προσπάθεια των ηθοποιών λόγω των υγειονομικών κανονισμών διήρκεσε\nπολλούς\nμήνες.\nΣύμφωνα\nμε\nτους\nπρωταγωνιστές:\n«πρόβες\nήταν\nαδύνατον\nνα\nπραγματοποιηθούν. Ωστόσο, είχαμε ενθουσιαστεί γι’ αυτή την ομαδική δράση που έφερε στο φως\nκάτι που ποτέ πιο πριν δεν είχε ξαναγίνει. Παίρναμε τα κείμενα και τα μελετούσαμε από\nαπόσταση. Ύστερα, μόνοι μας αποδίδαμε μπροστά στα μικρόφωνα όλους τους χαρακτήρες. Με\nτην τεχνική του μοντάζ, που διήρκησε ώρες ατελείωτες, κατορθώσαμε\nνα υλοποιηθεί η\nηχογράφηση ολόκληρου του έργου, που ο ακροατής θα μπορεί να απολαύσει από τα μέσα\nκοινωνικής δικτύωσης του ΚΘΒΕ με το πάτημα ενός κουμπιού».\nΔιασκευή από το Δελτίο Τύπου του ΚΘΒΕ για τις ανάγκες των εξετάσεων, www.ntng.gr, 29-12-2020", "sub": [{"type": "mcq", "q": "Η δράση του ΚΘΒΕ αφορά την ηχογράφηση της Οδύσσειας.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Οι ηθοποιοί έκαναν πολλές πρόβες μαζί.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Οι ραψωδίες της Οδύσσειας είναι 23.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Πολλές κριτικές έχουν γραφτεί για τη δράση αυτή.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Στην Οδύσσεια περιλαμβάνονται πολλές ηρωικές μάχες.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Οι περιπέτειες του Οδυσσέα παρομοιάζονται με την πανδημία.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Το ΚΘΒΕ στη δράση αυτή ακολούθησε τη μετάφραση της Οδύσσειας", "options": ["της Έφης Δρόσου", "του Νίκου Κολοβού", "του Δημήτρη Μαρωνίτη"], "answer": 2}, {"type": "mcq", "q": "Η «Οδύσσεια» από το ΚΘΒΕ θα είναι διαθέσιμη", "options": ["ζωντανά", "από την παραμονή της πρωτοχρονιάς", "για λίγες μέρες μόνο"], "answer": 1}, {"type": "mcq", "q": "Όσοι ενδιαφέρονται, θα πρέπει", "options": ["να αγοράσουν έγκαιρα εισιτήριο", "να επισκεφθούν το ΚΘΒΕ", "να ψάξουν την ιστοσελίδα του ΚΘΒΕ"], "answer": 2}, {"type": "typed", "q": "Να μεταφέρετε το ρήμα στον κατάλληλο τύπο, για να δηλώνει το παρόν. Εμείς παίρναμε τα κείμενα για μελέτη. Εμείς _____ .. τα κείμενα για μελέτη.", "a": "παίρνουμε"}, {"type": "typed", "q": "Να μεταφέρετε το ρήμα στον κατάλληλο τύπο, για να δηλώνει το μέλλον. Ο Όμηρος μιλά στον σύγχρονο άνθρωπο. Και στο μέλλον ο Όμηρος πάντα _____ .. στον σύγχρονο άνθρωπο.", "a": "θα μιλά"}, {"type": "typed", "q": "Να μεταφέρετε το ρήμα στον κατάλληλο τύπο, για να δηλώνει το παρελθόν. Η ηχογράφηση θα είναι έτοιμη από την Παραμονή της Πρωτοχρονιάς. Η ηχογράφηση _____ έτοιμη από την Παραμονή της Πρωτοχρονιάς.", "a": "ήταν"}, {"type": "typed", "q": "Να συμπληρώσετε το κενό με 3 λέξεις, ώστε οι δύο προτάσεις να έχουν το ίδιο νόημα. Ο ηρωισμός δεν αποτυπώνεται με μάχες. Οι μάχες δεν _____ .", "a": "αποτυπώνουν τον ηρωισμό."}, {"type": "typed", "q": "Να μεταφέρετε την πρόταση στον ενικό αριθμό. Εμείς παίρναμε τα κείμενα. Εγώ _____ .", "a": "έπαιρνα το κείμενο"}, {"type": "typed", "q": "Να μεταφέρετε την πρόταση στον πληθυντικό αριθμό Η δράση ενθουσίασε τον ηθοποιό. Οι _____ τους ηθοποιούς.", "a": "δράσεις ενθουσίασαν"}, {"type": "mcq", "q": "«Ο ακροατής θα απολαύσει το έργο με το πάτημα ενός κουμπιού»: η φράση «με το πάτημα» απαντά στην ερώτηση", "options": ["πού;", "πώς;", "γιατί;"], "answer": 1}, {"type": "mcq", "q": "«λόγω των συνθηκών»: η λέξη «λόγω» μπορεί να αντικατασταθεί με τη λέξη", "options": ["επειδή", "γιατί", "εξαιτίας"], "answer": 2}, {"type": "mcq", "q": "«ωστόσο»: λέξη με παρόμοια σημασία είναι", "options": ["Επειδή", "Όταν", "Όμως"], "answer": 2}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Επισημαίνουμε ότι δεν πρέπει να υπογράψετε με το ονοματεπώνυμό σας στο τέλος του κειμένου. Διαβάσατε το κείμενο για την ηχογραφημένη Οδύσσεια και γράφετε ένα μήνυμα ηλεκτρονικού ταχυδρομείου σε έναν φίλο/μία φίλη σας, για να τον ενημερώσετε και να του προτείνετε να την ακούσει κι εκείνος."}, {"type": "reading", "cat": "reading", "id": "read_060", "title": "!", "passage": "Το ελληνικό χωριό των καλλιτεχνών είναι βγαλμένο απ’ τα παραμύθια\nΠώς θα σας φαινόταν, αν σας λέγαμε ότι υπάρχει ένα χωριό που έχει γίνει… το στέκι\nτων ανθρώπων του πνεύματος και της τέχνης; Είναι το μοναδικό Μεταξοχώρι, το οποίο\nαπέχει από την Αθήνα περίπου 360 χιλιόμετρα και θεωρείται ιδανικός προορισμός.\nΒρίσκεται σε κοντινή απόσταση τόσο από την πόλη της Λάρισας, όσο και από την κωμόπολη\nτης Αγιάς. Στο Μεταξοχώρι θα βρείτε ησυχία, αλλά θα κάνετε και τις βουτιές σας το\nκαλοκαίρι, καθώς βρίσκεται 15 περίπου λεπτά μακριά από τη θάλασσα.\nΠαλιά, στο Μεταξοχώρι συναντούσε κανείς τους καλύτερους παραγωγούς μεταξιού\nστην Ελλάδα. Οι Μεταξοχωρίτες έκαναν πολύ αυστηρή διαλογή αυγών και επέλεγαν πάντα\nτα καλύτερα. Γι’ αυτό, η ποιότητα του προϊόντος τους ήταν πολύ υψηλή και θεωρούνταν\nτότε απ’ τις κορυφαίες στον κόσμο.\nΤο χωριό ξαναγεννήθηκε στις αρχές του 2000, όταν ο Θεόδωρος Σουλιώτης\nεγκαταστάθηκε στην περιοχή, αγόρασε και αναστήλωσε ένα κτήριο του 1850 και έφτιαξε\nέναν ξενώνα, που είναι και σήμερα το καμάρι του χωριού. Η αρχή είχε γίνει. Ακολούθησε η\nαναστήλωση και άλλων πέτρινων σπιτιών, τα οποία με τον καιρό έγιναν η εξοχική κατοικία\nγνωστών καλλιτεχνών και διανοούμενων, που βρήκαν στο Μεταξοχώρι τον επίγειο\nπαράδεισό τους: έναν τόπο με ομορφιές, όπου ο χρόνος έχει σταματήσει σε μια άλλη εποχή!\nΕδώ, μπορείτε να απολαύσετε τη φύση και να επισκεφθείτε μνημεία, όπως το παλιό\nυδραγωγείο, τον Ναό του Προφήτη Ηλία, που χτίστηκε τον 17ο αιώνα, και τον\nανοιγμένο βράχο με το μεγάλο δέντρο στη μέση. Πάντως, είναι βέβαιο ότι στα\nπετρόχτιστα δρομάκια του χωριού κι εσείς θα ανακαλύψετε τη δική σας γωνιά!\nΔιασκευή από ταξιδιωτικό άρθρο σε ηλεκτρονική εφημερίδα για τις ανάγκες των εξετάσεων, 1/1/2021\nhttps://www.ethnos.gr/travel/139781_o-paradeisos-ton-dianooymenon-elliniko-horio-ton-kallitehnon-einai-bgalmeno-ap-ta", "sub": [{"type": "mcq", "q": "Η πιο κοντινή πόλη στο Μεταξοχώρι είναι η Αθήνα.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Στο Μεταξοχώρι βρίσκονται μέχρι και σήμερα οι καλύτεροι παραγωγοί μεταξιού στην Ελλάδα.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Το χωριό είναι πολύ ήσυχο.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Ακόμη και στις μέρες μας χτίζονται πολλά πέτρινα σπίτια.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Γνωστοί καλλιτέχνες έχουν εξοχικό στο Μεταξοχώρι.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Το χωριό βρίσκεται μακριά από τη θάλασσα.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Ο Θεόδωρος Σουλιώτης αναστήλωσε το κτήριο", "options": ["το 1850", "το 2000", "τον 17ο αιώνα"], "answer": 1}, {"type": "mcq", "q": "Το κείμενο προέρχεται από", "options": ["βιβλίο ιστορίας", "βιβλίο γεωγραφίας", "ηλεκτρονικό άρθρο"], "answer": 2}, {"type": "mcq", "q": "Το Μεταξοχώρι το προτιμούν άνθρωποι του πνεύματος", "options": ["για τις φυσικές του ομορφιές", "για τους παραγωγούς μεταξιού", "για τις γνωριμίες που μπορούν να κάνουν"], "answer": 0}, {"type": "mcq", "q": "«εγκαταστάθηκε»: λέξη/φράση με παρόμοια σημασία είναι", "options": ["έφυγε", "ταξίδεψε", "έμεινε μόνιμα"], "answer": 2}, {"type": "mcq", "q": "«Εξοχική κατοικία»: σημαίνει το σπίτι στο οποίο κάποιος", "options": ["μένει στις διακοπές του", "μένει μόνιμα", "μετακομίζει"], "answer": 0}, {"type": "mcq", "q": "«κοντινή»: λέξη με αντίθετη σημασία είναι", "options": ["διπλανή", "μακρινή", "τεράστια"], "answer": 1}, {"type": "mcq", "q": "«αναστήλωσε»: λέξη με αντίθετη σημασία είναι", "options": ["γκρέμισε", "έχτισε", "τροποποίησε"], "answer": 0}, {"type": "typed", "q": "Να μεταφέρετε την πρόταση στον πληθυντικό αριθμό Έφτιαξε τον ξενώνα. _____", "a": "Έφτιαξαν τους ξενώνες."}, {"type": "typed", "q": "Να μεταφέρετε την πρόταση στον ενικό αριθμό. Γνωστοί καλλιτέχνες μένουν εκεί. _____ εκεί.", "a": "Γνωστός καλλιτέχνης μένει"}, {"type": "typed", "q": "Να μεταφέρετε το ρήμα στον κατάλληλο τύπο, για να δηλώνει το παρελθόν. Το χωριό βρίσκεται σε κοντινή απόσταση από τη θάλασσα. Παλιότερα το χωριό _____ σε κοντινή απόσταση από τη θάλασσα", "a": "βρισκόταν"}, {"type": "typed", "q": "Να μεταφέρετε το ρήμα στον κατάλληλο τύπο, για να δηλώνει το μέλλον. Το χωριό θεωρείται ιδανικός προορισμός. Και στο μέλλον, για πάντα το χωριό _____ ..ιδανικός προορισμός.", "a": "θα θεωρείται"}, {"type": "typed", "q": "Να μεταφέρετε το ρήμα στον κατάλληλο τύπο, για να δηλώνει το παρόν. Εκεί θα κάνεις τις βουτιές σου το καλοκαίρι. Εκεί _____ τις βουτιές σου κάθε καλοκαίρι.", "a": "κάνεις"}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Επισημαίνουμε ότι δεν πρέπει να υπογράψετε με το ονοματεπώνυμό σας στο τέλος του κειμένου. Μετά από μια εκδρομή στο Μεταξοχώρι στέλνετε ένα μήνυμα ηλεκτρονικού ταχυδρομείου (email) σε έναν φίλο/μία φίλη σας με τις εντυπώσεις σας."}, {"type": "reading", "cat": "reading", "id": "read_061", "title": "!", "passage": "«Ανάβρυτα»: Ένα ιστορικό σχολείο μέσα σε δάσος!\nΤα «Ανάβρυτα» αποτελούν ένα σημαντικό τμήμα της ιστορίας της εκπαίδευσης στην\nΕλλάδα. Το Πρότυπο Γυμνάσιο και Πρότυπο Λύκειο Αναβρύτων βρίσκονται στην καρδιά\nτου καταπράσινου Άλσους Συγγρού, μεταξύ Αμαρουσίου και Κηφισιάς.\nΗ ονομασία\n«Ανάβρυτα» παραπέμπει σε τρεχούμενο νερό και δόθηκε, επειδή στην περιοχή υπήρχαν\nπολλές πηγές. Το Άλσος, έκτασης 950 στρεμμάτων, ανήκε στον εθνικό ευεργέτη, Ανδρέα\nΣυγγρό, η χήρα του οποίου το χάρισε μετά το θάνατό της στην Ελληνική Γεωργική Εταιρεία.\nΗ Εταιρεία με τη σειρά της ίδρυσε μέσα σ’ αυτό το “Πρακτικό Γεωργικό Σχολείο”, για όσους\nήθελαν να ασχοληθούν με τη γεωργία.\nΠαράλληλα, το 1949 ιδρύθηκε εκεί ένα ιδιωτικό σχολείο αγοριών, το «Εθνικό\nΕκπαιδευτήριο Αναβρύτων». Οι μαθητές γίνονταν δεκτοί μετά από αυστηρές εξετάσεις και\nέμεναν μέσα στο σχολείο πληρώνοντας δίδακτρα. Το 1971 ιδρύθηκε στη θέση του το\n«Γυμνάσιο Αριστούχων Αναβρύτων» με μαθητές που εξακολουθούσαν να δίνουν εξετάσεις\nκαι να μένουν μέσα στο σχολείο, αλλά χωρίς να πληρώνουν δίδακτρα.\nΤα χρόνια πέρασαν και μετά από πολλές μεταρρυθμίσεις το Γυμνάσιο και το Λύκειο\nπου φιλοξενούνται στο Άλσος Συγγρού είναι σήμερα Πρότυπα δημόσια σχολεία και οι\n΄ Γυμνασίου. Στόχος τους είναι -μεταξύ\nμαθητές περνούν εισαγωγικές εξετάσεις στην Α\nάλλων- η ανάπτυξη της προσωπικότητάς των μαθητών μέσα από τη λειτουργία\nπρογραμμάτων δημιουργικότητας και τη συμμετοχή σε διαγωνισμούς και φεστιβάλ.\nΕπιπλέον, συνεργάζονται με το Πανεπιστήμιο Αθηνών και πολλοί φοιτητές παιδαγωγικών\nσχολών πραγματοποιούν εδώ τις πρακτικές ασκήσεις τους.\nΤο Άλσος Συγγρού είναι το μοναδικό φυσικό δάσος της ευρύτερης περιοχής και δέχεται\nκαθημερινά επισκέπτες, περιπατητές, αθλούμενους και οικογένειες μέχρι τη δύση του\nηλίου. Οι μαθητές, πάντως, μπορούν να απολαμβάνουν καθημερινά τη μάθηση μέσα σε ένα\nθαυμάσιο φυσικό περιβάλλον!\nΔιασκευή για τις ανάγκες των εξετάσεων, https://maroussi-news.gr/mia-istoriki-matia-sti-sxoli-anavrytwn/, 26-1-2021", "sub": [{"type": "mcq", "q": "Το Άλσος Συγγρού είναι ένα τεχνητό δάσος.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Ειδικοί έχουν εντοπίσει αρχαιολογικά ευρήματα στον χώρο.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Το Άλσος Συγγρού είναι ανοιχτό στο κοινό.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Στο «Εθνικό Εκπαιδευτήριο Αναβρύτων» μπορούσαν να φοιτήσουν αγόρια και κορίτσια.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Σήμερα, το Πρότυπο Γυμνάσιο και Λύκειο Αναβρύτων είναι δημόσια σχολεία συνεργαζόμενα με το Πανεπιστήμιο Αθηνών.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Σήμερα, οι μαθητές της Ά Γυμνασίου μπορούν να φοιτήσουν στο Πρότυπο Γυμνάσιο Αναβρύτων", "options": ["με απλή εγγραφή", "μετά από κλήρωση", "μετά από εισαγωγικές εξετάσεις"], "answer": 2}, {"type": "mcq", "q": "Αρχικά, το Άλσος Συγγρού ανήκε", "options": ["στην Ελληνική Γεωργική Εταιρεία", "στον Ανδρέα Συγγρό", "στη σύζυγο του Ανδρέα Συγγρού"], "answer": 1}, {"type": "mcq", "q": "Οι μαθητές του «Γυμνασίου Αριστούχων Αναβρύτων»", "options": ["έμεναν στο σχολείο μετά τα μαθήματα", "επέστρεφαν στο σπίτι τους", "μπορούσαν να διαλέξουν αν θα έμεναν ή όχι στο σχολείο μετά τα μαθήματα"], "answer": 0}, {"type": "mcq", "q": "Στο Πρακτικό Γεωργικό Σχολείο οι μαθητές", "options": ["έδιναν εισαγωγικές εξετάσεις", "κληρώνονταν", "ήθελαν να ασχοληθούν με τη γεωργία"], "answer": 2}, {"type": "typed", "q": "Να μεταφέρετε το ρήμα της πρότασης στον κατάλληλο τύπο, για να δηλώνει το μέλλον. Οι μαθητές απολαμβάνουν ένα όμορφο φυσικό περιβάλλον. Για πολλά χρόνια στο μέλλον, οι μαθητές _____ .. ένα όμορφο φυσικό περιβάλλον.", "a": "θα απολαμβάνουν"}, {"type": "typed", "q": "Να μεταφέρετε το ρήμα της πρότασης στον κατάλληλο τύπο, για να δηλώνει το παρόν. Τότε, οι μαθητές γίνονταν δεκτοί μετά από εξετάσεις. Σήμερα, οι μαθητές _____ . δεκτοί μετά από εξετάσεις.", "a": "γίνονται"}, {"type": "typed", "q": "Να μεταφέρετε το ρήμα της πρότασης στον κατάλληλο τύπο, για να δηλώνει το παρελθόν. Τα « Ανάβρυτα» αποτελούν ένα σημαντικό κομμάτι της εκπαιδευτικής ιστορίας. Και παλιότερα για πολλά χρόνια, τα «Ανάβρυτα» _____ . ένα σημαντικό κομμάτι της εκπαιδευτικής ιστορίας.", "a": "αποτελούσαν"}, {"type": "typed", "q": "Να μεταφέρετε την πρόταση στον ενικό αριθμό. Οι φοιτητές πραγματοποιούν τις πρακτικές τους στα Ανάβρυτα. Ο _____ . στα Ανάβρυτα.", "a": "φοιτητής πραγματοποιεί την πρακτική του"}, {"type": "typed", "q": "Να μεταφέρετε την πρόταση στον πληθυντικό αριθμό. Η ονομασία παραπέμπει σε τρεχούμενο νερό. Οι _____ νερά.", "a": "ονομασίες παραπέμπουν σε τρεχούμενα"}, {"type": "typed", "q": "Να κάνετε τις απαραίτητες αλλαγές, ώστε οι δύο προτάσεις να έχουν την ίδια σημασία. Το όνομα «Ανάβρυτα» δόθηκε από τους κατοίκους της περιοχής. Οι κάτοικοι της περιοχής _____ «Ανάβρυτα».", "a": "έδωσαν το όνομα"}, {"type": "typed", "q": "Να συμπληρώσετε το κενό. Το βραδάκι βλέπουμε τη δύση του ηλίου, ενώ το πρωί την _____ . του ηλίου.", "a": "ανατολή"}, {"type": "mcq", "q": "«ιδιωτικό»: λέξη με αντίθετη σημασία είναι", "options": ["δημόσιο", "ατομικό", "προσωπικό"], "answer": 0}, {"type": "mcq", "q": "«σημαντικό»: λέξη με παρόμοια σημασία είναι", "options": ["ασήμαντο", "ουσιαστικό", "άχρηστο"], "answer": 1}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Επισημαίνουμε ότι δεν πρέπει να υπογράψετε με το ονοματεπώνυμό σας στο τέλος του κειμένου. Μόλις επιστρέψατε από μία βόλτα στο Άλσος Συγγρού. Γράψτε ένα μήνυμα ηλεκτρονικού ταχυδρομείου (email) σε έναν φίλο/μία φίλη σας με τις εντυπώσεις σας."}, {"type": "reading", "cat": "reading", "id": "read_062", "title": "!", "passage": "Ο Οδυσσέας Ελύτης «θα μείνει» στην Πλάκα\nΣτη δημιουργία ενός ειδικού χώρου, για να μπορεί κανείς να δει τη σπουδαία\nκληρονομιά του νομπελίστα ποιητή Οδυσσέα Ελύτη, προχωρά το Υπουργείο Πολιτισμού\nκαι Αθλητισμού. Ένα παλαιό κτήριο και δύο βοηθητικά κτίσματα στη συμβολή των οδών\nΔιοσκούρων και Πολυγνώτου στην Πλάκα αποκαθίστανται για τον λόγο αυτό από την\nαρμόδια υπηρεσία του Υπουργείου. Το «Αρχείο Ελύτη» βρίσκεται σήμερα στην κατοχή της\nκυρίας Ηλιοπούλου, η οποία πρότεινε τη δημιουργία ειδικού χώρου στο Υπουργείο\nΠολιτισμού και Αθλητισμού το 2013. Μετά την έγκριση από τους αρμόδιους φορείς το\nκτήριο αναμένεται να ολοκληρωθεί σύντομα.\nΣτο ισόγειο του κτηρίου θα τοποθετηθεί ο χώρος υποδοχής του κοινού, ο χώρος\nπαρουσίασης σημαντικών σταθμών της ζωής και του έργου του ποιητή, καθώς και το\nγραφείο του. Εδώ, θα μπορεί κανείς να δει τις πρώτες εκδόσεις, τα χειρόγραφα, διάφορα\nέργα ζωγραφικής του Ελύτη, έργα που ο ίδιος αγαπούσε, μεταφράσεις και άλλα. Στον 1ο\nόροφο θα\nδημιουργηθεί\nαίθουσα\nπολλαπλών\nχρήσεων\nγια\nδιαλέξεις,\nσυνέδρια,\nεκπαιδευτικά προγράμματα, αλλά και μουσικές και ποιητικές εκδηλώσεις, καθώς και ένα\nμικρό καφέ με θέα στην Ακρόπολη, τoν λόφο της Πνύκας και το Αστεροσκοπείο.\nΤο υπόγειο πρόκειται να χρησιμοποιηθεί ως βιβλιοθήκη με βιβλία, περιοδικά, δίσκους,\nφωτογραφικό, ηχητικό και κινηματογραφικό υλικό και θα διαθέτει υπολογιστές. Εδώ, οι\nερευνητές θα έχουν πρόσβαση στο σύνολο των εκδόσεων, ελληνικών και ξένων, σε\nαφιερώματα και βιβλία για το έργο του Ελύτη. Σε έναν άλλο ειδικό χώρο θα φυλάσσεται\nυλικό που δεν θα εκτίθεται, όπως σημειωματάρια, αποκόμματα από τον Τύπο, αφίσες,\nπρογράμματα και άλλα.\nΔιασκευή από ηλεκτρονικό άρθρο για τις ανάγκες των εξετάσεων, https://www.lifo.gr/now/culture/305956/o-odysseas-elytis-thameinei-stin-plaka, 10-12-2020", "sub": [{"type": "mcq", "q": "Το κτήριο που θα φιλοξενήσει το «Αρχείο Ελύτη» βρίσκεται στην Πλάκα.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Ο ποιητής Οδυσσέας Ελύτης έχει πάρει Νόμπελ.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Στον 1ο όροφο θα υπάρχει μόνο ένα μικρό καφέ.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Η βιβλιοθήκη δεν θα έχει υπολογιστές, μόνο βιβλία.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Θα δημιουργηθούν και άλλοι παρόμοιοι χώροι για τους σπουδαίους Έλληνες ποιητές.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Το παραπάνω κείμενο αποτελεί ηλεκτρονική διαφήμιση.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Στο υπόγειο συναντά κάποιος", "options": ["την αποθήκη", "το γραφείο", "τη βιβλιοθήκη"], "answer": 2}, {"type": "mcq", "q": "Τα αποκόμματα από τις εφημερίδες θα βρίσκονται", "options": ["στο ισόγειο", "στη βιβλιοθήκη", "σε άλλο ειδικό χώρο"], "answer": 2}, {"type": "mcq", "q": "Το «Αρχείο Ελύτη» σήμερα το έχει", "options": ["η κυρία Ηλιοπούλου", "το Υπουργείο Πολιτισμού και Αθλητισμού", "το Υπουργείο Παιδείας και Θρησκευμάτων"], "answer": 0}, {"type": "typed", "q": "Να μεταφέρετε το ρήμα στον κατάλληλο τύπο, για να δηλώνει το παρελθόν. Στον χώρο βλέπουμε έργα του Ελύτη. Μια φορά μόνο χθες στον χώρο _____ . έργα του Ελύτη.", "a": "είδαμε"}, {"type": "typed", "q": "Να μεταφέρετε το ρήμα στον κατάλληλο τύπο, για να δηλώνει το παρόν. Η βιβλιοθήκη θα έχει υπολογιστές Η βιβλιοθήκη τώρα _____ υπολογιστές.", "a": "έχει"}, {"type": "typed", "q": "Να μεταφέρετε το ρήμα στον κατάλληλο τύπο, για να δηλώνει το μέλλον. Το «Αρχείο Ελύτη» βρίσκεται σε αυτό τον χώρο. Για πολλά χρόνια στο μέλλον το «Αρχείο Ελύτη» _____ σε αυτό τον χώρο.", "a": "θα βρίσκεται"}, {"type": "typed", "q": "Να μεταφέρετε την πρόταση στον πληθυντικό αριθμό. Σε άλλο χώρο βρίσκεται το υλικό. Σε άλλους _____ ..", "a": "χώρους βρίσκονται τα υλικά."}, {"type": "typed", "q": "Να μεταφέρετε την πρόταση στον ενικό αριθμό. Οι ερευνητές διαβάζουν τα έργα. Ο _____", "a": "ερευνητής διαβάζει το έργο."}, {"type": "typed", "q": "Να κάνετε τις απαραίτητες αλλαγές, ώστε οι δύο προτάσεις να έχουν το ίδιο νόημα. Η κυρία Ηλιοπούλου πρότεινε τη δημιουργία ειδικού χώρου. Η κυρία Ηλιοπούλου πρότεινε _____ .. ειδικός χώρος.", "a": "να δημιουργηθεί"}, {"type": "mcq", "q": "«σπουδαία»: λέξη με αντίθετη σημασία είναι", "options": ["σημαντική", "ουσιαστική", "ασήμαντη"], "answer": 2}, {"type": "mcq", "q": "«Οι ερευνητές θα έχουν πρόσβαση στο υλικό» σημαίνει", "options": ["οι ερευνητές θα μπορούν να δουν το υλικό", "οι ερευνητές δεν θα μπορούν να δουν το υλικό", "οι ερευνητές θα απαγορεύεται να δουν το υλικό"], "answer": 0}, {"type": "mcq", "q": "«υλικό που εκτίθεται»: παρόμοια σημασία έχει", "options": ["υλικό που δεν μπορεί να δει το κοινό", "υλικό που μπορεί να δει το κοινό", "υλικό που μπορεί να αγοράσει το κοινό"], "answer": 1}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Επισημαίνουμε ότι δεν πρέπει να υπογράψετε με το ονοματεπώνυμό σας στο τέλος του κειμένου. Σε μία βόλτα στην Πλάκα βλέπετε το κτήριο για το οποίο διαβάσατε. Γράψτε ένα μήνυμα ηλεκτρονικού ταχυδρομείου (email) σε έναν φίλο/ μία φίλη σας, για να τον ενημερώσετε για το κτήριο αυτό."}, {"type": "reading", "cat": "reading", "id": "read_063", "title": "!", "passage": "Ένα εκπληκτικό βιβλίο για τον Μηχανισμό των Αντικυθήρων επιτέλους στα\nελληνικά!\nΤο βιβλίο του Αλεξάντερ Τζόουνς «Ένας φορητός κόσμος», που αφορά τον λεγόμενο\n«Μηχανισμό των Αντικυθήρων», μόλις κυκλοφόρησε και στα ελληνικά από τις\nΠανεπιστημιακές Εκδόσεις Κρήτης. Ο «Μηχανισμός των Αντικυθήρων» είναι ένα\nεκπληκτικό αντικείμενο, το οποίο μια ολόκληρη ομάδα Ελλήνων και ξένων επιστημόνων\nαπό διάφορες ειδικότητες μελετούν συστηματικά από το 2005 έως τις μέρες μας. Μέσα σε\nαυτά τα 17 χρόνια έχουμε μάθει τόσο πολλά για τον λεγόμενο «υπολογιστή» της\nαρχαιότητας,\nπου σταμάτησε πια να θεωρείται κάτι παράξενο για τις μέχρι τότε\nεπιστημονικές γνώσεις των αρχαίων Ελλήνων.\nΤο βιβλίο είναι γραμμένο σα μυθιστόρημα, το οποίο ξεκινά από τους σφουγγαράδες\nτης Σύμης που βρήκαν το ναυάγιο το 1900 και φθάνει στη σύγχρονη μελέτη των παράξενων\nαντικειμένων που βρέθηκαν στον βυθό. Με βάση τις μαρτυρίες από τις αρχαίες πηγές, αλλά\nκαι τις πρόσφατες ανακαλύψεις από την ομάδα
