<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Ελληνική Ιθαγένεια — Προετοιμασία</title>
<style>
  :root{
    --sky:#0369a1; --sky2:#0284c7; --ink:#1e293b; --mut:#64748b;
    --line:#e2e8f0; --bg:#f1f5f9; --ok:#059669; --okbg:#ecfdf5; --no:#e11d48; --nobg:#fff1f2;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{margin:0; background:var(--bg); font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; color:var(--ink)}
  #app{max-width:480px; margin:0 auto; min-height:100vh; background:var(--bg); padding-bottom:84px}
  .pad{padding:0 18px}
  .hidden{display:none!important}
  /* header */
  .hdr{background:linear-gradient(180deg,var(--sky),var(--sky2)); color:#fff; padding:34px 18px 46px; border-radius:0 0 26px 26px}
  .hdr .brand{display:flex; align-items:center; gap:8px; opacity:.92; font-size:14px; font-weight:600}
  .hdr h1{margin:6px 0 18px; font-size:25px}
  .ringrow{display:flex; align-items:center; gap:20px}
  .pill{display:inline-flex; align-items:center; gap:7px; background:rgba(255,255,255,.16); padding:7px 13px; border-radius:999px; font-weight:600; font-size:15px; margin-top:8px}
  /* cards */
  .card{background:#fff; border-radius:18px; box-shadow:0 1px 3px rgba(0,0,0,.06); padding:16px}
  .card:active{transform:scale(.99)}
  .row{display:flex; align-items:center; gap:13px}
  .ico{width:48px; height:48px; border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:24px; flex:0 0 auto}
  .title{font-weight:700; font-size:18px}
  .sub{color:var(--mut); font-size:14px}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .bar{height:7px; background:var(--line); border-radius:99px; overflow:hidden; margin-top:9px}
  .bar > i{display:block; height:100%; border-radius:99px}
  h2.sec{font-size:18px; margin:22px 0 12px}
  .chev{margin-left:auto; color:#cbd5e1; font-size:22px}
  /* buttons */
  button{font-family:inherit}
  .btn{display:block; width:100%; border:none; border-radius:16px; padding:16px; font-size:18px; font-weight:700; cursor:pointer}
  .btn-primary{background:var(--sky); color:#fff}
  .btn-dark{background:#1e293b; color:#fff}
  .btn-soft{background:#e2e8f0; color:#475569}
  .opt{display:flex; justify-content:space-between; align-items:center; gap:10px; width:100%; text-align:left; border:2px solid var(--line); background:#fff; border-radius:16px; padding:15px; font-size:17px; font-weight:600; color:#334155; cursor:pointer; margin-bottom:11px}
  .opt.ok{background:var(--okbg); border-color:#34d399; color:#065f46}
  .opt.no{background:var(--nobg); border-color:#fda4af; color:#9f1239}
  .opt.dim{color:#94a3b8; border-color:#eef2f7}
  .listen{flex:0 0 auto; width:44px; height:44px; border-radius:999px; border:none; background:#e0f2fe; color:var(--sky); font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center}
  .qtext{font-size:21px; font-weight:700; line-height:1.32; flex:1; white-space:pre-line}
  .badge{font-size:12px; font-weight:700; padding:4px 10px; border-radius:999px}
  .tfrow{background:#fff; border:2px solid #eef2f7; border-radius:16px; padding:14px; margin-bottom:11px}
  .tfbtns{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:11px}
  .tfbtn{border:none; border-radius:12px; padding:13px; font-size:17px; font-weight:700; background:#eef2f7; color:#475569; cursor:pointer}
  .tfbtn.sel{background:var(--sky); color:#fff}
  .tfbtn.ok{background:#d1fae5; color:#065f46; box-shadow:inset 0 0 0 2px #34d399}
  .tfbtn.no{background:#ffe4e6; color:#9f1239; box-shadow:inset 0 0 0 2px #fb7185}
  .note{background:#f1f5f9; border-radius:12px; padding:12px; color:#475569; font-size:15px; line-height:1.5; margin:14px 0}
  .reveal{background:var(--okbg); border:1px solid #a7f3d0; border-radius:16px; padding:16px; margin:6px 0 14px}
  .reveal .lbl{font-size:12px; font-weight:700; color:var(--ok); margin-bottom:4px}
  .reveal .ans{font-size:18px; font-weight:700; color:#065f46; line-height:1.4; white-space:pre-line}
  .back{background:none; border:none; color:var(--sky); font-weight:600; font-size:16px; cursor:pointer; padding:0; display:inline-flex; align-items:center; gap:4px; margin:26px 0 6px}
  .center{text-align:center}
  /* nav */
  .nav{position:fixed; left:50%; transform:translateX(-50%); bottom:0; width:100%; max-width:480px; background:#fff; border-top:1px solid var(--line); display:flex; padding:8px 4px; padding-bottom:max(8px,env(safe-area-inset-bottom))}
  .nav button{flex:1; background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:2px; padding:6px 0; color:#94a3b8; font-size:12px; font-weight:600; cursor:pointer}
  .nav button.on{color:var(--sky)}
  .nav .ni{font-size:22px}
  .small{font-size:13px; color:var(--mut)}
  .count{margin-left:auto; font-size:14px; color:var(--mut)}
  /* interactive fill + list */
  .fill-sentence{font-size:18px; line-height:2.1; margin:6px 0 18px}
  .slot{display:inline-block; min-width:64px; border:none; border-bottom:2px dashed var(--sky); background:#f0f9ff; color:var(--ink); font-size:16px; font-weight:600; padding:2px 8px; margin:0 2px; border-radius:6px 6px 0 0; cursor:pointer; vertical-align:baseline}
  .slot.filled{border-bottom-style:solid; background:#e0f2fe}
  .slot.ok{background:var(--okbg); color:var(--ok); border-bottom-color:var(--ok)}
  .slot.no{background:var(--nobg); color:var(--no); border-bottom-color:var(--no)}
  .chips{display:flex; flex-wrap:wrap; gap:8px}
  .chip{background:#fff; border:1.5px solid var(--line); border-radius:20px; padding:8px 14px; font-size:15px; font-weight:600; color:var(--ink); cursor:pointer}
  .chip.sel{border-color:var(--sky); background:#e0f2fe; color:var(--sky)}
  .clouds{display:flex; flex-wrap:wrap; gap:8px; min-height:8px; margin-bottom:12px}
  .cloud{padding:6px 12px; border-radius:14px; font-size:15px; font-weight:600; border:1.5px solid var(--line)}
  .cloud.ok{background:var(--okbg); color:var(--ok); border-color:#a7f3d0}
  .cloud.no{background:var(--nobg); color:var(--no); border-color:#fecdd3}
  .cloud small{font-weight:600; opacity:.8}
  .text-in{flex:1; border:1.5px solid var(--line); border-radius:12px; padding:12px 14px; font-size:16px; outline:none}
  .text-in:focus{border-color:var(--sky)}
  .ver{text-align:center; font-size:11px; color:#cbd5e1; padding:10px 0 84px}
</style>

<script>
/* ============================================================
   1. CORRECTIONS
   The question bank in questions.js is already cleaned and verified
   at build time, so no per-id patches are needed here. These hooks
   remain in case you ever want to override a single question.
   ============================================================ */
const FIXES = {};
const DROP = new Set();

function cleanQ(q){
  q = (q||"").replace(/^[;:,.\s·]+/,"").replace(/^(και|Α΄|Β΄|Γ΄|Δ΄)\s+/,"");
  return q.trim();
}
function cleanA(a){
  a = (a||"").replace(/^μέχρι[^.]*?λέξ\S*\.?\s*/,"").replace(/^ΑΠΑΝΤΗΣΗ\s*[:.]?\s*/,"");
  return a.trim();
}
function normalize(raw){
  const out=[];
  for(const q of raw){
    if(DROP.has(q.id)) continue;
    const item = Object.assign({}, q, FIXES[q.id]||{});
    item.q = cleanQ(item.q);
    if(item.type==="open") item.answerText = cleanA(item.answerText);
    out.push(item);
  }
  return out;
}
const QS = normalize(window.QUESTIONS || []);

/* ============================================================
   2. CATEGORIES + storage
   ============================================================ */
const CATS = {
  geography:    {label:"Γεωγραφία",           short:"Γεωγραφία",  emoji:"🗺️", color:"#0ea5a0"},
  culture:      {label:"Πολιτισμός",          short:"Πολιτισμός", emoji:"🎭", color:"#d97706"},
  history:      {label:"Ιστορία",             short:"Ιστορία",    emoji:"📜", color:"#9333ea"},
  institutions: {label:"Θεσμοί Πολιτεύματος", short:"Θεσμοί",     emoji:"🏛️", color:"#0d5eaf"},
};
const KEY="gr_pegp_progress_v1";
function def(){return {stats:{}, streak:0, lastDay:null, mocks:[]}}
function load(){ try{return Object.assign(def(), JSON.parse(localStorage.getItem(KEY))||{})}catch(e){return def()} }
function save(){ try{localStorage.setItem(KEY, JSON.stringify(P))}catch(e){} }
let P = load();
const today = ()=> new Date().toISOString().slice(0,10);

function record(id, correct){
  const s = P.stats[id] || {seen:0,correct:0,wrong:0};
  s.seen++; correct? s.correct++ : s.wrong++; s.last = correct?"ok":"no";
  P.stats[id]=s;
  const t=today();
  if(P.lastDay!==t){
    const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
    P.streak = (P.lastDay===y)? P.streak+1 : 1;
    P.lastDay=t;
  }
  save();
}
const isKnown = q => { const s=P.stats[q.id]; return s && s.last==="ok" && s.correct/s.seen>=0.6; };
const catQs = c => QS.filter(q=>q.cat===c);
const catProg = c => { const a=catQs(c); return {known:a.filter(isKnown).length, total:a.length}; };
const readiness = ()=> QS.length? Math.round(QS.filter(isKnown).length/QS.length*100):0;
const mistakes = ()=> QS.filter(q=>P.stats[q.id]&&P.stats[q.id].last==="no");

/* ============================================================
   3. helpers
   ============================================================ */
const $ = (h)=>{const d=document.createElement("div"); d.innerHTML=h.trim(); return d.firstChild;};
const shuffle = a => a.map(x=>[Math.random(),x]).sort((p,q)=>p[0]-q[0]).map(x=>x[1]);
function speak(t){
  try{ if(!window.speechSynthesis) return; speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(t); u.lang="el-GR"; u.rate=.85;
    const v=speechSynthesis.getVoices().find(v=>v.lang&&v.lang.toLowerCase().startsWith("el")); if(v)u.voice=v;
    speechSynthesis.speak(u);
  }catch(e){}
}
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

let view="home", cat=null, mock=null;
const APP_VERSION="v1.3";
const app=document.getElementById("app");

/* ============================================================

}

  wrap.appendChild(grid);

  const ex=$(`<div class="card btn-dark" style="margin-top:18px; color:#fff" >

    <div class="sub" style="color:#cbd5e1">20 ερωτήσεις — όπως στην πραγματική</div></div>
    <div class="chev" style="color:#64748b">›</div></div></div>`);
  ex.onclick=()=>{mock=buildMock(); view="mock"; render();};
  wrap.appendChild(ex);

  const m=mistakes().length;
  if(m) wrap.appendChild($(`<div class="card" style="margin-top:14px; background:#fff1f2; color:#9f1239; font-size:14px">Έχεις <b>${m}</b> ερωτήσεις για επανάληψη, στην ενότητα «Μελέτη».</div>`));

function ring(pct,fg,bg){

}

function studyMenu(){

let sOrder=[], sIdx=0, sTitle="";
function startStudy(list, title){
  sOrder=shuffle(list.slice()); sIdx=0; sTitle=title; cat=cat||"_review"; view="study"; renderStudy();
}
function study(){ sOrder=shuffle(catQs(cat)); sIdx=0; sTitle=CATS[cat].label; renderStudy(); }

function renderStudy(){
  app.innerHTML="";
  const w=$(`<div class="pad"></div>`);
  const back=$(`<button class="back">‹ Πίσω</button>`);
  back.onclick=()=>{ if(sTitle==="Επανάληψη Λαθών"){view="study";cat=null;} cat=(sTitle==="Επανάληψη Λαθών")?null:null; view="study"; cat=null; render(); };

function card(q, next){
  if(q.type==="mcq")  return mcqCard(q,next,false);
  if(q.type==="tf")   return tfCard(q,next);
  if(q.type==="fill") return fillCard(q,next);
  if(q.type==="list") return listCard(q,next);
  return openCard(q,next);
}

/* ---- Greek-aware answer matching (accents, final sigma, sound-alikes, typos) ---- */
function grNorm(s){
  s=(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  s=s.replace(/ς/g,"σ").replace(/[^α-ωa-z0-9 ]/g," ");
  return s.replace(/\s+/g," ").trim();
}
function grPhon(s){
  s=grNorm(s);
  s=s.replace(/αυ/g,"αφ").replace(/ευ/g,"εφ");
  s=s.replace(/μπ/g,"β").replace(/ντ/g,"δ").replace(/γκ|γγ/g,"γ");
  s=s.replace(/ει|οι|υι/g,"ι").replace(/[ηυ]/g,"ι");
  s=s.replace(/αι/g,"ε").replace(/ω/g,"ο");
  return s.replace(/(.)\1+/g,"$1");
}
function lev(a,b){
  const m=a.length,n=b.length,d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=0;j<=n;j++)d[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return d[m][n];
}
/* returns 2 = exact, 1 = correct but mis-spelled, 0 = wrong */
function matchScore(user,target){
  const u=grNorm(user), t=grNorm(target);
  if(!u) return 0;
  if(u===t) return 2;
  if(grPhon(user)===grPhon(target)) return 1;
  if(t.split(" ").includes(u) || u.split(" ").includes(t)) return 1;
  const d=lev(grPhon(user),grPhon(target));
  if(d<=1 || (d<=2 && t.length>=8)) return 1;
  return 0;
}

function qhead(q,big){
  const h=$(`<div class="row" style="align-items:flex-start; margin-bottom:16px"><div class="qtext">${esc(q.q)}</div></div>`);
  const b=$(`<button class="listen">🔊</button>`); b.onclick=()=>speak(q.q); h.appendChild(b); return h;
}

function mcqCard(q,next,isMock){
  const box=$(`<div></div>`);
  box.appendChild(qhead(q));
  let answered=false;
  const optEls=[];
  q.options.forEach((o,i)=>{
    const el=$(`<button class="opt"><span>${esc(o)}</span><span></span></button>`);
    el.onclick=()=>{
      if(answered) return; answered=true;
      record(q.id, i===q.answer);
      optEls.forEach((e,j)=>{
        if(j===q.answer){e.className="opt ok"; e.lastChild.textContent="✓";}
        else if(j===i){e.className="opt no"; e.lastChild.textContent="✗";}
        else e.className="opt dim";
      });
      box.appendChild(nextBtn(next));
    };
    optEls.push(el); box.appendChild(el);
  });
  return box;
}

function tfCard(q,next){
  const box=$(`<div></div>`);
  box.appendChild($(`<p class="sub" style="font-size:17px; font-weight:600; margin:4px 0 14px">Σωστό (Σ) ή Λάθος (Λ);</p>`));
  const picks={}; let done=false;
  q.statements.forEach((s,i)=>{
    const row=$(`<div class="tfrow"></div>`);
    const top=$(`<div class="row" style="align-items:flex-start"><div style="flex:1; font-size:17px; line-height:1.35">${esc(s.t)}</div></div>`);
    const lb=$(`<button class="listen">🔊</button>`); lb.onclick=()=>speak(s.t); top.appendChild(lb); row.appendChild(top);
    const btns=$(`<div class="tfbtns"></div>`);
    [["Σωστό",true],["Λάθος",false]].forEach(([lbl,val])=>{
      const b=$(`<button class="tfbtn">${lbl}</button>`);
      b.onclick=()=>{
        if(done) return; picks[i]=val;
        Array.from(btns.children).forEach(c=>c.classList.remove("sel"));
        b.classList.add("sel");
        if(Object.keys(picks).length===q.statements.length){
          done=true; record(q.id, q.statements.every((st,k)=>st.a===picks[k]));
          q.statements.forEach((st,k)=>{
            const rb=box.querySelectorAll(".tfrow")[k].querySelectorAll(".tfbtn");
            rb[0].className="tfbtn"+(st.a?" ok":(picks[k]===true?" no":""));
            rb[1].className="tfbtn"+(!st.a?" ok":(picks[k]===false?" no":""));
          });
          box.appendChild(nextBtn(next));
        }
      };
      btns.appendChild(b);
    });
    row.appendChild(btns); box.appendChild(row);
  });
  return box;
}

function openCard(q,next){
  const box=$(`<div class="card" style="min-height:230px"></div>`);
  box.appendChild(qhead(q,true));
  const reveal=$(`<button class="btn btn-primary">Δείξε την απάντηση</button>`);
  reveal.onclick=()=>{
    reveal.remove();
    const r=$(`<div class="reveal"><div class="lbl">ΕΠΙΣΗΜΗ ΑΠΑΝΤΗΣΗ</div><div class="ans">${esc(q.answerText)}</div></div>`);
    const lb=$(`<button class="listen" style="margin-top:8px">🔊</button>`); lb.onclick=()=>speak(q.answerText); r.appendChild(lb);
    box.appendChild(r);
    const g=$(`<div class="tfbtns"></div>`);
    const no=$(`<button class="tfbtn no">Δεν το ήξερα</button>`);
    const yes=$(`<button class="tfbtn ok">Το ήξερα</button>`);
    no.onclick=()=>{record(q.id,false); next();};
    yes.onclick=()=>{record(q.id,true); next();};
    g.appendChild(no); g.appendChild(yes); box.appendChild(g);
  };
  const sp=$(`<div style="margin-top:14px"></div>`); sp.appendChild(reveal); box.appendChild(sp);
  return box;
}

/* ---- Fill in the blanks: tap a word, then tap a slot ---- */
function fillCard(q,next){
  const box=$(`<div class="card"></div>`);
  box.appendChild(qhead(q,true));
  const solByNum={}; q.blanks.forEach(([n,t])=>solByNum[n]=t);
  let selected=null, selChip=null, checked=false;

  const sent=$(`<div class="fill-sentence"></div>`);
  const slots={};
  q.sentence.split(/(⟦\d+⟧)/).forEach(part=>{
    const m=part.match(/⟦(\d+)⟧/);
    if(m){
      const n=+m[1];
      const slot=$(`<button class="slot" data-n="${n}">␣</button>`);
      slot.onclick=()=>{
        if(checked) return;
        if(slot.dataset.word){ slot.dataset.word=""; slot.textContent="␣"; slot.classList.remove("filled"); return; }
        if(selected!=null){ slot.dataset.word=selected; slot.textContent=selected; slot.classList.add("filled"); }
      };
      slots[n]=slot; sent.appendChild(slot);
    } else if(part){ sent.appendChild(document.createTextNode(part)); }
  });
  box.appendChild(sent);

  const bankWrap=$(`<div class="chips"></div>`);
  q.bank.forEach(w=>{
    const chip=$(`<button class="chip">${esc(w)}</button>`);
    chip.onclick=()=>{
      if(checked) return;
      if(selChip) selChip.classList.remove("sel");
      selected=w; selChip=chip; chip.classList.add("sel");
    };
    bankWrap.appendChild(chip);
  });
  box.appendChild(bankWrap);

  const check=$(`<button class="btn btn-primary" style="margin-top:16px">Έλεγχος</button>`);
  check.onclick=()=>{
    if(checked) return;
    const nums=Object.keys(slots);
    if(nums.some(n=>!slots[n].dataset.word)){ flash(check,"Συμπλήρωσε όλα τα κενά"); return; }
    checked=true; let allOk=true;
    nums.forEach(n=>{
      const ok=matchScore(slots[n].dataset.word, solByNum[n])>0;
      slots[n].classList.add(ok?"ok":"no");
      if(!ok){ allOk=false; slots[n].textContent=solByNum[n]; }
    });
    record(q.id, allOk);
    check.remove();
    box.appendChild(nextBtn(next));
  };
  box.appendChild(check);
  return box;
}

/* ---- "Name N": type answers; each becomes a cloud that turns green/red ---- */
function listCard(q,next){
  const box=$(`<div class="card"></div>`);
  box.appendChild(qhead(q,true));
  box.appendChild($(`<p class="sub" style="margin:2px 0 12px">Γράψε <b>${q.n}</b> ${q.n===1?"απάντηση":"απαντήσεις"} (μία κάθε φορά):</p>`));
  const cloudWrap=$(`<div class="clouds"></div>`); box.appendChild(cloudWrap);
  const used=[]; let got=0, tries=0;

  const row=$(`<div class="row" style="gap:8px"></div>`);
  const inp=$(`<input class="text-in" type="text" autocomplete="off" placeholder="Η απάντησή σου…">`);
  const sub=$(`<button class="btn btn-primary" style="margin:0">Υποβολή</button>`);
  row.appendChild(inp); row.appendChild(sub); box.appendChild(row);

  function finish(){
    inp.disabled=true; sub.disabled=true;
    const miss=q.pool.filter(p=>!used.includes(p));
    const res=$(`<div class="reveal"><div class="lbl">ΑΠΟΤΕΛΕΣΜΑ</div><div class="ans">Βρήκες ${got}/${q.n} σωστές.</div>
      <div style="margin-top:8px;font-size:14px;color:var(--mut)">Όλες οι αποδεκτές απαντήσεις:</div>
      <div style="margin-top:4px">${q.pool.map(p=>esc(p)).join(" · ")}</div></div>`);
    box.appendChild(res);
    record(q.id, got>=q.n);
    box.appendChild(nextBtn(next));
  }
  function submit(){
    if(tries>=q.n) return;
    const val=inp.value.trim(); if(!val){ return; }
    tries++;
    let best={s:0,p:null};
    q.pool.forEach(p=>{ if(used.includes(p)) return; const s=matchScore(val,p); if(s>best.s) best={s,p}; });
    const cloud=$(`<span class="cloud"></span>`);
    if(best.s>0){
      used.push(best.p); got++;
      cloud.classList.add("ok");
      cloud.innerHTML = best.s===2 ? esc(val) : esc(val)+` <small>→ ${esc(best.p)}</small>`;
    } else {
      cloud.classList.add("no"); cloud.textContent=val;
    }
    cloudWrap.appendChild(cloud);
    inp.value=""; inp.focus();
    if(tries>=q.n) finish();
  }
  sub.onclick=submit;
  inp.addEventListener("keydown",e=>{ if(e.key==="Enter") submit(); });
  return box;
}

function flash(btn,msg){ const o=btn.textContent; btn.textContent=msg; setTimeout(()=>btn.textContent=o,1200); }

function nextBtn(next){
  const b=$(`<button class="btn btn-primary" style="margin-top:18px">Επόμενη</button>`);
  b.onclick=next; return b;
}

/* ---- Mock exam (multiple-choice, 4 options, 4/4/6/6) ---- */
function buildMock(){
  const pick=(c,n)=> shuffle(QS.filter(q=>q.cat===c && q.type==="mcq" && q.options && q.options.length===4)).slice(0,n);
  const qs=shuffle([...pick("geography",4),...pick("culture",4),...pick("history",6),...pick("institutions",6)]);
  return {qs, i:0, ans:{}, done:false};
}
function mockView(){
  if(!mock){ mock=buildMock(); }
  app.innerHTML="";
  const w=$(`<div class="pad"></div>`);
  if(!mock.started){
    w.appendChild($(`<h1 style="margin:28px 0 8px">Δοκιμαστική Εξέταση</h1>`));
    w.appendChild($(`<p class="sub" style="margin-bottom:20px">20 ερωτήσεις πολλαπλής επιλογής όπως στην πραγματική εξέταση: 4 Γεωγραφία, 4 Πολιτισμός, 6 Ιστορία, 6 Θεσμοί. Χρειάζεσαι 50% για να περάσεις αυτό το μέρος.</p>`));
    const b=$(`<button class="btn btn-primary">Ξεκίνα</button>`); b.onclick=()=>{mock.started=true; mockView();}; w.appendChild(b);
    if(P.mocks.length){
      w.appendChild($(`<h2 class="sec">Προηγούμενες προσπάθειες</h2>`));
      P.mocks.slice(-5).reverse().forEach(m=>{
        const ok=m.score/m.total>=.5;
        w.appendChild($(`<div class="card row" style="margin-bottom:8px"><span class="sub">${m.date}</span><span style="margin-left:auto; font-weight:700; color:${ok?'var(--ok)':'var(--no)'}">${m.score}/${m.total} ${ok?'✓':''}</span></div>`));
      });
    }
    app.appendChild(w); renderNav(); return;
  }
  if(mock.done){
    const sc=Object.entries(mock.ans).filter(([id,a])=>{const q=mock.qs.find(x=>x.id===id); return q&&a===q.answer;}).length;
    const pass=sc/mock.qs.length>=.5;
    w.appendChild($(`<div class="center" style="margin-top:40px">
      <div style="width:96px;height:96px;border-radius:50%;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;font-size:46px;background:${pass?'#d1fae5':'#ffe4e6'}">${pass?'✓':'↻'}</div>
      <h1 style="margin:0">${sc}/${mock.qs.length}</h1>
      <p style="font-weight:700;color:${pass?'var(--ok)':'var(--no)'}">${pass?'Πέρασες αυτό το μέρος! 🎉':'Λίγο ακόμα — συνέχισε τη μελέτη.'}</p>
      <p class="small" style="margin-bottom:30px">Όριο επιτυχίας στις θεματικές ενότητες: 50%</p></div>`));
    const b1=$(`<button class="btn btn-primary" style="margin-bottom:10px">Νέα δοκιμή</button>`); b1.onclick=()=>{mock=buildMock(); mock.started=true; mockView();};
    const b2=$(`<button class="btn btn-soft">Τέλος</button>`); b2.onclick=()=>{mock=null; view="home"; render();};
    w.appendChild(b1); w.appendChild(b2); app.appendChild(w); renderNav(); return;
  }
  const q=mock.qs[mock.i]; const chosen=mock.ans[q.id]; const answered=chosen!==undefined;
  w.appendChild($(`<div class="row" style="margin-top:28px"><span class="small">Ερώτηση ${mock.i+1} από ${mock.qs.length}</span>
    <span class="badge" style="margin-left:auto; background:${CATS[q.cat].color}1a; color:${CATS[q.cat].color}">${CATS[q.cat].short}</span></div>`));
  w.appendChild($(`<div class="bar" style="margin:10px 0 20px"><i style="width:${(mock.i+1)/mock.qs.length*100}%;background:var(--sky)"></i></div>`));
  w.appendChild(qhead(q));
  q.options.forEach((o,i)=>{
    let cls="opt";
    if(answered){ if(i===q.answer)cls="opt ok"; else if(i===chosen)cls="opt no"; else cls="opt dim"; }
    const el=$(`<button class="${cls}"><span>${esc(o)}</span><span>${answered&&i===q.answer?'✓':(answered&&i===chosen?'✗':'')}</span></button>`);
    if(!answered) el.onclick=()=>{ record(q.id,i===q.answer); mock.ans[q.id]=i; mockView(); };
    w.appendChild(el);
  });
  if(answered){
    const last=mock.i+1>=mock.qs.length;
    const b=$(`<button class="btn btn-primary" style="margin-top:8px">${last?'Δες το αποτέλεσμα':'Επόμενη'}</button>`);
    b.onclick=()=>{ if(last){ const sc=Object.entries(mock.ans).filter(([id,a])=>{const qq=mock.qs.find(x=>x.id===id);return qq&&a===qq.answer;}).length; P.mocks.push({date:today(),score:sc,total:mock.qs.length}); save(); mock.done=true;} else mock.i++; mockView(); };
    w.appendChild(b);
  }
  app.appendChild(w); renderNav();
}

function progressView(){
  const w=$(`<div class="pad"></div>`);
  w.appendChild($(`<h1 style="margin:28px 0 18px">Η Πρόοδός σου</h1>`));
  const seen=Object.values(P.stats).reduce((a,s)=>a+s.seen,0);
  w.appendChild($(`<div class="card row" style="gap:18px"><div>${ring(readiness(),"#0d5eaf","#e2e8f0")}</div>
    <div><div class="title">Συνολική ετοιμότητα</div><div class="sub" style="margin-top:3px">${seen} απαντήσεις συνολικά</div>
    <div style="color:#d97706; font-weight:700; font-size:14px; margin-top:6px">🔥 ${P.streak} μέρες σερί</div></div></div>`));
  w.appendChild($(`<h2 class="sec">Ανά ενότητα</h2>`));
  Object.entries(CATS).forEach(([k,c])=>{
    const p=catProg(k), pct=p.total?Math.round(p.known/p.total*100):0;
    w.appendChild($(`<div class="card" style="margin-bottom:11px"><div class="row" style="margin-bottom:6px"><span>${c.emoji}</span><b>${c.label}</b><span class="count">${p.known}/${p.total}</span></div>
      <div class="bar"><i style="width:${pct}%;background:${c.color}"></i></div></div>`));
  });
  const m=mistakes().length;
  w.appendChild($(`<div class="card row" style="margin-top:6px"><b>Ερωτήσεις για επανάληψη</b><span style="margin-left:auto; font-weight:700; color:${m?'var(--no)':'var(--ok)'}">${m}</span></div>`));
  w.appendChild($(`<p class="small center" style="margin-top:24px">Συνολικά ${QS.length} ερωτήσεις από την επίσημη Τράπεζα Θεμάτων (Απρίλιος 2026)</p>`));
  app.appendChild(w);
}

function renderNav(){
  const nav=document.getElementById("nav");
  const items=[["home","Αρχική","🏠"],["study","Μελέτη","📖"],["mock","Εξέταση","📝"],["progress","Πρόοδος","📊"]];
  nav.innerHTML="";
  items.forEach(([k,l,e])=>{
    const b=$(`<button class="${view===k?'on':''}"><span class="ni">${e}</span><span>${l}</span></button>`);
    b.onclick=()=>{ view=k; if(k==="study")cat=null; if(k==="mock")mock=null; render(); };
    nav.appendChild(b);
  });
}
