όλυτη προσοχή μας. _____ . ιδίως κατά _____ .. μίας εργασίας που χρειάζεται την απόλυτη προσοχή μας.", "a": "την εκτέλεση"}, {"type": "typed", "q": "_____ μειώνει τον κίνδυνο εμφάνισης καρδιακών παθήσεων μειώνει τον κίνδυνο να _____ καρδιακές παθήσεις", "a": "να εμφανιστούν"}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Επισημαίνουμε ότι δεν πρέπει να υπογράψετε με το ονοματεπώνυμό σας στο τέλος του κειμένου. Γράψτε μία ηλεκτρονική επιστολή προς έναν φίλο / μία φίλη, που περνάει μία δύσκολη φάση στη ζωή του / της, και προτείνετέ του / της να υιοθετήσει ένα κατοικίδιο ζωάκι, για να αισθανθεί καλύτερα."}, {"type": "reading", "cat": "reading", "id": "read_066", "title": "!", "passage": "Οι καλλιτέχνες του δρόμου προσπαθούν να διώξουν την πανδημία!\nΚαλλιτέχνες του δρόμου στην Ελλάδα, αλλά και σε όλο τον κόσμο αποτυπώνουν με\nτα έργα τους τις δραματικές στιγμές που ζει ο πλανήτης λόγω του κορωνοϊού. Η ομάδα\nUrban Act δημιούργησε τον Ιούλιο μία μεγάλη τοιχογραφία στο νοσοκομείο ΑΧΕΠΑ της\nΘεσσαλονίκης, για να πει «ευχαριστώ» στους εργαζόμενους του νοσοκομείου. Πρόκειται\nγια μία δράση που εντάσσεται στο πρόγραμμα δημόσιων τοιχογραφιών, αυτή τη φορά σε\nνοσοκομεία σε όλη την Ελλάδα με τον τίτλο «Χρώμα Στα Νοσοκομεία».\nΗ ομάδα σε ανακοίνωσή της έγραψε: «Με αφορμή την πρόκληση που ζούμε όλοι μας\nμε τον covid-19 φέτος, αποφασίσαμε να υλοποιήσουμε ένα νέο πρόγραμμα, παρόμοιο με το\nπρόγραμμα ¨Ζωγραφίζοντας Σχολικά Κτίρια¨, που έχουμε αναλάβει στα δημόσια σχολεία\nαπό το 2005. Το νέο αυτό πρόγραμμα ονομάζεται ¨Χρώμα Στα Νοσοκομεία¨ και υλοποιείται\nμε τη συμμετοχή επώνυμων καλλιτεχνών από τον χώρο σε συνεργασία με τις διοικήσεις\nτων Νοσοκομείων και τη στήριξη χορηγών, εταιρειών, ιδιωτών και άλλων. Το συγκεκριμένο\nπρόγραμμα ξεκίνησε φέτος με δύο μεγάλες εξωτερικές τοιχογραφίες σε δύο νοσοκομεία\nαντίστοιχα: στο ΑΧΕΠΑ Θεσσαλονίκης τον Ιούλιο και στην Αττική τον Σεπτέμβριο (θα\nανακοινωθεί σύντομα το Νοσοκομείο που θα επιλεγεί). Οι συγκεκριμένες τοιχογραφίες\nέχουν ως θέμα το ¨Σας ευχαριστούμε¨ στο νοσηλευτικό και ιατρικό προσωπικό. Οι\nκαλλιτέχνες του δρόμου έρχονται να δώσουν με τον μοναδικό τους τρόπο χρώμα, ομορφιά\nκαι\nελπίδα\nσε\nέναν\nακόμη\nδημόσιο\nχώρο,\nαυτό\nτων\nνοσοκομείων.»\nΣε πολλές πόλεις του κόσμου, πάντως, καλλιτέχνες έδωσαν τον καλύτερο εαυτό τους και\nέκαναν την πανδημία κομμάτι της τέχνης τους.\nΔιασκευή άρθρου σε ηλεκτρονική εφημερίδα για τις ανάγκες των εξετάσεων,\nhttps://www.in.gr/2021/01/05/life/culture-live/oi-kallitexnes-tou-dromou-ksorkizoun-tin-pandimia/", "sub": [{"type": "tf", "t": "Το κείμενο μιλά για ένα νέο πρόγραμμα τοιχογραφιών σε δημόσια νοσοκομεία.", "a": true}, {"type": "tf", "t": "Το φαινόμενο των τοιχογραφιών με θέμα την πανδημία είναι ελληνικό.", "a": false}, {"type": "tf", "t": "Το νοσοκομείο που έχει επιλεγεί στην Αθήνα είναι ο Ερυθρός Σταυρός.", "a": false}, {"type": "tf", "t": "Το νέο πρόγραμμα ονομάζεται «Χρώμα στην Υγεία».", "a": false}, {"type": "tf", "t": "Οι τοιχογραφίες στα νοσοκομεία θέλουν να εκφράσουν τις ευχαριστίες προς το προσωπικό.", "a": true}, {"type": "tf", "t": "Το νέο πρόγραμμα αφορά την Αθήνα και τη Θεσσαλονίκη.", "a": false}, {"type": "tf", "t": "Για να υλοποιηθεί το πρόγραμμα αυτό χρειάζεται η συνεργασία πολλών φορέων.", "a": true}, {"type": "mcq", "q": "Ένα πιο παλιό πρόγραμμα που είχε αναλάβει η ομάδα αφορούσε", "options": ["σχολεία", "νοσοκομεία", "εταιρείες"], "answer": 0}, {"type": "mcq", "q": "Η τοιχογραφία στο νοσοκομείο της Θεσσαλονίκης έγινε τον μήνα", "options": ["Ιούνιο", "Ιούλιο", "Σεπτέμβριο"], "answer": 1}, {"type": "typed", "q": "Να μεταφέρετε το ρήμα στον κατάλληλο τύπο, για να δηλώνει το παρόν. Η ομάδα δημιούργησε μια μεγάλη τοιχογραφία. Αυτές τις μέρες η ομάδα _____ μια μεγάλη τοιχογραφία.", "a": "δημιουργεί"}, {"type": "typed", "q": "Να μεταφέρετε το ρήμα στον κατάλληλο τύπο, για να δηλώνει το παρελθόν. Οι τοιχογραφίες έχουν κοινό θέμα. Παλιότερα οι τοιχογραφίες _____ . κοινό θέμα.", "a": "είχαν"}, {"type": "typed", "q": "Να μεταφέρετε το ρήμα στον κατάλληλο τύπο, για να δηλώνει το μέλλον. Οι καλλιτέχνες του δρόμου δίνουν χρώμα στα κτήρια. Για πολλά χρόνια ακόμη οι καλλιτέχνες του δρόμου _____ .. χρώμα στα κτήρια.", "a": "θα δίνουν"}, {"type": "typed", "q": "Να μεταφέρετε την πρόταση στον πληθυντικό αριθμό. Το πρόγραμμα ξεκίνησε φέτος. Τα _____ .. φέτος.", "a": "προγράμματα ξεκίνησαν"}, {"type": "typed", "q": "Να μεταφέρετε την πρόταση στον ενικό αριθμό. Οι καλλιτέχνες δίνουν ζωή στους τοίχους. _____ ζωή στον τοίχο.", "a": "Ο καλλιτέχνης δίνει"}, {"type": "typed", "q": "Να κάνετε τις απαραίτητες αλλαγές, ώστε οι δύο προτάσεις να σημαίνουν το ίδιο. Το πρόγραμμα υλοποιείται από εμάς. Εμείς _____", "a": "υλοποιούμε το πρόγραμμα"}, {"type": "mcq", "q": "«επώνυμος»: λέξη με παρόμοια σημασία είναι", "options": ["άγνωστος", "γνωστός", "ντόπιος"], "answer": 1}, {"type": "mcq", "q": "«δραματικές»: λέξη με αντίθετη σημασία είναι", "options": ["εξαιρετικές", "απαίσιες", "δύσκολες"], "answer": 0}, {"type": "typed", "q": "Συμπληρώστε τα κενά με λέξεις αντίθετης σημασίας. Μεγάλες, εξωτερικές τοιχογραφίες _____ .., _____ .. τοιχογραφίες", "a": "μικρές, εσωτερικές"}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Επισημαίνουμε ότι δεν πρέπει να υπογράψετε με το ονοματεπώνυμό σας στο τέλος του κειμένου. Γράψτε σε έναν φίλο/ μία φίλη σας ένα μήνυμα ηλεκτρονικού ταχυδρομείου (email) με το οποίο του/της παρουσιάζετε την αγαπημένη σας δραστηριότητα κατά τον ελεύθερο χρόνο σας."}, {"type": "reading", "cat": "reading", "id": "read_067", "title": "!", "passage": "«Λίγο ακόμα θα ιδούμε τις αμυγδαλιές ν’ ανθίζουν»\nΓνωστή από την αρχαιότητα, η αμυγδαλιά προέρχεται μάλλον από το Ιράν ή κοντινές\nπεριοχές. Ήταν γνωστή στους Παλαιστινίους και αναφέρεται συχνά στη Βίβλο. Θεωρείται\nαπό τα πρώτα δέντρα που καλλιεργήθηκαν, γιατί αναπαράγεται εύκολα με σπορά. Οι\nκαρποί της ήταν κυρίως πικροί, αλλά με το πέρασμα των χρόνων αυτό άλλαξε. Σήμερα,\nκυριαρχούν οι ποικιλίες γλυκών αμυγδάλων στη θέση των πικραμυγδάλων. Το λάδι του\nπικραμύγδαλου, όμως, χρησιμοποιείται πάρα πολύ στα καλλυντικά, στα φάρμακα και στη\nζαχαροπλαστική.\nΣτην Ευρώπη η αμυγδαλιά εξαπλώθηκε από τους αρχαίους Έλληνες και τους\nΡωμαίους, οι οποίοι έλεγαν τον καρπό «ελληνικό καρύδι». Αυτοί έφτιαξαν πρώτοι τα\nζαχαρωμένα αμύγδαλα, σαν τα δικά μας κουφέτα. Τον Μεσαίωνα άρχισαν να\nχρησιμοποιούν το γάλα αμυγδάλου, γιατί αντικαθιστούσε το ζωικό γάλα κατά τη διάρκεια\nτης νηστείας. Εκτός από το γάλα αμυγδάλου, στις ευρωπαϊκές κουζίνες του Μεσαίωνα\nμπήκε δυναμικά και ο αλεσμένος σε σκόνη καρπός (το αλεύρι αμυγδάλου, δηλαδή). Η χρήση\nτου εξαπλώθηκε με τους Άραβες στην Ισπανία, όπου ακόμα και σήμερα φτιάχνουν πολλές\nζύμες με αλεύρι αμυγδάλου.\nΤο αμύγδαλο έχει χρησιμοποιηθεί σε όλο τον κόσμο ανά τους αιώνες σε άπειρα\nγλυκά. Εμείς οι Έλληνες έχουμε τα αμυγδαλωτά, τα κουφέτα, τα μαντολάτα, την πραλίνα\nαμυγδάλου, τα λικέρ, ενώ γλυκά από αμυγδαλόπαστα υπάρχουν σχεδόν σε όλες τις\nπαραδοσιακές κουζίνες της Ευρώπης. Τι γίνεται όμως με τη μαγειρική, την ξεχάσαμε; Όχι\nβέβαια. Μπορεί η δική μας παράδοσή να μην έχει πολλές μαγειρικές με αμύγδαλο –μία από\nτις ωραίες εξαιρέσεις είναι η σκορδαλιά–, όμως οι επαγγελματίες της κουζίνας έχουν να μας\nπροτείνουν εξαιρετικά φαγητά με αμύγδαλο, εμπνευσμένα από τη διεθνή κουζίνα. Ας μην\nπούμε τίποτα, λοιπόν. Θα μιλήσουν οι συνταγές.\nΔιασκευή διαδικτυακού άρθρου της Χ. Τζιάλλα για τις ανάγκες των εξετάσεων, 4/1/2021,\nhttps://www.gastronomos.gr/gr", "sub": [{"type": "mcq", "q": "Η αμυγδαλιά καλλιεργήθηκε ήδη από την αρχαιότητα.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Οι Έλληνες φτιάχνουν περισσότερα φαγητά με αμύγδαλο απ ΄ ότι γλυκά.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Το γάλα αμυγδάλου είναι πολύ διαδεδομένο στις μέρες μας.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Οι Ρωμαίοι ονόμαζαν το αμύγδαλο «ελληνικό καρύδι».", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Σήμερα, παράγονται περισσότερα πικραμύγδαλα από γλυκά αμύγδαλα.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Το λάδι του πικραμύγδαλου χρησιμοποιείται", "options": ["στη μαγειρική", "στην ιατρική", "στα φάρμακα"], "answer": 2}, {"type": "mcq", "q": "Τα πρώτα «κουφέτα», δηλαδή ζαχαρωμένα αμύγδαλα, έφτιαξαν", "options": ["οι Παλαιστίνιοι", "οι αρχαίοι Έλληνες και Ρωμαίοι", "οι Άραβες"], "answer": 1}, {"type": "mcq", "q": "Παραδοσιακά γλυκά από αμυγδαλόπαστα υπάρχουν σχεδόν", "options": ["σε όλο τον κόσμο", "σε όλη την Ελλάδα", "σε όλη την Ευρώπη"], "answer": 2}, {"type": "mcq", "q": "Τον Μεσαίωνα, κατά την περίοδο της νηστείας", "options": ["έτρωγαν αμύγδαλα", "έπιναν γάλα αμυγδάλου", "έτρωγαν γλυκά με αμύγδαλο"], "answer": 1}, {"type": "mcq", "q": "«άπειρα»: λέξη/φράση με παρόμοια σημασία είναι", "options": ["πάρα πολλά", "πολύ λίγα", "ελάχιστα"], "answer": 0}, {"type": "mcq", "q": "Η λέξη «γιατί» μπορεί να αντικατασταθεί από τη λέξη/φράση", "options": ["αν", "για να", "επειδή"], "answer": 2}, {"type": "mcq", "q": "«διεθνής»: λέξη με αντίθετη σημασία είναι", "options": ["παγκόσμια", "παραδοσιακή", "τοπική"], "answer": 2}, {"type": "mcq", "q": "«εύκολα»: λέξη με αντίθετη σημασία είναι", "options": ["δυστυχώς", "δύσκολα", "ευτυχώς"], "answer": 1}, {"type": "mcq", "q": "Η λέξη «συχνά» απαντά στην ερώτηση", "options": ["πώς;", "πού;", "κάθε πότε;"], "answer": 2}, {"type": "typed", "q": "Να μεταφέρετε το ρήμα στον κατάλληλο τύπο, για να δηλώνει το παρόν. Αυτοί έφτιαξαν γλυκά με αμύγδαλο. Σήμερα αυτοί _____ .γλυκά με αμύγδαλο.", "a": "φτιάχνουν"}, {"type": "typed", "q": "Να μεταφέρετε το ρήμα στον κατάλληλο τύπο, για να δηλώνει το παρελθόν. Γλυκά με αμύγδαλο υπάρχουν πάντα και παντού. Και στο παρελθόν γλυκά με αμύγδαλο _____ . πάντα και παντού.", "a": "υπήρχαν"}, {"type": "typed", "q": "Να μεταφέρετε το ρήμα στον κατάλληλο τύπο, για να δηλώνει το μέλλον. Οι καρποί ήταν πικροί. Και στο μέλλον οι καρποί _____ .. πικροί.", "a": "θα είναι"}, {"type": "typed", "q": "Να μεταφέρετε την πρόταση στον πληθυντικό αριθμό. Το αμύγδαλο έχει χρησιμοποιηθεί πολύ. Τα _____ χρησιμοποιηθεί πολύ.", "a": "αμύγδαλα έχουν"}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Επισημαίνουμε ότι δεν πρέπει να υπογράψετε με το ονοματεπώνυμό σας στο τέλος του κειμένου. Γράψτε σε έναν φίλο σας ένα μήνυμα ηλεκτρονικού ταχυδρομείου (email), για να περιγράψετε το αγαπημένο σας γλύκισμα."}, {"type": "reading", "cat": "reading", "id": "read_068", "title": "!", "passage": "Ένας νέος, αρχαίος, ψηφιακός κόσμος\nΕγκαινιάστηκε πρόσφατα το Ψηφιακό Μουσείο της Ακρόπολης, το οποίο, για πρώτη\nφορά σε ελληνικό μουσειακό ιστότοπο, προβάλλει το σύνολο των εκθεμάτων του. Ο\nεπισκέπτης θα ξαφνιαστεί από τις νέες δυνατότητες που προσφέρονται και είναι σίγουρο\nότι θα θέλει όχι μόνο να ξαναπεράσει τη διαδικτυακή του πύλη, αλλά και να ξαναβρεθεί\nστο μουσείο.\n«Οι έρευνες των μουσείων έχουν δείξει ότι ύστερα από μια ενδιαφέρουσα ψηφιακή\nπεριήγηση δυναμώνει η επιθυμία του θεατή να επισκεφθεί το μουσείο ζωντανά και να δει\nτα αντικείμενα των φωτογραφιών από κοντά», μας λέει η κα Ελευθεράτου, Διευθύντρια\nΣυλλογών και Εκθέσεων του Μουσείου Ακρόπολης. «Ο νέος ιστότοπος παρουσιάζει το\nμουσείο και τους εκθεσιακούς του χώρους, δίνει πληροφορίες για την επίσκεψη, τις\nεκθέσεις, τις δράσεις, τις εκδηλώσεις, τις σχολικές και οικογενειακές δραστηριότητες, την\nέρευνα, τη συντήρηση και τις νέες τεχνολογίες. Για πρώτη φορά, ιστότοπος ελληνικού\nμουσείου προβάλλει το σύνολο των εκθεμάτων και όχι ένα μέρος. Στην ουσία, λειτουργεί\nσυμπληρωματικά με τη φυσική επίσκεψη, ενώ παράλληλα δίνει τη δυνατότητα στο κοινό\nπου μένει μακριά να αποκτήσει μια σφαιρική εικόνα για το μουσείο».\nΤα 2.156 έργα που περιλαμβάνει σήμερα ο ιστότοπος συνοδεύονται από\nπεριγραφές, φωτογραφίες, σχέδια και σε πολλές περιπτώσεις βίντεο… Η πρώτη συμβουλή\nτης κυρίας Ελευθεράτου είναι να αφιερώσουμε λίγο χρόνο, προσοχή και όρεξη. Η δεύτερη\nσυμβουλή είναι να δοκιμάσουμε τα νέα ψηφιακά μέσα, να πειραματιστούμε με τις\nδυνατότητες της τεχνολογίας, να μπούμε στο «παιχνίδι» της αλληλεπίδρασης με τα\nψηφιακά εκθέματα, ώστε τελικά να μας παρασύρει η ομορφιά τους…\nΔιασκευή ηλεκτρονικού άρθρου της Μ. Βασιλειάδου για τις ανάγκες των εξετάσεων,\nhttps://www.kathimerini.gr/culture/561217558/enas-neos-archaios-psifiakos-kosmos/, 7-1-2021", "sub": [{"type": "mcq", "q": "Το Ψηφιακό Μουσείο της Ακρόπολης βρίσκεται στην Αθήνα.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Για κάθε έργο υπάρχει και ένα βίντεο που το εξηγεί.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Η τεχνολογία μας δίνει τη δυνατότητα να αλληλεπιδράσουμε στον υπολογιστή με τα εκθέματα.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Πολλά μουσεία θα ακολουθήσουν το παράδειγμα του Μουσείου Ακρόπολης.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Δε χρειάζεται να αφιερώσουμε πάρα πολύ χρόνο στην ψηφιακή περιήγηση.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Η κυρία Ελευθεράτου δίνει", "options": ["μία συμβουλή", "δύο συμβουλές", "τρεις συμβουλές"], "answer": 1}, {"type": "mcq", "q": "Μετά από μια ενδιαφέρουσα ψηφιακή επίσκεψη σε μουσείο, οι άνθρωποι", "options": ["δεν θέλουν να το επισκεφθούν ζωντανά.", "θέλουν να το επισκεφθούν ζωντανά", "κανένα από τα δύο"], "answer": 1}, {"type": "mcq", "q": "Με το ψηφιακό μουσείο οι επισκέπτες μπορούν να αποκτήσουν", "options": ["μια σφαιρική εικόνα του μουσείου", "μια μερική εικόνα του μουσείου", "φωτογραφίες από τον χώρο του μουσείου"], "answer": 0}, {"type": "mcq", "q": "Για πρώτη φορά, ένα ψηφιακό ελληνικό μουσείο προβάλλει", "options": ["το μεγαλύτερο μέρος των εκθεμάτων του", "ένα μικρό μέρος των εκθεμάτων του", "το σύνολο των εκθεμάτων του."], "answer": 2}, {"type": "mcq", "q": "«ενδιαφέρουσα»: λέξη με αντίθετη σημασία είναι", "options": ["έξυπνη", "βαρετή", "συναρπαστική"], "answer": 1}, {"type": "mcq", "q": "Η φράση «εκθέματα του Μουσείου» σημαίνει", "options": ["έργα και αντικείμενα του Μουσείου", "δραστηριότητες του Μουσείου", "εισιτήρια εισόδου του Μουσείου"], "answer": 0}, {"type": "mcq", "q": "«Ο άνθρωπος έχει αλληλεπίδραση με τα ψηφιακά εκθέματα» σημαίνει ότι", "options": ["μπορεί να ψωνίζει από το μουσείο μέσω υπολογιστή", "μπορεί να διαβάζει βιβλία για το μουσείο μέσω υπολογιστή", "μπορεί να κάνει δραστηριότητες με τα εκθέματα μέσω υπολογιστή"], "answer": 2}, {"type": "mcq", "q": "«ψηφιακά μέσα»: φράση με παρόμοια σημασία είναι", "options": ["νέα συγκοινωνιακά μέσα", "νέα τεχνολογικά μέσα", "νέα εκπαιδευτικά μέσα"], "answer": 1}, {"type": "mcq", "q": "«λίγο»: λέξη/φράση με αντίθετη σημασία είναι", "options": ["ελάχιστα", "πολύ λίγο", "πολύ"], "answer": 2}, {"type": "typed", "q": "Να μεταφέρετε το ρήμα στον κατάλληλο τύπο, για να δηλώνει το παρόν. Αργότερα, θα θέλει να ξαναβρεθεί στο μουσείο. Τώρα, _____ .. να ξαναβρεθεί στο μουσείο.", "a": "θέλει"}, {"type": "typed", "q": "Να μεταφέρετε το ρήμα στον κατάλληλο τύπο, για να δηλώνει το μέλλον. Σήμερα, ο ιστότοπος παρουσιάζει το μουσείο. Για πολλά χρόνια ακόμη, ο ιστότοπος _____ . το μουσείο.", "a": "θα παρουσιάζει"}, {"type": "typed", "q": "Να μεταφέρετε το ρήμα στον κατάλληλο τύπο, για να δηλώνει το παρελθόν. Τώρα δοκιμάζουμε τα ψηφιακά μέσα. Χθες, όλη μέρα _____ . τα ψηφιακά μέσα.", "a": "δοκιμάζαμε"}, {"type": "typed", "q": "Να μεταφέρετε στον ενικό αριθμό. Οι έρευνες έχουν δείξει. Η _____ _____ .. δείξει.", "a": "έρευνα έχει"}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Επισημαίνουμε ότι δεν πρέπει να υπογράψετε με το ονοματεπώνυμό σας στο τέλος του κειμένου. Διαβάσατε το παραπάνω κείμενο και γράφετε ένα μήνυμα ηλεκτρονικού ταχυδρομείου (email) σε έναν φίλο/μία φίλη σας, όπου θα εξηγείτε τι είναι το Ψηφιακό Μουσείο της Ακρόπολης."}, {"type": "reading", "cat": "reading", "id": "read_069", "title": "!", "passage": "H Αλόννησος ξεχωρίζει!\nΤη δεύτερη θέση ανάμεσα σε συνολικά επτά κορυφαίους προορισμούς του κόσμου,\nπου διακρίνονται σε επίπεδο οικολογικού τουρισμού, κατακτά η Αλόννησος. Σύμφωνα με το\nαφιέρωμα του ταξιδιωτικού περιοδικού της «Ένωσης Βρετανών ταξιδιωτικών πρακτόρων»,\nτρεις ήταν οι λόγοι που οδήγησαν στην απόφαση να συμπεριλάβουν στην κατάταξη τον\nεξωτικό παράδεισο των Σποράδων. Αρχικά, για τη λειτουργία του μεγαλύτερου φυσικού\nθαλάσσιου πάρκου της Μεσογείου στην περιοχή της Αλοννήσου από το 1992 και εξής.\nΕπιπλέον, για το άνοιγμα του πρώτου υποβρύχιου μουσείου της Ελλάδας στο ναυάγιο της\nΠεριστέρας τον Ιούνιο του 2021. Τέλος, για την απόφαση του δήμου να καταργήσει πρώτος,\nτο 2015, τις πλαστικές σακούλες στο νησί.\n«Η σπουδαία αυτή διάκριση δεν ωφελεί μόνο την Αλόννησο, αλλά και όλη την\nΕλλάδα. Για να μπορέσει, όμως, η διεθνής αναγνώριση να φέρει πραγματική ζήτηση και να\nπροσελκύσουμε περισσότερους τουρίστες με οικολογικά ενδιαφέροντα, χρειάζονται\nσημαντικά κίνητρα για ανάπτυξη. Για τον λόγο αυτό, ο δήμος κατέθεσε πρόσφατα\nσυγκεκριμένες προτάσεις», δήλωσε ο δήμαρχος Αλοννήσου.\nΗ συγκεκριμένη λίστα «φιλοξενεί» ακόμη έξι προορισμούς από Αμερική, Ευρώπη, Αφρική\nκαι Ωκεανία. Την κορυφή καταλαμβάνει η Κόστα Ρίκα με το εθνικό της πάρκο. Στη δεύτερη\nθέση είναι η Αλόννησος, ο μοναδικός ελληνικός προορισμός της κατάταξης. Ακολουθούν η\nΚοπεγχάγη με τις περιβαλλοντικές καινοτομίες της, το Σαν Φρανσίσκο, μία πόλη φιλική για\nτο περιβάλλον, η Μορέα της Γαλλικής Πολυνησίας για τα μέτρα προστασίας της θαλάσσιας\nζωής, η Κένυα για τη στρατηγική διάσωσης των άγριων ζώων και, τέλος, η Σλοβενία για τη\nσύνδεση φύσης, τουρισμού και προστασίας του περιβάλλοντος που έχει επιτύχει.\nΔιασκευή ηλεκτρονικού άρθρου για τις ανάγκες των εξετάσεων\nhttps://www.kathimerini ων ημερών είναι το έθιμο του ανάμματος της φωτιάς, για να\nμπουν οι άνθρωποι «καθαροί» μετά τις Απόκριες στη νηστεία της Σαρακοστής.\nΤην Καθαρή Δευτέρα οι νοικοκυρές καθαρίζουν τα μαγειρικά σκεύη από τα λίπη με\nστάχτη και ξεκινά η νηστεία. Τρώνε λαγάνες (πρόχειρο ψωμί), και νηστίσιμα φαγητά (κρασί,\nελιές, ταραμά, φρέσκα κρεμμυδάκια). Στην Αθήνα παραδοσιακά οι κάτοικοι γιορτάζουν\nβγαίνοντας στη φύση και πετώντας χαρταετούς. Στον Τύρναβο της Θεσσαλίας πηγαίνουν\nσε ένα σταυροδρόμι και μαγειρεύουν σε μία μεγάλη χύτρα το «μπουρανί», δηλαδή μια\nχορτόσουπα χωρίς λάδι με σπανάκι, ρύζι και ξύδι και μετά διασκεδάζουν. Στη Θήβα\nοργανώνουν τον «Βλάχικο Γάμο», ενώ ιδιαίτερα γνωστά είναι και τα «μουτζουρώματα με\nαλεύρι» στο Γαλαξίδι. Τα περισσότερα έθιμα της Αποκριάς μας μεταφέρουν σε αρχαίες\nτελετές λατρείας του Διονύσου.\nΑικατερίνη Πολυμέρου-Καμηλάκη, διασκευή για τις ανάγκες των εξετάσεων, http://www.kentrolaografias.gr/el/, 10-12021", "sub": [{"type": "mcq", "q": "Τα ελληνικά έθιμα της Αποκριάς είναι γνωστά σε όλο τον κόσμο.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Το γνωστότερο καρναβάλι της Ελλάδας γίνεται στην Πάρο.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Ο «Βλάχικος Γάμος» γίνεται στον Τύρναβο.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Λαγάνες τρώγονται την Καθαρή Δευτέρα.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Η νηστεία της Σαρακοστής ξεκινά μετά τις Απόκριες.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Τα περισσότερα έθιμα της Αποκριάς ξεκινούν", "options": ["από την Τουρκοκρατία", "από την αρχαιότητα", "από το Βυζάντιο"], "answer": 1}, {"type": "mcq", "q": "Την Κυριακή της Αποκριάς σύμφωνα με την παράδοση τρώμε", "options": ["τυροκομικά προϊόντα", "λαγάνες", "χορτόσουπα"], "answer": 0}, {"type": "mcq", "q": "Στην Αθήνα την Καθαρή Δευτ ικό σας κείμενο (80-100 λέξεις). Επισημαίνουμε ότι δεν πρέπει να υπογράψετε με το ονοματεπώνυμό σας στο τέλος του κειμένου. Με αφορμή το κείμενο που διαβάσατε, γράφετε ένα μήνυμα ηλεκτρονικού ταχυδρομείου (email) σε έναν φίλο/μία φίλη σας, για να περιγράψετε ένα έθιμο της χώρας σας ή ένα ελληνικό έθιμο που σας αρέσει."}, {"type": "reading", "cat": "reading", "id": "read_072", "title": "!", "passage": "Αυτή είναι η νέα όψη της πλατείας Θεάτρου!\nΜια μικρή, αλλά σημαντική πλατεία τοποθετημένη στο κέντρο της πρωτεύουσας,\nπίσω από το δημαρχείο της Αθήνας, η πλατεία Θεάτρου, αλλάζει όψη. Ο δήμος Αθηναίων\nθα χρησιμοποιήσει μια βραβευμένη σε αρχιτεκτονικό διαγωνισμό μελέτη που υπήρχε εδώ\nκαι καιρό για την ανάπλασή της. Το έργο έχει τον τίτλο «Ανάπλαση της περιοχής Πλατείας\nΘεάτρου». Πρόθεση του δήμου είναι να χρηματοδοτηθεί εξ ολοκλήρου από την Ευρωπαϊκή\nΈνωση. Με το έργο αυτό θα βελτιωθεί αισθητικά και περιβαλλοντικά ο χώρος και θα φανούν\nτα πολιτιστικά στοιχεία της περιοχής. Παράλληλα, θα δοθεί έμφαση στην αίσθηση\nασφάλειας των κατοίκων και των περαστικών σε όλη τη διάρκεια του 24ώρου.\nΣτόχος της αρχιτεκτονικής προσέγγισης είναι να συνδεθεί το παρόν με το ιστορικό\nπαρελθόν της πόλης και να δημιουργηθεί ένας δημόσιος χώρος για ατομικές και συλλογικές\nδράσεις. Ουσιαστικά, η ανανεωμένη πλατεία Θεάτρου θα μπορεί να λειτουργεί ως ένας\nκρυμμένος κήπος στο κέντρο της Αθήνας.\nΗ πλατεία Θεάτρου αποτελεί ένα από τα πιο\nιστορικά σημεία της πόλης. Η ονομασία της οφείλεται στο πρώτο κλειστό θέατρο της\nνεότερης Αθήνας: το θέατρο Μπούκουρα που λειτούργησε στην οδό Μενάνδρου από το\n1840 έως το 1897 και αποτέλεσε τη μόνη χειμερινή σκηνή της πόλης για περίπου μισό\nαιώνα.\nΕιδικότερα, με την ανάπλαση προβλέπεται η πλήρης πεζοδρόμηση των γύρω οδών\nκαι η μετατροπή τους από ανοιχτό χώρο στάθμευσης, που είναι σήμερα, σε χώρο πρασίνου.\nΣτην περιοχή θα δημιουργηθούν νέα παρτέρια και, βέβαια, θα χρησιμοποιηθούν\nκατασκευές και υλικά που έχουν διάρκεια στον χρόνο και αντοχή στις φθορές από την\nκαθημερινή χρήση και τις συνθήκες του περιβάλλοντος.\nΔιασκευασμένο απόσπασμα για τις ανάγκες των εξετάσεων,\nhttps://www.lifo.gr/articles/athens_articles/309772/ayti-einai-i-nea-opsi-tis-plateias-theatroy, 14-1-2021", "sub": [{"type": "mcq", "q": "Η πλατεία Θεάτρου βρίσκεται μπροστά από το Δημαρχείο της Αθήνας.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Η πλατεία έχει αυτό το όνομα γιατί υπήρχε ένα θέατρο εκεί παλιότερα.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Και άλλες πλατείες της Αθήνας πρόκειται να αλλάξουν όψη.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Θα χρησιμοποιηθούν υλικά που αντέχουν στη φθορά.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Πρόκειται να φτιαχτεί ένας ανοιχτός χώρος στάθμευσης στην πλατεία.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Ποιο από τα τρία ισχύει; Η μελέτη για την ανάπλαση της πλατείας Θεάτρου", "options": ["δεν είναι καινούρια", "δεν είναι παλιά", "δεν είναι βραβευμένη"], "answer": 0}, {"type": "mcq", "q": "Ο Δήμος Αθηναίων επιθυμεί", "options": ["να δώσει τα χρήματα για την ανάπλαση της πλατείας", "να χρησιμοποιήσει χρήματα χορηγών", "να πάρει τα χρήματα από την Ευρωπαϊκή Ένωση"], "answer": 2}, {"type": "mcq", "q": "Το θέατρο Μπούκουρα", "options": ["ήταν ανοιχτό θέατρο", "ήταν κλειστό θέατρο", "λειτουργεί ακόμη"], "answer": 1}, {"type": "mcq", "q": "Ο Δήμος με το έργο αυτό δίνει έμφαση", "options": ["στην ασφάλεια των κατοίκων και περαστικών", "στη χρηματοδότηση του έργου από δημοτικούς φόρους", "στην ανακαίνιση του θεάτρου"], "answer": 0}, {"type": "mcq", "q": "«ανάπλαση της πλατείας»: φράση με παρόμοια σημασία είναι", "options": ["νέα, βελτιωμένη μορφή της πλατείας", "γκρέμισμα της πλατείας", "κατασκευή μιας νέας πλατείας"], "answer": 0}, {"type": "mcq", "q": "«φθορές»: λέξη με παρόμοια σημασία είναι", "options": ["επισκευές", "μετατροπές", "ζημιές"], "answer": 2}, {"type": "mcq", "q": "«πρόθεση»: λέξη με παρόμοια σημασία είναι", "options": ["προθεσμία", "σκοπός", "αιτία"], "answer": 1}, {"type": "mcq", "q": "«ένας δημόσιος χώρος»: φράση με αντίθετη σημασία είναι", "options": ["ένας κοινόχρηστος χώρος", "ένας ιδιωτικός χώρος", "ένας ενοικιασμένος χώρος"], "answer": 1}, {"type": "typed", "q": "Να ξαναγράψετε την πρόταση κάνοντας τις αλλαγές που χρειάζεται, ώστε το νόημα να παραμείνει το ίδιο. Από τους εργάτες θα χρησιμοποιηθούν υλικά ανθεκτικά. Οι εργάτες θα _____", "a": "χρησιμοποιήσουν υλικά ανθεκτικά"}, {"type": "typed", "q": "Να μεταφέρετε το ρήμα στον κατάλληλο τύπο, για να δηλώνει το παρελθόν. Η πλατεία θα μοιάζει με κήπο. Και παλιότερα η πλατεία _____ με κήπο.", "a": "έμοιαζε"}, {"type": "typed", "q": "Να μεταφέρετε το ρήμα στον κατάλληλο τύπο, για να δηλώνει το παρόν. Το θέατρο λειτούργησε στην οδό Μενάνδρου. Και στις μέρες μας, το θέατρο _____ .. στην οδό Μενάνδρου.", "a": "λειτουργεί"}, {"type": "typed", "q": "Να μεταφέρετε το ρήμα στον κατάλληλο τύπο, για να δηλώνει το μέλλον. Η πλατεία Θεάτρου αποτελεί μία ιστορική πλατεία. Και στο μέλλον πάντα η πλατεία Θεάτρου _____ ..μια ιστορική πλατεία.", "a": "θα αποτελεί"}, {"type": "typed", "q": "Να μεταφέρετε την πρόταση που σας δίνεται στον πληθυντικό αριθμό. Η πλατεία είναι χώρος πρασίνου. Οι _____ πρασίνου.", "a": "πλατείες είναι χώροι"}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Επισημαίνουμε ότι δεν πρέπει να υπογράψετε με το ονοματεπώνυμό σας στο τέλος του κειμένου. Σε ένα μήνυμα ηλεκτρονικού ταχυδρομείου (email) να περιγράψετε σε έναν φίλο/μία φίλη σας από την πατρίδα σας μία περιοχή της Ελλάδας που αγαπάτε."}, {"type": "reading", "cat": "reading", "id": "read_073", "title": "!", "passage": "Στον δρόμο για το βραβείο αρχιτεκτονικής\nΤρία ελληνικά αρχιτεκτονικά έργα δημόσιου χαρακτήρα είναι υποψήφια για ένα\nευρωπαϊκό βραβείο σύγχρονης αρχιτεκτονικής για το 2022. Πρόκειται για την επέκταση της\nνότιας πτέρυγας του Διεθνούς Αερολιμένα Αθηνών «Ελευθέριος Βενιζέλος», τη νέα\nΒιβλιοθήκη της Φιλοσοφικής Σχολής του Εθνικού Καποδιστριακού Πανεπιστημίου Αθηνών\nκαι το Μουσείο Σύγχρονης Τέχνης του Ιδρύματος Β. & Ε. Γουλανδρή. Ας τα δούμε, όμως, πιο\nαναλυτικά.\nΤο νέο κτήριο στον διεθνή αερολιμένα αποτελεί, επίσης, την πρώτη επέκταση του\nαεροδρομίου στην ιστορία του. Ο στόχος των αρχιτεκτόνων ήταν η δημιουργία ενός\nκτηρίου που θα δένει αρμονικά\nμε το περιβάλλον, δεν θα μοιάζει ξένο στην αρχική\nκτηριακή σύνθεση, αλλά θα προσθέτει και μια αίσθηση ανανέωσης. Η εντυπωσιακή\nπρόσοψη με τις 77 ανοιχτές περσίδες αντανακλά τον ουρανό ανάλογα με τις καιρικές\nσυνθήκες.\nΗ Βιβλιοθήκη της Φιλοσοφικής Σχολής του ΕΚΠΑ, συνολικής επιφάνειας 5.254 τ.μ.,\nολοκληρώθηκε το 2018 και έχει ήδη διακριθεί στα βραβεία ελληνικής αρχιτεκτονικής 2020.\nΣύμφωνα με την αρχιτεκτονική περιγραφή, το κτήριο ταιριάζει στο τοπίο του\nπανεπιστημίου και μοιάζει με φυσική προέκταση της Φιλοσοφικής. Όλες οι κινήσεις από\nκαι προς τη βιβλιοθήκη οδηγούν στον υπαίθριο χώρο της αυλής.\nΣτην περίπτωση του Μουσείου Σύγχρονης Τέχνης Γουλανδρή υλοποιήθηκαν ουσιαστικά\nδύο αντικείμενα: η αποκατάσταση ενός παλαιού κτίσματος, το οποίο έγινε μουσείο, και η\nπροσθήκη μιας σύγχρονης επέκτασής του. Το νέο κτήριο έχει επτά ορόφους και πέντε\nυπόγεια, όπου φιλοξενούνται τα εκθέματα της συλλογής, εστιατόριο, κατάστημα δώρων,\nεργαστήρια, γραφεία διοίκησης και αμφιθέατρο εκδηλώσεων.\nΤο συγκεκριμένο βραβείο απονέμεται κάθε δύο χρόνια σε Ευρωπαίους αρχιτέκτονες\nγια ολοκληρωμένα έργα, τα οποία προτείνονται από αρχιτεκτονικούς συλλόγους και\nανεξάρτητους κριτές.\nΔιασκευή άρθρου σε ηλεκτρονική εφημερίδα του Σ. Ιωαννίδη για τις ανάγκες των\nεξετάσεων,https://www.kathimerini.gr/culture/561225478/ston-dromo-gia-to-vraveio-architektonikis/, 13-1-2021", "sub": [{"type": "mcq", "q": "Το κείμενο μιλάει για 3 βραβευμένα αρχιτεκτονικά έργα.", "options": ["Σωστό", "Λάθος", ον περιορισμό της\nδιασποράς του ιού θα φέρνουν νέες συνήθειες με απρόβλεπτες συνέπειες τόσο στην\nκοινωνική όσο και στην προσωπική ζωή μας.\n«Τη μεγάλη αλλαγή θα τη φέρει η τηλεργασία, η οποία σε συνθήκες πανδημίας\nαυξήθηκε από περίπου 10% το 2015 σε 40% με 50% σε παγκόσμια κλίμακα σήμερα. Επειδή\nέχει μεγάλα οικονομικά πλεονεκτήματα, πολλές επιχειρήσεις θα παραμείνουν σε αυτό το\nμοντέλο και μετά την πανδημία, φέρνοντας μεγάλες μεταβολές στους χώρους εργασίας. Δεν\nθα χρειάζονται τόσο μεγάλοι χώροι γραφείων, κάποιες επιχειρήσεις θα μετακινηθούν σε\nχώρους μικρότερης δαπάνης λειτουργίας και ευνοϊκότερου κόστους απόκτησης, εκτός\nκέντρου» σημειώνει ο Νίκος Κομνηνός, ομότιμος καθηγητής αστικής ανάπτυξης στο\nΑριστοτέλειο Πανεπιστήμιο Θεσσαλονίκης.\nΤην ίδια άποψη έχει και η αρχιτέκτων- πολεοδόμος κα Άσπα Γοσποδίνη, καθηγήτρια\nστο Πανεπιστήμιο Θεσσαλίας. «Μετά την ικανοποιητική απόδοση της τηλεργασίας\nστελεχών και υπαλλήλων στη διάρκεια του lockdown, μεγάλες εταιρείες τεχνολογίας και\nδιεθνείς γίγαντες όπως το Facebook, Twitter, Google, Universal Music κ.α. προωθούν πλέον\nτην τηλεργασία σε μόνιμη βάση, βεβαίως με μειώσεις στους μισθούς των εργαζομένων. Εάν\nτο μοντέλο υιοθετηθεί και από εταιρείες άλλων κλάδων στον τριτογενή τομέα της\nοικονομίας, όπως, Τράπεζες, ασφαλιστικές εταιρείες, εμπορικές εταιρείες με πωλήσεις\nπροϊόντων και υπηρεσιών μέσω Διαδικτύου, η δομή των πόλεων σταδιακά θα αλλάξει.»\nΔιασκευασμένο κείμενο για τις ανάγκες της εξέτασης. https://www.kathimerini.gr/world/1092110/oi-poleis-sti-m-c-meta-covid-epochi/", "sub": [{"type": "mcq", "q": "Με την εφαρμογή της τηλεργασίας αντιμετωπίζεται η πανδημία.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Η τηλεργασία μετά το τέλος της πανδημίας θα εγκαταλειφθεί από τις εταιρείες και τις επιχειρήσεις.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Από το 2015 έως σήμερα η τηλεργασία αυξήθηκε σε ποσοστό περίπου 40% με 50% στην πα  όρους\nΤα ζώα μας αγαπούν ό,τι και να συμβεί. Σίγουρα, τα ταΐζουμε, τα χαϊδεύουμε, παίζουμε μαζί\nτους και καθαρίζουμε όταν λερώνουν. Μας αγαπάνε όμως ακόμα και αν δεν τους δώσουμε\nτο φαγητό τους στην ώρα του ή αν δεν παίξουμε μια μέρα.\n2. Δεν μας κρίνουν\nΤα ζώα δεν κρίνουν. Δεν έχει σημασία αν είμαστε ωραίοι, μικροί, μεγάλοι, πλούσιοι ή\nφτωχοί. Δεν τα νοιάζει αν κάνουμε καλά τη δουλειά μας, αν έχουμε καλό γούστο, αν οι άλλοι\nάνθρωποι μας αγαπάνε, μας θέλουν στη ζωή τους ή μας αποφεύγουν. Τα ζώα απλά\nχαίρονται που είμαστε κοντά τους! Αυτό μάς προσφέρει ηρεμία και μας κάνει να νιώθουμε\nάνετα.\n3.\nΔεν ζητάνε πάντα κάτι\nΑν και τα ζώα θέλουν να τους δίνουμε να φάνε και να παίζουν μαζί μας, δεν μας ενοχλούν\nσυνέχεια γι’ αυτό. Τα κατοικίδια μας δίνουν άφθονο χρόνο για να μείνουμε μόνοι μας, αν\nτο χρειαζόμαστε.\n4. Τρώνε κάθε μέρα το ίδιο φαγητό χωρίς πρόβλημα\nΒαρεθήκατε να μαγειρεύετε κάθε μέρα για την οικογένειά σας κάτι καινούργιο; Τα ζώα\nακόμα και αν τα ταϊζετε με την ίδια κονσέρβα κάθε βράδυ, τρώνε το φαγητό τους κάθε φορά\nσαν να είναι το πιο υπέροχο γεύμα.\n5. Μας προστατεύουν\nΌταν για ένα ζώο είμαστε ο άνθρωπος του, δεν θα αφήσει τίποτα κακό να μας συμβεί. Θα\nμας προστατεύσει από κάποιο ατύχημα, θα μας προσέχει όταν είμαστε άρρωστοι, ή απλά\nθα βάλει το κεφάλι του στην αγκαλιά μας όταν είμαστε λυπημένοι. Το κατοικίδιο μας θα μας\nπροσέχει πάντα, ό,τι κι αν συμβεί!\n6. Μπορούν να μας ηρεμήσουν\nΟι άνθρωποι μπορεί να μας κουράζουν κάποιες φορές. Συχνά η δουλειά, το σχολείο, η\nοικογένεια μπορεί να μας κάνουν να αισθανόμαστε αγχωμένοι και εκνευρισμένοι. Ωστόσο,\nη παρουσία ενός ζώου μπορεί να ηρεμήσει την ανθρώπινη ψυχή. Στη δύσκολη\nκαθημερινότητα, η επιστροφή στο σπίτι σε ένα ζώο που μας περιμένει υπομονετικά είναι\nσα φάρμακο για το άγχος.\n7. Εκτιμούν την προσοχή μας\nΔεν υπάρχει ποτέ κακή στιγμή για να δώσουμε στον αγαπημένο μας τριχωτό φίλο ένα ή δύο\nχάδια. Ακόμα και ένα απλό χτύπημα στο κεφάλι και μερικά γλυκά λόγια όταν περνάει δίπλα\nμας, θα τη θάλασσα να δουν ποιο θα φτάσει πιο μακριά.\nΑπό τα χαλίκια εκείνα λένε ότι φύτρωσαν οι Σποράδες, η καταπράσινη αυτή νοητή συνέχεια\nτου βουνού των Κενταύρων που βλέπει τις ακτές του Πηλίου από απόσταση λίγων\nναυτικών μιλίων. Γι’ αυτό, άλλωστε ανήκουν διοικητικά στον νομό Μαγνησίας. Τέσσερα\nκατοικημένα νησιά όλα κι όλα, μαζί με το νοτιότερο αδέρφι τους, τη Σκύρο.\nΗ Αλόννησος πήρε το όνομά της από ένα διπλανό ερημονήσι, την Κυρά- Παναγιά.\nΑυτό λένε πως είναι η πραγματική αρχαία Αλόννησος. Μετά την απελευθέρωση από τους\nΤούρκους την είπαν Αλόννησο. Το πραγματικό της αρχαίο όνομα ήταν Ίκος. Μέχρι πριν από\nτη δεκαετία του 1980, αυτό το στολίδι του Αιγαίου με τα κρυστάλλινα νερά ήταν γνωστό σε\nλίγους. Υπήρχαν όμως και κάποιοι άλλοι, πιο παράξενοι επισκέπτες, που είχαν κάνει την\nΑλόννησο μόνιμο τόπο τους, πολύ πιο πριν, εκτιμώντας αυτό που τους πρόσφερε: ησυχία,\nκαθαρά νερά και άφθονη τροφή. Οι «επισκέπτες» αυτοί ήταν οι μεσογειακές φώκιες\n«monachus- monachus», που έκαναν γνωστή την Αλόννησο στο πλατύ κοινό. Στη θάλασσα\nτης Αλοννήσου δημιουργήθηκε το 1992 το «Εθνικό Θαλάσσιο Πάρκο Αλοννήσου- Βορείων\nΣποράδων».\nΗ αρχαία Ίκος, την εποχή που ανήκε στην Αθηναϊκή Συμμαχία της Δήλου (478 π. Χ)\nαπέκτησε μεγάλη πολιτική και οικονομική δύναμη. Στα νερά της έχουν βρεθεί δεκάδες\nκουφάρια εμπορικών και πολεμικών πλοίων. Μάλιστα είχε κόψει δικό της νόμισμα.\nΦημισμένη ήταν για το καλό κρασί της. Αμφορείς με την επιγραφή «Ίκιον» βρέθηκαν από\nτη Μαύρη Θάλασσα μέχρι την Αλεξάνδρεια της Αιγύπτου. Ακόμη, σήμερα, το ξακουστό\nεκείνο κρασί συνεχίζει να παράγεται, κυρίως για οικιακή κατανάλωση.\nΠεριοδικό Geo, 9, 2020. Διασκευή για τις ανάγκες των εξετάσεων.", "sub": [{"type": "mcq", "q": "Η Αλόννησος πήρε το όνομα της αυτό:", "options": ["Στα χρόνια της Τουρκοκρατίας.", "Στην αρχαιότητ", "Μετά την Επανάσταση του 1821 και την απελευθέρωση."], "answer": 2}, {"type": "mcq", "q": "Σύμφωνα με τη μυθολογία:", "options": ["Η Αλόννησος ήταν ο τόπος των Κενταύρων.", "Η Αλόννησος μόνο δημιουργήθηκε από το παιχνίδι δύο γιγάντων, του Ώτο και του Εφιάλτη.", "Οι Βόρειες Σποράδες δημιουργήθηκαν από το παιχνίδι δύο γιγάντων, του Ώτο και του Εφιάλτη."], "answer": 2}, {"type": "mcq", "q": "Το νησί Αλόννησος", "options": ["αποτελούσε πάντα έναν ξεχωριστό τουριστικό προορισμό.", "δεν ήταν πάντα γνωστό και διάσημο νησί.", "μετά τη δεκαετία του 1980 έγινε ευρύτερα αγαπητή και γνωστή στους τουρίστες."], "answer": 2}, {"type": "mcq", "q": "Στον βυθό των θαλασσών της Αλοννήσου", "options": ["βρίσκονται, δυστυχώς, πολλά σκουπίδι", "συναντάμε μοναδικά λιβάδια ποσειδωνίας.", "συναντάμε ναυάγια πλοίων."], "answer": 2}, {"type": "mcq", "q": "Η φώκια Monachus monachus ζει στα νερά της Αλοννήσου,", "options": ["γιατί βρίσκει εύκολα σπηλιές να γεννήσει τα μικρά της.", "γιατί στα καθαρά νερά της βρίσκει ένα υγιές περιβάλλον να επιβιώσει.", "γιατί δεν υπάρχουν κοντά παραλίες και γενικά, ανθρώπινες δραστηριότητες."], "answer": 1}, {"type": "mcq", "q": "Η Αλόννησος είναι το μεγαλύτερο νησί από τα Νησιά των Σποράδων.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Η οικονομική και ναυτική της δύναμη αποδεικνύεται από το γεγονός ότι έχουν βρεθεί αμφορείς σε πολλές περιοχές της Μεσογείου και της Μαύρης Θάλασσας.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Από την αρχαιότητα μέχρι σήμερα η Αλόννησος παράγει και εξάγει το φημισμένο κρασί της.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Η φώκια monachus monachus ζει στις θάλασσες της Αλοννήσου από το 1992.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "«που σύστησαν την Αλόννησο στο πλατύ κοινό.» Λέξη με παρόμοια σημασία για τη λέξη «πλατύ» είναι:", "options": ["ευρύ", "μικρό", "παχύ"], "answer": 0}, {"type": "typed", "q": "«(Η Αλόννησος) που ανήκε στην Αθηναϊκή Συμμαχία της Δήλου _____ »: Συμπληρώστε το κενό βάζοντας το ρήμα στον κατάλληλο τύπο, για να δηλώνει το μφωνήσουν μαζί σας."}, {"type": "reading", "cat": "reading", "id": "read_077", "title": "!", "passage": "Γιατί επιστρέφω πάντα στην Ελλάδα\nΈνας από τους λόγους που επιστρέφω τόσο συχνά στην Ελλάδα είναι γιατί πολύ απλά\nαγαπώ την ομορφιά́ της. Υπάρχει κάτι τόσο απόλυτα διαχρονικό σε αυτή, ώστε μου κόβεται\nη ανάσα κάθε φορά που ρίχνω την πρώτη κλεφτή ματιά από το παράθυρο του αεροπλάνου.\nΓια μένα η Ελλάδα αγγίζει το ιδανικό της αισθητικής τελειότητας. Το θαλασσινό τοπίο και\nη ηπειρωτική χώρα είναι λουσμένα σε ένα μοναδικό φως, το οποίο δεν έχω ποτέ δει σε\nκανένα άλλο σημείο του κόσμου. Μερικές φορές εύχομαι να μπορούσα να μεταφέρω αυτή\nτην ακτινοβολία ζωγραφίζοντάς την. Εγώ, όμως, αυτόν τον ρόλο των χρωμάτων τον\nαναθέτω στις λέξεις ή, ακόμα καλύτερα, φέρνω μαζί μου ανθρώπους εδώ, να δουν μόνοι\nτους και να καταλάβουν. [...]\nΔεν βρίσκω ούτε μια στιγμή πλήξης εδώ. Μου φαίνεται πως υπάρχει μια συνεχής\nπάλη και σύγκρουση, με την απειλή των σεισμών και τη σκληρή καθημερινότητα να κάνουν\nτον τόπο εξαιρετικά δύσκολο, για να επιβιώσει κανείς. Για τους περισσότερους ανθρώπους\nυπάρχουν καθημερινές μάχες με τη γραφειοκρατία, οικονομικά προβλήματα,βία και\nεπιθετικότητα, απεργίες και ανασφάλεια. Μέρα με τη μέρα, η ζωή στην Ελλάδα γίνεται\nολοένα και πιο δύσκολη.\nΠαρά το γεγονός αυτό, οι άνθρωποι εδώ διαθέτουν απίστευτες αντιστάσεις. Κάθε\nφορά που παρατηρώ τους Έλληνες φίλους μου να πίνουν τον καφέ τους, μπορώ να\nδιακρίνω ότι έχουν περάσει σε μια εντελώς νέα «κατάσταση». Είναι ικανοί να\nαπολαμβάνουν τη ζωή σ’ ένα διαφορετικό επίπεδο, ξεχνώντας όλες τις δυσκολίες της. Το\nθαυμάζω αυτό. Διακρίνω τις αντοχές τους και την εσωτερική τους δύναμη. Η ιστορία\nδιδάσκει ότι, παρά τις κρίσεις – οι οποίες φαίνεται να μαστίζουν τη χώρα εκατοντάδες\nχρόνια – οι Έλληνες βρίσκουν τρόπο να επιβιώνουν. Κι αυτό από μόνο του είναι μια πηγή\nέμπνευσης.\nhttps://www.athensvoice.gr/culture/book/678754_viktoria-hislop-i-ellada-moy-empneei-afosiosi\nΔιασκευή για τις ανάγκες των εξετάσεων."
