ns": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "«…ώστε μου κόβεται η ανάσ", "options": ["» Η πρόταση αυτή εκφράζει:", "αποτέλεσμα", "αιτία"], "answer": 1}, {"type": "mcq", "q": "«Υπάρχει κάτι τόσο απόλυτα διαχρονικό σε αυτή … » Η λέξη «αυτή» αναφέρεται:", "options": ["στην Ελλάδα", "στην ομορφιά", "στην αγάπη που τρέφει για την Ελλάδα"], "answer": 0}, {"type": "typed", "q": "«Εγώ όμως αυτόν τον ρόλο των χρωμάτων τον αναθέτω στις λέξεις _____ » Συμπληρώστε την πρόταση με τον κατάλληλο τύπο του ρήματος, ξεκινώντας έτσι: «Εμείς, όμως, αυτόν τον ρόλο των χρωμάτων τον _____ στις λέξεις.»", "a": "αναθέτουμε"}, {"type": "typed", "q": "«Το θαυμάζω αυτό _____ »: Συμπληρώστε το ρήμα στον κατάλληλο τύπο ξεκινώντας έτσι: «Εσύ το _____ .. αυτό».", "a": "Θαυμάζεις"}, {"type": "mcq", "q": "Λέξη με αντίθετη σημασία στη λέξη «ανασφάλεια» είναι:", "options": ["ασφάλεια", "αγωνία", "αστάθεια"], "answer": 0}, {"type": "mcq", "q": "«Δεν βρίσκω ούτε μία στιγμή πλήξης εδώ … » Λέξη με παρόμοια σημασία για τη λέξη «πλήξη» είναι:", "options": ["ανία", "ανοησία", "ζωντάνια"], "answer": 0}, {"type": "mcq", "q": "«Υπάρχει μια συνεχής πάλη και σύγκρουση … » Λέξη με παρόμοια σημασία για τη λέξη «συνεχής» είναι:", "options": ["αδιάκοπη", "σταθερή", "σίγουρη"], "answer": 0}, {"type": "mcq", "q": "« … για να επιβιώσει κανείς» Η πρόταση αυτή φανερώνει:", "options": ["συμπέρασμα", "σκοπό", "χρόνο"], "answer": 1}, {"type": "mcq", "q": "« … παρά τις κρίσεις, οι οποίες φαίνεται να μαστίζουν τη χώρα …». Λέξη με παρόμοια σημασία για το ρήμα «μαστίζουν» είναι:", "options": ["καταστρέφουν", "βασανίζουν", "υποφέρουν"], "answer": 1}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Έχετε έρθει εδώ και χρόνια στην Ελλάδα και θέλετε να παραμείνετε. Εξηγήστε τους λόγους για τους οποίους πήρατε αυτή την απόφαση."}, {"type": "reading", "cat": "reading", "id": "read_078", "title": "!", "passage": "Μέγας Αλέξανδρος\nΟ Αλέξανδρος ανέλαβε τον θρόνο της Μακεδονίας, όταν ο πατέρας του\nδολοφονήθηκε το 336 π.Χ. Ονειρευόταν να κατακτήσει τον κόσμο και ανησυχούσε μήπως\nδεν απέμεναν και πολλά να κατακτήσει ο ίδιος, όταν θα γινόταν βασιλιάς. Όταν πήρε την\nεξουσία, αποφάσισε να πραγματοποιήσει το όνειρό του, δηλαδή, να κατακτήσει τον κόσμο\nαλλά και να εκδικηθεί τους Πέρσες για την εισβολή τους στην Ελλάδα, το 490 π. Χ. Στην\nεκστρατεία του προς την Ανατολή, ο Αλέξανδρος ίδρυσε πάρα πολλές πόλεις. Σε δύο από\nαυτές έδωσε το όνομα του αγαπημένου του αλόγου, του Βουκεφάλα, ενώ περίπου 60 πήραν\nτο όνομά του.\nΜία από αυτές ήταν η Αλεξάνδρεια της Αιγύπτου, την οποία ίδρυσε το 331π.Χ.\nΣύμφωνα με έναν μύθο, ο Αλέξανδρος είδε στο όνειρό του τον Όμηρο να του λέει ότι θα\nέκτιζε μια πόλη στο νησί Φάρος. Όταν έφτασε εκεί, θαύμασε την περιοχή. Κατευθύνθηκε\nπρος την όαση Σίβα, για να συμβουλευτεί το μαντείο του Άμμωνα. Έτσι, διάλεξε ένα σημείο\nκοντά στο νησί Φάρο για να κτίσει την πρώτη Αλεξάνδρεια. Την εποχή εκείνη, το μόνο που\nυπήρχε εκεί ήταν ένα ψαροχώρι, καταφύγιο πειρατών. Έφτιαξε το σχέδιο της πόλης με\nκιμωλία και σχεδίασε το περίγραμμα των τειχών της με πετραδάκια. Αρχιτέκτονα επέλεξε\nτον Δεινοκράτη τον Ρόδιο, ο οποίος σχεδίασε φαρδείς δρόμους σε αντίθεση με τους\nστενούς δρόμους, που συνήθως είχαν οι περισσότερες πόλεις τότε. Άφησε επίσης τον\nΚλεομένη να επιβλέπει αν η πόλη κτιζόταν σύμφωνα με το σχέδιο του. Ο Αλέξανδρος\nσυνέχισε την πορεία λίγους μήνες αφότου ο Δεινοκράτης άρχισε την κατασκευή της πόλης.\nΗ Αλεξάνδρεια έγινε η νέα πρωτεύουσα της Αιγύπτου και σημαντικό κέντρο γραμμάτων και\nεμπορίου, που κατοικήθηκε από πολλούς Αιγύπτιους και Έλληνες.\nΜέγας Αλέξανδρος, Ο Έλληνας στρατηλάτης, εκδόσεις Σαββάλας, 1999\nΔιασκευή για τις ανάγκες των εξετάσεων.", "sub": [{"type": "mcq", "q": "Ο Αλέξανδρος στη διάρκεια των εκστρατειών του", "options": ["κατέστρεφε τις πόλεις που κατακτούσε.", "αδιαφορούσε για τα μέρη που κατακτούσε.", "όταν μια περιοχή του άρεσε έχτιζε εκεί και μια πόλη."], "answer": 2}, {"type": "mcq", "q": "Το όνειρό του να κατακτήσει τον κόσμο φανερώνει ότι", "options": ["ο Αλέξανδρος ήθελε να ξεπεράσει τον πατέρα του.", "ο Αλέξανδρος ήταν φιλόδοξος και δυναμικός χαρακτήρας.", "ο Αλέξανδρος ήθελε να γίνει γνωστός στον τότε κόσμο."], "answer": 1}, {"type": "mcq", "q": "Η Αλεξάνδρεια της Αιγύπτου", "options": ["είναι μία από τις καλύτερες πόλεις που έχτισε ο Αλέξανδρος.", "είναι μία από τις 60 περίπου πόλεις που πήρε το όνομά του.", "είναι η αγαπημένη πόλη του Αλέξανδρου."], "answer": 1}, {"type": "mcq", "q": "Ο Αλέξανδρος", "options": ["είδε την πόλη να χτίζεται και να ολοκληρώνεται.", "έφυγε από την περιοχή πριν αρχίσει να χτίζεται η πόλη του.", "έφυγε από την περιοχή λίγους μήνες μετά τις εργασίες οικοδόμησης."], "answer": 2}, {"type": "mcq", "q": "Με την εκστρατεία στην Ανατολή", "options": ["ο Αλέξανδρος ικανοποιούσε τις φιλοδοξίες του πατέρα του.", "ο Αλέξανδρος έπαιρνε εκδίκηση για τους Περσικούς πολέμους.", "ο Αλέξανδρος επεδίωκε πλούτο."], "answer": 1}, {"type": "tf", "t": "Τις πόλεις που ίδρυσε, έχουν το όνομά του.", "a": false}, {"type": "tf", "t": "Η περιοχή στην οποία ίδρυσε την Αλεξάνδρεια ήταν τότε έρημος και εχθρική.", "a": false}, {"type": "tf", "t": "Ο Αλέξανδρος σε συνεργασία με τον αρχιτέκτονα Δεινοκράτη σχεδίασαν την πόλη.", "a": true}, {"type": "tf", "t": "Η πόλη της Αλεξάνδρειας εξελίχτηκε σε διοικητικό, πνευματικό και οικονομικό κέντρο.", "a": true}, {"type": "typed", "q": "«Αρχιτέκτονα επέλεξε τον Δεινοκράτη τον Ρόδιο.»: Συμπληρώστε το κενό βάζοντας το ρήμα στον κατάλληλο τύπο, για να δηλώνει το παρόν, ξεκινώντας έτσι: «Ως Αρχιτέκτονα _____ . τον Δεινοκράτη τον Ρόδιο»", "a": "Επιλέγει"}, {"type": "typed", "q": "«Ο Αλέξανδρος ανέλαβε τον θρόνο της Μακεδονίας _____ »Συμπληρώστε το κενό βάζοντας το ρήμα στον κατάλληλο τύπο, για να δηλώνει το παρόν: «Ο Αλέξανδρος _____ τον θρόνο της Μακεδονίας _____ »", "a": "αναλαμβάνει"}, {"type": "mcq", "q": "«Άφησε επίσης τον Κλεομένη να επιβλέπει …». Λέξη με παρόμοια σημασία για τη λέξη «επιβλέπει» είναι:", "options": ["ενημερώνει", "παραβλέπει", "επιτηρεί"], "answer": 2}, {"type": "mcq", "q": "« … για την εισβολή τους στην Ελλάδα, το 490 π. Χ.». Λέξη με παρόμοια σημασία για τη λέξη «εισβολή» είναι:", "options": ["επίθεση", "κυριαρχία", "εχθρότητα"], "answer": 0}, {"type": "typed", "q": "« _____ που κατοικήθηκε από πολλούς Αιγύπτιους και Έλληνες. Συμπληρώστε το κενό βάζοντας το ρήμα στον κατάλληλο τύπο, για να δηλώνει το παρόν, ξεκινώντας έτσι: « _____ που _____ από πολλούς Αιγύπτιους και Έλληνες ακόμα και στις μέρες μας»", "a": "κατοικείται"}, {"type": "mcq", "q": "« … αποφάσισε να πραγματοποιήσει το όνειρό του, δηλαδή να κατακτήσει τον κόσμο.» Η λέξη «δηλαδή» εκφράζει:", "options": ["αντίθεση", "επεξήγηση", "αιτιολόγηση"], "answer": 1}, {"type": "typed", "q": "«Ο Αλέξανδρος έφτιαξε το σχέδιο της πόλης». Συμπληρώστε το κενό βάζοντας το ρήμα στον κατάλληλο τύπο, για να δηλώνει το παρόν, ξεκινώντας έτσι «Ο Αλέξανδρος _____ . το σχέδιο της πόλης.»", "a": "φτιάχνει"}, {"type": "mcq", "q": "Κυκλώστε τη λέξη που προέρχεται από το ρήμα «έδωσε»:", "options": ["δώρο", "δράση", "διάθεση"], "answer": 0}, {"type": "typed", "q": "«Ο Αλέξανδρος συνέχισε την πορεία _____ ». Συμπληρώστε το κενό βάζοντας το ρήμα στον κατάλληλο τύπο, για να δηλώνει το παρόν, ξεκινώντας έτσι: «Ο Αλέξανδρος _____ . την πορεία _____ »", "a": "συνεχίζει"}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Γράψτε σε έναν/ μία φίλο/ φίλη σας τη γνώμη σας και παρουσιάστε την εικόνα που έχετε για τον Μέγα Αλέξανδρο."}, {"type": "reading", "cat": "reading", "id": "read_079", "title": ".", "passage": "Εκδρομή στην ορεινή Πελοπόννησο\nΤα Λαγκάδια είναι ένα χωριό κυριολεκτικά κρεμασμένο από το βουνό, χτισμένο σε\nτρία επίπεδα. Τα πέτρινα σπίτια του οικοδομήθηκαν με μια πολύ ιδιαίτερη τεχνική.\nΠρόκειται για τετραώροφα αρχοντικά σκαρφαλωμένα πάνω στο βράχο με σκεπαστές αυλές.\nΤα καλντερίμια* θυμίζουν χωριό σε νησί, ενώ πέτρινα μονοπάτια και αμέτρητα σκαλιά\nενώνουν τα διαφορετικά επίπεδα μεταξύ τους και κάνουν εξαντλητική την ανάβαση.\nΟι εκκλησίες του χωριού είναι επίσης πέτρινες και πολύ μικρές για ορθόδοξοι ναοί.\nΗ μία, μάλιστα, που είναι πάνω από το νεκροταφείο, μοιάζει πιο πολύ με σπίτι ή με\nαποθήκη. Είναι από τις πιο ενδιαφέρουσες εκκλησίες που έχω δει. Το ίδιο συμβαίνει και με\nτο χωριό. Μπορεί να μην έχει και πολλά πράγματα να κάνεις, αν δεν σου αρέσουν οι\nπεριπλανήσεις στις φυσικές ομορφιές και η ησυχία, αλλά είναι καλοδιατηρημένο και\nελάχιστα τουριστικό.\nΣτα Λαγκάδια ζουν πλέον καμία 350αριά άνθρωποι. Έχουν φύγει όλοι για την Αθήνα\nκαι το εξωτερικό, κυρίως μετανάστες σε Αμερική και Αυστραλία. Στην ακμή του όμως το\nχωριό είχε 7.000 κατοίκους, τότε που οι περίφημοι Λαγκαδινοί χτίστες και μάστορες της\nπέτρας κατασκεύαζαν σε όλη την Πελοπόννησο σπίτια, γεφύρια, σχολεία και εκκλησίες.\nΤα πιο πολλά μαγαζιά είναι απλωμένα πάνω στον κεντρικό δρόμο. Πουλούν κυρίως\nτοπικά προϊόντα, όπως μέλι, μαρμελάδες, γλυκά του κουταλιού και ζυμαρικά. Γενικά στην\nΑρκαδία και την Ηλεία τα ντόπια «σπιτικά» ζυμαρικά υπάρχουν σε υπερβολικά μεγάλες\nποσότητες, τόσα πολλά που ανταγωνίζονται άνετα τα ζυμαρικά των ιταλικών πόλεων. Από\nτην άλλη πλευρά στα εστιατόρια του χωριού βρίσκεις παντού κρέατα, πολλά κρέατα:\nαγριογούρουνο, ελάφι, χοιρινό, αρνίσια παϊδάκια, λουκάνικα και παστά τηγανισμένα μαζί\nμε αυγά.\nΜετά το φαγητό κάναμε μια μεγάλη βόλτα προς το ρέμα, μέσα από το ελατόδασος,\nαπό ένα μονοπάτι στην άκρη του γκρεμού. Η μόνη απροσδόκητη συνάντηση που είχαμε\nήταν με μια προβατίνα, η οποία στεκόταν καμαρωτή στην μέση του μονοπατιού,\nπεριμένοντας να της αδειάσουμε το δρόμο για να συνεχίσει την πορεία της. Δεν\nμετακινηθήκαμε, την κοιτάζαμε σαν χαμένοι. Αφού περίμενε για κανένα δεκάλεπτο να\nκάνουμε την πρώτη κίνηση, αποφάσισε να κάνει μεταβολή και να φύγει τρέχοντας.\n*μικρά πέτρινα δρομάκια\nΑντλήθηκε από https://www.lifo.gr/tropos-zois/travel/mia-kyriaki-stin-arhaia-olympia-kai-trigyro και", "sub": [{"type": "mcq", "q": "Οι εκκλησίες στα Λαγκάδια είναι πέτρινες και ιδιαίτερα μεγάλες για ορθόδοξοι ναοί", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Στα Λαγκάδια ζουν κοντά στους 7.000 κατοίκους αλλά πολλοί από αυτούς μένουν και στην Αθήνα.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Τα Λαγκάδια είναι ένα χωριό χτισμένο σε τρία επίπεδα", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Τα «σπιτικά» ζυμαρικά της Ηλείας και της Αρκαδίας είναι καλύτερα από τα ζυμαρικά των ιταλικών πόλεων", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Η προβατίνα που συνάντησε η παρέα περίμενε 10 λεπτά πριν κάνει μεταβολή και φύγει", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Το χωριό Λαγκάδια είναι", "options": ["ιδιαίτερα τουριστικό χωριό", "χτισμένο σε τρία επίπεδα", "σε νησί"], "answer": 1}, {"type": "mcq", "q": "Η εκκλησία πάνω από το νεκροταφείο", "options": ["μοιάζει με σπίτι", "ήταν παλιά αποθήκη", "δεν μοιάζει με τις άλλες εκκλησίες του χωριού"], "answer": 0}, {"type": "mcq", "q": "Οι Λαγκαδινοί χτίστες και μάστορες", "options": ["κατασκεύαζαν σε όλη την Πελοπόννησο σπίτια, γέφυρες, σχολεία και εκκλησίες", "παλιά ήταν περίπου 7.500", "έχουν φύγει όλοι για την Αθήνα και το εξωτερικό"], "answer": 0}, {"type": "mcq", "q": "Στα εστιατόρια του χωριού σερβίρονται κυρίως", "options": ["ντόπια «σπιτικά» ζυμαρικά", "ζυμαρικά από ιταλικές πόλεις", "πολλά είδη κρέατος"], "answer": 2}, {"type": "mcq", "q": "Αντίθετο της λέξης «ενδιαφέρουσες» στη φράση «από τις πιο ενδιαφέρουσες εκκλησίες» είναι :", "options": ["άχρωμες", "αδιάφορες", "καταπληκτικές"], "answer": 1}, {"type": "mcq", "q": "Στη φράση «Η μόνη απροσδόκητη συνάντηση» η λέξη «απροσδόκητη» σημαίνει:", "options": ["ξαφνική", "αναμενόμενη", "φοβερή"], "answer": 0}, {"type": "mcq", "q": "Η φράση «έκανε μεταβολή» σημαίνει :", "options": ["προχώρησε μπροστά", "έφυγε προς τα πίσω", "έμεινε ακίνητη"], "answer": 1}, {"type": "mcq", "q": "Στη φράση «κάνουν εξαντλητική την ανάβαση» η λέξη «εξαντλητική» σημαίνει:", "options": ["πολύ άνετη", "πολύ ενδιαφέρουσα", "πολύ κουραστική"], "answer": 2}, {"type": "typed", "q": "«Έχουν φύγει όλοι για την Αθήνα και το εξωτερικό» Αυτή την εποχή _____ όλοι για την Αθήνα και το εξωτερικό.", "a": "φεύγουν"}, {"type": "typed", "q": "«Τα πιο πολλά μαγαζιά είναι απλωμένα πάνω στον κεντρικό δρόμο.». Τον περασμένο αιώνα τα πιο πολλά μαγαζιά _____ απλωμένα πάνω στον κεντρικό δρόμο.", "a": "ήταν"}, {"type": "typed", "q": "«Η μόνη απροσδόκητη συνάντηση που είχαμε ήταν με μια προβατίνα» Απροσδόκητα εμείς _____ μία προβατίνα !", "a": "συναντήσαμε"}, {"type": "mcq", "q": "Η πρόταση «..αν δεν σου αρέσουν οι περιπλανήσεις στις φυσικές ομορφιές και η ησυχί", "options": [".» δηλώνει :", "υπόθεση", "χρόνο"], "answer": 1}, {"type": "mcq", "q": "Η πρόταση «..για να συνεχίσει την πορεία της.» δηλώνει :", "options": ["χρόνο", "σκοπό", "αιτία"], "answer": 1}], "writing": "Διαβάστε το παρακάτω θέμα και γράψτε το δικό σας κείμενο με βάση τις οδηγίες (80100 λέξεις) Επισκεφθήκατε ένα χωριό που οι κάτοικοί του έχουν φύγει μετανάστες σε άλλες χώρες. Εξηγείστε σε έναν φίλος σας για ποιους λόγους μπορεί να γίνει αυτό."}, {"type": "reading", "cat": "reading", "id": "read_080", "title": "!", "passage": "Η ζωή στις μεγάλες πόλεις τότε και τώρα!\n«Η ζωή στις μεγάλες πόλεις έχει αλλάξει πολύ τα τελευταία χρόνια. Παλιότερα, οι πόλεις\nήταν μικρότερες, πιο ήσυχες και πιο καθαρές. Σήμερα, με την ανάπτυξη της τεχνολογίας και\nτην αύξηση του πληθυσμού, οι πόλεις έχουν μεγαλώσει και προσφέρουν πολλές ευκαιρίες\nστους κατοίκους τους. Από τη μία πλευρά, υπάρχουν περισσότερες επιλογές για εργασία,\nεκπαίδευση, διασκέδαση και κοινωνικές δραστηριότητες. Από την άλλη πλευρά, η\nκαθημερινότητα στις πόλεις είναι γεμάτη προκλήσεις.\nΈνα από τα μεγαλύτερα πλεονεκτήματα της ζωής στην πόλη είναι η πρόσβαση σε αγαθά και\nυπηρεσίες. Τα μεγάλα καταστήματα, τα νοσοκομεία, τα σχολεία και τα μέσα μεταφοράς\nδιευκολύνουν τη ζωή των κατοίκων. Οι άνθρωποι μπορούν να βρουν σχεδόν ό,τι\nχρειάζονται, από φρέσκα τρόφιμα μέχρι τεχνολογικά προϊόντα. Επιπλέον, οι πόλεις\nπροσφέρουν πολιτιστικές εμπειρίες, όπως θέατρα, μουσεία και φεστιβάλ.\nΩστόσο, η ζωή στις πόλεις έχει και τα αρνητικά της. Το μεγαλύτερο πρόβλημα είναι η\nρύπανση. Ο αέρας είναι συχνά γεμάτος καυσαέρια από τα αυτοκίνητα, και ο θόρυβος από\nτα μέσα μεταφοράς και τις οικοδομές είναι συνεχής. Επίσης, η κίνηση στους δρόμους\nμπορεί να κάνει τη μετακίνηση πολύ δύσκολη και κουραστική. Σε πολλές πόλεις, οι κάτοικοι\nπερνούν ώρες κάθε μέρα σε μποτιλιαρίσματα.\nΈνα άλλο ζήτημα είναι η έλλειψη χώρου. Οι πολυκατοικίες, τα γραφεία και τα εμπορικά\nκέντρα καλύπτουν κάθε ελεύθερο σημείο. Τα πάρκα και οι χώροι πρασίνου είναι λίγοι, και\nσυχνά γεμάτοι κόσμο. Αυτό κάνει πολλούς ανθρώπους να νιώθουν πίεση και άγχος.\nΠαράλληλα, η καθημερινότητα στις πόλεις είναι γρήγορη και απαιτητική. Οι άνθρωποι\nπρέπει να δουλεύουν πολλές ώρες και συχνά δεν έχουν χρόνο για τον εαυτό τους ή την\nοικογένειά τους.\nΠαρόλα αυτά, οι πόλεις παραμένουν ελκυστικές για πολλούς νέους ανθρώπους. Τα\nπανεπιστήμια και οι εταιρείες που βρίσκονται εκεί τους προσφέρουν δυνατότητες για\nκαριέρα και ανάπτυξη. Επίσης, οι πόλεις είναι συχνά κέντρα καινοτομίας και\nδημιουργικότητας. Από την άλλη πλευρά, οι μεγαλύτεροι σε ηλικία συχνά ονειρεύονται να\nζήσουν σε πιο ήρεμα μέρη, όπως η ύπαιθρος ή οι μικρές πόλεις, όπου η ζωή είναι πιο αργή\nκαι πιο κοντά στη φύση.\nΣυμπερασματικά, η ζωή στην πόλη έχει πλεονεκτήματα και μειονεκτήματα. Η επιλογή\nανάμεσα στη ζωή στην πόλη και στην ύπαιθρο εξαρτάται από τις ανάγκες, τις\nπροτεραιότητες και τον τρόπο ζωής του κάθε ανθρώπου. Μερικοί βρίσκουν την ενέργεια\nτης πόλης συναρπαστική, ενώ άλλοι προτιμούν την ησυχία και τη φυσική ομορφιά της\nεξοχής.»", "sub": [{"type": "mcq", "q": "Τι προσφέρει η ζωή στις μεγάλες πόλεις στους κατοίκους της;", "options": ["Περιορισμένες επιλογές", "Πολλές ευκαιρίες για εργασία, εκπαίδευση και διασκέδαση", "Μόνο καθαρό αέρα"], "answer": 1}, {"type": "mcq", "q": "Ποια είναι τα μεγαλύτερα προβλήματα στις πόλεις σύμφωνα με το κείμενο;", "options": ["Ο αργός ρυθμός ζωής", "Η έλλειψη τεχνολογίας", "Η ρύπανση, η κίνηση και η έλλειψη χώρου"], "answer": 2}, {"type": "mcq", "q": "Γιατί πολλοί νέοι προτιμούν τη ζωή στην πόλη;", "options": ["Επειδή έχει λιγότερο άγχος", "Επειδή προσφέρει ευκαιρίες για καριέρα", "Επειδή υπάρχουν περισσότερα πάρκα"], "answer": 1}, {"type": "mcq", "q": "Πώς νιώθουν οι μεγαλύτεροι άνθρωποι για τη ζωή στην πόλη;", "options": ["Προτιμούν την ησυχία και τη φύση της υπαίθρου", "Θεωρούν ότι η πόλη είναι ιδανική για αυτούς", "Βρίσκουν την πόλη γεμάτη ενέργεια"], "answer": 0}, {"type": "mcq", "q": "Τι τονίζεται ως ο κύριος λόγος που οι πόλεις παραμένουν δημοφιλείς;", "options": ["Οι λίγες απαιτήσεις της καθημερινότητας", "Οι δυνατότητες για καινοτομία και δημιουργικότητα", "Η ησυχία και η αργή ζωή"], "answer": 1}, {"type": "tf", "t": "Η ζωή στις μεγάλες πόλεις είναι πιο ήσυχη και καθαρή σε σχέση με το παρελθόν.", "a": false}, {"type": "tf", "t": "Η κίνηση στους δρόμους είναι ένα από τα σημαντικότερα προβλήματα της πόλης.", "a": true}, {"type": "tf", "t": "Οι μεγάλες πόλεις δεν έχουν καθόλου χώρους πρασίνου και πάρκα.", "a": false}, {"type": "tf", "t": "Οι νέοι συχνά επιλέγουν να ζουν στην πόλη λόγω των ευκαιριών για εργασία και εκπαίδευση.", "a": true}, {"type": "typed", "q": "Στις μεγάλες πόλεις υπάρχουν περισσότερες ευκαιρίες για εργασία, εκπαίδευση και διασκέδαση. Στις μεγάλες πόλεις υπάρχουν περισσότερες _____ για εργασία, εκπαίδευση και διασκέδαση.", "a": "Δυνατότητες/Επιλογές/Προοπτικές"}, {"type": "typed", "q": "Η ρύπανση είναι ένα από τα μεγαλύτερα προβλήματα της ζωής στις πόλεις. Η ρύπανση αποτελεί ένα από τα μεγαλύτερα _____ της ζωής στις πόλεις.", "a": "Ζητήματα/Μειονεκτήματα"}, {"type": "typed", "q": "Πολλοί άνθρωποι στις πόλεις αισθάνονται πίεση και άγχος. κοντά στη φύση. Πολλοί άνθρωποι στις πόλεις νιώθουν _____ και άγχος.", "a": "Στρες/Ανησυχία"}, {"type": "typed", "q": "Η ζωή στην ύπαιθρο είναι πιο ήρεμη και Η ζωή στην ύπαιθρο είναι πιο _____ και κοντά στη φύση.", "a": "Γαλήνια/Ήσυχη"}, {"type": "typed", "q": "Η καθημερινότητα στις πόλεις είναι συχνά γρήγορη και απαιτητική. Η καθημερινότητα στις πόλεις είναι συχνά _____ και απαιτητική. Διαλέξτε τη λέξη που έχει αντίθετη σημασία από την υπογραμμισμένη και γράψτε στο τετράδιό σας τον αριθμό της άσκησης και δίπλα τη σωστή απάντηση:", "a": "Έντονη/Ταραχώδης/Πυρετώδης"}, {"type": "typed", "q": "Η καθημερινότητα στις μεγάλες πόλεις είναι γεμάτη προκλήσεις. (α) ευκολίες (β) δυσκολίες (γ) αλλαγές", "a": "α (Ευκολίες)"}, {"type": "typed", "q": "Η ζωή στην ύπαιθρο είναι πιο ήρεμη και κοντά στη φύση. (α) ταραχώδης (β) ήσυχη (γ) ήπια", "a": "α (Ταραχώδης)"}, {"type": "typed", "q": "Οι νέοι συχνά βρίσκουν τις πόλεις ελκυστικές. (α) απωθητικές (β) ενδιαφέρουσες (γ) όμορφες", "a": "α (Απωθητικές)"}, {"type": "typed", "q": "Η ρύπανση στις πόλεις είναι ένα μεγάλο πρόβλημα. (α) καθαριότητα (β) μόλυνση (γ) υγεία", "a": "α (Καθαριότητα)"}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Γράψτε ένα κείμενο όπου να συγκρίνετε τη ζωή στην πόλη και τη ζωή στην εξοχή. Αναφέρετε δύο πλεονεκτήματα και ένα μειονέκτημα για κάθε επιλογή και εξηγήστε τι προτιμάτε προσωπικά."}, {"type": "reading", "cat": "reading", "id": "read_081", "title": "!", "passage": "Το τηλεπικοινωνιακό μουσείο\nΤο τηλεπικοινωνιακό μουσείο του Ομίλου ΟΤΕ στην Κηφισιά, με τριάντα ένα χρόνια\nλειτουργίας και έντεκα χρόνια εκπαιδευτικής δράσης, από το 1990 αφηγείται την ιστορία\nτων τηλεπικοινωνιών από την αρχαιότητα μέχρι σήμερα. Μέσα από συλλογές που συνεχώς\nεμπλουτίζονται και ξεπερνούν τα 4.000 αντικείμενα, πλούσιο αρχειακό υλικό με\nπερισσότερα\nαπό\n33.000\nέγγραφα,\nχάρτες\nκαι\nτηλεφωτογραφίες,\nκαθώς\nκαι\nοπτικοακουστικά μέσα ειδικά σχεδιασμένα για το Μουσείο αποτελεί έναν ιδανικό χώρο για\nτην εξέλιξη των τηλεπικοινωνιών.\nΓια τους επισκέπτες του, το ταξίδι στον χρόνο ξεκινά στους εκθεσιακούς χώρους του\nαπό τον πρώτο όροφο με τις τηλεπικοινωνιακές εφευρέσεις της αρχαίας Ελλάδας, όπως το\nσύστημα αναμετάδοσης μηνυμάτων με φωτιά και τις εφευρέσεις του Βυζαντίου και\nσυνεχίζεται με την ανακάλυψη του ηλεκτρισμού και τους μεγάλους εφευρέτες, τον\nτηλέγραφο με σήματα Μόρς, την τηλεγραφία, την τηλεφωνία, τους τηλεφωνικούς\nθαλάμους, το καλωδιακό πλοίο του ΟΤΕ «Θαλής ο Μιλήσιος», τις τηλεφωτογραφίες, τις\nοπτικές ίνες και τους δορυφόρους. Σε επιλεγμένα σημεία η εμπειρία του επισκέπτη\nεμπλουτίζεται με τη βοήθεια έξι ειδικά σχεδιασμένων ψηφιακών εφαρμογών.\nΜπαίνοντας στο Μουσείο, τους επισκέπτες καλωσορίζει η ψηφιακή εικόνα του Bell,\nενώ στη συνέχεια ο Mors «ζωντανεύει» μέσα από το κινητό τηλέφωνο και μιλάει για την\nιστορία της τηλεγραφίας. Πιο κάτω, μπροστά στα μάτια των επισκεπτών γίνεται η βύθιση\nτων υποβρύχιων καλωδίων προκειμένου να συνδεθεί τηλεπικοινωνιακά η ηπειρωτική με\nτη νησιωτική Ελλάδα.\nΤο ταξίδι στο μουσείο και στον χρόνο ολοκληρώνεται στον δεύτερο όροφο με την\nπαρουσίαση της εξέλιξης του δικτύου κινητής τηλεφωνίας και το πρώτο στούντιο\nτηλεόρασης του 1967. Μελλοντικά, οι επισκέπτες θα μπορούν να περιηγηθούν στην έκθεση\nκαι με εικονικό τρόπο (virtually).\nhttps://www.athensmagazine.gr/article/kifisia/382865-moyseio-thlepikoinwniwn-o-micro-iloy-ote-ena-ksexwristotaksidi-sthn-istoria-twn-thlepikoinwniwn-gia-micro-ikroys-kai-micro-egaloys\nΔιασκευή για τις ανάγκες των εξετάσεων.\nΜέρος Α\nΓράψτε στο τετράδιο τον αριθμό της άσκησης και δίπλα τη σωστή απάντηση:\n1. Οι επισκέπτες μπαίνοντας στο Μουσείο αντικρίζουν:\nα. Το καλωδιακό πλοίο «Θαλής ο Μιλήσιος».\nβ. Την ψηφιακή εικόνα του Bell.\nγ. Τίποτα από τα παραπάνω.\n2. Πόσες εφαρμογές «επαυξημένης πραγματικότητας» συναντάμε στους χώρους\nτου Μουσείου:\nα. 10.\nβ. 6.\nγ. Δεν αναφέρεται στο κείμενο.\n3. Στον 1ο όροφο του Μουσείου βλέπουμε:\nα. Εφευρέσεις από την αρχαιότητα.\nβ. Εφευρέσεις από το Βυζάντιο.\nγ. Εφευρέσεις από την αρχαιότητα και το Βυζάντιο.\n4. Το Μουσείο άρχισε να λειτουργεί:\nα. Από το 1990.\nβ. Από το 2000.\nγ. Από το 2004.\n5. Οι συλλογές του Τηλεπικοινωνιακού Μουσείου\nα. αποτελούνται κυρίως από οπτικοακουστικά μέσα.\nβ. δεν διαθέτουν πολλά αντικείμενα και έγγραφα.\nγ. διαρκώς ανανεώνονται και εμπλουτίζονται.\nΓράψτε στο τετράδιο τον αριθμό της άσκησης και δίπλα σημειώστε «Σ» για τη σωστή\nαπάντηση, «Λ» για τη λανθασμένη απάντηση και Δ/Α για την πρόταση που δεν\nαναφέρεται στο κείμενο:\n6. Το Μουσείο Τηλεπικοινωνιών είναι ένα σύγχρονο μουσείο που αξιοποιεί την\nτεχνολογία και την ιστορία.\n7. Στον δεύτερο όροφο του Μουσείου ο επισκέπτης βλέπει τα εκθέματα και μαθαίνει\nγια την εξέλιξη της κινητής τηλεφωνίας.\n8. Στο\nΜουσείο\nΤηλεπικοινωνιών\nπραγματοποιούνται\nδραστηριότητες.\nκαι\nεκπαιδευτικές\n9. Το Μουσείο Τηλεπικοινωνιών συνδυάζει πλούσιο αρχειακό υλικό, εκθέματα,\nψηφιακά προγράμματα, αλλά έχει και «έξυπνα» σχέδια για το μέλλον.\nΜΕΡΟΣ Β\nΔιαβάστε τις παρακάτω προτάσεις και γράψτε στο τετράδιο τον αριθμό της άσκησης\nκαι δίπλα τη σωστή απάντηση:\n1. Στη φράση: «πλούσιο αρχειακό υλικό» λέξη με αντίθετη σημασία στη λέξη\n«πλούσιο» είναι:\nα. Άφθονο\nβ. Αρκετό\nγ. Περιορισμένο\n2. Στην πρόταση «η μουσειακή εμπειρία απογειώνεται» λέξη με παρόμοια σημασία\nγια το «απογειώνεται» είναι:\nα. Μειώνεται\nβ. Κορυφώνεται\nγ. Παρουσιάζεται\n3. Στην πρόταση «Μέσα από συλλογές που συνεχώς εμπλουτίζονται» λέξη με\nπαρόμοια σημασία για το «συνεχώς» είναι:\nα. Διαρκώς\nβ. Αμέσως\nγ. Άμεσα\n4. «Μπαίνοντας στο μουσείο τους επισκέπτες καλωσορίζει η ψηφιακή εικόνα του\nBell». Η λέξη «μπαίνοντας» δηλώνει:\nα. αντίθεση\nβ. χρόνο\nγ. σκοπό\n5. «Οι επισκέπτες θα μπορούν να περιηγηθούν στην έκθεση με εικονικό τρόπο»:\nΣυμπληρώστε τα κενά βάζοντας τα ρήματα στον κατάλληλο τύπο:\n«Ο επισκέπτης …..……………….. …………………… στην έκθεση με εικονικό τρόπο»\n6. Η έκφραση «μπροστά στα μάτια των επισκεπτών» δηλώνει:\nα. Τρόπο\nβ. Τόπο\nγ. Χρόνο\n7. «Το Μουσείο συμπληρώνει 30 χρόνια λειτουργίας»: Συμπληρώστε το κενό\nβάζοντας το ρήμα στον κατάλληλο τύπο, για να δηλώνει το παρελθόν,\nξεκινώντας έτσι: «Φέτος το Μουσείο …………………. 30 χρόνια λειτουργίας.»\n8. Στην πρόταση «Το ταξίδι στον χρόνο συνεχίζεται …» λέξη με αντίθετη σημασία\nστο ρήμα «συνεχίζεται» είναι:\nα. Διακόπτεται\nβ. Διαλύεται\nγ. Διαγράφεται\n9. Ποια από τις παρακάτω λέξεις έχει σχέση με τη λέξη έγγραφα;\nα. Γράμμα\nβ. Σφραγίδα\nγ. Φράγμα\nΜΕΡΟΣ Γ\nΔιαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο\n(80-100 λέξεις).\nΕίστε δημοσιογράφος και γράφετε στη στήλη «Προτάσεις ψυχαγωγίας» της εφημερίδας που\nεργάζεστε ένα σύντομο κείμενο με σκοπό να πείσετε τους αναγνώστες σας να επισκεφτούν\nτο Μουσείο Τηλεπικοινωνιών.", "sub": [{"type": "mcq", "q": "Στη φράση: «πλούσιο αρχειακό υλικό» λέξη με αντίθετη σημασία στη λέξη «πλούσιο» είναι:", "options": ["Άφθονο", "Αρκετό", "Περιορισμένο"], "answer": 2}, {"type": "mcq", "q": "Στην πρόταση «η μουσειακή εμπειρία απογειώνεται» λέξη με παρόμοια σημασία για το «απογειώνεται» είναι:", "options": ["Μειώνεται", "Κορυφώνεται", "Παρουσιάζεται"], "answer": 1}, {"type": "mcq", "q": "Στην πρόταση «Μέσα από συλλογές που συνεχώς εμπλουτίζονται» λέξη με παρόμοια σημασία για το «συνεχώς» είναι:", "options": ["Διαρκώς", "Αμέσως", "Άμεσα"], "answer": 0}, {"type": "mcq", "q": "«Μπαίνοντας στο μουσείο τους επισκέπτες καλωσορίζει η ψηφιακή εικόνα του Bell». Η λέξη «μπαίνοντας» δηλώνει:", "options": ["αντίθεση", "χρόνο", "σκοπό"], "answer": 1}, {"type": "typed", "q": "«Οι επισκέπτες θα μπορούν να περιηγηθούν στην έκθεση με εικονικό τρόπο»: Συμπληρώστε τα κενά βάζοντας τα ρήματα στον κατάλληλο τύπο: «Ο επισκέπτης _____ .. _____ .. _____ στην έκθεση με εικονικό τρόπο»", "a": "Θα μπορεί, να περιηγηθεί"}, {"type": "mcq", "q": "Η έκφραση «μπροστά στα μάτια των επισκεπτών» δηλώνει:", "options": ["Τρόπο", "Τόπο", "Χρόνο"], "answer": 1}, {"type": "typed", "q": "«Το Μουσείο συμπληρώνει 30 χρόνια λειτουργίας»: Συμπληρώστε το κενό βάζοντας το ρήμα στον κατάλληλο τύπο, για να δηλώνει το παρελθόν, ξεκινώντας έτσι: «Φέτος το Μουσείο _____ . 30 χρόνια λειτουργίας.»", "a": "Συμπλήρωσε"}, {"type": "mcq", "q": "Στην πρόταση «Το ταξίδι στον χρόνο συνεχίζεται …» λέξη με αντίθετη σημασία στο ρήμα «συνεχίζεται» είναι:", "options": ["Διακόπτεται", "Διαλύεται", "Διαγράφεται"], "answer": 0}, {"type": "mcq", "q": "Ποια από τις παρακάτω λέξεις έχει σχέση με τη λέξη έγγραφα;", "options": ["Γράμμα", "Σφραγίδα", "Φράγμα"], "answer": 0}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Είστε δημοσιογράφος και γράφετε στη στήλη «Προτάσεις ψυχαγωγίας» της εφημερίδας που εργάζεστε ένα σύντομο κείμενο με σκοπό να πείσετε τους αναγνώστες σας να επισκεφτούν το Μουσείο Τηλεπικοινωνιών."}, {"type": "reading", "cat": "reading", "id": "read_082", "title": "!", "passage": "Ελληνική Ορνιθολογική Εταιρεία\nΗ Ελληνική Ορνιθολογική Εταιρεία είναι περιβαλλοντική, μη κερδοσκοπική\nοργάνωση για τη μελέτη και προστασία των άγριων πουλιών και των βιοτόπων τους στην\nΕλλάδα. Από το 1982 εργάζεται με σκοπό να διασφαλίσει ένα ασφαλές περιβάλλον για\nπουλιά και για ανθρώπους. Το έργο της περιλαμβάνει μεγάλη ποικιλία δράσεων: από την\nπροστασία και τη μελέτη, ως την ενημέρωση, την εκπαίδευση, αλλά και τις παρεμβάσεις για\nκρίσιμα θέματα του περιβάλλοντος. Είναι μέλος της μεγαλύτερης Παγκόσμιας Ένωσης για\nτην προστασία των πουλιών και των βιοτόπων τους. Άλλωστε, τα προβλήματα των πουλιών\nδεν γνωρίζουν σύνορα.\nΓιατί όμως τα πουλιά; Τα πουλιά αποτελούν έναν από τους σημαντικότερους δείκτες\nτης ποιότητας του φυσικού περιβάλλοντος. Στον αγώνα για την προστασία τους, η Ελλάδα\nείναι ιδιαίτερα σημαντική διεθνώς, τόσο για τα πουλιά που δεν μεταναστεύουν σε\nθερμότερους τόπους,όσο και για τα μεταναστευτικά είδη. Στο σταυροδρόμι τριών\nηπείρων, η Ελλάδα, με εκπληκτική ποικιλία στο φυσικό περιβάλλον (ακτές, βουνά, δάση,\nλιβάδια), διευκολύνει το ταξίδι εκατομμύριων πουλιών από τη Μεσόγειο προς την Αφρική.\nΗ Ελλάδα αποτελεί έναν φιλόξενο τόπο για τα είδη του ευρωπαϊκού Βορρά που\nκατεβαίνουν για να ωφεληθούν από τον ήπιο χειμώνα της. Η παρακολούθηση και η\nκαταμέτρηση του πληθυσμού τους είναι σημαντικό έργο στο οποίο δραστηριοποιούνται,\nεκτός από ειδικοί επιστήμονες, δεκάδες εθελοντές από όλη την Ελλάδα.\nΕιδικά οι παρατηρήσεις εθελοντών και ερασιτεχνών έχουν καθοριστικό ρόλο στο\nέργο της Ορνιθολογικής Εταιρείας, γιατί μπορούν να δώσουν πολύτιμα στοιχεία, τα οποία\nείναι αδύνατον να συγκεντρωθούν από λίγους ειδικούς επιστήμονες. Η Ορνιθολογική\nΕταιρεία πραγματοποιεί πολυετή εθελοντικά προγράμματα καταμέτρησης πουλιών στα\nοποία η συμβολή εθελοντών παρατηρητών γίνεται μέσο προστασίας τους.\nhttps://www.lifo.gr/articles/environment_articles/282182/i-elliniki-ornithologiki-etaireia-polema-ti-lathrothiria\nΔιασκευή για τις ανάγκες των εξετάσεων.", "sub": [{"type": "mcq", "q": "Η Ελληνική Ορνιθολογική Εταιρεία ενδιαφέρεται:", "options": ["αποκλειστικά για τον πληθυσμό των πουλιών.", "για την προστασία μόνο των απειλούμενων ειδών.", "για ένα καλύτερο φυσικό περιβάλλον μέσα στο οποίο ζουν άνθρωποι και πουλιά."], "answer": 2}, {"type": "mcq", "q": "Η Ελλάδα δέχεται πολλά μεταναστευτικά πουλιά:", "options": ["γιατί όλες τις εποχές του χρόνου έχει καλό καιρό.", "γιατί η γεωγραφική της θέση είναι ευνοϊκή για τη μετανάστευση.", "γιατί έχει τις κατάλληλες υποδομές."], "answer": 1}, {"type": "mcq", "q": "Κατά την εποχή της μετανάστευσης των πουλιών η Ορνιθολογική Εταιρεία:", "options": ["παρακολουθεί, καταγράφει τα πουλιά και τον πληθυσμό τους.", "απαγορεύει τις επισκέψεις σε υγροβιότοπους", "δραστηριοποιείται στην προστασία των φωλιών τους."], "answer": 0}, {"type": "mcq", "q": "Η Ελληνική Ορνιθολογική Εταιρεία:", "options": ["οργανώνει εθελοντικά προγράμματα μεγάλης χρονικής διάρκειας", "το έργο της και οι δραστηριότητές της είναι πολύ συγκεκριμένα", "αντιμετωπίζει έλλειψη χρηματικών συνδρομών."], "answer": 0}, {"type": "mcq", "q": "Η Ορνιθολογική Εταιρεία", "options": ["συνεργάζεται μόνο με άλλες ελληνικές περιβαλλοντικές οργανώσεις.", "συμμετέχει στην Παγκόσμια Ένωση για την προστασία των πουλιών.", "δεν ενδιαφέρεται για συνεργασίες."], "answer": 1}, {"type": "tf", "t": "Η δράση της Ελληνικής Ορνιθολογικής Εταιρείας συγκριτικά με το τι συμβαίνει στις άλλες χώρες του κόσμου, δεν είναι τόσο σημαντική.", "a": false}, {"type": "tf", "t": "Το έργο των ειδικών επιστημόνων είναι ανώτερο και καλύτερο από αυτό των Εθελοντών της Ορνιθολογικής Εταιρείας.", "a": false}, {"type": "tf", "t": "Ένας λόγος που η Ελλάδα κατέχει σημαντική θέση στον αγώνα προστασίας των πουλιών είναι το γεωμορφολογικό της περιβάλλον.", "a": true}, {"type": "tf", "t": "Στην Ορνιθολογική Εταιρεία συμμετέχουν εθελοντές από όλες τις χώρες της Μεσογείου.", "a": false}, {"type": "mcq", "q": "«…για να ωφεληθούν από τον ήπιο χειμώνα της». Η πρόταση αυτή φανερώνει:", "options": ["συμπέρασμα", "τρόπο", "σκοπό"], "answer": 2}, {"type": "typed", "q": "«Άλλωστε, τα προβλήματα των πουλιών δεν γνωρίζουν σύνορα.» Συμπληρώστε το κενό βάζοντας το ρήμα στον κατάλληλο τύπο, για να δηλώνει το μέλλον, ξεκινώντας έτσι: «Πάντοτε, τα πρόβληματα των πουλιών ___________________ σύνορα»", "a": "Δεν θα γνωρίζουν"}, {"type": "mcq", "q": "Ειδικά:", "options": ["γενικά", "συγκεκριμένα", "τελικά"], "answer": 1}, {"type": "mcq", "q": "Υλοποιεί:", "options": ["πραγματοποιεί", "σχεδιάζει", "συνθέτει"], "answer": 0}, {"type": "mcq", "q": "Κρίσιμα:", "options": ["απλά", "σοβαρά", "επίκαιρα"], "answer": 1}, {"type": "mcq", "q": "Συνεισφορά:", "options": ["ωφέλεια", "βοήθεια", "προσοχή"], "answer": 1}, {"type": "mcq", "q": "Ποικιλομορφία:", "options": ["ομοιομορφία", "ομοιογένεια", "ομοιότητα"], "answer": 0}, {"type": "mcq", "q": "Διευκολύνει:", "options": ["δυσκολεύει", "υποστηρίζει", "εξυπηρετεί"], "answer": 0}, {"type": "mcq", "q": "Ήπιο:", "options": ["ελαφρό", "απαλό", "βαρύ"], "answer": 2}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Επισημαίνουμε ότι δεν πρέπει να υπογράψετε με το ονοματεπώνυμό σας στο τέλος του κειμένου. Γράφετε ένα γράμμα σ’ έναν φίλο σας ή μία φίλη σας για να του/ της πείτε ότι θαυμάζετε το έργο της Ορνιθολογικής Εταιρείας και θέλετε να γίνετε εθελοντής της."}, {"type": "reading", "cat": "reading", "id": "read_083", "title": "!", "passage": "Κόρινθος\nΣτο σημείο όπου ο Ισθμός χώριζε τον Κορινθιακό από τον Σαρωνικό κόλπο κι ένωνε την\nυπόλοιπη Ελλάδα με την Πελοπόννησο, σε μια εύφορη πεδιάδα, άνθισε μία από τις πιο\nαξιόλογες ελληνικές πολιτείες, η Κόρινθος. Ο μεσογειακός ήλιος μεγάλωνε γρήγορα τα\nσπαρτά στον κάμπο της. Τα δυο της λιμάνια, το Λέχαιο και οι Κεχρεές, ένα σε κάθε κόλπο,\nτην έκαναν σταυροδρόμι εμπορικών συναλλαγών. Τα καράβια της μετέφεραν προς κάθε\nκατεύθυνση τα κορινθιακά προϊόντα, που την ποιότητά τους δεν αμφισβητούσε κανένας.\nΈνας ψηλός βράχος, η Ακροκόρινθος, την προστάτευε και αποτελούσε καταφύγιο των\nκατοίκων της σε δύσκολες ώρες.\nΟ θεός της θάλασσας, ο Ποσειδώνας, αγαπούσε την Κόρινθο. Την ήθελε δική του. Όποια,\nόμως, πόλη ήθελε, τη διεκδικούσε και κάποιος άλλος θεός, την Αθήνα η Αθηνά, το Άργος η\nΉρα. Τώρα, στη διεκδίκηση της Κορίνθου αντίπαλός του ήταν ο Ήλιος. Και πώς να μην είναι;\nΠρωί πρωί, ανηφορίζοντας με το άρμα του στον ουρανό, τη χρύσιζε με τις ακτίνες του, την\nευλογούσε. Αλλά κι ο Ποσειδώνας χτυπούσε με την τρίαινά του τους βράχους κι ανάβλυζαν\nπηγές με καθαρά νερά.\nΗ διαμάχη διαρκούσε πολύ και αποφάσισαν να βάλουν διαιτητή. Έναν διαιτητή που θα\nεπέβαλλε την απόφασή του και κανένας δεν θα μπορούσε να την αμφισβητήσει. Και\nδιάλεξαν τον Βριάρεο με τα εκατό χέρια. Το πλάσμα αυτό ήταν δυνατό και άγριο και είχε\nβοηθήσει τον Δία να νικήσει τους Τιτάνες με τη δύναμη των εκατό χεριών του. Ήρθε,\nλοιπόν, ο Βριάρεος στην Κόρινθο, είδε και αποφάσισε. Τελεσίδικα. Ο Ήλιος θα είχε δική του\nτην περιοχή της Ακροκορίνθου με τη συναρπαστική θέα κι ο Ποσειδώνας όλη την περιοχή\nγύρω από τον Ισθμό και τη θάλασσα.\nΑγγελική Βαρελλά, Κόρινθος, ήρωες, τόποι, πολιτισμοί, Δελφίνι.Διασκευή για τις ανάγκες των εξετάσεων.", "sub": [{"type": "mcq", "q": "Η αρχαία Κόρινθος ήταν:", "options": ["παραθαλάσσι", "ορεινή.", "νησί."], "answer": 0}, {"type": "mcq", "q": "Ο Ισθμός της Κορίνθου ένωνε:", "options": ["την υπόλοιπη Ελλάδα με την Αττική.", "την υπόλοιπη Ελλάδα με την Πελοπόννησο.", "την Κόρινθο με την Αττική."], "answer": 1}, {"type": "mcq", "q": "Ο Ποσειδώνας διεκδικούσε την Κόρινθο από:", "options": ["την Αθηνά.", "την Ήρ", "τον Ήλιο."], "answer": 2}, {"type": "mcq", "q": "Σύμβολο του Ποσειδώνα ήταν:", "options": ["η κουκουβάγι", "το άλογο.", "η τρίαιν"], "answer": 2}, {"type": "mcq", "q": "Διαιτητής στη διαμάχη Ποσειδώνα και Ήλιου για την Κόρινθο ήταν:", "options": ["η Αθηνά.", "ο Δίας.", "ο Βριάρεος."], "answer": 2}, {"type": "tf", "t": "Όποια πόλη ήθελε ο Ποσειδώνας, οι άλλοι θεοί δεν την διεκδικούσαν.", "a": false}, {"type": "tf", "t": "Η Κόρινθος είχε εύφορη και πλούσια πεδιάδα.", "a": true}, {"type": "tf", "t": "Η Κόρινθος είχε σημαντική εμπορική δραστηριότητα.", "a": true}, {"type": "tf", "t": "Ο Ποσειδώνας έκανε δική του την περιοχή γύρω από τον Ισθμό και τη θάλασσα και ο Ήλιος την περιοχή της Ακροκορίνθου.", "a": true}, {"type": "mcq", "q": "Ποια από τις παρακάτω λέξεις έχει παρόμοια σημασία με τη λέξη «εύφορη»:", "options": ["γόνιμη", "ξερή", "πράσινη"], "answer": 0}, {"type": "mcq", "q": "Της λέξης «αντίπαλος» αντίθετη είναι:", "options": ["εχθρός", "σύμμαχος", "κακός"], "answer": 1}, {"type": "mcq", "q": "Στην πρόταση «άνθισε τα παλιά χρόνια μια από τις πιο αξιόλογες ελληνικές πολιτείες, η Κόρινθος» η λέξη «άνθισε» σημαίνει:", "options": ["αναπτύχθηκε", "παρουσιάστηκε", "κατασκευάστηκε"], "answer": 0}, {"type": "mcq", "q": "«Η διαμάχη τραβούσε σε μάκρος»: λέξη με παρόμοια σημασία για τη λέξη «διαμάχη» είναι:", "options": ["διάλογος", "διαφωνία", "συνομιλία"], "answer": 1}, {"type": "typed", "q": "«Ήρθε λοιπόν ο Βριάρεος στην Κόρινθο, είδε και αποφάσισε.» Συμπληρώστε το κενό βάζοντας το ρήμα στον κατάλληλο τύπο, για να δηλώνει το παρόν, ξεκινώντας έτσι:« Έρχεται, λοιπόν, ο Βριάρεος στην Κόρινθο, ____________ και ____________»", "a": "Βλέπει, αποφασίζει"}, {"type": "mcq", "q": "Στην πρόταση: «την ήθελε δική του» η λέξη «την» αναφέρεται:", "options": ["στην Κόρινθο", "στη θάλασσα", "στην Αθήνα"], "answer": 0}, {"type": "mcq", "q": "Η πρόταση « … για να γίνει το καταφύγιο των κατοίκων της σε δύσκολες ώρες» δηλώνει:", "options": ["συμπέρασμα,", "σκοπό,", "τρόπο"], "answer": 1}, {"type": "mcq", "q": "Λέξη με αντίθετη σημασία του ρήματος «ένωνε» είναι:", "options": ["έμοιαζε", "συνέδεε", "χώριζε"], "answer": 2}, {"type": "mcq", "q": "Ποια λέξη προέρχεται από το ρήμα «τύχαινε»:", "options": ["τυχερός", "πτυχίο", "ταχύτητα"], "answer": 0}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Επισημαίνουμε ότι δεν πρέπει να υπογράψετε με το ονοματεπώνυμό σας στο τέλος του κειμένου. Γράψτε σ’ έναν φίλο ή σε μια φίλη σας που ζει στη χώρα καταγωγής σας, για να του/της αναφέρετε τις εντυπώσεις σας από την ιστορία της Αρχαίας Κορίνθου."}, {"type": "reading", "cat": "reading", "id": "read_084", "title": "!", "passage": "Ο Οκτώβριος των πουλιών\nΤο πρώτο Σαββατοκύριακο του Οκτωβρίου 1993 διοργανώθηκε για πρώτη φορά η\nΠανευρωπαϊκή Γιορτή των Πουλιών από την Παγκόσμια Ένωση Περιβαλλοντικών\nΟργανώσεων για την προστασία των πουλιών. Ο Οκτώβριος είναι περίοδος μετανάστευσης\nτων πουλιών που αποτελεί, σίγουρα, την πιο γοητευτική, για εμάς τους ανθρώπους, πτυχή\nτης ζωής τους.\nΤο απίστευτο ταξίδι της μετανάστευσης απαιτεί μία πολύ δύσκολη προσπάθεια\nπροκειμένου ένα πουλί να ξεπεράσει μύρια εμπόδια, ταραγμένες θάλασσες, αφιλόξενες\nερήμους, εχθρούς που παραμονεύουν, κακοκαιρία κ.ά. Ιδιαίτερα, θαυμασμό προκαλεί το\nταξίδι μικρών πουλιών, όπως είναι ο θαμνοφυλλοσκόπος, που ζυγίζει λιγότερο από 15\nγραμμάρια!\nΣτη χώρα μας, το φθινόπωρο είναι μια συναρπαστική εποχή για τη μετανάστευση\nτων πουλιών: οι ανοιξιάτικοι μετανάστες αναχωρούν για την Αφρική όπως ο Ασπροπάρης,\nενώ οι φθινοπωρινοί, όπως η νανόχηνα, φτάνουν στους βιότοπους της ελληνικής υπαίθρου\nαπό τον Βορρά. Ο ασπροπάρης είναι το πιο απειλούμενο πουλί της Ελλάδας και ο μόνος\nευρωπαϊκός γύπας που μεταναστεύει. Κάθε χρόνο διανύει περισσότερα από 5.000\nχιλιόμετρα από την υποσαχάρια Αφρική για να φωλιάσει εδώ. Μόλις 4 ζευγάρια απομένουν\nστην χώρα μας και λιγότερα από 70 στα Βαλκάνια. Μέχρι τη δεκαετία του 1980 αποτελούσε\nένα από τα πιο κοινά είδη γύπα της χώρας μας σήμερα βρίσκεται κοντά στην εξαφάνιση. Η\nδραματική μείωση του πληθυσμού του οφείλεται σε μεγάλο βαθμό στα δηλητηριασμένα\nδολώματα. Η νανόχηνα, πάλι, είναι το πιο απειλούμενο υδρόβιο πουλί της Ευρώπης. Κάθε\nχρόνο μόλις 30 ζευγάρια διανύουν χιλιάδες χιλιόμετρα από τον Αρκτικό κύκλο, για να\nπεράσουν τον χειμώνα τους στους υγροβιότοπους της Βόρειας Ελλάδας.\nΠεριοδικό Geo, 10, 2020. Διασκευή για τις ανάγκες των εξετάσεων.", "sub": [{"type": "mcq", "q": "Ο Οκτώβριος είναι ο μήνας των πουλιών γιατί:", "options": ["στην Ελλάδα έρχονται πολλά πουλιά.", "από την Ελλάδα φεύγουν πολλά πουλιά.", "αρχίζει η φθινοπωρινή μετανάστευση των πουλιών."], "answer": 2}, {"type": "mcq", "q": "Σκοπός της πανευρωπαϊκής Γιορτής των Πουλιών είναι:", "options": ["να διασκεδάσει τους ανθρώπους.", "να ενημερώσει τους ανθρώπους για τα άγρια πουλιά.", "να ευαισθητοποιήσει την ευρωπαϊκή κοινή γνώμη για την προστασία τους."], "answer": 2}, {"type": "mcq", "q": "Ο ασπροπάρης και η νανόχηνα:", "options": ["είναι ανοιξιάτικοι μετανάστες.", "τον Οκτώβριο ο ασπροπάρης αναχωρεί από τη χώρα μας, ενώ η νανόχην", "είναι φθινοπωρινοί μετανάστες."], "answer": 1}, {"type": "mcq", "q": "Η νανόχηνα είναι:", "options": ["το πιο απειλούμενο πουλί της Ελλάδας.", "το πιο απειλούμενο πουλί της Ευρώπης.", "το πιο απειλούμενο υδρόβιο πουλί της Ευρώπης."], "answer": 2}, {"type": "mcq", "q": "Η μετανάστευση των πουλιών:", "options": ["εντυπωσιάζει εμάς τους ανθρώπους.", "είναι ένα ταξίδι με πολλές δυσκολίες.", "εντυπωσιάζει τους ανθρώπους και έχει πολλές δυσκολίες για τα πουλιά."], "answer": 2}, {"type": "tf", "t": "Προορισμός των ανοιξιάτικων μεταναστών, όπως του ασπροπάρη είναι η Αφρική.", "a": true}, {"type": "tf", "t": "Η κυριότερη αιτία μείωσης του ασπροπάρη και της νανόχηνας είναι τα δηλητηριασμένα δολώματα.", "a": false}, {"type": "tf", "t": "Η νανόχηνα διανύει κάθε χρόνο χιλιάδες χιλιόμετρα από τον Αρκτικό Κύκλο, για να ξεχειμωνιάσει στους υγροτόπους της Βόρειας Ελλάδας.", "a": true}, {"type": "tf", "t": "Σύμφωνα με το κείμενο μεταναστεύουν μόνο μεγάλα πουλιά.", "a": false}, {"type": "typed", "q": "«Θαυμασμό προκαλεί το ταξίδι μικρών πουλιών _____ ». Συμπληρώστε το κενό βάζοντας το ρήμα στον κατάλληλο τύπο, για να δηλώνει το μέλλον, ξεκινώντας έτσι: «Διαρκώς θαυμασμό _____ το ταξίδι μικρών πουλιών.»", "a": "Θα προκαλεί"}, {"type": "typed", "q": "«Οι ανοιξιάτικοι μετανάστες αναχωρούν για την Αφρική _____ » Συμπληρώστε το κενό βάζοντας το ρήμα στον κατάλληλο τύπο, για να δηλώνει το παρελθόν, ξεκινώντας έτσι:«Κάθε χρόνο οι ανοιξιάτικοι μετανάστες _____ .. _____ για την Αφρική».", "a": "Αναχωρούσαν"}, {"type": "mcq", "q": "«Αφιλόξενες ερήμους»: λέξη με αντίθετη σημασία στο «αφιλόξενες» είναι:", "options": ["Συμπαθητικές", "Φιλόξενες", "Παράξενες"], "answer": 1}, {"type": "mcq", "q": "«Μύρια εμπόδια»: για τη λέξη «μύρια», λέξη με παρόμοια σημασία είναι:", "options": ["Άπειρα", "Περισσότερα", "Λίγα"], "answer": 0}, {"type": "mcq", "q": "« … αποτελεί σίγουρα την πιο γοητευτική …» Λέξη με παρόμοια σημασία για τη λέξη «σίγουρα» είναι:", "options": ["Βασικά", "Απλά", "Βέβαια"], "answer": 2}, {"type": "mcq", "q": "Στη φράση «… για την προστασία των πουλιών …» Λέξη με παρόμοια σημασία για τη λέξη «προστασία» είναι:", "options": ["Προσοχή", "Προθυμία", "Φροντίδα"], "answer": 2}, {"type": "typed", "q": "«Ο μόνος ευρωπαϊκός γύπας που μεταναστεύει.»: Ξαναγράψτε την πρόταση συμπληρώνοντας τους κατάλληλους τύπους: «Οι μόνοι _____ . _____ . γύπες που _____ . .»", "a": "Ευρωπαϊκοί, μεταναστεύουν"}, {"type": "mcq", "q": "« … για να περάσουν τον χειμώνα τους στους υγροβιότοπους της Βόρειας Ελλάδας.» Η πρόταση δηλώνει:", "options": ["Χρόνο", "Σκοπό", "Τρόπο"], "answer": 1}, {"type": "typed", "q": "«Οι φθινοπωρινοί μετανάστες φτάνουν στους βιότοπους της ελληνικής υπαίθρου.» Συμπληρώστε το κενό βάζοντας το ρήμα στον κατάλληλο τύπο, για να δηλώνει το παρελθόν, ξεκινώντας έτσι: «Πριν ένα χρόνο, οι φθινοπωρινοί μετανάστες _____ .. _____ στους βιότοπους της ελληνικής υπαίθρου»", "a": "Έφτασαν"}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Είστε δημοσιογράφος και γράφετε ένα σύντομο κείμενο με τίτλο: «Η Μετανάστευση των πουλιών», για να ευαισθητοποιήσετε τους αναγνώστες σας αναφορικά με τη σπουδαιότητα της παρουσίας της άγριας ζωής. Το κείμενό σας θα δημοσιευτεί στο περιοδικό: «Φύση και Ζωή»."}, {"type": "reading", "cat": "reading", "id": "read_085", "title": "!", "passage": "[Τα Μουσεία κι εμείς]\nΣημαντικά έργα της αρχαιότητας διαφόρων πολιτισμών υπάρχουν σε διεθνείς\nμουσειακές συλλογές. Στο πλαίσιο αυτό, η ομορφιά της αρχαίας ελληνικής τέχνης\nξεχωρίζει σε όποια γωνιά του κόσμου κι αν βρίσκεται. Εξίσου διάσημα με τα γλυπτά του\nΠαρθενώνα (Βρετανικό Μουσείο) είναι τα αγάλματα που βρίσκονται στο Μουσείο του\nΛούβρου, οι δύο «θεές» της ελληνιστικής αρχαιότητας που συγκαταλέγονται σταθερά στα\nπέντε πιο δημοφιλή εκθέματά του και στα σπουδαιότερα μνημεία του.\nΤο περίφημο άγαλμα της Αφροδίτης της Μήλου για χρόνια θεωρούνταν δημιούργημα\nτου Πραξιτέλη. Το ανακάλυψε το 1820 ο αγρότης Γιώργος (ή Θεόδωρος) Κεντρωτάς, καθώς\nέσκαβε το κτήμα του στο νησί. Στο Μουσείο του Λούβρου βρίσκεται και η Νίκη της\nΣαμοθράκης. Δεν είναι γνωστός ο δημιουργός της, αλλά ξέρουμε ότι δημιουργήθηκε την\nελληνιστική εποχή και βρέθηκε στον ναό των «μεγάλων Θεών ή Καβείρων». Είναι ένα\nγιγάντιο άγαλμα (3.28 μέτρα με τα φτερά) που βρέθηκε σε κομμάτια το 1863 από την\nαρχαιολογική αποστολή του Καρόλου Σαμπουαζό στα Βόρεια της Σαμοθράκης και\nμεταφέρθηκε στη Γαλλία το 1864. Από το 1945 μπορεί να το θαυμάσει κάποιος πάνω στην\nπερίφημη σκάλα Νταρού.\nΣτο Μητροπολιτικό μουσείο της Νέας Υόρκης, η συλλογή αρχαίας ελληνικής τέχνης\nείναι μία από τις πλουσιότερες συλλογές στον κόσμο με έργα μινωικού, μυκηναϊκού\nπολιτισμού, γλυπτά αρχαϊκής και πρωτοκλασικής περιόδου, αγγεία φημισμένων\nαγγειογράφων του 6ου αι. π. Χ. Ανάμεσά τους και ο περίφημος «Αρπιστής» (2800 έως 2700\nπ. Χ.) έργο κυκλαδικού πολιτισμού. Είναι ένα μικρό αγαλματίδιο από μάρμαρο της Πάρου\n(μόλις 29, 21 εκατοστά) και αναπαριστά έναν μουσικό που κάθεται σε μία καρέκλα ή σε έναν\nθρόνο, κρατάει μία άρπα και με τα δύο του χέρια και παίζει μια μουσική που επιζεί στους\nαιώνες.\nhttps://www.tovima.gr/printed_post/i-arxaia-ellada-ston-sygxrono-kosmo/ Διασκευή για τις ανάγκες των εξετάσεων.", "sub": [{"type": "mcq", "q": "Η Αφροδίτη της Μήλου ανακαλύφθηκε το:", "options": ["1821", "1820", "1863"], "answer": 1}, {"type": "mcq", "q": "Η Αφροδίτη της Μήλου ανακαλύφθηκε από:", "options": ["έναν ψαρά", "από αρχαιολόγους", "έναν αγρότη"], "answer": 2}, {"type": "mcq", "q": "Η Αφροδίτη της Μήλου και η Νίκη της Σαμοθράκης είναι:", "options": ["τα πιο διάσημα", "τα πιο ωραία", "τα πιο περίφημα αγάλματα του μουσείου του Λούβρου."], "answer": 0}, {"type": "mcq", "q": "Η Νίκη της Σαμοθράκης βρίσκεται στο Μουσείο του Λούβρου", "options": ["από το 1945.", "από το 1864.", "από το 1863."], "answer": 1}, {"type": "mcq", "q": "Επιλέξτε έναν άλλο τίτλο για το κείμενο:", "options": ["Η Νίκη της Σαμοθράκης.", "Η Αφροδίτη της Μήλου.", "Η αρχαία τέχνη στα μουσεία του κόσμου."], "answer": 2}, {"type": "tf", "t": "Η Αφροδίτη της Μήλου και η Νίκη της Σαμοθράκης είναι το ίδιο γνωστά και διάσημα αγάλματα, όπως τα γλυπτά του Παρθενώνα.", "a": true}, {"type": "tf", "t": "Η Αφροδίτη της Μήλου και η Νίκη της Σαμοθράκης κατασκευάστηκαν την αρχαϊκή εποχή.", "a": false}, {"type": "tf", "t": "Ο «Αρπιστής» είναι αγαλματίδιο μινωικό.", "a": false}, {"type": "tf", "t": "Η Αφροδίτη της Μήλου και η Νίκη της Σαμοθράκης απεικονίζουν μούσες.", "a": false}, {"type": "mcq", "q": "« ….. παίζει μια μουσική που επιζεί στους αιώνες». Λέξη με παρόμοια σημασία για τη λέξη «επιζεί» είναι:", "options": ["συντηρείται.", "διατηρείται.", "τραγουδιέται."], "answer": 1}, {"type": "mcq", "q": "« … από το 1945 παρουσιάζεται πάνω στην περίφημη σκάλα Νταρού.» Στη λέξη «παρουσιάζεται», λέξη με παρόμοια σημασία είναι το:", "options": ["βρίσκεται.", "καμαρώνει.", "κυριαρχεί."], "answer": 0}, {"type": "typed", "q": "«Είναι ένα αγαλματίδιο από παριανό μάρμαρο και αναπαριστά έναν μουσικό.» Συμπληρώστε το κενό βάζοντας το ρήμα στον κατάλληλο τύπο, για να δηλώνει το παρελθόν, ξεκινώντας έτσι: «Κάποτε _____ .. ένα αγαλματίδιο από παριανό μάρμαρο και αναπαριστούσε έναν μουσικό.»", "a": "Ήταν"}, {"type": "mcq", "q": "«Διάσημα», ποια λέξη έχει αντίθετη σημασία:", "options": ["περίφημα", "δημοφιλή", "άγνωστα"], "answer": 2}, {"type": "typed", "q": "« _____ τα κομμάτια του οποίου ταξίδεψαν τελικά την επόμενη χρονιά _____ » Συμπληρώστε το κενό βάζοντας το ρήμα στον κατάλληλο τύπο, για να δηλώνει το παρόν: « _____ τα κομμάτια του οποίου ________________________ τελικά αυτή τη χρονιά.»", "a": "ταξιδεύουν"}, {"type": "mcq", "q": "Στην πρόταση “την ανακάλυψε το 1820 ο αγρότης Γιώργος (ή Θεόδωρος) Κεντρωτάς” το “την” αναφέρεται:", "options": ["Στην Αφροδίτη της Μήλου,", "Στην Ελλάδα", "Στη Μήλο"], "answer": 0}, {"type": "mcq", "q": "Η πρόταση: “καθώς έσκαβε το κτήμα του στο νησί” δηλώνει:", "options": ["Τόπο,", "Αιτία,", "Χρόνο."], "answer": 2}, {"type": "typed", "q": "«Δεν είναι γνωστός ο δημιουργός της, αλλά ξέρουμε ότι δημιουργήθηκε την ελληνιστική εποχή και βρέθηκε στον ναό των «μεγάλων Θεών ή Καβείρων». Συμπληρώστε τα κενά βάζοντας τα ρήματα στον κατάλληλο τύπο: «Δεν είναι γνωστός ο δημιουργός τους αλλά ξέρουμε ότι _____ .. την ελληνιστική εποχή και _____ . στον ναό των μεγάλων θεών ή Καβείρων.»", "a": "Δημιουργήθηκαν, βρέθηκαν"}, {"type": "mcq", "q": "«Οι δύο ¨θεές¨ της ελληνιστικής αρχαιότητας που συγκαταλέγονται σταθερά στα πέντε πιο δημοφιλή εκθέματα … » Ποια είναι η λέξη με παρόμοια σημασία για το ρήμα «συγκαταλέγονται»;", "options": ["Εμφανίζονται", "Μετριούνται", "Περιλαμβάνονται"], "answer": 2}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Γράψτε τι προσφέρει κατά τη γνώμη σας, η επίσκεψη σ’ ένα μουσείο ζωγραφικής."}, {"type": "reading", "cat": "reading", "id": "read_086", "title": "!", "passage": "«Εγκατάλειψη θυμάτων σε τροχαία δυστυχήματα»\nΜια είδηση που μας ήρθε πρόσφατα από το Συμβούλιο της Ευρώπης συνιστά στην\nΚυβέρνηση να επιβάλει από τώρα και στο εξής πιο αυστηρές ποινές στους ασυνείδητους\nοδηγούς, που, αφού χτυπήσουν με το αυτοκίνητό τους τα θύματά τους, τα εγκαταλείπουν\nστη συνέχεια αβοήθητα στον δρόμο, φεύγοντας από τη σκηνή του δυστυχήματος.\nΤο Συμβούλιο της Ευρώπης συνέστησε στις χώρες μέλη του, μεταξύ των οποίων\nπεριλαμβάνεται και η Ελλάδα, να προσαρμόσουν τις σχετικές νομοθεσίες τους σε ό, τι\nαφορά αυτό το αδίκημα. Ιδιαίτερα θα πρέπει να βελτιώσουν τους κανονισμούς οδικής\nσυμπεριφοράς.\nΈνας οδηγός που κτυπά και φεύγει εγκαταλείποντας το θύμα του θα πρέπει να υπόκειται\nστις ακόλουθες ποινές:\n-Πρόστιμο που να αποτελεί ουσιαστική οικονομική θυσία γι’ αυτόν που τιμωρείται.\n-Φυλάκιση\n-Αφαίρεση της άδειας οδηγού\nΣ’ άλλες χώρες του κόσμου, μόλις ένας τέτοιος οδηγός συλληφθεί, η αστυνομία του\nαφαιρεί τις πινακίδες και την άδεια οδήγησης. Αυτά είναι τα πρώτα απαραίτητα μέτρα,\nώσπου να προσαχθεί ο οδηγός αυτός στο δικαστήριο για επιβολή της ποινής που\nπροβλέπεται από τον νόμο.\nΣτο παρελθόν χαρακτηρίσαμε τους ανθρώπους αυτούς ως ανθρώπους χωρίς συνείδηση,\nανθρώπους επιπόλαιους, δειλούς, σκληρούς, για τους οποίους οι έννοιες της ανθρωπιάς\nκαι της ευσπλαχνίας είναι άγνωστες. Είναι δυστυχώς, όμως, όχι σπάνιες οι περιπτώσεις που\nοδηγοί, αφού προκαλέσουν σοβαρό δυστύχημα ή αφού παρασύρουν πεζό, ποδηλάτη ή\nμοτοσικλετιστή, φεύγουν από τη σκηνή του δυστυχήματος, εγκαταλείποντας τα θύματά\nτους αιμόφυρτα.\nΗ Αστυνομία ζητεί απ’ όλους, από το κοινό και από τον τύπο, να βοηθήσουν στο έργο της\nκαι να συνδράμουν με τον τρόπο τους στη σύλληψη τέτοιων ασυνείδητων οδηγών και να\nτους παρουσιάσουν στο δικαστήριο, για να δικαστούν.\nΥπουργείο Παιδείας και Πολιτισμού Κύπρου, Συνάντηση με τη Γλώσσα, Α’ Γυμνασίου, Λευκωσία 2000, σ.107. Διασκευάστηκε για τις ανάγκες των εξετάσεων", "sub": [{"type": "mcq", "q": "Σύμφωνα με το κείμενο:", "options": ["Η Κυβέρνηση αποφάσισε να επιβάλει ποινές στους απρόσεκτους οδηγούς", "Το Δικαστήριο επέβαλε αυστηρές ποινές στους κακούς οδηγούς", "Το Συμβούλιο της Ευρώπης έδωσε οδηγίες στις χώρες μέλη του να βελτιώσουν τους κανονισμούς οδικής συμπεριφοράς"], "answer": 2}, {"type": "mcq", "q": "H οδηγία του Συμβουλίου της Ευρώπης αφορούσε:", "options": ["επιβολή αυστηρών ποινών σε όσους οδηγούς τρέχουν", "βίαιη αντίδραση από τους τροχονόμους", "επιβολή αυστηρών ποινών στους ασυνείδητους οδηγούς"], "answer": 2}, {"type": "mcq", "q": "Σύμφωνα με το κείμενο, οι οδηγοί χωρίς συνείδηση θεωρούνται:", "options": ["βιαστικοί και υβριστικοί", "επιπόλαιοι και σκληροί", "εγωιστές και αντικοινωνικοί"], "answer": 1}, {"type": "mcq", "q": "Σε άλλες χώρες, σύμφωνα με το κείμενο, όταν ένας ασυνείδητος οδηγός συλληφθεί:", "options": ["Η αστυνομία τον βάζει φυλακή", "Η αστυνομία τον παραπέμπει στον εκπαιδευτή οδήγησης", "Η αστυνομία του αφαιρεί τις πινακίδες και την άδεια οδήγησης"], "answer": 2}, {"type": "mcq", "q": "Ο νόμος προβλέπει για τον ασυνείδητο οδηγό:", "options": ["το δικαστήριο να του επιβάλει ποινή", "ο τροχονόμος να τον καλέσει στο αστυνομικό τμήμα για την τιμωρία", "ο διοικητής της αστυνομίας να του αφαιρέσει τις πινακίδες κυκλοφορίας"], "answer": 0}, {"type": "mcq", "q": "Η Αστυνομία ασκεί βία στους ασυνείδητους οδηγούς", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Το Συμβούλιο της Ευρώπης ζητεί από τις χώρες της Ευρωπαϊκής Ένωσης να μη δίνεται άδεια οδήγησης στους αλκοολικούς", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Συνιστάται η απόσυρση των παλαιών αυτοκινήτων από την κυκλοφορία", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Οι ασυνείδητοι οδηγοί είναι υπεύθυνοι πολίτες", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "«Η αστυνομία του αφαιρεί τις πινακίδες». Η αντωνυμία “του” απαντάει στην ερώτηση:", "options": ["Ποιος;", "Τι;", "Σε ποιον;"], "answer": 2}, {"type": "mcq", "q": "…«φεύγοντας» από τη σκηνή του δυστυχήματος. Η μετοχή με ποια πρόταση ισοδυναμεί;", "options": ["επειδή φεύγουν από τη σκηνή του δυστυχήματος", "με σκοπό να φεύγουν από τη σκηνή του δυστυχήματος", "με το να φεύγουν από τη σκηνή του δυστυχήματος"], "answer": 2}, {"type": "mcq", "q": "«Ένας οδηγός κτυπά και φεύγει εγκαταλείποντας το θύμα του». Η ίδια πρόταση, όταν δηλώνει παρελθόν, γίνεται:", "options": ["Ένας οδηγός θα κτυπήσει και θα φύγει εγκαταλείποντας το θύμα του", "Ένας οδηγός θα κτυπάει και θα φεύγει εγκαταλείποντας το θύμα του", "Ένας οδηγός κτύπησε και έφυγε εγκαταλείποντας το θύμα του"], "answer": 2}, {"type": "mcq", "q": "δυστυχώς: Ποια από τις παρακάτω λέξεις έχει αντίθετη σημασία;", "options": ["ακριβώς", "ευτυχώς", "περιέργως"], "answer": 1}, {"type": "mcq", "q": "Τι δηλώνει η παρακάτω πρόταση «εφόσον στις συστάσεις και προειδοποιήσεις επιδεικνύεται αδιαφορία»;", "options": ["σκοπό", "αιτία", "αποτέλεσμα"], "answer": 1}, {"type": "mcq", "q": "Το Συμβούλιο της Ευρώπης ________ τις χώρες μέλη του:", "options": ["απαίτησε", "συμβούλευσε", "εμπιστεύτηκε"], "answer": 1}, {"type": "typed", "q": "Να κάνετε αλλαγές στις λέξεις χωρίς να διαφοροποιηθεί το νόημα της πρότασης: Οι χώρες βελτιώνουν τους κανονισμούς οδικής κυκλοφορίας-> Οι κανονισμοί οδικής κυκλοφορίας ______________________", "a": "(Οι κανονισμοί οδικής κυκλοφορίας) βελτιώνονται από τις χώρες"}, {"type": "typed", "q": "Να συμπληρώσετε το κενό με τον κατάλληλο τύπο του ρήματος: Ένας ασυνείδητος οδηγός κτυπά και εγκαταλείπει το θύμα του -> Χθες το πρωί, μια στιγμή, ένας ασυνείδητος οδηγός ____________________", "a": "(Χθες το πρωί, μια στιγμή, ένας ασυνείδητος οδηγός) κτύπησε και"}, {"type": "mcq", "q": "Στην πρόταση «Μια είδηση μας ήρθε πρόσφατα από το Συμβούλιο της Ευρώπης» η λέξη «πρόσφατα» σημαίνει:", "options": ["παλαιότερα", "προσεχώς", "τελευταία"], "answer": 2}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Στη γειτονιά σας συγκρούστηκαν δυο αυτοκίνητα. Το περιστατικό έγινε μπροστά σας και βοηθήσατε τον οδηγό που χτύπησε. Να περιγράψετε το συμβάν με ένα δικό σας κείμενο που θα το δημοσιεύσετε στην τοπική εφημερίδα."}, {"type": "reading", "cat": "reading", "id": "read_087", "title": "!", "passage": "«Αποκατάσταση του σπιτιού του Παύλου Μελά»\nΟ Παύλος Μελάς έχασε τη ζωή του πολεμώντας για την πατρίδα στις 13 Οκτωβρίου του\n1904, στη Στάτιτσα της Καστοριάς, όπου οργάνωσε τον ένοπλο αγώνα για την\nαπελευθέρωση της Μακεδονίας. Εκατόν δεκαέξι χρόνια μετά, ανήμερα την επέτειο του\nθανάτου του, η Πρόεδρος της Δημοκρατίας Κατερίνα Σακελλαροπούλου παρέστη χθες\nβράδυ, μαζί με την ηγεσία του Υπουργείου Εθνικής Άμυνας και άλλων επισήμων στην\nτελετή αποκατάστασης της οικίας του, στην Κηφισιά, η οποία ολοκληρώθηκε πρόσφατα.\nΤαυτισμένο με το πνεύμα των ευρωπαϊκών εξοχικών του 19ου αιώνα, το οικοδόμημα που\nείχε σχεδιάσει ο ίδιος ο Παύλος Μελάς τραβά αμέσως το βλέμμα για την ομορφιά του. Από\nτο κατώφλι του έφυγε για τη Μακεδονία, γνωρίζοντας ότι δεν θα επέστρεφε. Η οικία\nγνώρισε τη φθορά και την εγκατάλειψη για πολλά χρόνια, αλλά τώρα στέκει υπερήφανη και\nκομψή, χάρη στη γενναιόδωρη συνεισφορά ενός χορηγού, αλλά και την έγνοια που έδειξε\nη ηγεσία του Υπουργείου Εθνικής Άμυνας. Το έργο, βεβαίως, δεν θα είχε προχωρήσει, αν η\nεγγονή του Παύλου Μελά δεν είχε προβεί σε δωρεά του ακινήτου προς το Υπουργείο. Την\nεφαρμογή της μελέτης έκανε η αστική, μη κερδοσκοπική Εταιρεία Δράμας «Κύκλωψ» , ενώ\nτο Υπουργείο Πολιτισμού και Αθλητισμού έβαλε τα δυνατά του, ώστε να γίνουν όλα\nγρήγορα.\nΣτον χαιρετισμό της, η Κυρία Πρόεδρος υπογράμμισε: «Ευγενής ιδεολόγος, οραματιστής\nμιας ελεύθερης, ελληνικής Μακεδονίας, ο Παύλος Μελάς έδωσε το σύνθημα για την\nουσιαστική έναρξη του Μακεδονικού Αγώνα και έγινε σύμβολο του αγώνα για το καλό και\nτο δίκαιο».\nΔιασκευή για τις ανάγκες των εξετάσεων από τον Ημερήσιο Τύπο, Δεκέμβριος 2020", "sub": [{"type": "mcq", "q": "Σύμφωνα με το κείμενο, ο Παύλος Μελάς πέθανε:", "options": ["στη Λάρισα", "στην Αθήνα", "στη Στάτιτσα"], "answer": 2}, {"type": "mcq", "q": "Η οικία του Παύλου Μελά ξεχωρίζει για:", "options": ["τον μεγάλο κήπο της", "την ομορφιά της", "την πισίνα"], "answer": 1}, {"type": "mcq", "q": "Η Πρόεδρος της Δημοκρατίας:", "options": ["μίλησε για τον Παύλο Μελά", "παρευρέθηκε στην τελετή μόνη της", "σχεδίασε το οικοδόμημα"], "answer": 0}, {"type": "mcq", "q": "Η τελετή αποκατάστασης της οικίας του Π. Μελά έλαβε χώρα:", "options": ["στον Πειραιά", "στην Κυψέλη", "στην Κηφισιά"], "answer": 2}, {"type": "mcq", "q": "Η κ. Σακελλαροπούλου χαρακτήρισε τον Π. Μελά ως:", "options": ["καλόκαρδο", "οραματιστή", "αξιωματικό"], "answer": 1}, {"type": "tf", "t": "Η τελετή αποκατάστασης της οικίας του Παύλου Μελά δεν ολοκληρώθηκε ακόμα.", "a": false}, {"type": "tf", "t": "Ο Παύλος Μελάς σκοτώθηκε στις 13 Οκτωβρίου 1915.", "a": false}, {"type": "tf", "t": "Η οικία παραχωρήθηκε ως δωρεά στο υπουργείο.", "a": true}, {"type": "tf", "t": "Ο Παύλος Μελάς έγινε σύμβολο του αγώνα για το δίκαιο.", "a": true}, {"type": "mcq", "q": "«Η οικία γνώρισε τη φθορά». Η ίδια πρόταση στο παρόν είναι:", "options": ["Η οικία θα γνωρίζει τη φθορά", "Η οικία έχει γνωρίσει τη φθορά", "Η οικία τώρα γνωρίζει τη φθορά"], "answer": 2}, {"type": "mcq", "q": "γρήγορα: Ποια από τις παρακάτω λέξεις έχει αντίθετη σημασία;", "options": ["νωρίς", "πριν", "αργά"], "answer": 2}, {"type": "mcq", "q": "Τι δηλώνει η παρακάτω πρόταση «ώστε να γίνουν όλα γρήγορα»;", "options": ["αιτία", "αποτέλεσμα", "υπόθεση"], "answer": 1}, {"type": "mcq", "q": "«Η οικία στέκει υπερήφανη». Η λέξη «υπερήφανη» σημαίνει:", "options": ["καμαρωτή", "πανέμορφη", "στολισμένη"], "answer": 0}, {"type": "mcq", "q": "Η κυρία Πρόεδρος:", "options": ["τόνισε ιδιαίτερα", "ανέφερε", "είπε"], "answer": 0}, {"type": "typed", "q": "Να κάνετε αλλαγές στις λέξεις χωρίς να διαφοροποιηθεί το νόημα της πρότασης: Ο Παύλος Μελάς έδωσε το σύνθημα -> Το σύνθημα _________ από ____ ________ _________", "a": "(Το σύνθημα) δόθηκε (από) τον Παύλο Μελά"}, {"type": "mcq", "q": "Στην πρόταση «Από το κατώφλι του έφυγε για τη Μακεδονία» η λέξη «κατώφλι» σημαίνει:", "options": ["κρεβάτι", "είσοδος σπιτιού", "κουζίνα"], "answer": 1}, {"type": "typed", "q": "Να συμπληρώσετε το κενό με τον κατάλληλο τύπο του ρήματος: Ο Παύλος Μελάς οργάνωσε τον ένοπλο αγώνα-> Ο ένοπλος αγώνας ________ από ____ _________ __________", "a": "(Ο ένοπλος αγώνας) οργανώθηκε (από) τον Παύλο Μελά"}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Επισημαίνουμε ότι δεν πρέπει να υπογράψετε με το ονοματεπώνυμό σας στο τέλος του κειμένου. Κάθε χώρα έχει τους ήρωές της που τους τιμάει για την προσφορά τους. Γράψτε ένα σύντομο ηλεκτρονικό κείμενο σε έναν συνάδελφό σας από άλλη χώρα, αναφέροντάς του τα χαρακτηριστικά μιας προσωπικότητας από την ελληνική ιστορία που εκτιμάτε."}, {"type": "reading", "cat": "reading", "id": "read_088", "title": "!", "passage": "Η νεανική βία και ο ρόλος των γονέων\n«Αν θέλεις να καταπολεμήσεις τη νεανική βία, πρέπει να απευθυνθείς στους γονείς νηπίων\nκαι παιδιών, γιατί η βία ξεκινάει στο σπίτι». Σε αυτή την παραδοχή στηρίχθηκε η Ένωση\nΑμερικάνων Ψυχολόγων, όταν το 2000 αναζητούσε τρόπους, για να αντιμετωπίσει την\nαυξανόμενη εφηβική και νεανική βία.\n«Μας ανησυχούσε η έξαρση της βίας και δημιουργήσαμε ένα πρόγραμμα που να\nστηρίζεται σε ερευνητικά δεδομένα», εξηγεί η Μισέλ Νοξ, καθηγήτρια Ψυχιατρικής στο\nΟχάιο. Η φιλοσοφία του Προγράμματος είναι η πρόληψη, δήλωσε. Θέλουμε να διδάξουμε\nστους γονείς από πολύ νωρίς να μεγαλώνουν τα παιδιά τους με τρόπο αποτελεσματικό και\nμη βίαιο. Πάμε όπου βρίσκονται γονείς, στο σχολείο, στο νοσοκομείο, στη φυλακή. Στόχος\nμας είναι να τους κάνουμε τους καλύτερους γονείς που μπορούν να γίνουν. Η βία, ώς\nγνωστόν, γεννάει βία.\n«Μέχρι τώρα, οτιδήποτε έκανε το παιδί μου – είτε έκανε φασαρία είτε δεν ανταποκρινόταν\nστο κάλεσμά μου – το χτυπούσα, κι ας μην είχε κλείσει ένα χρόνο ζωής», παραδέχθηκε προ\nετών η μητέρα ενός 11μηνου παιδιού, που είχε συμμετάσχει στο πρόγραμμα. «Αντιδρούσα\nέτσι, επειδή αυτό έκαναν και σε εμένα οι γονείς μου, τώρα όμως σταμάτησα το ξύλο στο\nπαιδί», ομολόγησε στην κ. Νοξ.\nΤα πρόσωπα που καθορίζουν το πώς εμείς μεγαλώνουμε τα παιδιά μας είναι πρώτον οι\nδικοί μας γονείς, οι παιδίατροί μας, οι θρησκευτικοί μας ηγέτες και, στο τέλος, έρχονται, οι\nεπαγγελματίες ψυχικής υγείας, σύμφωνα με τον Παγκόσμιο Οργανισμό Υγείας. ‘Οσοι,\nλοιπόν, θέλουν να σταματήσουν τη μεταφορά της βίας, στοχεύουν στη διαχείριση του\nθυμού των γονέων και έχουν εξαιρετικά αποτελέσματα σε μεγάλο ποσοστό των γονέων.\nΣημαντικά είναι τα οφέλη στα παιδιά τους, αφού μειώνονται τα προβλήματα συμπεριφοράς\nκαι η επιθετικότητα.", "sub": [{"type": "tf", "t": "Για να καταπολεμήσουμε τη νεανική βία, πρέπει να λείψει η βία από την οικογένεια.", "a": true}, {"type": "tf", "t": "Η Ένωση Αμερικάνων Ψυχολόγων δημιούργησε ερευνητικό πρόγραμμα για τη νεανική βία.", "a": true}, {"type": "tf", "t": "Βασική αρχή του Προγράμματος αντιμετώπισης της βίας είναι η πρόληψη.", "a": true}, {"type": "tf", "t": "Οι ερευνητές δεν επισκέπτονται γονείς στη φυλακή.", "a": false}, {"type": "tf", "t": "Η διαχείριση του θυμού από τους γονείς δεν ενδιαφέρει τους ερευνητές. Σημειώστε στο τετράδιο τον αριθμό της άσκησης και τη σωστή απάντηση.", "a": false}, {"type": "mcq", "q": "Στην έρευνα που παρουσιάζει το κείμενο, αναφέρεται η μαρτυρία μιας μητέρας:", "options": ["Παιδιού 11 χρονών", "Εφήβου 18 χρονών", "Παιδιού 11 μηνών"], "answer": 2}, {"type": "mcq", "q": "Σύμφωνα με το κείμενο:", "options": ["Η Μισέλ Νοξ ήταν καθηγήτρια της Κοινωνιολογίας", "Η Μισέλ Νοξ ήταν καθηγήτρια στο Σικάγο", "Η Μισέλ Νοξ ήταν καθηγήτρια Ψυχιατρικής στο Οχάιο"], "answer": 2}, {"type": "mcq", "q": "Το πώς μεγαλώνουμε τα παιδιά μας καθορίζεται:", "options": ["από τους δασκάλους και από τους κοινωνικούς λειτουργούς", "από τους φίλους και τους συγγενείς", "από τους γονείς, τους παιδιάτρους και τους θρησκευτικούς ηγέτες."], "answer": 2}, {"type": "mcq", "q": "Η έρευνα των Αμερικάνων ψυχολόγων που αναφέρεται στο κείμενο:", "options": ["Διεξήχθη το 2020", "Διεξήχθη το 1990", "Διεξήχθη το 2000"], "answer": 2}, {"type": "mcq", "q": "Στην πρόταση «Δημιουργήσαμε ένα πρόγραμμα», η λέξη «δημιουργήσαμε» σημαίνει:", "options": ["οργανώσαμε", "κατασκευάσαμε", "αναζητήσαμε"], "answer": 0}, {"type": "mcq", "q": "Στην πρόταση «να στηρίζεται σε ερευνητικά δεδομένα», η λέξη «στηρίζεται» σημαίνει:", "options": ["προβλέπει", "εκμεταλλεύεται", "αξιοποιεί"], "answer": 2}, {"type": "mcq", "q": "Στην πρόταση «Η φιλοσοφία του Προγράμματος είναι η πρόληψη», η λέξη με αντίθετη σημασία από τη λέξη «πρόληψη» είναι:", "options": ["θεραπεία", "επίθεση", "έμπνευση"], "answer": 0}, {"type": "mcq", "q": "Στην πρόταση «είτε έκανε φασαρία», η λέξη με αντίθετη σημασία από τη λέξη «φασαρία» είναι:", "options": ["ησυχία", "θόρυβος", "αταξία Ξαναγράψτε στο τετράδιό σας τον αριθμό της άσκησης και την αντίστοιχη πρόταση/ φράση ξεκινώντας με τον τρόπο που σας δίνεται:"], "answer": 0}, {"type": "typed", "q": "Στοχεύουμε στη διαχείριση του θυμού των γονέων. Στοχεύουμε οι γονείς να _____ .", "a": "να διαχειριστούν τον θυμό τους ή να διαχειρίζονται τον θυμό"}, {"type": "typed", "q": "Η βία γεννάει βία. Η βία _____ από τη βία.", "a": "γεννιέται"}, {"type": "typed", "q": "Δεν ανταποκρίνονταν στο κάλεσμά μου. Χθες οι φίλοι μου δεν _____ στο κάλεσμά μου. Γράψτε στον άλλο αριθμό τις φράσεις:", "a": "δεν ανταποκρίθηκαν"}, {"type": "typed", "q": "Oι θρησκευτικοί ηγέτες _____ ..", "a": "ο θρησκευτικός ηγέτης"}, {"type": "typed", "q": "Εξαιρετικά αποτελέσματα _____ ..", "a": "εξαιρετικό αποτέλεσμα"}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Ένας φίλος σου έχει μια κόρη 10 χρονών, που σε κάθε αταξία της την τιμωρεί σκληρά, με ξύλο και στερήσεις. Σκέπτεσαι να τον βοηθήσεις και τους λες τη γνώμη σου και τις συμβουλές σου, ώστε να γίνει καλύτερος πατέρας. Γράψε τί θα του έλεγες."}, {"type": "reading", "cat": "reading", "id": "read_089", "title": "!", "passage": "Μπορούμε να ξεπεράσουμε τη θλίψη.\n[https://popaganda.gr/wp-content/uploads/2021/09]\nΕίναι φυσιολογικό να αισθανόμαστε βαθιά στενοχώρια και θλίψη στις\nδύσκολες στιγμές της ζωής, όπως όταν προσβαλλόμαστε από κάποια σοβαρή\nασθένεια, όταν νιώθουμε μοναξιά, όταν λυπόμαστε για τον θάνατο κάποιου δικού μας\nανθρώπου, όταν χωρίζουμε ή χάνουμε τη δουλειά μας. Σίγουρα υπάρχουν τρόποι για\nνα αντιμετωπίσουμε τέτοιες δυσάρεστες καταστάσεις, ώστε να νιώσουμε καλύτερα και\nνα βρούμε πάλι την αισιοδοξία μας.\nΩστόσο, αν η λύπη μας διαρκεί πολύ καιρό, αν νιώθουμε πόνους στο σώμα ή\nδεν έχουμε όρεξη να φάμε, αν δεν μπορούμε να κοιμηθούμε και έχουμε αυξημένο\nάγχος, τότε σκόπιμο θα ήταν να αναζητήσουμε τη βοήθεια ενός ειδικού. Βέβαια,\nυπάρχουν και πρακτικοί τρόποι για να ξεπεράσουμε τη συνεχή θλίψη ή να\nβοηθήσουμε άλλους να την ξεπεράσουν:\nΜοιραζόμαστε ό,τι μας απασχολεί. Είναι πολύ σημαντικό να μιλάμε για τα\nσυναισθήματα, τα προβλήματα και τις δυσκολίες της καθημερινής ζωής σε\nανθρώπους που εμπιστευόμαστε. Όταν αποκαλύπτουμε τον πόνο και τη στενοχώρια\nμας, τότε και εμείς νιώθουμε πιο ήρεμοι, διότι οι δυσκολίες μοιάζουν μικρότερες και\nλιγότερο σημαντικές, και αφήνουμε στους άλλους το περιθώριο να μας βοηθήσουν.\nΚαλοπιάνουμε τον εαυτό μας. Φροντίζοντας το σώμα και γενικότερα την\nεμφάνισή μας, αισθανόμαστε καλύτερα και η ιδέα που έχουμε για τον εαυτό μας\nβελτιώνεται. Η προσεγμένη εμφάνιση, σε συνδυασμό με την υγιεινή διατροφή, τον\nκαλό ύπνο και την άσκηση, κάνουν τις αρνητικές σκέψεις να απομακρύνονται.\nΚάνουμε σχέδια για το μέλλον. Είναι, πράγματι, δύσκολο να έχουμε στόχους,\nνα ονειρευόμαστε και να σχεδιάζουμε το μέλλον μας μετά από ένα δυσάρεστο γεγονός\nή όσο βρισκόμαστε κάτω από την επίδραση μιας θλιβερής κατάστασης. Όταν\nκαταφέρουμε, πάντως, να σκεφτούμε το μέλλον, νιώθουμε πιο όμορφα, αποκτάμε\nαισιοδοξία και η ζωή μας μοιάζει να βρίσκει σκοπό και νόημα.\n[Ανυπόγραφο κείμενο από το περιοδικό της εταιρείας Hondos Center, στήλη «Υγεία», σελ. 99, Φθινόπωρο 2010. –\nδιασκευή για τις ανάγκες των εξετάσεων]", "sub": [{"type": "mcq", "q": "Η αντίδραση του ανθρώπου, όταν μαθαίνει ότι έχει κάποια σοβαρή ασθένεια, είναι η βαθιά λύπη.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Είναι φυσιολογικό να είμαστε περισσότερο στενοχωρημένοι όταν χωρίζουμε παρά όταν χάνουμε τη δουλειά μας.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Δεν υπάρχει άνθρωπος που να μην έχει αισθανθεί θλίψη κάποια στιγμή στη ζωή του.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 2}, {"type": "mcq", "q": "Όταν καταλάβουμε ότι η λύπη μας διαρκεί πολύ πρέπει να αναζητήσουμε τη βοήθεια του γιατρού.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Πρέπει να αφήνουμε τους γνωστούς και τους φίλους μας να μας βοηθήσουν, όταν αισθανόμαστε δύσκολα.", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "«Υπάρχουν πρακτικοί τρόποι» για να ξεπεράσουμε τη θλίψη μας σημαίνει:", "options": ["υπάρχουν τρόποι να μην είμαστε ποτέ λυπημένοι ·", "υπάρχουν καταστάσεις που βοηθούν να είμαστε χαρούμενοι ·", "υπάρχουν τρόποι που θα μας βοηθήσουν να αισθανθούμε πάλι καλά."], "answer": 2}, {"type": "mcq", "q": "Όταν μοιραζόμαστε με τους άλλους τα προβλήματά μας", "options": ["δείχνουμε ότι τους εμπιστευόμαστε ∙", "μαθαίνουμε να ακούμε τις συμβουλές τους ∙", "τους δίνουμε ρασα ένα\nμικροσκοπικό σπιτάκι. Τη δεκαετία του ’70 προμήθειες κάναμε από ένα μικρό μπακάλικο\nπου πουλούσε τα πάντα, από πατάτες μέχρι ουίσκι. Οι μεταφορές γίνονταν με γαϊδουράκια,\nλιμάνι δεν υπήρχε, επιβάτες και προϊόντα έμπαιναν στις βάρκες. Αυτό που έκανε τη Σίκινο\nνα ξεχωρίζει από τότε ήταν οι άνθρωποί της και ο τρόπος που διατηρούν την παράδοση,\nτα πανηγύρια και τις γιορτές».\nΑπό τον καθημερινό τύπο, Νοέμβριος 2020. Διασκευάστηκε για τις ανάγκες των εξετάσεων", "sub": [{"type": "mcq", "q": "Ο Τέρι Χάρις", "options": ["γεννήθηκε στο Μόναχο", "μεγάλωσε στην Οξφόρδη", "καταγόταν από το Λονδίνο"], "answer": 2}, {"type": "mcq", "q": "Σύμφωνα με το κείμενο ο Τέρι Χάρις:", "options": ["αγάπησε την Ελλάδα, όταν γέρασε", "Αρχικά έβλεπε την Ελλάδα με το μυαλό στο Λονδίνο", "ερωτεύθηκε την Ελλάδα, όταν ήταν παιδί"], "answer": 2}, {"type": "mcq", "q": "Σύμφωνα με το κείμενο:", "options": ["Ο Τέρι Χάρις όργωσε μόνος του τα πελάγη", "Ο Τέρι Χάρις εγκαταστάθηκε στη Σκιάθο", "Ο Τέρι Χάρις αγόρασε ένα σπιτάκι στη Σίκινο"], "answer": 2}, {"type": "mcq", "q": "Ο συγγραφέας θαυμάζει τον Τέρι Χάρις σύμφωνα με το κείμενο:", "options": ["γιατί μένει στην Ελλάδα", "γιατί ακολούθησε τον πατέρα του στη Σκιάθο", "γιατί εγκαταστάθηκε στη Σίκινο και παραμένει στην άγονη γραμμή και τον χειμώνα"], "answer": 2}, {"type": "mcq", "q": "Σύμφωνα με το κείμενο ο Τέρι Χάρις:", "options": ["αγάπησε τους νησιώτες, γιατί ψάρευαν", "του άρεσε πολύ να ταξιδεύει σε όλο τον κόσμο", "ξεχώριζε τους Σικινιώτες , γιατί διατηρούσαν την παράδοση"], "answer": 2}, {"type": "mcq", "q": "Ο συγγραφέας σκέπτεται τα μικρά νησιά του Αιγαίου χειμώνα- καλοκαίρι", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 1}, {"type": "mcq", "q": "Ένα από τα προβλήματα των κατοίκων των μικρών νησιών του Αιγαίου είναι αν θα φθάσουν εκεί έγκαιρα οι εκπαιδευτικοί", "options": ["Σωστό", "Λάθος", "Δεν αναφέρεται"], "answer": 0}, {"type": "mcq", "q": "Οι ξένοι που παραμένουν στα μικρά νησιά τον χειμώνα είναι αξιοθαύμαστοι" .\n-Τη νύχτα ο Αντρέας δεν κοιμήθηκε διόλου, είπε. Αρρώστησε ο πατέρας του και πήγε να\nφέρει τον γιατρό. Μα ο γιατρός δεν ήταν στο χωριό, γι’ αυτό χρειάστηκε να πάει ως τα\nΔεντρά, για να τον βρει και να τον φέρει.\nΈπειτα, άρχισε το μάθημα, μα κανείς δεν είχε νου ν’ ακούσει. Έβρεχε έξω σιγανά κι\nόλων η σκέψη ήταν στη χτεσινή τη νύχτα, που ερχόταν η μπόρα η μεγάλη και φύσαγε ο\nαέρας να ξεριζώσει δέντρα και πήρε σκεπές. Εκείνη την ώρα ο Αντρέας-που το έλεγε πως\nαγριεύεται στα σκοτάδια- περπατούσε ολομόναχος να φέρει τον γιατρό.\nΣτο διάλειμμα πήγα κοντά του:\n-Είδες, του είπα, μας κορόιδευες όλους τόσο καιρό. Δεν φοβήθηκες διόλου χτες τη νύχτα..\n-Φοβήθηκα! Ποιος το είπε πως δε φοβήθηκα; Έκαμε νυσταγμένα. Κι έφυγε!\nΓαλάτεια Σαράντη, ΟΕΔΒ, Αθήνα 1982, «Η Γλώσσα μου», σσ. 54-55. Διασκευάστηκε για τις ανάγκες των εξετάσεων.", "sub": [{"type": "mcq", "q": "Αρχηγός ήταν ________ , ο Πότης και ο Βαγγέλης", "options": ["ο Αντρέας", "ο Γιάννης", "ο συγγραφέας"], "answer": 2}, {"type": "mcq", "q": "Τη νύχτα ο Αντρέας…", "options": ["κοιμήθηκε πολύ βαθιά", "διάβαζε ένα βιβλίο", "δεν κοιμήθηκε καθόλου"], "answer": 2}, {"type": "mcq", "q": "Εμείς κανονίζαμε πότε θα παίξουμε πόλεμο. Ποιοι εννοούνται με το εμείς;", "options": ["Ο συγγραφέας και ο Αντρέας", "Ο Αντρέας και ο αδελφός του", "Ο συγγραφέας, ο Πότης και ο Βαγγέλης"], "answer": 2}, {"type": "mcq", "q": "Ο Αντρέας δεν ήταν καλός…", "options": ["στα μαθήματα", "στο τρέξιμο", "ούτε στα μαθήματα ούτε στο τρέξιμο"], "answer": 2}, {"type": "mcq", "q": "«Όταν ο πατέρας αρρώστησε τη νύχτα, ο Αντρέας…..»", "options": ["αδιαφόρησε", "πήγε να φέρει τον γιατρό", "κοιμήθηκε"], "answer": 1}, {"type": "mcq", "q": "Ποιο από τα παρακάτω δεν ήταν χαρακτηριστικό του Αντρέα;", "options": ["ήσυχος", "αρχηγός", "φοβιτσιάρης"], "answer": 1}, {"type": "mcq", "q": "«Μιλούσαμε ακόμα και για φαντάσματα!» σημαίνει:", "options": ["Συζητούσαμε για μυθικούς ήρωες", "Μιλούσαμε για εξωγήινους", "Συζητούσαμε για πλάσματα της φαντασίας μας"], "answer": 2}, {"type": "tf", "t": "Ο Αντρέας ήταν πάντα αρχηγός", "a": false}, {"type": "tf", "t": "Ο Αντρέας χρειάστηκε να πάει ως τα Δεντρά", "a": true}, {"type": "mcq", "q": "αγριεύεται: ποια λέξη έχει την ίδια σημασία;", "options": ["θυμώνει", "τρομάζει", "χαίρεται"], "answer": 1}, {"type": "mcq", "q": "Ποια από τις παρακάτω λέξεις ή φράση δηλώνει χρόνο;", "options": ["διόλου", "τη νύχτα", "σιγανά"], "answer": 1}, {"type": "mcq", "q": "“περπατούσε ολομόναχος”: Ποια φράση έχει την ίδια σημασία με το «ολομόναχος»;", "options": ["δύο- δύο", "τελείως μόνος", "με παρέα"], "answer": 1}, {"type": "mcq", "q": "Η λέξη «ξάφνιασμα» στο κείμενο σημαίνει:", "options": ["χαρά", "απογοήτευση", "έκπληξη"], "answer": 2}, {"type": "mcq", "q": "υπερφυσικές: Ποια από τις παρακάτω λέξεις έχει παρόμοια σημασία;", "options": ["εντυπωσιακές", "εξωπραγματικές", "φυσικές"], "answer": 1}, {"type": "mcq", "q": "Ποια λέξη έχει την ίδια σημασία με τη λέξη «κρυφά»;", "options": ["φανερά", "ήρεμα", "μυστικά"], "answer": 2}, {"type": "mcq", "q": "“οι άγριες ιστορίες” -> η:", "options": ["άγριας ιστορίας", "άγρια ιστορία", "άγριων ιστοριών"], "answer": 1}, {"type": "typed", "q": "Να μεταφέρετε την πρόταση στον άλλο αριθμό: Μπήκε ο δάσκαλος στην τάξη _______________ στις τάξεις", "a": "Μπήκαν οι δάσκαλοι"}, {"type": "typed", "q": "Να αλλάξετε τον τύπο του ρήματος στη δεύτερη πρόταση: «Τότε κανένας δεν το ομολογούσε» «Τώρα κανένας δεν το ___________»", "a": "ομολογεί"}], "writing": "Διαβάστε με προσοχή το παρακάτω θέμα και γράψτε το δικό σας κείμενο (80-100 λέξεις). Να γράψετε στο ημερολόγιό σας μια παιδική περιπέτεια που ζήσατε με τους φίλους σας και σας έμεινε αξέχαστη."}, {"type": "reading", "cat": "reading", "id": "read_094", "title": "!", "passage": "« Διαδρομές των ολυμπιονικών… »\nΟ Διαγόρας ο Ρόδιος θα έφθανε με καράβι στην Αθήνα και στη συνέχεια από την\nξηρά θα περνούσε τον Ισθμό (στην αρχαία εποχή δεν υπήρχε η διώρυγα του Ισθμού) και\nμέσω βόρειας Πελοποννήσου θα έφθανε στην Ολυμπία.\nΟ Μίλων ο Κροτωνιάτης, που θα ξεκινούσε με καράβι από την Κάτω Ιταλία, θα\nπερνούσε νότια από την Πελοπόννησο, για να φθάσει στη Νεμέα και από εκεί μέσω ξηράς\nθα έφθανε στην Ολυμπία.\nΟ Πυθαγόρας ο Θάσιος θα πήγαινε με καράβι στη Θεσσαλονίκη ή την Καβάλα και\nαπό εκεί, διασχίζοντας από την ξηρά την κεντρική Ελλάδα, θα έφθανε στους Δελφούς. Ένας\nτρόπος να πάει στην Ολυμπία, συνεχίζοντας τον δρόμο της ξηράς, ήταν να περάσει τον\nΙσθμό. Άλλη επιλογή του ήταν μετά τους Δελφούς να πάει με καράβι στην Ολυμπία.\nΟ Πυθαγόρας ο Θάσιος, αφού επιβιβάστηκε σ’ ένα πλοίο από τη Θάσο, την πατρίδα\nτου, πέρασε στην απέναντι όχθη και αποβιβάστηκε στην περιοχή της Θεσσαλονίκης. Από\nεκεί έπρεπε ν’ ακολουθήσει το δρόμο για τους Δελφούς από την ξηρά. Αλλά καθώς κατέβαινε\nπρος τη Θεσσαλία με τους συντρόφους του, τους βρήκε κακοκαιρία και δυνατές βροχές.\nΈτσι, αποφάσισαν ν’ αλλάξουν πορεία. Κάποιος πρότεινε να πάνε να κάνουν θυσία στο\nμαντείο της Δωδώνης και να πάρουν χρησμό για το ταξίδι τους. Πήραν λοιπόν τον δρόμο\nδυτικά, για να φθάσουν στο μαντείο. Ο καιρός, όμως, όλο και χειροτέρευε. Οι πλημμύρες\nπαρέσυραν δυο από τους συντρόφους του. Μετά από πολλές δυσκολίες και ταλαιπωρίες\nέφθασαν στη Δωδώνη και εκτέλεσαν τα θρησκευτικά τους καθήκοντα. Έμειναν εκεί, ώσπου\nνα βελτιωθεί ο καιρός, και μετά, μέσω της Στερεάς Ελλάδας, έφθασαν στους Δελφούς. Ένα\nκαράβι τους πέρασε στην Πελοπόννησο. Από κει και πέρα τα πράγματα ήταν εύκολα, για να\nφτάσουν στον προορισμό τους, την Ολυμπία.\nΞανθοπούλου Α.- Δημάκη Π., Τετράδιο Εργασιών Νεοελληνικής Γλώσσας, Α’Β’Γ’ Γυμνασίου, εκδ. Έννοια, Αθήνα 2006,\nσ.σ 67- 68. Διασκευάστηκε για τις ανάγκες των εξετάσεων", "sub": [{"type": "mcq", "q": "Ο Διαγόρας ο Ρόδιος θα έφθανε με καράβι:", "options": ["στον Ισθμό", "στη Θεσσαλονίκη", "στην Αθήνα"], "answer": 2}, {"type": "mcq", "q": "Ο Μίλων ο Κροτωνιάτης μέσω ξηράς θα έφθανε:", "options": ["στην Πελοπόννησο", "στη Νεμέα", "στην Ολυμπία"], "answer": 2}, {"type": "mcq", "q": "Η πατρίδα του Πυθαγόρα ήταν:", "options": ["η Θεσσαλία", "η Θεσσαλονίκη", "η Θάσος"], "answer": 2}, {"type": "mcq", "q": "Ο Πυθαγόρας, στον δρόμο για τη Θεσσαλία ήταν:", "options": ["μόνος του", "με τον πατέρα του", "με τους συντρόφους του"], "answer": 2}, {"type": "mcq", "q": "Ο Πυθαγόρας ταξίδευε με προορισμό:", "options": ["τον Όλυμπο", "τη Δωδώνη", "την Ολυμπία"], "answer": 2}, {"type": "mcq", "q": "Ο Μίλων θα περνούσε __________ από την Πελοπόννησο", "options": ["βόρεια", "δυτικά", "νότια"], "answer": 2}, {"type": "tf", "t": "Ο Πυθαγόρας πήρε χρησμό από το μαντείο των Δελφών", "a": false}, {"type": "tf", "t": "Ο Διαγόρας είχε καταγωγή από τη Ρόδο", "a": true}, {"type": "tf", "t": "Ο Πυθαγόρας αποβιβάστηκε στη Θεσσαλονίκη", "a": true}, {"type": "mcq", "q": "ξηρά: Ποια λέξη έχει παρόμοια σημασία;", "options": ["θάλασσα", "στεριά", "βυθός"], "answer": 1}, {"type": "mcq", "q": "“Επιβιβάστηκε σ’ ένα πλοίο από τη Θάσο”. Ποιος;", "options": ["Ο Μίλων", "Ο Πυθαγόρας", "Ο Διαγόρας"], "answer": 1}, {"type": "mcq", "q": "δυσκολίες: Ποια λέξη έχει αντίθετη σημασία;", "options": ["προβλήματα", "ευκολίες", "παρανομίες"], "answer": 1}, {"type": "mcq", "q": "«έμειναν» εκεί: Ποια σημασία έχει στο κείμενο;", "options": ["διέμειναν", "εγκαταστάθηκαν", "κοιμήθηκαν"], "answer": 0}, {"type": "mcq", "q": "«Θα έφθαναν στους Δελφούς». Ποιοι;", "options": ["Ο Διαγόρας και ο Μίλων", "Ο Μίλων και ο γιος του", "Ο Πυθαγόρας και οι σύντροφοί του"], "answer": 2}, {"type": "mcq", "q": "κατέβαινε: Ποια λέξη έχει αντίθετη σημασία;", "options": ["συνέχιζε", "έπεφτε", "ανέβαινε"], "answer": 2}, {"type": "mcq", "q": "εκτέλεσαν: Ποια σημασία έχει στο κείμενο;", "options": ["πέτυχαν", "πραγματοποίησαν", "σκότωσαν"], "answer": 1}, {"type": "typed", "q": "Να μεταφέρετε την πρόταση στον άλλο αριθμό: Αποφάσισαν ν’ αλλάξουν πορεία-> Αυτός___________________________", "a": "αποφάσισε ν’ αλλάξει πορεία"}, {"type": "typed", "q": "Να συμπληρώσετε το κενό με τον κατάλληλο τύπο του ρήματος: Τότε πήραν λοιπόν τον δρόμο δυτικά -> Τώρα ______ λοιπόν το
